<!DOCTYPE html>
<html lang="en" class="">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <title>AMP Center | Project D</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            pd: {
              teal: '#00F2EA',
              orange: '#FF5F00',
              dark: '#0b0f19',
              glass: 'rgba(255, 255, 255, 0.03)',
              glassBorder: 'rgba(255, 255, 255, 0.08)'
            }
          },
          animation: {
            'blob': 'blob 7s infinite',
            'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'flow-beam': 'flowBeam 2s linear infinite',
            'sweep-beam': 'sweepBeam 2s ease-in-out infinite'
          },
          keyframes: {
            blob: {
              '0%': { transform: 'translate(0px, 0px) scale(1)' },
              '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
              '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
              '100%': { transform: 'translate(0px, 0px) scale(1)' },
            },
            flowBeam: {
              '0%': { transform: 'translateY(-100%)' },
              '100%': { transform: 'translateY(200%)' }
            },
            sweepBeam: {
              '0%': { transform: 'translateX(-100%) skewX(-15deg)' },
              '100%': { transform: 'translateX(200%) skewX(-15deg)' }
            }
          }
        }
      }
    };
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap"
    rel="stylesheet">
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <script crossorigin="" src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin="" src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      background-color: #f9fafb;
      color: #111827;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      transition: background-color 0.3s, color 0.3s;
    }

    .dark body {
      background-color: #0b0f19;
      color: #f3f4f6;
    }

    .amp-card {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(0, 0, 0, 0.05);
      border-radius: 20px;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .dark .amp-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .amp-card:hover {
      transform: translateY(-4px);
      border-color: #00F2EA;
      box-shadow: 0 10px 30px -10px rgba(0, 242, 234, 0.15);
    }

    .amp-button {
      background: rgba(0, 0, 0, 0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 0, 0, 0.1);
      border-radius: 9999px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      color: #111;
    }

    .dark .amp-button {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #fff;
    }

    .amp-button::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 95, 0, 0.2), transparent);
      transform: translateX(-100%);
      transition: transform 0.5s ease;
    }

    .amp-button:hover::before {
      transform: translateX(100%);
    }

    .amp-button:hover {
      border-color: #FF5F00;
      box-shadow: 0 0 20px rgba(255, 95, 0, 0.3);
      transform: scale(1.02);
      color: #FF5F00;
    }

    .dark .amp-button:hover {
      color: white;
    }

    .amp-button.primary {
      background: rgba(255, 95, 0, 0.15);
      border-color: rgba(255, 95, 0, 0.5);
      color: #FF5F00;
    }

    .dark .amp-button.primary {
      color: white;
    }

    .amp-button.primary:hover {
      background: rgba(255, 95, 0, 0.3);
    }

    .glass-reveal {
      animation: glassReveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
      transform: translateY(20px) scale(0.95);
    }

    @keyframes glassReveal {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .stagger-1 {
      animation-delay: 0.1s;
    }

    .stagger-2 {
      animation-delay: 0.2s;
    }

    .stagger-3 {
      animation-delay: 0.3s;
    }

    .stagger-4 {
      animation-delay: 0.4s;
    }

    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.1);
      border-radius: 10px;
    }

    .dark ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 0, 0, 0.2);
    }

    .dark ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .toggle-checkbox:checked+.toggle-label {
      background-color: #FF5F00;
      border-color: #FF5F00;
    }

    .toggle-checkbox:checked+.toggle-label .toggle-thumb {
      transform: translateX(100%);
      border-color: #FF5F00;
    }

    .toggle-label {
      background-color: rgba(0, 0, 0, 0.1);
      border: 1px solid rgba(0, 0, 0, 0.2);
    }

    .dark .toggle-label {
      background-color: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .tree-line-v {
      width: 1px;
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0.2), transparent);
    }

    .dark .tree-line-v {
      background: linear-gradient(to bottom, rgba(255, 255, 255, 0.2), transparent);
    }

    .tree-line-h {
      height: 1px;
      background: rgba(0, 0, 0, 0.2);
    }

    .dark .tree-line-h {
      background: rgba(255, 255, 255, 0.2);
    }

    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>

<body>
  <div class="fixed inset-0 w-full h-full overflow-hidden pointer-events-none z-0 bg-gray-50 dark:bg-[#0b0f19]"
    id="bg-container"></div>
  <div id="root" class="relative z-10 w-full min-h-[100dvh] flex text-gray-800 dark:text-gray-200"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Initialize Supabase - USER MUST REPLACE THESE WITH ACTUAL KEYS
    const SUPABASE_URL = 'https://alkknerlktomzolqlntt.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_3Pip4_Ta8kBDSkUkM5-AGw_SCa4pJc-';
    let supabaseClient = null;
    if (SUPABASE_URL && SUPABASE_ANON_KEY && window.supabase) {
      supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    }

    const AuthScreen = ({ onLogin }) => {
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [isSignUp, setIsSignUp] = useState(false);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const [successMsg, setSuccessMsg] = useState('');

      const handleAuth = async (e) => {
        e.preventDefault();
        if (!supabaseClient) {
          setError("Supabase not connected. Please use Local Mode.");
          return;
        }
        setLoading(true);
        setError('');
        setSuccessMsg('');

        try {
          if (isSignUp) {
            const { data, error } = await supabaseClient.auth.signUp({ email, password });
            if (error) throw error;
            if (data.session) onLogin(data.session);
            else {
              setIsSignUp(false);
              setPassword('');
              setSuccessMsg("Account created! Please check your email for a confirmation link, then log in here.");
            }
          } else {
            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) throw error;
            if (data.session) onLogin(data.session);
          }
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="w-full min-h-[100dvh] flex items-center justify-center relative z-10 px-4">
          <div className="bg-white/40 dark:bg-pd-glass backdrop-blur-xl border border-gray-200 dark:border-pd-glassBorder rounded-2xl p-8 w-full max-w-md shadow-2xl">
            <div className="flex justify-center mb-6">
              <div className="w-20 h-20 rounded-2xl shadow-[0_0_20px_rgba(0,242,234,0.3)] overflow-hidden">
                <img src="https://hoirqrkdgbmvpwutwuwj.supabase.co/storage/v1/object/public/assets/assets/8c547aee-5092-488d-9b24-cc3cadf37fdc_800w.png" className="w-full h-full object-cover" alt="Project D Logo" />
              </div>
            </div>
            <h2 className="text-2xl font-bold text-center mb-2 text-gray-900 dark:text-white">
              {isSignUp ? 'Initialize Account' : 'Access AMP Center'}
            </h2>
            <p className="text-center text-gray-500 dark:text-gray-400 mb-8">
              Enter your credentials to proceed
            </p>

            {error && (
              <div className="mb-4 p-3 bg-red-500/20 border border-red-500/50 rounded-lg text-red-600 dark:text-red-400 text-sm text-center">
                {error}
              </div>
            )}

            {successMsg && (
              <div className="mb-4 p-3 bg-pd-teal/20 border border-pd-teal/50 rounded-lg text-pd-teal text-sm text-center font-medium">
                {successMsg}
              </div>
            )}

            <form onSubmit={handleAuth} className="space-y-4">
              <div>
                <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Email</label>
                <input type="email" value={email} onChange={e => setEmail(e.target.value)} required
                  className="w-full bg-white/50 dark:bg-pd-dark/50 border border-gray-300 dark:border-gray-700 rounded-xl px-4 py-3 text-gray-900 dark:text-white focus:ring-2 focus:ring-pd-teal focus:border-transparent outline-none transition-all"
                />
              </div>
              <div>
                <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Password</label>
                <input type="password" value={password} onChange={e => setPassword(e.target.value)} required minLength="6"
                  className="w-full bg-white/50 dark:bg-pd-dark/50 border border-gray-300 dark:border-gray-700 rounded-xl px-4 py-3 text-gray-900 dark:text-white focus:ring-2 focus:ring-pd-teal focus:border-transparent outline-none transition-all"
                />
              </div>
              <button type="submit" disabled={loading} className="w-full py-3 px-4 bg-gradient-to-r from-pd-orange to-pd-teal text-white font-semibold rounded-xl hover:opacity-90 transition-opacity disabled:opacity-50">
                {loading ? 'Processing...' : (isSignUp ? 'Create Account' : 'Login')}
              </button>
            </form>
            <div className="mt-6 text-center space-y-4">
              <button onClick={() => { setIsSignUp(!isSignUp); setError(''); setSuccessMsg(''); }} className="text-sm font-medium text-gray-600 dark:text-gray-400 hover:text-pd-orange transition-colors outline-none">
                {isSignUp ? 'Already have an account? Login' : "Don't have an account? Sign Up"}
              </button>
              
              {!supabaseClient && (
                <button onClick={() => {
                  localStorage.setItem('amp_local_session', 'true');
                  onLogin({ user: { id: 'local' } });
                }} type="button" className="w-full bg-black/5 dark:bg-white/10 hover:bg-black/10 dark:hover:bg-white/20 text-gray-900 dark:text-white rounded-xl py-3 text-sm font-semibold transition-all mt-4 border border-gray-200 dark:border-white/10 shadow-sm">
                  <iconify-icon icon="solar:cpu-linear" className="mr-2"></iconify-icon>
                  Enter Local Mode (No Database)
                </button>
              )}
            </div>
          </div>
        </div>
      );
    };

    const ThemeToggle = () => {
      const [isDark, setIsDark] = useState(() => document.documentElement.classList.contains('dark'));
      const toggle = () => {
        const next = !isDark;
        setIsDark(next);
        if (next) document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
      };
      return (
        <div className="flex items-center gap-2 z-50">
          <a href="index.html" className="w-10 h-10 rounded-xl flex items-center justify-center bg-gray-200/50 dark:bg-pd-glass border border-gray-300 dark:border-pd-glassBorder hover:scale-105 transition-all text-gray-600 dark:text-gray-400 hover:text-pd-teal shadow-sm">
            <iconify-icon icon="solar:home-2-linear" width="20"></iconify-icon>
          </a>
          <button onClick={toggle} className="w-10 h-10 rounded-xl flex items-center justify-center bg-gray-200/50 dark:bg-pd-glass border border-gray-300 dark:border-pd-glassBorder hover:scale-105 transition-all text-gray-600 dark:text-gray-400 hover:text-pd-teal shadow-sm">
            <iconify-icon icon={isDark ? "solar:sun-linear" : "solar:moon-linear"} width="20"></iconify-icon>
          </button>
        </div>
      );
    };

    const Background = ({ typingSpeed }) => {
      const duration = Math.max(1.5, 7 - typingSpeed * 0.5);
      const isDark = document.documentElement.classList.contains('dark');
      return (
        <div className="fixed inset-0 w-full h-full pointer-events-none opacity-50 z-0">
          <div className="absolute top-[10%] -left-[10%] w-[40vw] h-[40vw] bg-pd-orange rounded-full mix-blend-screen filter blur-[120px] opacity-20" style={{ animation: `blob ${duration}s infinite` }} />
          <div className="absolute top-[5%] -right-[5%] w-[35vw] h-[35vw] bg-pd-teal rounded-full mix-blend-screen filter blur-[100px] opacity-20" style={{ animation: `blob ${duration}s infinite`, animationDelay: '2s' }} />
          <div className="absolute -bottom-[20%] -left-[10%] w-[50vw] h-[50vw] bg-pd-teal rounded-full mix-blend-screen filter blur-[150px] opacity-20" style={{ animation: `blob ${duration}s infinite`, animationDelay: '4s' }} />
          <div className="absolute -bottom-[10%] right-[10%] w-[35vw] h-[35vw] bg-pd-orange rounded-full mix-blend-screen filter blur-[100px] opacity-20" style={{ animation: `blob ${duration}s infinite`, animationDelay: '2s' }} />
          <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-[60vw] h-[60vw] bg-gradient-to-r from-pd-orange/10 to-pd-teal/10 rounded-full filter blur-[120px] opacity-30 animate-pulse"></div>
          <div className="absolute inset-0 opacity-[0.03]" style={{ backgroundImage: 'radial-gradient(currentColor 1px, transparent 1px)', backgroundSize: '32px 32px' }}></div>
        </div>
      );
    };

    const Genesis = ({ onComplete, typingSpeed, setTypingSpeed }) => {
      const [input, setInput] = useState('');
      const [stage, setStage] = useState(0);
      const [ceoText, setCeoText] = useState('');
      const fullCeoText = "Initialization complete. I am your Custom CEO Agent. I have analyzed your kingdom parameters and am assembling your autonomous workforce...";

      const handleType = (e) => {
        setInput(e.target.value);
        setTypingSpeed(prev => Math.min(prev + 1, 10));
        clearTimeout(window.typingTimer);
        window.typingTimer = setTimeout(() => setTypingSpeed(0), 1000);
      };

      const handleSubmit = async (e) => {
        if (e && e.preventDefault) e.preventDefault();
        if (!input.trim()) return;
        localStorage.setItem('amp_genesis_input', input.trim());
        setStage(1);
        setTypingSpeed(0);

        try {
          const res = await fetch('/.netlify/functions/genesis', {
            method: 'POST',
            body: JSON.stringify({ description: input.trim() })
          });
          if (res.ok) {
            const data = await res.json();
            if (data && data.businessStage) {
              localStorage.setItem('amp_business_profile', JSON.stringify({ company_name: '', bio: '', stage: data.businessStage }));
            }
            if (data && data.subAgents) {
              localStorage.setItem('amp_custom_agents', JSON.stringify(data.subAgents));
            }
          }
        } catch(err) {
          console.error("Genesis analysis failed", err);
        }
      };

      useEffect(() => {
        if (stage === 1) {
          let i = 0;
          const interval = setInterval(() => {
            setCeoText(fullCeoText.substring(0, i));
            i++;
            if (i > fullCeoText.length) {
              clearInterval(interval);
              setTimeout(() => setStage(2), 500);
            }
          }, 30);
          return () => clearInterval(interval);
        }
      }, [stage]);

      return (
        <div className="w-full min-h-[100dvh] flex flex-col items-center justify-center p-6 relative z-10">
          <div className="absolute top-6 right-6"><ThemeToggle /></div>
          {stage === 0 && (
            <div className="w-full max-w-2xl mx-auto glass-reveal flex flex-col items-center">
              <div className="w-12 h-12 rounded-full border border-gray-200 dark:border-pd-glassBorder bg-white/40 dark:bg-pd-glass flex items-center justify-center mb-8 shadow-sm">
                <iconify-icon icon="solar:command-linear" width="24" className="text-gray-500 dark:text-gray-400"></iconify-icon>
              </div>
              <h1 className="text-3xl sm:text-4xl md:text-5xl font-medium tracking-tight mb-4 text-center drop-shadow-lg text-gray-900 dark:text-white">
                Describe your <span className="text-transparent bg-clip-text bg-gradient-to-r from-pd-orange to-pd-teal">digital kingdom...</span>
              </h1>
              <p className="text-sm text-gray-500 dark:text-gray-400 mb-8 md:mb-12 text-center">(Tell the Agent what kind of business you have)</p>
              <div className="w-full relative">
                <input
                  autoFocus type="text" value={input} onChange={handleType} onKeyDown={(e) => { if (e.key === 'Enter') handleSubmit(e); }}
                  className="w-full bg-white/40 dark:bg-pd-glass border border-gray-200 dark:border-pd-glassBorder rounded-2xl px-4 md:px-6 pr-14 md:pr-16 py-4 md:py-5 text-base md:text-lg text-gray-900 dark:text-white placeholder-gray-500 focus:outline-none focus:border-pd-teal/50 focus:ring-1 focus:ring-pd-teal/50 transition-all backdrop-blur-xl shadow-xl"
                  placeholder="e.g. A digital marketing agency focusing on Web3..."
                />
                <button type="button" onClick={handleSubmit} className="absolute right-2 md:right-3 top-1/2 -translate-y-1/2 w-10 md:w-12 h-10 md:h-12 rounded-xl bg-black/5 dark:bg-white/10 hover:bg-pd-orange/20 border border-black/10 dark:border-white/10 hover:border-pd-orange/50 flex items-center justify-center transition-all text-gray-900 dark:text-white hover:text-pd-orange">
                  <iconify-icon icon="solar:arrow-right-linear" width="20"></iconify-icon>
                </button>
              </div>
            </div>
          )}
          {stage >= 1 && (
            <div className="w-full max-w-4xl mx-auto flex flex-col items-center justify-start pt-10">
              <div className="glass-reveal mb-12 w-full max-w-2xl bg-white/40 dark:bg-pd-glass border border-gray-200 dark:border-pd-glassBorder rounded-2xl p-6 backdrop-blur-xl flex gap-4 items-start shadow-lg">
                <div className="w-10 h-10 rounded-full bg-white/40 dark:bg-pd-glass border border-gray-200 dark:border-pd-glassBorder flex items-center justify-center flex-shrink-0">
                  <iconify-icon icon="solar:user-bold" width="20" className="text-pd-teal"></iconify-icon>
                </div>
                <div>
                  <div className="text-xs font-mono text-pd-teal mb-1 uppercase tracking-widest">CEO Agent</div>
                  <div className="text-gray-800 dark:text-gray-200 leading-relaxed min-h-[3rem]"><FormatText text={ceoText} /></div>
                </div>
              </div>
              {stage === 2 && (
                <div className="flex flex-col items-center w-full relative">
                  <div className="amp-card p-4 flex items-center gap-4 w-64 justify-center glass-reveal z-10">
                    <div className="w-8 h-8 rounded-full bg-white/40 dark:bg-pd-glass border border-gray-200 dark:border-pd-glassBorder flex items-center justify-center">
                      <iconify-icon icon="solar:crown-minimalistic-linear" width="16" className="text-pd-orange"></iconify-icon>
                    </div>
                    <div>
                      <div className="text-sm font-semibold text-gray-900 dark:text-white">CEO</div>
                      <div className="text-[10px] text-gray-500 dark:text-gray-400 flex items-center gap-1">
                        <span className="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></span> Active
                      </div>
                    </div>
                  </div>
                  <div className="tree-line-v h-8 glass-reveal stagger-1 hidden md:block"></div>
                  <div className="tree-line-h w-full max-w-2xl relative glass-reveal stagger-1 hidden md:block">
                    <div className="absolute top-0 left-0 w-[1px] h-6 tree-line-v"></div>
                    <div className="absolute top-0 right-0 w-[1px] h-6 tree-line-v"></div>
                    <div className="absolute top-0 left-1/2 w-[1px] h-6 tree-line-v"></div>
                  </div>
                  <div className="h-6 hidden md:block"></div>
                  <div className="flex flex-col md:flex-row w-full max-w-3xl justify-between gap-4 relative z-10 px-4 mt-6 md:mt-0">
                    <div className="amp-card p-4 flex flex-col items-center gap-2 w-full md:w-48 text-center glass-reveal stagger-2 border-pd-teal/30">
                      <div className="w-8 h-8 rounded-full bg-white/40 dark:bg-pd-glass border border-gray-200 dark:border-pd-glassBorder flex items-center justify-center text-pd-teal">
                        <iconify-icon icon="solar:global-linear" width="16"></iconify-icon>
                      </div>
                      <div>
                        <div className="text-sm font-semibold text-gray-900 dark:text-white">CMO Agent</div>
                        <div className="text-[10px] text-gray-500 dark:text-gray-400 mt-1">Lead Gen & Marketing</div>
                      </div>
                    </div>
                    <div className="amp-card p-4 flex flex-col items-center gap-2 w-full md:w-48 text-center glass-reveal stagger-3">
                      <div className="w-8 h-8 rounded-full bg-white/40 dark:bg-pd-glass border border-gray-200 dark:border-pd-glassBorder flex items-center justify-center text-gray-500">
                        <iconify-icon icon="solar:settings-linear" width="16"></iconify-icon>
                      </div>
                      <div>
                        <div className="text-sm font-semibold text-gray-900 dark:text-white">CTO Agent</div>
                        <div className="text-[10px] text-gray-500 dark:text-gray-400 mt-1">Systems & Code</div>
                      </div>
                    </div>
                    <div className="amp-card p-4 flex flex-col items-center gap-2 w-full md:w-48 text-center glass-reveal stagger-4 border-pd-orange/30">
                      <div className="w-8 h-8 rounded-full bg-white/40 dark:bg-pd-glass border border-gray-200 dark:border-pd-glassBorder flex items-center justify-center text-pd-orange">

    const SettingsMenu = ({ session, onSaveComplete, activeTasks, userProfile, setUserProfile, onConnectPlatform, accountUsers, setAccountUsers, activeUserId, setActiveUserId, activeUserName }) => {

      const fetchCustomAgents = async () => {
        if (supabaseClient && session?.user?.id) {
          const { data } = await supabaseClient.from('agents').select('*').order('created_at', { ascending: true });
          if (data) setCustomAgents(data.map(d => ({ ...d, name: d.role_name, description: d.persona_description, parent: d.parent || 'CMO' })));
        } else {
          try {
            const agents = JSON.parse(localStorage.getItem('amp_custom_agents') || '[]');
            setCustomAgents(agents);
          } catch(e) {}
        }
      };

      useEffect(() => {
        fetchCustomAgents();
        if (supabaseClient) {
          const channel = supabaseClient.channel('realtime:agents')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'agents' }, fetchCustomAgents)
            .subscribe();
          return () => { supabaseClient.removeChannel(channel); };
        } else {
          window.addEventListener('amp-subagents-updated', fetchCustomAgents);
          return () => window.removeEventListener('amp-subagents-updated', fetchCustomAgents);
        }
      }, []);

      const handleReset = async () => {
        if (confirmText.toLowerCase() !== 'confirm') return;
        setLoading(true);
        try {
          const keys = ['amp_business_profile', 'amp_chat_history', 'amp_finances', 'amp_genesis_complete', 'amp_genesis_input', 'amp_chat_threads', 'amp_clients', 'amp_inventory', 'amp_usage_pct', 'amp_local_session', 'amp_tasks', 'amp_calendar_events', 'amp_plans'];
          keys.forEach(k => localStorage.removeItem(k));
          
          if (supabaseClient && session?.user?.id) {
            const tables = ['business_profile', 'tasks', 'leads', 'clients', 'inventory', 'campaigns', 'calendar_events', 'finances'];
            for (const table of tables) {
              await supabaseClient.from(table).delete().eq('user_id', session.user.id);
            }
          }
        } catch (e) {
          console.error("Reset failed", e);
        }
        window.location.reload();
      };

      const handleSave = async () => {
        setLoading(true);
        
        // Save to localStorage as a fallback to guarantee persistence across sessions even if DB fails
        try {
          localStorage.setItem('amp_business_profile', JSON.stringify({
            company_name: userProfile.company_name,
            bio: userProfile.bio,
            stage: userProfile.stage,
            store_link: userProfile.store_link,
            integrations: userProfile.integrations
          }));
        } catch (e) {
          console.error("Failed to save to localStorage", e);
        }

        if (supabaseClient && session?.user?.id) {
          try {
            const { error } = await supabaseClient.from('business_profile').upsert({
              user_id: session.user.id,
              company_name: userProfile.company_name,
              bio: userProfile.bio,
              stage: userProfile.stage,
              store_link: userProfile.store_link,
              updated_at: new Date()
            });
              if (error) throw error;
          } catch(e) {
            console.warn("Supabase upsert failed, relying on localStorage.");
          }

        if (onSaveComplete) onSaveComplete();
        setLoading(false);

    };

    const CommandCenter = ({ session }) => {
      const [accountUsers, setAccountUsers] = useState(() => {
        try {
          const saved = localStorage.getItem('amp_account_users');
          return saved ? JSON.parse(saved) : [{id: '1', name: 'Primary User'}];
        } catch(e) { return [{id: '1', name: 'Primary User'}]; }
      });
      const [activeUserId, setActiveUserId] = useState(() => {
        return localStorage.getItem('amp_active_user_id') || '1';
      });

      const fetchAccountUsers = async () => {
        if (supabaseClient && session?.user?.id) {
          const { data } = await supabaseClient.from('account_users').select('*').eq('user_id', session.user.id).order('created_at', { ascending: true });
          if (data && data.length > 0) setAccountUsers(data);
        }
      };

      useEffect(() => {
        fetchAccountUsers();
        if (supabaseClient) {
          const channel = supabaseClient.channel('realtime:account_users')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'account_users' }, fetchAccountUsers)
            .subscribe();
          return () => { supabaseClient.removeChannel(channel); };
        } else {
          const handleStorage = (e) => {
            if (e.key === 'amp_account_users' && e.newValue) setAccountUsers(JSON.parse(e.newValue));
          };
          window.addEventListener('storage', handleStorage);
          return () => window.removeEventListener('storage', handleStorage);
        }
      }, []);

      useEffect(() => {
        localStorage.setItem('amp_account_users', JSON.stringify(accountUsers));
      }, [accountUsers]);

      useEffect(() => {
        localStorage.setItem('amp_active_user_id', activeUserId);
      }, [activeUserId]);

      const activeUserName = accountUsers.find(u => u.id === activeUserId)?.name || 'Primary User';

      const [activeModule, setActiveModule] = useState('neural-chat');
      const [isStatsOpen, setIsStatsOpen] = useState(false);
      const [isRightSidebarCollapsed, setIsRightSidebarCollapsed] = useState(false);
      const [activeTasks, setActiveTasks] = useState([]);
      const [tasksFilter, setTasksFilter] = useState('active');
      const [tempProcessingTasks, setTempProcessingTasks] = useState([]);
      const [needsProfileSetup, setNeedsProfileSetup] = useState(false);
      const [contentReferences, setContentReferences] = useState([]);
      const [userProfile, setUserProfile] = useState({ company_name: '', bio: '', stage: 'Solo', store_link: '' });
      const [triggerPrompt, setTriggerPrompt] = useState(null);
      
      const [unreadCounts, setUnreadCounts] = useState({ 'all': 0 });
      const [totalUnreadTeam, setTotalUnreadTeam] = useState(0);

      useEffect(() => {
        let count = 0;
        Object.keys(unreadCounts).forEach(k => count += unreadCounts[k]);
        setTotalUnreadTeam(count);
      }, [unreadCounts]);

      useEffect(() => {
        const handleNewMessage = (payload) => {
           if (payload.sender_id === activeUserId) return;
           if (payload.channel === 'all' || payload.channel === activeUserId) {
              if (activeModule !== 'team-chat') {
                 setUnreadCounts(prev => ({ ...prev, [payload.channel === 'all' ? 'all' : payload.sender_id]: (prev[payload.channel === 'all' ? 'all' : payload.sender_id] || 0) + 1 }));
              }
           }
        };

        if (supabaseClient) {
          const channel = supabaseClient.channel('realtime:team_messages_badge')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'team_messages' }, (p) => handleNewMessage(p.new))
            .subscribe();
          return () => { supabaseClient.removeChannel(channel); };
        } else {
          const handleStorage = (e) => {
            if (e.key === 'amp_team_messages' && e.newValue) {
               const local = JSON.parse(e.newValue);
               const lastMsg = local[local.length - 1];
               if (lastMsg) handleNewMessage(lastMsg);
            }
          };
          window.addEventListener('storage', handleStorage);
          return () => window.removeEventListener('storage', handleStorage);
        }
      }, [activeUserId, activeModule]);

      const displayTasks = [...tempProcessingTasks, ...activeTasks];

      const triggerInventoryPrompt = () => {
        setActiveModule('neural-chat');
        setTimeout(() => {

            setTriggerPrompt({ sender: 'user', text: `Sync my inventory from my store link: ${userProfile.store_link || 'my store'}.`, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) });

      const triggerLeadPrompt = () => {
        setActiveModule('neural-chat');

      const triggerClientPrompt = () => {

        setTimeout(() => {

      const handleCsvImport = async (e, table, mapper) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async (ev) => {
          const text = ev.target.result;
          const lines = text.split('\n').filter(l => l.trim().length > 0);
          if (lines.length < 2) return;
          const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
          const records = lines.slice(1).map(line => {
            const values = line.split(',');
            const obj = {};
            headers.forEach((h, i) => { obj[h] = values[i]?.trim(); });
            return obj;
          });
          
          if (supabaseClient && session?.user?.id) {
             const toInsert = records.map(r => mapper(r, session.user.id));
             try {
               await supabaseClient.from(table).insert(toInsert);
               alert(`Successfully imported ${toInsert.length} records into ${table}!`);
             } catch (err) {
               console.error("Import failed:", err);
               alert("Failed to import. Ensure your CSV matches the required columns.");
             }
          } else {
             alert(`Database not connected. Simulated import of ${records.length} records.`);
          }
        };
        reader.readAsText(file);
        e.target.value = null; // reset input
      };

      const checkProfile = async () => {
        let loadedProfile = { company_name: '', bio: '', stage: 'Solo' };
        let setupNeeded = true;
        
        try {
          const localData = localStorage.getItem('amp_business_profile');
          if (localData) {
            const parsed = JSON.parse(localData);
            loadedProfile = { ...loadedProfile, ...parsed };
            setupNeeded = !parsed.company_name || !parsed.stage;
          }
        } catch (e) {
          console.error("Local storage error:", e);
        }

        if (supabaseClient && session?.user?.id) {
          try {
            const { data, error } = await supabaseClient.from('business_profile').select('*').eq('user_id', session.user.id).single();
            if (data && data.company_name) {
              loadedProfile = { ...loadedProfile, company_name: data.company_name, bio: data.bio || loadedProfile.bio, stage: data.stage || loadedProfile.stage, store_link: data.store_link !== undefined ? data.store_link : loadedProfile.store_link };
              setupNeeded = !data.company_name || !data.stage;
            }
          } catch(e) {
            console.warn("Supabase profile fetch failed, relying on localStorage.");
          }
        }
        
        setUserProfile(loadedProfile);
        setNeedsProfileSetup(setupNeeded);
      };

      const fetchTasks = async () => {
        if (supabaseClient) {
          const { data } = await supabaseClient.from('tasks').select('*').order('created_at', { ascending: false }).limit(50);
          if (data) setActiveTasks(data);
        } else {
          try {
            const local = JSON.parse(localStorage.getItem('amp_tasks') || '[]');
            setActiveTasks(local);
          } catch(e) {}
        }
      };

      useEffect(() => {
        const handleTasksUpdate = () => fetchTasks();
        const handleProfileUpdate = () => checkProfile();
        window.addEventListener('amp-tasks-updated', handleTasksUpdate);
        window.addEventListener('amp-profile-updated', handleProfileUpdate);
        return () => {
          window.removeEventListener('amp-tasks-updated', handleTasksUpdate);
          window.removeEventListener('amp-profile-updated', handleProfileUpdate);
        };
      }, []);

      // Background Execution Engine
      useEffect(() => {
        const interval = setInterval(() => {
          setActiveTasks(prev => {
            let changed = false;
            const now = new Date();
            const updated = prev.map(t => {
               if (t.status !== 'done' && t.scheduled_time) {
                 const sched = new Date(t.scheduled_time);
                 if (now >= sched) {
                   changed = true;
                   return { ...t, status: 'done', executed_at: now.toISOString() };
                 }
               }
               return t;
            });
            if (changed) {
               try { localStorage.setItem('amp_tasks', JSON.stringify(updated)); } catch(e) {}
            }
            return changed ? updated : prev;
          });
        }, 5000); // Check every 5 seconds
        return () => clearInterval(interval);
      }, []);

      const [usagePct, setUsagePct] = useState(() => {
        const saved = localStorage.getItem('amp_usage_pct');
        return saved ? JSON.parse(saved) : { CEO: 100, CMO: 100, Creative: 100, CTO: 100, Subagents: 100 };
      });

      const depleteBudget = (agent, amount) => {
        setUsagePct(prev => {
          const newPct = Math.max(0, (prev[agent] || 100) - amount);
          const updated = { ...prev, [agent]: newPct };
          localStorage.setItem('amp_usage_pct', JSON.stringify(updated));
          return updated;
        });
      };

      const handleProfileSaved = async () => {
        setNeedsProfileSetup(false);
        setTriggerPrompt({
          sender: 'user',
          text: `I have completed my Business Profile settings. You now have access to my business details.`,

        checkProfile();

        checkProfile();
        if (supabaseClient) {
          const channel = supabaseClient.channel('realtime:tasks')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'tasks' }, fetchTasks)
            .subscribe();
          return () => { supabaseClient.removeChannel(channel); };
        }
      }, [session]);

      useEffect(() => {
        window.simulateSale = () => {
          if (userProfile?.stage !== 'Ecomm') return;
          
          const platform = 'Store';
          
          // Add to finances
          const finances = JSON.parse(localStorage.getItem('amp_finances') || '[]');
          const amount = Math.floor(Math.random() * 80) + 20;
          finances.unshift({
            user_id: session?.user?.id || 'local',
            type: 'Income',
            amount: amount,
            description: `Auto-Synced Order from ${platform}`,
            created_at: new Date().toISOString()
          });
          localStorage.setItem('amp_finances', JSON.stringify(finances));

          // Add to clients
          const clients = JSON.parse(localStorage.getItem('amp_clients') || '[]');
          clients.unshift({
            id: Date.now().toString(),
            name: `Customer #${Math.floor(Math.random() * 9000) + 1000}`,
            ltv: `$${amount}.00`,
            retainer: '1 Product',
            assigned_agents: 'CEO',
            created_at: new Date().toISOString()
          });
          localStorage.setItem('amp_clients', JSON.stringify(clients));

          // Update inventory (deduct stock)
          const inventory = JSON.parse(localStorage.getItem('amp_inventory') || '[]');
          if (inventory.length > 0) {
            const randomItem = inventory[Math.floor(Math.random() * inventory.length)];
            const currentStock = parseInt(randomItem.stock, 10) || 0;
            if (currentStock > 0) {
              randomItem.stock = (currentStock - 1).toString();
              localStorage.setItem('amp_inventory', JSON.stringify(inventory));
            }
          }

          // Trigger re-render of components by dispatching an event
          window.dispatchEvent(new Event('amp-simulated-sale'));
          
          // Add a notification to the chat history
          const chatHistory = JSON.parse(localStorage.getItem('amp_chat_history') || '[]');
          if (chatHistory.length > 0) {
             chatHistory.push({
               sender: 'ceo',
               text: `[SYSTEM] Autonomous sync: A new order was just placed on your ${platform} store for $${amount}. I have automatically updated your inventory, added the customer to your ledger, and logged the revenue.`,
               time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
             });
             localStorage.setItem('amp_chat_history', JSON.stringify(chatHistory));
          }
        };

        // Automatic periodic sync removed per user request

        return () => {
          delete window.simulateSale;
        };

      const navItems = [

        { id: 'settings', icon: 'solar:settings-linear', label: 'Settings', mobileLabel: 'Settings' }
      ];

      return (
        <div className="flex flex-col lg:flex-row w-full h-[100dvh] overflow-hidden p-2 sm:p-4 gap-2 sm:gap-4 z-10 relative glass-reveal">

            <div className="flex items-center gap-3">
              <img src="https://hoirqrkdgbmvpwutwuwj.supabase.co/storage/v1/object/public/assets/assets/8c547aee-5092-488d-9b24-cc3cadf37fdc_800w.png" className="w-8 h-8 rounded object-cover shadow-[0_0_15px_rgba(0,242,234,0.3)]" alt="Project D Logo" />
              <span className="font-bold tracking-tight text-gray-900 dark:text-white">AMP Center</span>
            </div>
            <div className="flex items-center gap-2">
              <ThemeToggle />
              <button onClick={() => setIsStatsOpen(true)} className="w-10 h-10 rounded-xl flex items-center justify-center bg-white/40 dark:bg-pd-glass border border-gray-200 dark:border-pd-glassBorder text-gray-600 dark:text-gray-400 relative hover:text-pd-teal hover:border-pd-teal/50 transition-all">
                <iconify-icon icon="solar:chart-square-linear" width="20"></iconify-icon>

            <div className="w-72 sm:w-80 lg:w-72 xl:w-80 p-4 xl:p-6 flex flex-col gap-6 h-full">

                <h3 className="font-bold text-gray-900 dark:text-white flex items-center gap-2"><iconify-icon icon="solar:chart-square-linear" className="text-pd-teal"></iconify-icon> System Stats</h3>

                  <BudgetBar agent="CMO" percentage={usagePct.CMO} />

    };

    const TaskCard = ({ agent, task, status, color }) => (
      <div className={`bg-white/50 dark:bg-white/5 border border-gray-200 dark:border-pd-glassBorder rounded-xl p-3 relative overflow-hidden group hover:border-gray-300 dark:hover:border-white/20 transition-all duration-500 shadow-sm ${status === 'completed' ? 'opacity-0 scale-95 pointer-events-none' : 'opacity-100 scale-100'}`}>
        <div className={`absolute top-0 left-0 w-1 h-full bg-${color}`}></div>
