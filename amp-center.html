  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Initialize Supabase - USER MUST REPLACE THESE WITH ACTUAL KEYS
    const SUPABASE_URL = 'https://alkknerlktomzolqlntt.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_3Pip4_Ta8kBDSkUkM5-AGw_SCa4pJc-';
    let supabaseClient = null;
    if (SUPABASE_URL && SUPABASE_ANON_KEY && window.supabase) {
      supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    }

    const AuthScreen = ({ onLogin }) => {
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [isSignUp, setIsSignUp] = useState(false);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const [successMsg, setSuccessMsg] = useState('');

      const handleAuth = async (e) => {
        e.preventDefault();
        if (!supabaseClient) {
          setError("Supabase not connected. Please use Local Mode.");
          return;
        }
        setLoading(true);
        setError('');
        setSuccessMsg('');

        try {
          if (isSignUp) {
            const { data, error } = await supabaseClient.auth.signUp({ email, password });
            if (error) throw error;
            if (data.session) onLogin(data.session);
            else {
              setIsSignUp(false);
              setPassword('');
              setSuccessMsg("Account created! Please check your email for a confirmation link, then log in here.");
            }
          } else {
            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) throw error;
            if (data.session) onLogin(data.session);
          }
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="w-full min-h-[100dvh] flex items-center justify-center relative z-10 px-4">
          <div className="bg-white/40 dark:bg-pd-glass backdrop-blur-xl border border-gray-200 dark:border-pd-glassBorder rounded-2xl p-8 w-full max-w-md shadow-2xl">
            <div className="flex justify-center mb-6">
              <div className="w-20 h-20 rounded-2xl shadow-[0_0_20px_rgba(0,242,234,0.3)] overflow-hidden">
                <img src="https://hoirqrkdgbmvpwutwuwj.supabase.co/storage/v1/object/public/assets/assets/8c547aee-5092-488d-9b24-cc3cadf37fdc_800w.png" className="w-full h-full object-cover" alt="Project D Logo" />
              </div>
            </div>
            <h2 className="text-2xl font-bold text-center mb-2 text-gray-900 dark:text-white">
              {isSignUp ? 'Initialize Account' : 'Access AMP Center'}
            </h2>
            <p className="text-center text-gray-500 dark:text-gray-400 mb-8">
              Enter your credentials to proceed
            </p>

            {error && (
              <div className="mb-4 p-3 bg-red-500/20 border border-red-500/50 rounded-lg text-red-600 dark:text-red-400 text-sm text-center">
                {error}
              </div>
            )}

            {successMsg && (
              <div className="mb-4 p-3 bg-pd-teal/20 border border-pd-teal/50 rounded-lg text-pd-teal text-sm text-center font-medium">
                {successMsg}
              </div>
            )}

            <form onSubmit={handleAuth} className="space-y-4">
              <div>
                <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Email</label>
                <input type="email" value={email} onChange={e => setEmail(e.target.value)} required
                  className="w-full bg-white/50 dark:bg-pd-dark/50 border border-gray-300 dark:border-gray-700 rounded-xl px-4 py-3 text-gray-900 dark:text-white focus:ring-2 focus:ring-pd-teal focus:border-transparent outline-none transition-all"
                />
              </div>
              <div>
                <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Password</label>
                <input type="password" value={password} onChange={e => setPassword(e.target.value)} required minLength="6"
                  className="w-full bg-white/50 dark:bg-pd-dark/50 border border-gray-300 dark:border-gray-700 rounded-xl px-4 py-3 text-gray-900 dark:text-white focus:ring-2 focus:ring-pd-teal focus:border-transparent outline-none transition-all"
                />
              </div>
              <button type="submit" disabled={loading} className="w-full py-3 px-4 bg-gradient-to-r from-pd-orange to-pd-teal text-white font-semibold rounded-xl hover:opacity-90 transition-opacity disabled:opacity-50">
                {loading ? 'Processing...' : (isSignUp ? 'Create Account' : 'Login')}
              </button>
            </form>
            <div className="mt-6 text-center space-y-4">
              <button onClick={() => { setIsSignUp(!isSignUp); setError(''); setSuccessMsg(''); }} className="text-sm font-medium text-gray-600 dark:text-gray-400 hover:text-pd-orange transition-colors outline-none">
                {isSignUp ? 'Already have an account? Login' : "Don't have an account? Sign Up"}
              </button>
              
              {!supabaseClient && (
                <button onClick={() => {
                  localStorage.setItem('amp_local_session', 'true');
                  onLogin({ user: { id: 'local' } });
                }} type="button" className="w-full bg-black/5 dark:bg-white/10 hover:bg-black/10 dark:hover:bg-white/20 text-gray-900 dark:text-white rounded-xl py-3 text-sm font-semibold transition-all mt-4 border border-gray-200 dark:border-white/10 shadow-sm">
                  <iconify-icon icon="solar:cpu-linear" className="mr-2"></iconify-icon>
                  Enter Local Mode (No Database)
                </button>
              )}
            </div>
          </div>
        </div>
      );
    };

    const LanguageToggle = () => {
      const [lang, setLang] = useState(() => {
        const saved = localStorage.getItem('amp_language');
        if (saved) return saved;
        const combo = document.querySelector('.goog-te-combo');
        if (combo && combo.value) return combo.value === 'es' ? 'es' : 'en';
        return 'en';
      });
      const [isSwitching, setIsSwitching] = useState(false);
      
      const toggle = () => {
        if (isSwitching) return;
        setIsSwitching(true);
        const targetLang = lang === 'en' ? 'es' : 'en';
        
        const selectField = document.querySelector(".goog-te-combo");
        if (selectField) {
          selectField.value = targetLang === 'en' ? 'en' : 'es'; 
          selectField.dispatchEvent(new Event('change'));
          setTimeout(() => {
            if (selectField.value !== (targetLang === 'en' ? 'en' : 'es')) {
               selectField.value = targetLang === 'en' ? 'en' : 'es';
               selectField.dispatchEvent(new Event('change'));
            }
          }, 150);
        }

        setLang(targetLang);
        localStorage.setItem('amp_language', targetLang);
        setTimeout(() => setIsSwitching(false), 800);
      };

      return (
        <button 
          onClick={toggle} 
          disabled={isSwitching} 
          translate="no"
          className={`px-4 py-2 rounded-xl flex items-center gap-2 bg-gray-200/50 dark:bg-pd-glass border border-gray-300 dark:border-pd-glassBorder transition-all text-gray-600 dark:text-gray-400 shadow-sm ${isSwitching ? 'opacity-50 cursor-not-allowed' : 'hover:scale-105 hover:text-pd-teal'}`}
          title={lang === 'en' ? 'Traducir a Español' : 'Translate to English'}
        >
          <iconify-icon icon="solar:global-linear" width="16"></iconify-icon>
          <span className="text-[10px] font-bold uppercase tracking-widest">
            {lang === 'en' ? 'Español' : 'English'}
          </span>
        </button>
      );
    };

    const ThemeToggle = () => {
      const [isDark, setIsDark] = useState(() => document.documentElement.classList.contains('dark'));
      const toggle = () => {
        const next = !isDark;
        setIsDark(next);
        if (next) document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
      };
      return (
        <div className="flex items-center gap-2 z-50">
          <a href="index.html" className="w-10 h-10 rounded-xl flex items-center justify-center bg-gray-200/50 dark:bg-pd-glass border border-gray-300 dark:border-pd-glassBorder hover:scale-105 transition-all text-gray-600 dark:text-gray-400 hover:text-pd-teal shadow-sm">
            <iconify-icon icon="solar:home-2-linear" width="20"></iconify-icon>
          </a>
          <button onClick={toggle} className="w-10 h-10 rounded-xl flex items-center justify-center bg-gray-200/50 dark:bg-pd-glass border border-gray-300 dark:border-pd-glassBorder hover:scale-105 transition-all text-gray-600 dark:text-gray-400 hover:text-pd-teal shadow-sm">
            <iconify-icon icon={isDark ? "solar:sun-linear" : "solar:moon-linear"} width="20"></iconify-icon>
          </button>
        </div>
      );
    };

          <div className="absolute top-[5%] -right-[5%] w-[35vw] h-[35vw] bg-pd-teal rounded-full mix-blend-screen filter blur-[100px] opacity-20" style={{ animation: `blob ${duration}s infinite`, animationDelay: '2s' }} />
          <div className="absolute -bottom-[20%] -left-[10%] w-[50vw] h-[50vw] bg-pd-teal rounded-full mix-blend-screen filter blur-[150px] opacity-20" style={{ animation: `blob ${duration}s infinite`, animationDelay: '4s' }} />

          <div className="absolute inset-0 opacity-[0.03]" style={{ backgroundImage: 'radial-gradient(currentColor 1px, transparent 1px)', backgroundSize: '32px 32px' }}></div>

        if (confirmText.toLowerCase() !== 'confirm') return;
        setLoading(true);
        try {
          // Thoroughly wipe all amp-related localStorage keys including stage-specific ones
          Object.keys(localStorage).forEach(key => {
            if (key.startsWith('amp_')) {
              localStorage.removeItem(key);
            }
          });
          
          if (supabaseClient && session?.user?.id) {
            const tables = ['business_profile', 'tasks', 'leads', 'clients', 'inventory', 'campaigns', 'calendar_events', 'finances', 'account_users', 'plans', 'agents', 'documents'];
            for (const table of tables) {
              try {
                await supabaseClient.from(table).delete().eq('user_id', session.user.id);
              } catch(e) {
                console.warn(`Failed to wipe table ${table}:`, e);
              }
            }
          }
        } catch (e) {
          console.error("Reset failed", e);
        }
        window.location.reload();
      };

      const handleSave = async () => {
        setLoading(true);
        
        // Save to localStorage as a fallback to guarantee persistence across sessions even if DB fails
        try {
          localStorage.setItem('amp_business_profile', JSON.stringify({
            company_name: userProfile.company_name,
            bio: userProfile.bio,
            stage: userProfile.stage,
            store_link: userProfile.store_link,
            integrations: userProfile.integrations
          }));
        } catch (e) {
          console.error("Failed to save to localStorage", e);
        }

        if (supabaseClient && session?.user?.id) {
          try {
            const { error } = await supabaseClient.from('business_profile').upsert({
              user_id: session.user.id,
              company_name: userProfile.company_name,
              bio: userProfile.bio,
              stage: userProfile.stage,
              store_link: userProfile.store_link,
              updated_at: new Date().toISOString()
            });
              if (error) throw error;
          } catch(e) {
            console.warn("Supabase upsert failed, relying on localStorage.");
          }
        }
        
        if (onSaveComplete) onSaveComplete();
        setLoading(false);
      };



      const cmoTask = activeTasks?.find(t => t.agent === 'CMO' && t.status !== 'done');
      const creativeTask = activeTasks?.find(t => t.agent === 'Creative' && t.status !== 'done');
      const ctoTask = activeTasks?.find(t => t.agent === 'CTO' && t.status !== 'done');

      const handleAddUser = async () => {
        const input = document.getElementById('newUserName');
        if (!input.value.trim()) return;
        const newUser = { id: Date.now().toString(), name: input.value.trim() };
        
        // Update local state immediately
        const updated = [...accountUsers, newUser];
        setAccountUsers(updated);
        localStorage.setItem('amp_account_users', JSON.stringify(updated));

        if (supabaseClient && session?.user?.id) {
           await supabaseClient.from('account_users').insert([{ ...newUser, user_id: session.user.id }]);
        }
        input.value = '';
      };

      const handleRemoveUser = async (idToRemove) => {
        // Update local state immediately
        const updated = accountUsers.filter(x => x.id !== idToRemove);
        setAccountUsers(updated);
        localStorage.setItem('amp_account_users', JSON.stringify(updated));

        if (supabaseClient && session?.user?.id) {
           await supabaseClient.from('account_users').delete().eq('id', idToRemove).eq('user_id', session.user.id);
        }
      };

      const handleEditUser = async (userId, currentName) => {
        const newName = prompt("Enter new name for this user:", currentName);
        if (newName && newName.trim() && newName !== currentName) {
          const updatedName = newName.trim();
          
          // Update local state immediately for responsiveness
          const updated = accountUsers.map(u => u.id === userId ? { ...u, name: updatedName } : u);
          setAccountUsers(updated);
          localStorage.setItem('amp_account_users', JSON.stringify(updated));

          if (supabaseClient && session?.user?.id) {
             try {
               await supabaseClient.from('account_users').update({ name: updatedName }).eq('id', userId).eq('user_id', session.user.id);

            <div className={`h-full ${displayPct < 20 ? 'bg-red-500 shadow-[0_0_10px_rgba(239,68,68,0.8)]' : 'bg-pd-teal shadow-[0_0_10px_rgba(0,242,234,0.5)]'} rounded-full transition-all duration-1000`} style={{ width: `${displayPct}%` }}></div>
          </div>
        </div>

    const TeamChat = ({ session, accountUsers, activeUserId, activeUserName, unreadCounts, setUnreadCounts }) => {
        const [messages, setMessages] = useState([]);
        const [activeChannel, setActiveChannel] = useState('all'); // 'all' or user.id
        const [input, setInput] = useState('');
        const endRef = useRef(null);

        const fetchMessages = async () => {
          if (supabaseClient && session?.user?.id) {
             const { data } = await supabaseClient.from('team_messages').select('*').eq('account_id', session.user.id).order('created_at', { ascending: true });
             if (data) setMessages(data);
          } else {
             try {
               const local = JSON.parse(localStorage.getItem('amp_team_messages') || '[]');
               setMessages(local);
             } catch(e) {}
          }
        };

        useEffect(() => {
          fetchMessages();
          if (supabaseClient) {
            const channel = supabaseClient.channel('realtime:team_messages')
              .on('postgres_changes', { event: '*', schema: 'public', table: 'team_messages' }, fetchMessages)
              .subscribe();
            return () => { supabaseClient.removeChannel(channel); };
          } else {
            const handleStorage = (e) => {
              if (e.key === 'amp_team_messages' && e.newValue) setMessages(JSON.parse(e.newValue));
            };
            const handleCustomEvent = () => fetchMessages();
            window.addEventListener('storage', handleStorage);
            window.addEventListener('amp-team-messages', handleCustomEvent);
            return () => {
              window.removeEventListener('storage', handleStorage);
              window.removeEventListener('amp-team-messages', handleCustomEvent);
            };
          }
        }, []);

        useEffect(() => {
          if (unreadCounts[activeChannel] > 0) {
            setUnreadCounts(prev => ({ ...prev, [activeChannel]: 0 }));
          }
        }, [messages, activeChannel, unreadCounts, setUnreadCounts]);

        useEffect(() => { endRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages, activeChannel]);

        const handleSend = async (e) => {
          if (e) e.preventDefault();
          if (!input.trim()) return;
          const payload = {
            id: Date.now().toString() + Math.random().toString(36).substr(2, 5),
            account_id: session?.user?.id || 'local',
            sender_id: activeUserId,
            sender_name: activeUserName,
            channel: activeChannel,
            text: input.trim(),
            created_at: new Date().toISOString()
          };
          setInput('');

          if (supabaseClient && session?.user?.id) {
             await supabaseClient.from('team_messages').insert([payload]);
          } else {
             const local = JSON.parse(localStorage.getItem('amp_team_messages') || '[]');
             local.push(payload);
             localStorage.setItem('amp_team_messages', JSON.stringify(local));
             setMessages(local);
             window.dispatchEvent(new Event('amp-team-messages'));
          }
        };

        const filteredMessages = messages.filter(m => 
          m.channel === 'all' ? activeChannel === 'all' : 
          (m.channel === activeUserId && m.sender_id === activeChannel) || 
          (m.channel === activeChannel && m.sender_id === activeUserId) ||
          (m.channel === activeChannel && activeChannel === 'all')
        );

        return (
          <div className="flex h-full overflow-hidden">
             {/* Channel Sidebar (Desktop Only) */}
             <div className="hidden md:flex w-1/4 border-r border-gray-200 dark:border-pd-glassBorder bg-black/5 dark:bg-white/5 flex-col p-4 overflow-y-auto">

                <button onClick={() => setActiveChannel('all')} className={`text-left px-3 py-2 rounded-xl text-sm mb-2 transition-colors flex justify-between items-center ${activeChannel === 'all' ? 'bg-pd-teal text-pd-dark font-bold' : 'text-gray-600 dark:text-gray-400 hover:bg-black/5 dark:hover:bg-white/10'}`}>

      const NeuralChat = ({ session, needsProfileSetup, depleteBudget, userProfile, triggerPrompt, setTriggerPrompt, setTempTasks, activeUserName, customAgents, labels }) => {

      const handleUndo = async () => {
        if (!lastActionBatch) return;

        try {
          for (const action of lastActionBatch) {
            if (action.type === 'delete') {
              if (action.key) {
                const local = JSON.parse(localStorage.getItem(action.key) || '[]');
                const filtered = local.filter(x => x.id !== action.id);
                localStorage.setItem(action.key, JSON.stringify(filtered));

              if (supabaseClient && session?.user?.id && action.table) {

              }
            } else if (action.type === 'restore') {
              if (action.key && action.data) {
                const local = JSON.parse(localStorage.getItem(action.key) || '[]');
                const idx = local.findIndex(x => x.id === action.data.id);
                if (idx >= 0) local[idx] = action.data;
                else local.push(action.data);

      const fetchMessages = async () => {

      useEffect(() => {
        fetchMessages();
        if (supabaseClient) {

      useEffect(() => {
        if (needsProfileSetup && messages.length === 1) {

          const greetingText = genesisInput

        setIsTyping(true);

        const localLeads = JSON.parse(localStorage.getItem(`amp_leads_${userProfile?.stage || 'Default'}`) || '[]');

        const leadNames = localLeads.map(l => l.name).join(', ') || 'None';
        const clientNames = localClients.map(c => c.name).join(', ') || 'None';

        const systemPromptAddon = `\n\n[SYSTEM INSTRUCTION: You are an autonomous AI agent integrated directly into the AMP Center platform — a centralized business hub where the user manages everything in one place.

PERSONALITY & COMMUNICATION STYLE (CRITICAL):
- Talk like a sharp, friendly business partner — NOT a robot. Keep it simple. If a 12-year-old wouldn't understand your sentence, rewrite it.
- When explaining anything technical, USE ANALOGIES. Example: Instead of "I'll upsert a lead record into your CRM pipeline," say "Think of your Marketing Pipeline like a fishing net — I'll add this person to it so they don't slip through the cracks."

- When you take actions, summarize what you did in plain English: "Done — I added Sarah to your client list and scheduled a follow-up for Thursday."

PROACTIVE INTELLIGENCE (CRITICAL):
- You are not just a command-taker. You are a proactive partner. READ THE CONVERSATION and spot opportunities.

- NEVER take proactive action silently. Always ask: "Want me to handle that?" / "Should I go ahead and...?" / "I can take care of that — want me to?"
- When the user DIRECTLY REQUESTS something (e.g., "add a lead," "schedule a meeting," "create a task"), execute it immediately without asking for confirmation — they already told you what to do.

CURRENT BUSINESS PROFILE (CRITICAL CONTEXT):
- Business Name: ${userProfile?.company_name || 'Not Provided'}

If the user tells you they have completed their profile, DO NOT ask them to do it again. Acknowledge their business type and ask how you can assist them today.

FRAMING THE PLATFORM:
- The AMP Center is the user's business command center — like a cockpit for their entire operation. Everything lives here: leads, clients, tasks, calendar, inventory, marketing, and strategic plans.
- Your job is to help them USE every channel. If a channel is empty, look for natural moments in conversation to suggest populating it. Example: If they mention clients but their Client Ledger is empty, say "I notice your client list is empty — want to start adding your current clients so we can track everything in one place?"
- Position the AI agents (yourself and the sub-agents) as a team that handles the boring stuff — data entry, drafting outreach, research, organizing info — so the user can focus on the work that actually makes them money.

Available Tools & Channels:
1. 'send_team_message' -> Populates the 'Team Chat' channel. Payload: { agent_name: 'Your Name', message: '...', channel: 'all' }.

6. 'create_client' -> Populates the 'Client Ledger' (Drivers/Members). Payload: { name: '...' }.
7. 'create_task' -> Populates the "Today's Tasks" list (also known as "Active Tasks"). If a task must be done by the user in real life (IRL) and you cannot do it automatically (like physically checking vans, calling someone, etc.), use this tool to add it to their "Today's Tasks". Always refer to this as "Today's Tasks".
8. 'add_inventory_item' -> Populates the 'Inventory Tracking' ledger. This tool works for ANY product data found in screenshots, including Shopify, Etsy, WooCommerce, spreadsheets, or tables. Payload: { product_name: '...', sku_link: '...', stock: '...', price: '...' }.

CONTEXT INJECTION:
Current Known Leads/Prospects: ${leadNames}
Current Known Clients/Members/Drivers (Ledger): ${clientNames}

CRITICAL RULES ON WORKFLOW & HUMAN TASKS:
1. Names & Meetings: If the user mentions a person/company by name, check the Known Leads/Clients lists above. If UNRECOGNIZED, you MUST use 'add_lead' to create them FIRST, UNLESS the user explicitly states they were 'hired', 'closed', or are a 'new client/driver/member', in which case you MUST use 'create_client' to add them to the ledger immediately. CRITICAL: Digital ledger/lead records MUST be created before any human tasks are assigned. HOWEVER, before you call 'create_client' OR 'add_lead', you MUST ALWAYS ask the user to specify ALL necessary fields required for their business type if they did not provide them (e.g. Assigned Route & Work Days for Dispatchers; Products Bought for Ecomm; Contact Info & Est Value for Leads). Do not guess these values.
2. Physical Limitations & IRL Tasks: As an AI, you CANNOT perform physical actions (e.g., physical checkups, driving, manual inspections, or in-person human meetings). If a task requires physical real-world action, you MUST recognize it as an In-Real-Life (IRL) human task. Use a simple analogy: "I can set the reminder and prep the notes, but you'll need to be the one in the room for this one."
3. Assigning IRL Human Tasks: For IRL tasks, you MUST use the 'create_task' tool to add it to "Today's Tasks". IMPORTANT: Do NOT include a 'scheduled_time' in the payload for human tasks. Leaving 'scheduled_time' empty is how the system knows it is a human task that should wait for the user to manually complete it.

5. Recurring Human Tasks: If the user mentions a recurring schedule (e.g., "every morning at 9am" or "every Wednesday"), use 'create_task' for the immediate next occurrence, and clarify in your response that it has been added to Today's Tasks. You may also use 'add_calendar_event' to document the recurring nature if needed.
6. Multi-tool capability: You are capable of returning multiple action tools in a single response to accomplish complex workflows. Think of it like a chef prepping multiple dishes at once — if the user needs a lead added, a meeting scheduled, AND a task created, do all three in one go.
7. Image Analysis & Universal Data Extraction: ALWAYS carefully analyze any new images provided. You are capable of extracting data from Shopify, Etsy, Amazon, or any online store listing, as well as spreadsheets, CRM screenshots, PDF exports, and handwritten tables. You must recognize which channel the data belongs to (e.g. Leads, Clients/Members, Inventory, or Tasks) and use the corresponding tool (add_lead, create_client, add_inventory_item, or create_task). This applies to ALL business stages/types. Do not assume images contain the same data as previous ones. Extract exactly what is in the new image. If multiple items/rows are present, use the relevant tool for EACH item found.

        const currentLanguage = localStorage.getItem('amp_language') || 'en';

        fetch('/.netlify/functions/agent', {

          .then(res => res.json().then(data => ({ status: res.status, data })))
          .then(({ status, data }) => {

                  } else if (action.type === 'store_plan') {
                  agentForLog = 'CEO'; taskNameLog = 'Created Plan';
                  detailsLog = `Stored plan: ${action.payload.title}\n\n${action.payload.content}`;
                } else if (action.type === 'create_client') {
                  agentForLog = 'CEO'; taskNameLog = 'Added to Ledger';
                  detailsLog = `Added client/driver: ${action.payload.name}`;
                } else if (action.type === 'create_task') {
                  agentForLog = action.payload.assigned_agent || 'CEO'; taskNameLog = 'Delegated Task';
                  detailsLog = `Created task: ${action.payload.title}`;
                } else if (action.type === 'add_inventory_item') {
                  agentForLog = 'CTO'; taskNameLog = 'Synced Inventory';
                  detailsLog = `Added product: ${action.payload.product_name}`;
                } else if (action.type === 'update_lead') {
                  agentForLog = 'CEO'; taskNameLog = 'Updated Lead';
                  detailsLog = `Updated ${action.payload.name} to stage ${action.payload.stage}`;

                  detailsLog = `Updated business profile: ${action.payload.company_name || 'Details updated'}`;

                // Create calendar event for historical record

                const histPayload = { 
                  id: Date.now().toString() + Math.random(), 
                  day_of_week: dayOfWeek, 
                  agent_role: agentForLog, 
                  task_name: taskNameLog,
                  details: detailsLog,
                  is_historical: true,
                  created_at: new Date().toISOString()

                localCal.push(histPayload);
                localStorage.setItem(`amp_calendar_events_${userProfile?.stage || 'Default'}`, JSON.stringify(localCal));
                window.dispatchEvent(new Event('amp-calendar-updated'));
                if (supabaseClient && session?.user?.id) {
                   supabaseClient.from('calendar_events').insert([{ ...histPayload, user_id: session.user.id }]).then();

                try {
                  const logAction = (name, agent) => {
                    const localCal2 = JSON.parse(localStorage.getItem('amp_calendar_events') || '[]');
                    const payload = { id: Date.now().toString() + Math.random().toString(36).substr(2,5), date_time: new Date().toISOString(), event_type: 'agent_deployment', agent_role: agent || 'CEO', task_name: name, created_at: new Date().toISOString(), created_by: activeUserName || 'System' };
                    localCal2.push(payload);
                    localStorage.setItem('amp_calendar_events', JSON.stringify(localCal2));
                    window.dispatchEvent(new Event('amp-calendar-updated'));
                    if (supabaseClient && session?.user?.id) {
                       supabaseClient.from('calendar_events').insert([{ ...payload, user_id: session.user.id }]).then();

                  if (action.type === 'add_inventory_item') {
                    const stageKey = `amp_inventory_${userProfile?.stage || 'Default'}`;
                    const local = JSON.parse(localStorage.getItem(stageKey) || '[]');
                    const invPayload = { id: Date.now().toString() + Math.random().toString(36).substr(2, 5), ...action.payload, business_stage: userProfile?.stage || 'Default', user_id: session?.user?.id || 'local', created_at: new Date().toISOString() };
                    local.push(invPayload);
                    localStorage.setItem(stageKey, JSON.stringify(local));
                    if (supabaseClient && session?.user?.id) { supabaseClient.from('inventory').insert([invPayload]).then(); }
                    window.dispatchEvent(new Event('amp-inventory-updated'));
                  } else if (action.type === 'create_plan' || action.type === 'store_plan') {
                    const local = JSON.parse(localStorage.getItem('amp_plans') || '[]');
                    const payload = { id: Date.now().toString(), ...action.payload, created_at: new Date().toISOString() };
                    local.push(payload);
                    localStorage.setItem('amp_plans', JSON.stringify(local));
                    if (supabaseClient && session?.user?.id) { supabaseClient.from('plans').insert([{ ...payload, user_id: session.user.id }]).then(); }
                    window.dispatchEvent(new Event('amp-plans-updated'));    logAction(`Created Plan: ${action.payload.title}`, action.payload.agent);
                  } else if (action.type === 'create_task') {
                    const local = JSON.parse(localStorage.getItem(`amp_tasks_${userProfile?.stage || 'Default'}`) || '[]');
                    const payload = { id: Date.now().toString(), title: action.payload.title, status: action.payload.column_id || 'todo', agent: action.payload.assigned_agent || 'CEO', scheduled_time: action.payload.scheduled_time || null, priority: action.payload.priority || 'Medium', business_stage: userProfile?.stage || 'Default', created_at: new Date().toISOString() };
                    local.unshift(payload);
                    localStorage.setItem(`amp_tasks_${userProfile?.stage || 'Default'}`, JSON.stringify(local));
                    if (supabaseClient && session?.user?.id) { supabaseClient.from('tasks').insert([{ ...payload, user_id: session.user.id }]).then(); }
                    window.dispatchEvent(new Event('amp-tasks-updated'));
                    logAction(`Delegated Task: ${action.payload.title}`, action.payload.assigned_agent);
                    revertActions.push({ type: 'delete', table: 'tasks', id: payload.id, key: `amp_tasks_${userProfile?.stage || 'Default'}` });
                  } else if (action.type === 'update_task') {
                    let local = JSON.parse(localStorage.getItem(`amp_tasks_${userProfile?.stage || 'Default'}`) || '[]');
                    const targetIdx = local.findIndex(t => t.id === action.payload.task_title_or_id || t.title.toLowerCase() === action.payload.task_title_or_id.toLowerCase());
                    if (targetIdx !== -1) {
                      revertActions.push({ type: 'restore', table: 'tasks', key: `amp_tasks_${userProfile?.stage || 'Default'}`, data: JSON.parse(JSON.stringify(local[targetIdx])) });
                      if (action.payload.priority) local[targetIdx].priority = action.payload.priority;
                      if (action.payload.status) local[targetIdx].status = action.payload.status;
                      localStorage.setItem(`amp_tasks_${userProfile?.stage || 'Default'}`, JSON.stringify(local));
                      if (supabaseClient && session?.user?.id) { supabaseClient.from('tasks').update({ priority: local[targetIdx].priority, status: local[targetIdx].status }).eq('id', local[targetIdx].id).eq('user_id', session.user.id).then(); }

                      logAction(`Updated Task: ${action.payload.task_title_or_id}`, 'CEO');

                    local.push(payload);
                    localStorage.setItem(`amp_calendar_events_${userProfile?.stage || 'Default'}`, JSON.stringify(local));
                    if (supabaseClient && session?.user?.id) { supabaseClient.from('calendar_events').insert([{ ...payload, user_id: session.user.id }]).then(); }

                      try { parsed = JSON.parse(localData); } catch (e) {}

                    if (supabaseClient && session?.user?.id) { supabaseClient.from('business_profile').upsert({ user_id: session.user.id, ...parsed, ...action.payload }).then(); }

                    logAction(`Hired Subagent: ${action.payload.role_name}`, 'CEO');
                    revertActions.push({ type: 'delete', table: 'agents', id: payload.id, key: 'amp_custom_agents' });

                    const local = JSON.parse(localStorage.getItem('amp_documents') || '[]');

                    local.unshift(payload);
                    localStorage.setItem('amp_documents', JSON.stringify(local));
                    if (supabaseClient && session?.user?.id) { supabaseClient.from('documents').insert([{ ...payload, user_id: session.user.id }]).then(); }
                    window.dispatchEvent(new Event('amp-documents-updated'));
          window.dispatchEvent(new Event('amp-plans-updated'));
                    logAction(`Drafted Document: ${action.payload.title}`, 'CEO');
                    revertActions.push({ type: 'delete', table: 'documents', id: payload.id, key: 'amp_documents' });
                  } else if (action.type === 'add_lead') {
                    const local = JSON.parse(localStorage.getItem(`amp_leads_${userProfile?.stage || 'Default'}`) || '[]');

                    localStorage.setItem(`amp_leads_${userProfile?.stage || 'Default'}`, JSON.stringify(local));

                    window.dispatchEvent(new Event('amp-simulated-lead'));
                    logAction(`Added Lead: ${action.payload.name}`, 'CEO');
                    revertActions.push({ type: 'delete', table: 'leads', id: payload.id, key: `amp_leads_${userProfile?.stage || 'Default'}` });
                  } else if (action.type === 'create_client') {
                    const local = JSON.parse(localStorage.getItem(`amp_clients_${userProfile?.stage || 'Default'}`) || '[]');
                    const payload = { id: Date.now().toString(), ...action.payload, business_stage: userProfile?.stage || 'Default', created_at: new Date().toISOString() };
                    local.unshift(payload);
                    localStorage.setItem(`amp_clients_${userProfile?.stage || 'Default'}`, JSON.stringify(local));
                    if (supabaseClient && session?.user?.id) { supabaseClient.from('clients').insert([{ ...payload, user_id: session.user.id }]).then(); }
                    window.dispatchEvent(new Event('amp-simulated-sale'));
                    logAction(`Added to Ledger: ${action.payload.name}`, 'CEO');
                    revertActions.push({ type: 'delete', table: 'clients', id: payload.id, key: `amp_clients_${userProfile?.stage || 'Default'}` });
                  } else if (action.type === 'add_multiple_leads') {
                    const local = JSON.parse(localStorage.getItem(`amp_leads_${userProfile?.stage || 'Default'}`) || '[]');
                    const newLeads = action.payload.leads.map((l, i) => ({ id: Date.now().toString() + i, ...l, business_stage: userProfile?.stage || 'Default', created_at: new Date().toISOString() }));
                    localStorage.setItem(`amp_leads_${userProfile?.stage || 'Default'}`, JSON.stringify([...newLeads, ...local]));
                    if (supabaseClient && session?.user?.id) { supabaseClient.from('leads').insert(newLeads.map(l => ({...l, user_id: session.user.id}))).then(); }
                    window.dispatchEvent(new Event('amp-simulated-lead'));
                    logAction(`Generated ${action.payload.leads.length} Leads`, 'CEO');
                    newLeads.forEach(l => revertActions.push({ type: 'delete', table: 'leads', id: l.id, key: `amp_leads_${userProfile?.stage || 'Default'}` }));
                  } else if (action.type === 'add_multiple_clients') {
                    const local = JSON.parse(localStorage.getItem(`amp_clients_${userProfile?.stage || 'Default'}`) || '[]');
                    const newClients = action.payload.clients.map((c, i) => ({ id: Date.now().toString() + i, ...c, business_stage: userProfile?.stage || 'Default', created_at: new Date().toISOString() }));
                    localStorage.setItem(`amp_clients_${userProfile?.stage || 'Default'}`, JSON.stringify([...newClients, ...local]));
                    if (supabaseClient && session?.user?.id) { supabaseClient.from('clients').insert(newClients.map(c => ({...c, user_id: session.user.id}))).then(); }
                    window.dispatchEvent(new Event('amp-simulated-sale'));
                    logAction(`Imported ${action.payload.clients.length} Clients/Members`, 'CEO');
                    newClients.forEach(c => revertActions.push({ type: 'delete', table: 'clients', id: c.id, key: `amp_clients_${userProfile?.stage || 'Default'}` }));
                  } else if (action.type === 'update_lead') {
                    const local = JSON.parse(localStorage.getItem(`amp_leads_${userProfile?.stage || 'Default'}`) || '[]');
                    const index = local.findIndex(l => l.name.toLowerCase() === action.payload.name.toLowerCase());
                    if (index >= 0) {
                      revertActions.push({ type: 'restore', table: 'leads', key: `amp_leads_${userProfile?.stage || 'Default'}`, data: JSON.parse(JSON.stringify(local[index])) });
                      local[index] = { ...local[index], ...action.payload, updated_at: new Date().toISOString() };
                      localStorage.setItem(`amp_leads_${userProfile?.stage || 'Default'}`, JSON.stringify(local));
                      if (supabaseClient && session?.user?.id) { supabaseClient.from('leads').update(action.payload).eq('id', local[index].id).eq('user_id', session.user.id).then(); }
                      window.dispatchEvent(new Event('amp-simulated-lead'));
                      logAction(`Updated Lead: ${action.payload.name}`, 'CEO');
                    }
                  } else if (action.type === 'create_campaign') {
                    const local = JSON.parse(localStorage.getItem('amp_campaigns') || '[]');
                    const payload = { id: Date.now().toString(), ...action.payload, created_at: new Date().toISOString() };
                    local.unshift(payload);
                    localStorage.setItem('amp_campaigns', JSON.stringify(local));
                    if (supabaseClient && session?.user?.id) { supabaseClient.from('campaigns').insert([{ ...payload, user_id: session.user.id }]).then(); }
                    window.dispatchEvent(new Event('amp-campaigns-updated'));
                    logAction(`Launched Campaign: ${action.payload.name}`, 'CMO');
                    revertActions.push({ type: 'delete', table: 'campaigns', id: payload.id, key: 'amp_campaigns' });
                  } else if (action.type === 'update_plan') {
                    const local = JSON.parse(localStorage.getItem('amp_plans') || '[]');
                    const targetIdx = local.findIndex(p => p.id === action.payload.plan_id_or_title || p.title.toLowerCase() === action.payload.plan_id_or_title.toLowerCase());
                    if (targetIdx !== -1) {
                      revertActions.push({ type: 'restore', table: 'plans', key: 'amp_plans', data: JSON.parse(JSON.stringify(local[targetIdx])) });
                      if (action.payload.title) local[targetIdx].title = action.payload.title;
                      if (action.payload.content) local[targetIdx].content = action.payload.content;
                      localStorage.setItem('amp_plans', JSON.stringify(local));
                      if (supabaseClient && session?.user?.id) { supabaseClient.from('plans').update({ title: local[targetIdx].title, content: local[targetIdx].content }).eq('id', local[targetIdx].id).eq('user_id', session.user.id).then(); }
                      logAction(`Adapted Plan: ${action.payload.plan_id_or_title}`, 'CEO');
                    }
                  } else if (action.type === 'send_team_message') {
                    const localMessages = JSON.parse(localStorage.getItem('amp_team_messages') || '[]');
                    const payload = { 
                      id: Date.now().toString() + Math.random().toString(36).substr(2, 5), 
                      account_id: session?.user?.id || 'local', 
                      sender_id: action.payload.agent_id || 'system', 
                      sender_name: action.payload.agent_name || action.payload.agent || 'CEO Agent', 
                      channel: action.payload.channel || 'all', 
                      text: action.payload.message, 
                      created_at: new Date().toISOString() 
                    };
                    localMessages.push(payload);
                    localStorage.setItem('amp_team_messages', JSON.stringify(localMessages));
                    window.dispatchEvent(new Event('amp-team-messages'));
                    if (supabaseClient && session?.user?.id) { supabaseClient.from('team_messages').insert([payload]).then(); }
                    logAction(`Sent Team Announcement`, action.payload.agent_name || 'CEO');
                    revertActions.push({ type: 'delete', table: 'team_messages', id: payload.id, key: 'amp_team_messages' });
                  }
                } catch (e) { console.error("Parse error", e); }
              });
              setLastActionBatch(revertActions);
            }

            if (status >= 400 || data.error) {
              appendMessage({ sender: 'ceo', text: `[SYSTEM ERROR] ${data.error || 'Unknown error'}`, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) });
            } else {
              appendMessage({ sender: 'ceo', text: data.content || "I have completed the task.", actions: data.actions, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) });
            }
            setIsTyping(false);
          })
          .catch(err => {
            console.error(err);
            const userTextLower = msgText.toLowerCase();
            let responseText = "[ERROR] Backend disconnected or API Key missing. Simulation mode active.";
            
            if (userTextLower.includes('lead') && (userTextLower.includes('add') || userTextLower.includes('find') || userTextLower.includes('generate') || userTextLower.includes('insert'))) {
              responseText = "[ERROR] I cannot generate leads because my backend connection to Gemini is currently offline. Please ensure you are running this platform on a live server with API keys configured.";
            }

            appendMessage({ sender: 'ceo', text: responseText, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) });
            setIsTyping(false);
          });
      };

      const handleSend = (e) => {
        if (e && e.preventDefault) e.preventDefault();
        if (!input.trim() && !attachment) return;
        const textToSend = input.trim();
        const attachmentToSend = attachment;
        setInput('');
        setAttachment(null);
        sendMessage(textToSend, attachmentToSend);
      };

      useEffect(() => {
        if (triggerPrompt) {
          if (triggerPrompt.sender === 'ceo') {
            appendMessage({ sender: 'ceo', text: triggerPrompt.text, time: triggerPrompt.time || new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) });
          } else {
            sendMessage(triggerPrompt.text, null);
          }
          setTriggerPrompt(null);
        }
      }, [triggerPrompt]);

      useEffect(() => { endRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages, isTyping]);

      const handleFileChange = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (ev) => {
            setAttachment({ 
              data: ev.target.result.split(',')[1], 
              mimeType: file.type, 
              preview: ev.target.result 
            });
          };
          reader.readAsDataURL(file);
        }
      };

      return (
        <div className="flex flex-col h-full w-full relative">

              <div className="w-10 h-10 rounded-xl bg-white/40 dark:bg-pd-glass border border-gray-200 dark:border-pd-glassBorder flex items-center justify-center text-pd-orange shadow-sm">

              </div>

            <div className="flex items-center gap-2">

                      <div className="w-10 h-10 rounded-lg bg-indigo-500/10 text-indigo-500 flex items-center justify-center shrink-0">
                        <iconify-icon icon="solar:document-text-bold" width="24"></iconify-icon>
                      </div>
                      <div className="min-w-0 flex-1">

                      <iconify-icon icon="solar:alt-arrow-right-linear" className="text-gray-400 group-hover:text-pd-teal transition-colors"></iconify-icon>
                    </button>

                  <div className="text-[9px] text-gray-500 dark:text-gray-400 mt-2">{m.time}</div>

                <span className="w-2 h-2 rounded-full bg-pd-orange animate-bounce" style={{ animationDelay: '0.1s' }}></span>
                <span className="w-2 h-2 rounded-full bg-pd-orange animate-bounce" style={{ animationDelay: '0.2s' }}></span>
              </div>
            )}
            <div ref={endRef} />

          <div className="p-4 bg-white/50 dark:bg-white/5 border-t border-gray-200 dark:border-pd-glassBorder flex flex-col gap-2">
            {attachment && (
              <div className="flex items-center gap-2 bg-white dark:bg-black/40 w-max px-3 py-1.5 rounded-lg border border-gray-200 dark:border-white/10">

                <button onClick={() => setAttachment(null)} className="ml-2 text-gray-400 hover:text-red-500"><iconify-icon icon="solar:close-circle-bold" width="16"></iconify-icon></button>
              </div>
            )}
            <div className="relative flex items-center gap-2">
              <input type="file" ref={fileInputRef} onChange={handleFileChange} accept="image/*" className="hidden" />
              <button onClick={() => fileInputRef.current?.click()} className="w-10 h-10 rounded-full bg-white dark:bg-black/40 border border-gray-200 dark:border-pd-glassBorder hover:bg-gray-50 dark:hover:bg-white/10 text-gray-500 flex items-center justify-center transition-all flex-shrink-0">
                <iconify-icon icon="solar:paperclip-linear" width="20"></iconify-icon>
              </button>
              <div className="relative flex-1">
                <input type="text" value={input} onChange={e => setInput(e.target.value)} onKeyDown={(e) => { if (e.key === 'Enter') handleSend(e) }} onFocus={(e) => setTimeout(() => e.target.scrollIntoView({ behavior: 'smooth', block: 'center' }), 300)} placeholder="Instruct the CEO or attach a reference..." className="w-full bg-white dark:bg-pd-glass border border-gray-200 dark:border-pd-glassBorder rounded-full pl-6 pr-14 py-4 text-sm text-gray-900 dark:text-white focus:outline-none focus:border-pd-orange/50 shadow-inner" />
                <button onClick={handleSend} className="absolute right-2 top-2 w-10 h-10 rounded-full bg-pd-orange/20 border border-pd-orange/50 hover:bg-pd-orange hover:text-white text-pd-orange flex items-center justify-center transition-all"><iconify-icon icon="solar:plain-bold" width="18"></iconify-icon></button>
              </div>
            </div>
          </div>

          {activeDocument && (
            <div className="absolute inset-0 z-[100] bg-white/95 dark:bg-[#0b0f19]/95 backdrop-blur-xl flex flex-col animate-fade-in">
              <div className="flex items-center justify-between p-4 md:p-6 border-b border-gray-200 dark:border-white/10 bg-white/50 dark:bg-black/20">
                <div className="flex items-center gap-4">
                  <div className="w-12 h-12 rounded-xl bg-indigo-500/10 text-indigo-500 flex items-center justify-center shrink-0 border border-indigo-500/20">
                    <iconify-icon icon="solar:document-text-bold" width="28"></iconify-icon>
                  </div>
                  <div>
                    <h3 className="font-bold text-lg text-gray-900 dark:text-white">{activeDocument.title}</h3>
                    <p className="text-xs font-semibold text-indigo-500 tracking-wider uppercase mt-1">{activeDocument.document_type} • {new Date(activeDocument.created_at).toLocaleDateString()}</p>
                  </div>
                </div>
                <div className="flex gap-2">
                  <button onClick={() => {
                    const el = document.createElement('a');
                    el.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(activeDocument.content));
                    el.setAttribute('download', activeDocument.title + '.txt');
                    el.click();
                  }} className="p-2 md:px-4 md:py-2 text-sm font-semibold bg-gray-100 hover:bg-gray-200 dark:bg-white/5 dark:hover:bg-white/10 text-gray-700 dark:text-white rounded-lg flex items-center gap-2 transition-all">
                    <iconify-icon icon="solar:download-minimalistic-bold"></iconify-icon> <span className="hidden md:inline">Download</span>
                  </button>
                  <button onClick={() => setActiveDocument(null)} className="p-2 md:px-4 md:py-2 text-sm font-semibold bg-red-50 hover:bg-red-100 dark:bg-red-500/10 dark:hover:bg-red-500/20 text-red-500 rounded-lg flex items-center gap-2 transition-all">
                    <iconify-icon icon="solar:close-circle-bold" width="20"></iconify-icon> <span className="hidden md:inline">Close</span>
                  </button>

              <div className="flex-1 overflow-y-auto p-4 md:p-12">
                <div className="max-w-4xl mx-auto bg-white dark:bg-[#131b2c] p-8 md:p-16 rounded-2xl shadow-2xl border border-gray-200 dark:border-white/5 min-h-[800px]">
                  <div className="prose prose-sm md:prose-base dark:prose-invert max-w-none prose-p:leading-relaxed prose-headings:font-bold whitespace-pre-wrap font-serif text-gray-800 dark:text-gray-200">
                    <FormatText text={activeDocument.content} />
                  </div>
                </div>
              </div>
            </div>
          )}
