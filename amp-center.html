<!DOCTYPE html>
<html lang="en" class="">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AMP Center | Project D</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            pd: {
              teal: '#00F2EA',
              orange: '#FF5F00',
              dark: '#0b0f19',
              glass: 'rgba(255, 255, 255, 0.03)',
              glassBorder: 'rgba(255, 255, 255, 0.08)'
            }
          },
          animation: {
            'blob': 'blob 7s infinite',
            'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'flow-beam': 'flowBeam 2s linear infinite',
            'sweep-beam': 'sweepBeam 2s ease-in-out infinite'
          },
          keyframes: {
            blob: {
              '0%': { transform: 'translate(0px, 0px) scale(1)' },
              '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
              '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
              '100%': { transform: 'translate(0px, 0px) scale(1)' },
            },
            flowBeam: {
              '0%': { transform: 'translateY(-100%)' },
              '100%': { transform: 'translateY(200%)' }
            },
            sweepBeam: {
              '0%': { transform: 'translateX(-100%) skewX(-15deg)' },
              '100%': { transform: 'translateX(200%) skewX(-15deg)' }
            }
          }
        }
      }
    };
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap"
    rel="stylesheet">
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <script crossorigin="" src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin="" src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      background-color: #f9fafb;
      color: #111827;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      transition: background-color 0.3s, color 0.3s;
    }

    .dark body {
      background-color: #0b0f19;
      color: #f3f4f6;
    }

    .amp-card {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(0, 0, 0, 0.05);
      border-radius: 20px;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .dark .amp-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .amp-card:hover {
      transform: translateY(-4px);
      border-color: #00F2EA;
      box-shadow: 0 10px 30px -10px rgba(0, 242, 234, 0.15);
    }

    .amp-button {
      background: rgba(0, 0, 0, 0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 0, 0, 0.1);
      border-radius: 9999px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      color: #111;
    }

    .dark .amp-button {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #fff;
    }

    .amp-button::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 95, 0, 0.2), transparent);
      transform: translateX(-100%);
      transition: transform 0.5s ease;
    }

    .amp-button:hover::before {
      transform: translateX(100%);
    }

    .amp-button:hover {
      border-color: #FF5F00;
      box-shadow: 0 0 20px rgba(255, 95, 0, 0.3);
      transform: scale(1.02);
      color: #FF5F00;
    }

    .dark .amp-button:hover {
      color: white;
    }

    .amp-button.primary {
      background: rgba(255, 95, 0, 0.15);
      border-color: rgba(255, 95, 0, 0.5);
      color: #FF5F00;
    }

    .dark .amp-button.primary {
      color: white;
    }

    .amp-button.primary:hover {
      background: rgba(255, 95, 0, 0.3);
    }

    .glass-reveal {
      animation: glassReveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
      transform: translateY(20px) scale(0.95);
    }

    @keyframes glassReveal {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .stagger-1 {
      animation-delay: 0.1s;
    }

    .stagger-2 {
      animation-delay: 0.2s;
    }

    .stagger-3 {
      animation-delay: 0.3s;
    }

    .stagger-4 {
      animation-delay: 0.4s;
    }

    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.1);
      border-radius: 10px;
    }

    .dark ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 0, 0, 0.2);
    }

    .dark ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .toggle-checkbox:checked+.toggle-label {
      background-color: #FF5F00;
      border-color: #FF5F00;
    }

    .toggle-checkbox:checked+.toggle-label .toggle-thumb {
      transform: translateX(100%);
      border-color: #FF5F00;
    }

    .toggle-label {
      background-color: rgba(0, 0, 0, 0.1);
      border: 1px solid rgba(0, 0, 0, 0.2);
    }

    .dark .toggle-label {
      background-color: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .tree-line-v {
      width: 1px;
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0.2), transparent);
    }

    .dark .tree-line-v {
      background: linear-gradient(to bottom, rgba(255, 255, 255, 0.2), transparent);
    }

    .tree-line-h {
      height: 1px;
      background: rgba(0, 0, 0, 0.2);
    }

    .dark .tree-line-h {
      background: rgba(255, 255, 255, 0.2);
    }

    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>

<body>
  <div class="fixed inset-0 w-full h-full overflow-hidden pointer-events-none z-0 bg-gray-50 dark:bg-[#0b0f19]"
    id="bg-container"></div>
  <div id="root" class="relative z-10 w-full min-h-screen flex text-gray-800 dark:text-gray-200"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Initialize Supabase - USER MUST REPLACE THESE WITH ACTUAL KEYS
    const SUPABASE_URL = 'https://alkknerlktomzolqlntt.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_3Pip4_Ta8kBDSkUkM5-AGw_SCa4pJc-';
    let supabaseClient = null;
    if (SUPABASE_URL && SUPABASE_ANON_KEY && window.supabase) {
      supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    }

    const AuthScreen = ({ onLogin }) => {
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [isSignUp, setIsSignUp] = useState(false);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');

      const handleAuth = async (e) => {
        e.preventDefault();
        if (!supabase) {
          setError("Supabase not connected. Please add your API keys to amp-center.html");
          return;
        }
        setLoading(true);
        setError('');

        try {
          if (isSignUp) {
            const { data, error } = await supabaseClient.auth.signUp({ email, password });
            if (error) throw error;
            if (data.session) onLogin(data.session);
            else setError("Check your email for a confirmation link.");
          } else {
            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) throw error;
            if (data.session) onLogin(data.session);
          }
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="w-full min-h-screen flex items-center justify-center relative z-10 px-4">
          <div className="bg-white/40 dark:bg-pd-glass backdrop-blur-xl border border-gray-200 dark:border-pd-glassBorder rounded-2xl p-8 w-full max-w-md shadow-2xl">
            <div className="flex justify-center mb-6">
              <div className="w-20 h-20 rounded-2xl shadow-[0_0_20px_rgba(0,242,234,0.3)] overflow-hidden">
                <img src="https://hoirqrkdgbmvpwutwuwj.supabase.co/storage/v1/object/public/assets/assets/8c547aee-5092-488d-9b24-cc3cadf37fdc_800w.png" className="w-full h-full object-cover" alt="Project D Logo" />
              </div>
            </div>
            <h2 className="text-2xl font-bold text-center mb-2 text-gray-900 dark:text-white">
              {isSignUp ? 'Initialize Account' : 'Access AMP Center'}
            </h2>
            <p className="text-center text-gray-500 dark:text-gray-400 mb-8">
              Enter your credentials to proceed
            </p>

            {error && (
              <div className="mb-4 p-3 bg-red-500/20 border border-red-500/50 rounded-lg text-red-600 dark:text-red-400 text-sm text-center">
                {error}
              </div>
            )}

            <form onSubmit={handleAuth} className="space-y-4">
              <div>
                <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Email</label>
                <input type="email" value={email} onChange={e => setEmail(e.target.value)} required
                  className="w-full bg-white/50 dark:bg-pd-dark/50 border border-gray-300 dark:border-gray-700 rounded-xl px-4 py-3 text-gray-900 dark:text-white focus:ring-2 focus:ring-pd-teal focus:border-transparent outline-none transition-all"
                />
              </div>
              <div>
                <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Password</label>
                <input type="password" value={password} onChange={e => setPassword(e.target.value)} required minLength="6"
                  className="w-full bg-white/50 dark:bg-pd-dark/50 border border-gray-300 dark:border-gray-700 rounded-xl px-4 py-3 text-gray-900 dark:text-white focus:ring-2 focus:ring-pd-teal focus:border-transparent outline-none transition-all"
                />
              </div>
              <button type="submit" disabled={loading} className="w-full py-3 px-4 bg-gradient-to-r from-pd-orange to-pd-teal text-white font-semibold rounded-xl hover:opacity-90 transition-opacity disabled:opacity-50">
                {loading ? 'Processing...' : (isSignUp ? 'Create Account' : 'Login')}
              </button>
            </form>
            <div className="mt-6 text-center">
              <button onClick={() => setIsSignUp(!isSignUp)} className="text-sm font-medium text-gray-600 dark:text-gray-400 hover:text-pd-orange transition-colors outline-none">
                {isSignUp ? 'Already have an account? Login' : "Don't have an account? Sign Up"}
              </button>
            </div>
          </div>
        </div>
      );
    };

    const ThemeToggle = () => {
      const [isDark, setIsDark] = useState(() => document.documentElement.classList.contains('dark'));
      const toggle = () => {
        const next = !isDark;
        setIsDark(next);
        if (next) document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
      };
      return (
        <div className="flex items-center gap-2 z-50">
          <a href="index.html" className="w-10 h-10 rounded-xl flex items-center justify-center bg-gray-200/50 dark:bg-pd-glass border border-gray-300 dark:border-pd-glassBorder hover:scale-105 transition-all text-gray-600 dark:text-gray-400 hover:text-pd-teal shadow-sm">
            <iconify-icon icon="solar:home-2-linear" width="20"></iconify-icon>
          </a>
          <button onClick={toggle} className="w-10 h-10 rounded-xl flex items-center justify-center bg-gray-200/50 dark:bg-pd-glass border border-gray-300 dark:border-pd-glassBorder hover:scale-105 transition-all text-gray-600 dark:text-gray-400 hover:text-pd-teal shadow-sm">
            <iconify-icon icon={isDark ? "solar:sun-linear" : "solar:moon-linear"} width="20"></iconify-icon>
          </button>
        </div>
      );
    };

    const Background = ({ typingSpeed }) => {
      const duration = Math.max(1.5, 7 - typingSpeed * 0.5);
      const isDark = document.documentElement.classList.contains('dark');
      return (
        <div className="fixed inset-0 w-full h-full pointer-events-none opacity-50 z-0">
          <div className="absolute top-[10%] -left-[10%] w-[40vw] h-[40vw] bg-pd-orange rounded-full mix-blend-screen filter blur-[120px] opacity-20" style={{ animation: `blob ${duration}s infinite` }} />
          <div className="absolute top-[5%] -right-[5%] w-[35vw] h-[35vw] bg-pd-teal rounded-full mix-blend-screen filter blur-[100px] opacity-20" style={{ animation: `blob ${duration}s infinite`, animationDelay: '2s' }} />
          <div className="absolute -bottom-[20%] -left-[10%] w-[50vw] h-[50vw] bg-pd-teal rounded-full mix-blend-screen filter blur-[150px] opacity-20" style={{ animation: `blob ${duration}s infinite`, animationDelay: '4s' }} />
          <div className="absolute -bottom-[10%] right-[10%] w-[35vw] h-[35vw] bg-pd-orange rounded-full mix-blend-screen filter blur-[100px] opacity-20" style={{ animation: `blob ${duration}s infinite`, animationDelay: '2s' }} />
          <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-[60vw] h-[60vw] bg-gradient-to-r from-pd-orange/10 to-pd-teal/10 rounded-full filter blur-[120px] opacity-30 animate-pulse"></div>
          <div className="absolute inset-0 opacity-[0.03]" style={{ backgroundImage: 'radial-gradient(currentColor 1px, transparent 1px)', backgroundSize: '32px 32px' }}></div>
        </div>
      );
    };

    const Genesis = ({ onComplete, typingSpeed, setTypingSpeed }) => {
      const [input, setInput] = useState('');
      const [stage, setStage] = useState(0);
      const [ceoText, setCeoText] = useState('');
      const fullCeoText = "Initialization complete. I am your Custom CEO Agent. I have analyzed your kingdom parameters and am assembling your autonomous workforce...";

      const handleType = (e) => {
        setInput(e.target.value);
        setTypingSpeed(prev => Math.min(prev + 1, 10));
        clearTimeout(window.typingTimer);
        window.typingTimer = setTimeout(() => setTypingSpeed(0), 1000);
      };

      const handleSubmit = (e) => {
        if (e && e.preventDefault) e.preventDefault();
        if (!input.trim()) return;
        setStage(1);
        setTypingSpeed(0);
      };

      useEffect(() => {
        if (stage === 1) {
          let i = 0;
          const interval = setInterval(() => {
            setCeoText(fullCeoText.substring(0, i));
            i++;
            if (i > fullCeoText.length) {
              clearInterval(interval);
              setTimeout(() => setStage(2), 500);
            }
          }, 30);
          return () => clearInterval(interval);
        }
      }, [stage]);

      return (
        <div className="w-full min-h-screen flex flex-col items-center justify-center p-6 relative z-10">
          <div className="absolute top-6 right-6"><ThemeToggle /></div>
          {stage === 0 && (
            <div className="w-full max-w-2xl mx-auto glass-reveal flex flex-col items-center">
              <div className="w-12 h-12 rounded-full border border-gray-200 dark:border-pd-glassBorder bg-white/40 dark:bg-pd-glass flex items-center justify-center mb-8 shadow-sm">
                <iconify-icon icon="solar:command-linear" width="24" className="text-gray-500 dark:text-gray-400"></iconify-icon>
              </div>
              <h1 className="text-3xl sm:text-4xl md:text-5xl font-medium tracking-tight mb-4 text-center drop-shadow-lg text-gray-900 dark:text-white">
                Describe your <span className="text-transparent bg-clip-text bg-gradient-to-r from-pd-orange to-pd-teal">digital kingdom...</span>
              </h1>
              <p className="text-sm text-gray-500 dark:text-gray-400 mb-8 md:mb-12 text-center">(Tell the Agent what kind of business you have)</p>
              <div className="w-full relative">
                <input
                  autoFocus type="text" value={input} onChange={handleType} onKeyDown={(e) => { if (e.key === 'Enter') handleSubmit(e); }}
                  className="w-full bg-white/40 dark:bg-pd-glass border border-gray-200 dark:border-pd-glassBorder rounded-2xl px-4 md:px-6 pr-14 md:pr-16 py-4 md:py-5 text-base md:text-lg text-gray-900 dark:text-white placeholder-gray-500 focus:outline-none focus:border-pd-teal/50 focus:ring-1 focus:ring-pd-teal/50 transition-all backdrop-blur-xl shadow-xl"
                  placeholder="e.g. A digital marketing agency focusing on Web3..."
                />
                <button type="button" onClick={handleSubmit} className="absolute right-2 md:right-3 top-1/2 -translate-y-1/2 w-10 md:w-12 h-10 md:h-12 rounded-xl bg-black/5 dark:bg-white/10 hover:bg-pd-orange/20 border border-black/10 dark:border-white/10 hover:border-pd-orange/50 flex items-center justify-center transition-all text-gray-900 dark:text-white hover:text-pd-orange">
                  <iconify-icon icon="solar:arrow-right-linear" width="20"></iconify-icon>
                </button>
              </div>
            </div>
          )}
          {stage >= 1 && (
            <div className="w-full max-w-4xl mx-auto flex flex-col items-center justify-start pt-10">
              <div className="glass-reveal mb-12 w-full max-w-2xl bg-white/40 dark:bg-pd-glass border border-gray-200 dark:border-pd-glassBorder rounded-2xl p-6 backdrop-blur-xl flex gap-4 items-start shadow-lg">
                <div className="w-10 h-10 rounded-full bg-white/40 dark:bg-pd-glass border border-gray-200 dark:border-pd-glassBorder flex items-center justify-center flex-shrink-0">
                  <iconify-icon icon="solar:user-bold" width="20" className="text-pd-teal"></iconify-icon>
                </div>
                <div>
                  <div className="text-xs font-mono text-pd-teal mb-1 uppercase tracking-widest">CEO Agent</div>
                  <p className="text-gray-800 dark:text-gray-200 leading-relaxed min-h-[3rem]">{ceoText}</p>
                </div>
              </div>
              {stage === 2 && (
                <div className="flex flex-col items-center w-full relative">
                  <div className="amp-card p-4 flex items-center gap-4 w-64 justify-center glass-reveal z-10">
                    <div className="w-8 h-8 rounded-full bg-white/40 dark:bg-pd-glass border border-gray-200 dark:border-pd-glassBorder flex items-center justify-center">
                      <iconify-icon icon="solar:crown-minimalistic-linear" width="16" className="text-pd-orange"></iconify-icon>
                    </div>
                    <div>
                      <div className="text-sm font-semibold text-gray-900 dark:text-white">CEO</div>
                      <div className="text-[10px] text-gray-500 dark:text-gray-400 flex items-center gap-1">
                        <span className="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></span> Active
                      </div>
                    </div>
                  </div>
                  <div className="tree-line-v h-8 glass-reveal stagger-1 hidden md:block"></div>
                  <div className="tree-line-h w-full max-w-2xl relative glass-reveal stagger-1 hidden md:block">
                    <div className="absolute top-0 left-0 w-[1px] h-6 tree-line-v"></div>
                    <div className="absolute top-0 right-0 w-[1px] h-6 tree-line-v"></div>
                    <div className="absolute top-0 left-1/2 w-[1px] h-6 tree-line-v"></div>
                  </div>
                  <div className="h-6 hidden md:block"></div>
                  <div className="flex flex-col md:flex-row w-full max-w-3xl justify-between gap-4 relative z-10 px-4 mt-6 md:mt-0">
                    <div className="amp-card p-4 flex flex-col items-center gap-2 w-full md:w-48 text-center glass-reveal stagger-2 border-pd-teal/30">
                      <div className="w-8 h-8 rounded-full bg-white/40 dark:bg-pd-glass border border-gray-200 dark:border-pd-glassBorder flex items-center justify-center text-pd-teal">
                        <iconify-icon icon="solar:global-linear" width="16"></iconify-icon>
                      </div>
                      <div>
                        <div className="text-sm font-semibold text-gray-900 dark:text-white">CMO Agent</div>
                        <div className="text-[10px] text-gray-500 dark:text-gray-400 mt-1">Lead Gen & Marketing</div>
                      </div>
                    </div>
                    <div className="amp-card p-4 flex flex-col items-center gap-2 w-full md:w-48 text-center glass-reveal stagger-3">
                      <div className="w-8 h-8 rounded-full bg-white/40 dark:bg-pd-glass border border-gray-200 dark:border-pd-glassBorder flex items-center justify-center text-gray-500">
                        <iconify-icon icon="solar:settings-linear" width="16"></iconify-icon>
                      </div>
                      <div>
                        <div className="text-sm font-semibold text-gray-900 dark:text-white">CTO Agent</div>
                        <div className="text-[10px] text-gray-500 dark:text-gray-400 mt-1">Systems & Code</div>
                      </div>
                    </div>
                    <div className="amp-card p-4 flex flex-col items-center gap-2 w-full md:w-48 text-center glass-reveal stagger-4 border-pd-orange/30">
                      <div className="w-8 h-8 rounded-full bg-white/40 dark:bg-pd-glass border border-gray-200 dark:border-pd-glassBorder flex items-center justify-center text-pd-orange">
                        <iconify-icon icon="solar:palette-linear" width="16"></iconify-icon>
                      </div>
                      <div>
                        <div className="text-sm font-semibold text-gray-900 dark:text-white">Creative Agent</div>
                        <div className="text-[10px] text-gray-500 dark:text-gray-400 mt-1">Content & Assets</div>
                      </div>
                    </div>
                  </div>
                  <div className="mt-16 glass-reveal stagger-4 flex justify-center w-full">
                    <button onClick={onComplete} className="amp-button primary px-8 py-3 text-sm font-medium tracking-wide shadow-[0_0_30px_rgba(255,95,0,0.2)]">
                      Enter Command Center <iconify-icon icon="solar:arrow-right-linear"></iconify-icon>
                    </button>
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
      );
    };

    const SettingsMenu = ({ session, onSaveComplete, activeTasks, userProfile, setUserProfile }) => {
      const [loading, setLoading] = useState(false);

      const handleSave = async () => {
        setLoading(true);
        if (supabaseClient && session?.user?.id) {
          await supabaseClient.from('business_profile').upsert({
            user_id: session.user.id,
            company_name: userProfile.company_name,
            bio: userProfile.bio,
            stage: userProfile.stage,
            updated_at: new Date()
          });
          if (onSaveComplete) onSaveComplete();
        }
        setLoading(false);
      };

      const handleLogout = async () => {
        if (supabaseClient) {
          await supabaseClient.auth.signOut();
          window.location.reload();
        }
      };

      const cmoTask = activeTasks?.find(t => t.agent === 'CMO' && t.status !== 'done');
      const creativeTask = activeTasks?.find(t => t.agent === 'Creative' && t.status !== 'done');

              <div className="flex-1 flex flex-col items-center justify-center relative min-w-[600px] pb-4 z-10">
                
                {/* CEO */}

                  <div className="amp-card p-4 flex items-center gap-4 w-64 justify-center z-10 border-pd-orange/20 shadow-[0_0_15px_rgba(255,95,0,0.1)] bg-white/80 dark:bg-[#0b0f19]">

                      <div className={`w-10 h-10 rounded-full bg-white/40 dark:bg-pd-glass border border-gray-200 dark:border-pd-glassBorder flex items-center justify-center shadow-sm ${cmoTask ? 'text-pd-teal' : 'text-gray-400'}`}>

                      <div>

                      </div>
                    </div>

                      <div className={`w-10 h-10 rounded-full bg-white/40 dark:bg-pd-glass border border-gray-200 dark:border-pd-glassBorder flex items-center justify-center shadow-sm ${ctoTask ? 'text-pd-orange' : 'text-gray-400'}`}>

                      <div>
                        <div className="text-sm font-semibold text-gray-900 dark:text-white">CTO Agent</div>

                    {/* Creative */}

                    </div>

                  </div>
                </div>
                
              </div>

    };

    const CommandCenter = ({ session }) => {
      const [activeModule, setActiveModule] = useState('neural-chat');
      const [isStatsOpen, setIsStatsOpen] = useState(false);
      const [isRightSidebarCollapsed, setIsRightSidebarCollapsed] = useState(false);

      const [triggerPrompt, setTriggerPrompt] = useState(null);

      const triggerCampaignPrompt = () => {
        setActiveModule('neural-chat');
        setTimeout(() => {
          setTriggerPrompt({
            sender: 'ceo',
            text: "I see you want to launch a new Marketing Campaign. To help me build the best campaign possible, please tell me: 1) What is the main goal of this campaign? 2) Who is the target audience? 3) Do you have any specific offers or budgets in mind? Once you provide this, I'll begin complex planning and delegate the tasks to the CMO.",
            time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
          });
        }, 150);
      };

      const triggerLeadPrompt = () => {
        setActiveModule('neural-chat');
        setTimeout(() => {
          setTriggerPrompt({
            sender: 'ceo',
            text: "You'd like to add a new Lead to the pipeline. Let's gather their information. Please provide their Name, Company, and any notes about what they are looking for so I can instruct the CMO to track them.",
            time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
          });
        }, 150);
      };

      const checkProfile = async () => {
        if (!supabaseClient || !session?.user?.id) return;
        const { data } = await supabaseClient.from('business_profile').select('*').eq('user_id', session.user.id).single();
        if (data) {
          setUserProfile({ company_name: data.company_name || '', bio: data.bio || '', stage: data.stage || 'Solo' });
          if (!data.company_name || !data.stage) {
            setNeedsProfileSetup(true);
          } else {
            setNeedsProfileSetup(false);
          }
        } else {
          setNeedsProfileSetup(true);
        }
      };

      const fetchTasks = async () => {
        if (!supabaseClient) return;
        const { data } = await supabaseClient.from('tasks').select('*').order('created_at', { ascending: false }).limit(50);
        if (data) setActiveTasks(data);
      };

      const [usagePct, setUsagePct] = useState(() => {
        const saved = localStorage.getItem('amp_usage_pct');
        return saved ? JSON.parse(saved) : { CEO: 100, CMO: 100, Creative: 100, CTO: 100 };
      });

      const depleteBudget = (agent, amount) => {
        setUsagePct(prev => {
          const newPct = Math.max(0, (prev[agent] || 100) - amount);
          const updated = { ...prev, [agent]: newPct };
          localStorage.setItem('amp_usage_pct', JSON.stringify(updated));
          return updated;
        });
      };

      const handleProfileSaved = async () => {
        await checkProfile();
        setTriggerPrompt({
          sender: 'ceo',
          text: `Excellent. Now that I understand your goals for your business, we can begin. Would you like me to analyze your target audience, generate some initial brand assets, or formulate a lead strategy?`,
          time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
        });
        setActiveModule('neural-chat');
      };

      useEffect(() => {
        fetchTasks();
        checkProfile();
        if (supabaseClient) {
          const channel = supabaseClient.channel('realtime:tasks')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'tasks' }, fetchTasks)
            .subscribe();
          return () => { supabaseClient.removeChannel(channel); };
        }
      }, [session]);

      const navItems = [
        { id: 'neural-chat', icon: 'solar:command-linear', label: 'Neural Chat', mobileLabel: 'Chat' },
        { id: 'lead-pipeline', icon: 'solar:filter-linear', label: 'Lead Pipeline', mobileLabel: 'Leads' },
        { id: 'client-ledger', icon: 'solar:folder-with-files-linear', label: 'Client Ledger', mobileLabel: 'Clients' },
        { id: 'marketing-pipeline', icon: 'solar:chart-square-linear', label: 'Marketing Pipeline', mobileLabel: 'Marketing' },
        { id: 'content-factory', icon: 'solar:palette-linear', label: 'Content Factory', mobileLabel: 'Content' },
        { id: 'tactical-calendar', icon: 'solar:calendar-linear', label: 'Tactical Calendar', mobileLabel: 'Calendar' },
        { id: 'settings', icon: 'solar:settings-linear', label: 'Settings', mobileLabel: 'Settings' }
      ];

      return (
        <div className="flex flex-col lg:flex-row w-full h-screen overflow-hidden p-2 sm:p-4 gap-2 sm:gap-4 z-10 relative glass-reveal">

            <div className="flex items-center gap-3">
              <img src="https://hoirqrkdgbmvpwutwuwj.supabase.co/storage/v1/object/public/assets/assets/8c547aee-5092-488d-9b24-cc3cadf37fdc_800w.png" className="w-8 h-8 rounded object-cover shadow-[0_0_15px_rgba(0,242,234,0.3)]" alt="Project D Logo" />
              <span className="font-bold tracking-tight text-gray-900 dark:text-white">AMP Center</span>
            </div>
            <div className="flex items-center gap-2">
              <ThemeToggle />
              <button onClick={() => setIsStatsOpen(true)} className="w-10 h-10 rounded-xl flex items-center justify-center bg-white/40 dark:bg-pd-glass border border-gray-200 dark:border-pd-glassBorder text-gray-600 dark:text-gray-400 relative hover:text-pd-teal hover:border-pd-teal/50 transition-all">
                <iconify-icon icon="solar:chart-square-linear" width="20"></iconify-icon>
                <span className="absolute top-2 right-2 w-2 h-2 rounded-full bg-pd-teal shadow-[0_0_5px_#00F2EA] animate-pulse"></span>
              </button>
            </div>
          </div>

          {/* Desktop Sidebar */}
          <aside className="hidden lg:flex w-64 flex-col bg-white/40 dark:bg-pd-glass border border-gray-200 dark:border-pd-glassBorder backdrop-blur-2xl rounded-3xl overflow-hidden shadow-xl flex-shrink-0">
            <div className="p-6 border-b border-gray-200 dark:border-pd-glassBorder flex justify-between items-center bg-white/50 dark:bg-transparent">
              <div className="flex items-center gap-3">
                <img src="https://hoirqrkdgbmvpwutwuwj.supabase.co/storage/v1/object/public/assets/assets/8c547aee-5092-488d-9b24-cc3cadf37fdc_800w.png" className="w-8 h-8 rounded object-cover shadow-[0_0_15px_rgba(0,242,234,0.3)]" alt="Project D Logo" />
                <span className="font-bold tracking-tight text-gray-900 dark:text-white">AMP Center</span>
              </div>
              <ThemeToggle />
            </div>
            <nav className="flex-1 p-4 flex flex-col gap-2 overflow-y-auto">
              {navItems.map(item => (
                <button key={item.id} onClick={() => setActiveModule(item.id)} className={`flex items-center gap-3 px-4 py-3 rounded-xl transition-all text-sm font-medium relative overflow-hidden ${activeModule === item.id ? 'bg-black/5 dark:bg-white/10 text-gray-900 dark:text-white shadow-sm' : 'text-gray-500 dark:text-gray-400 hover:bg-black/5 dark:hover:bg-white/5 hover:text-gray-900 dark:hover:text-gray-200'}`}>
                  <iconify-icon icon={item.icon} width="20" className={activeModule === item.id ? 'text-pd-teal relative z-10' : 'relative z-10'}></iconify-icon>

                </button>

            </nav>
            <div className="p-4 border-t border-gray-200 dark:border-pd-glassBorder">
              <div className="amp-card p-3 flex items-center gap-3 text-xs text-gray-500 dark:text-gray-400">
                <div className="w-2 h-2 rounded-full bg-green-500 shadow-[0_0_8px_#22c55e] animate-pulse"></div>

            </div>
          </aside>

          {/* Mobile Bottom Navigation */}
          <nav className="lg:hidden fixed bottom-4 left-4 right-4 bg-white/95 dark:bg-[#0b0f19]/95 border border-gray-200 dark:border-pd-glassBorder backdrop-blur-2xl rounded-2xl flex p-2 gap-1 overflow-x-auto z-40 shadow-2xl hide-scrollbar snap-x snap-mandatory">
            {navItems.map(item => (
              <button key={item.id} onClick={() => setActiveModule(item.id)} className={`flex flex-col items-center justify-center min-w-[72px] sm:min-w-[80px] p-2 rounded-xl transition-all text-[10px] font-medium snap-center flex-shrink-0 ${activeModule === item.id ? 'bg-pd-teal/10 text-pd-teal shadow-inner' : 'text-gray-500 hover:bg-black/5 dark:hover:bg-white/5'}`}>
                <iconify-icon icon={item.icon} width="22" className="mb-1"></iconify-icon>
                <span className="truncate w-full text-center">{item.mobileLabel}</span>
              </button>
            ))}
          </nav>

          <main className="flex-1 bg-white/40 dark:bg-pd-glass border border-gray-200 dark:border-pd-glassBorder backdrop-blur-2xl rounded-2xl lg:rounded-3xl overflow-hidden shadow-xl relative flex flex-col min-h-0 mb-[80px] lg:mb-0">
            <div className={`h-full flex flex-col ${activeModule === 'neural-chat' ? '' : 'hidden'}`}>
              <NeuralChat session={session} needsProfileSetup={needsProfileSetup} depleteBudget={depleteBudget} userProfile={userProfile} triggerPrompt={triggerPrompt} setTriggerPrompt={setTriggerPrompt} />
            </div>
            {activeModule === 'lead-pipeline' && <LeadPipeline onAddLead={triggerLeadPrompt} />}
            {activeModule === 'client-ledger' && <ClientLedger />}
            {activeModule === 'marketing-pipeline' && <MarketingPipeline onAddCampaign={triggerCampaignPrompt} />}
            {activeModule === 'tactical-calendar' && <TacticalCalendar />}
            {activeModule === 'content-factory' && <ContentFactory session={session} activeTasks={activeTasks} depleteBudget={depleteBudget} references={contentReferences} setReferences={setContentReferences} />}
            {activeModule === 'settings' && <SettingsMenu session={session} onSaveComplete={handleProfileSaved} activeTasks={activeTasks} userProfile={userProfile} setUserProfile={setUserProfile} />}
          </main>

          {isRightSidebarCollapsed && (

          <aside className={`fixed lg:static top-0 right-0 h-full lg:h-auto bg-white/95 dark:bg-[#0b0f19]/95 lg:bg-white/40 lg:dark:bg-pd-glass border-l lg:border border-gray-200 dark:border-pd-glassBorder backdrop-blur-3xl lg:rounded-3xl overflow-y-auto overflow-x-hidden shadow-2xl lg:shadow-xl flex-shrink-0 z-50 transition-all duration-300 origin-right ${isStatsOpen ? 'translate-x-0 w-80' : 'translate-x-full w-80 lg:translate-x-0'} ${isRightSidebarCollapsed ? 'lg:w-0 lg:border-0 lg:opacity-0 pointer-events-none' : 'lg:w-80 lg:opacity-100 pointer-events-auto'}`}>
            <div className="w-80 p-6 flex flex-col gap-6 h-full">
              <div className="flex justify-between items-center lg:hidden mb-2 border-b border-gray-200 dark:border-pd-glassBorder pb-4">
                <h3 className="font-bold text-gray-900 dark:text-white flex items-center gap-2"><iconify-icon icon="solar:chart-square-linear" className="text-pd-teal"></iconify-icon> System Stats</h3>
                <button onClick={() => setIsStatsOpen(false)} className="w-8 h-8 flex items-center justify-center bg-black/5 dark:bg-white/10 hover:bg-black/10 dark:hover:bg-white/20 rounded-full text-gray-600 dark:text-gray-400 transition-colors"><iconify-icon icon="solar:close-circle-linear" width="20"></iconify-icon></button>
              </div>

                )) : (
                  <div className="text-xs text-gray-500 italic">No active tasks. Chat with the CEO to assign work.</div>
                )}
              </div>
              <div className="mt-auto pt-6 border-t border-gray-200 dark:border-pd-glassBorder">

                  <BudgetBar agent="CEO" percentage={usagePct.CEO} />
                  <BudgetBar agent="CMO" percentage={usagePct.CMO} />
                  <BudgetBar agent="Creative" percentage={usagePct.Creative} />
                  <BudgetBar agent="CTO" percentage={usagePct.CTO} />
                </div>
              </div>
            </div>
          </aside>

      <div className="bg-white/50 dark:bg-white/5 border border-gray-200 dark:border-pd-glassBorder rounded-xl p-3 relative overflow-hidden group hover:border-gray-300 dark:hover:border-white/20 transition-all shadow-sm">

        <div className="flex justify-between items-start mb-1">
          <span className="text-[10px] font-semibold text-gray-700 dark:text-gray-300">{agent}</span>
          {status === 'running' ? (
            <span className="text-[10px] text-pd-teal flex items-center gap-1"><span className="w-1.5 h-1.5 rounded-full bg-pd-teal animate-pulse"></span> Running</span>
          ) : (<span className="text-[10px] text-gray-500">Done</span>)}
        </div>
        <p className="text-xs text-gray-500 dark:text-gray-400 leading-tight">{task}</p>
      </div>
    );

    const BudgetBar = ({ agent, percentage }) => {
      const displayPct = Math.max(0, Math.round(percentage));

      const [input, setInput] = useState('');
      const [isTyping, setIsTyping] = useState(false);
      const [attachment, setAttachment] = useState(null);
      const endRef = useRef(null);
      const fileInputRef = useRef(null);

      useEffect(() => {
        if (needsProfileSetup && messages.length === 1) {
          setMessages([

          ]);
        }
      }, [needsProfileSetup]);

      useEffect(() => {
        if (triggerPrompt) {
          setMessages(prev => [...prev, triggerPrompt]);
          setTriggerPrompt(null);
        }
      }, [triggerPrompt]);

      useEffect(() => { endRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages, isTyping]);

      const handleFileChange = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (ev) => {
            setAttachment({ 
              data: ev.target.result.split(',')[1], 
              mimeType: file.type, 
              preview: ev.target.result 
            });
          };
          reader.readAsDataURL(file);
        }
      };

      const handleSend = (e) => {
        if (e && e.preventDefault) e.preventDefault();
        if (!input.trim() && !attachment) return;
        
        const msg = input.trim();
        const currentAttachment = attachment;

        if (needsProfileSetup) {
          setMessages(prev => [...prev, 
            { sender: 'user', text: msg, attachment: currentAttachment ? currentAttachment.preview : null, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) },
            { sender: 'ceo', text: "I cannot execute tasks until your Business Profile is configured. Please complete your settings first.", time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) }
          ]);
          setInput('');
          setAttachment(null);
          return;
        }
        
        setMessages(prev => [...prev, { 
          sender: 'user', 
          text: msg, 
          attachment: currentAttachment ? currentAttachment.preview : null,
          time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) 
        }]);
        
        setInput('');
        setAttachment(null);
        setIsTyping(true);

        fetch('/.netlify/functions/agent', {
          method: 'POST',

            message: msg, 
            userId: session?.user?.id,
            attachment: currentAttachment ? { data: currentAttachment.data, mimeType: currentAttachment.mimeType } : null,

              <div className="absolute bottom-4 md:bottom-6 w-full max-w-xl px-2 md:px-4 z-10">
                <div className="relative">
                  <input type="file" ref={fileRef} onChange={handleFile} accept="image/*" className="hidden" />
                  <input type="text" value={prompt} onChange={e => setPrompt(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleGenerate()} placeholder={references.length === 0 ? "Upload brand materials first, then type prompt..." : "Prompt (e.g. 'Generate a new logo')..."} className="w-full bg-white/90 dark:bg-pd-glass border border-gray-200 dark:border-pd-glassBorder rounded-full pl-4 md:pl-6 pr-24 md:pr-28 py-3 md:py-4 text-sm text-gray-900 dark:text-white focus:outline-none focus:border-pd-orange/50 shadow-2xl backdrop-blur-xl" />
                  
                  <div className="absolute right-1.5 md:right-2 top-1/2 -translate-y-1/2 flex items-center gap-1.5 md:gap-2">
                    <button onClick={() => fileRef.current?.click()} className="w-8 md:w-10 h-8 md:h-10 rounded-full bg-pd-teal/20 text-pd-teal flex items-center justify-center hover:bg-pd-teal hover:text-white transition-all group relative">
                      <iconify-icon icon="solar:paperclip-linear" width="18"></iconify-icon>
                      <span className="absolute bottom-full mb-2 px-2 py-1 bg-black text-white text-[10px] rounded opacity-0 group-hover:opacity-100 whitespace-nowrap pointer-events-none transition-opacity hidden md:block">Attach Reference</span>
                    </button>
                    <button onClick={handleGenerate} disabled={isGenerating} className="w-8 md:w-10 h-8 md:h-10 rounded-full bg-pd-orange/20 text-pd-orange flex items-center justify-center hover:bg-pd-orange hover:text-white transition-all disabled:opacity-50">
                      <iconify-icon icon="solar:plain-bold" width="18"></iconify-icon>
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div className="mt-6 border-t border-gray-200 dark:border-pd-glassBorder pt-6 w-full z-10 relative">
             <h3 className="text-sm font-semibold mb-4 text-gray-900 dark:text-white flex items-center gap-2">
               <iconify-icon icon="solar:history-linear" className="text-pd-orange"></iconify-icon> Asset Archive
             </h3>
             {archiveItems.length > 0 ? (
               <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 overflow-y-auto max-h-48 hide-scrollbar">
                 {archiveItems.map((item, idx) => (
                   <div key={idx} className="bg-white/40 dark:bg-black/20 border border-gray-200 dark:border-white/10 rounded-xl p-2 flex flex-col items-center justify-between shadow-sm cursor-pointer hover:shadow-md hover:border-pd-orange/50 transition-all group">
                     <div className="w-full h-20 mb-2 bg-black/5 dark:bg-white/5 rounded-lg flex items-center justify-center overflow-hidden">
                       {(item.notes && item.notes.startsWith('data:image')) ? (
                         <img src={item.notes} alt={item.title} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" />
                       ) : (
                         <iconify-icon icon="solar:document-text-linear" width="24" className="text-gray-400"></iconify-icon>
                       )}
                     </div>
                     <p className="text-[10px] text-gray-600 dark:text-gray-400 truncate w-full text-center" title={item.title}>{item.title}</p>
                   </div>
                 ))}
               </div>
             ) : (
               <div className="w-full h-24 bg-black/5 dark:bg-white/5 rounded-2xl flex flex-col items-center justify-center border border-dashed border-gray-300 dark:border-white/10">
                 <iconify-icon icon="solar:box-linear" width="24" className="text-gray-400 mb-2"></iconify-icon>
                 <p className="text-xs text-gray-500">Archive is empty. Generate content to populate.</p>
               </div>
             )}
          </div>
        </div>
      );
    };

    const TacticalCalendar = () => {
      const [events, setEvents] = useState([]);

      const fetchEvents = async () => {
        if (!supabaseClient) return;
        const { data } = await supabaseClient.from('calendar_events').select('*').order('created_at', { ascending: true });
        if (data) setEvents(data);
      };

      useEffect(() => {
        fetchEvents();
        if (supabaseClient) {
          const channel = supabaseClient.channel('realtime:calendar_events')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'calendar_events' }, fetchEvents)
            .subscribe();
          return () => { supabaseClient.removeChannel(channel); };
        }
      }, []);

      const dayOffsets = { 'Mon': '10px', 'Tue': '130px', 'Wed': '250px', 'Thu': '370px', 'Fri': '490px' };
      const agentColors = {
        'CMO': { icon: 'solar:global-linear', text: 'text-pd-teal', bg: 'bg-pd-teal/20', border: 'border-pd-teal/50' },
        'Creative': { icon: 'solar:palette-linear', text: 'text-pd-orange', bg: 'bg-pd-orange/20', border: 'border-pd-orange/50' },
        'CTO': { icon: 'solar:settings-linear', text: 'text-gray-700 dark:text-gray-300', bg: 'bg-gray-200 dark:bg-white/10', border: 'border-gray-300 dark:border-white/20' }
      };

      const groupedEvents = events.reduce((acc, event) => {
        const role = event.agent_role || 'General';
        if (!acc[role]) acc[role] = [];
        acc[role].push(event);
        return acc;
      }, {});

      // Add default agents if empty
      if (Object.keys(groupedEvents).length === 0) {
        groupedEvents['CMO'] = [];
        groupedEvents['Creative'] = [];
        groupedEvents['CTO'] = [];
      }

      return (
        <div className="p-4 md:p-8 h-full flex flex-col">
          <div className="mb-6 md:mb-8"><h2 className="text-xl md:text-2xl font-semibold tracking-tight text-gray-900 dark:text-white mb-1">Tactical Calendar</h2><p className="text-xs text-gray-500">Gantt-style timeline of agent deployments and heartbeats.</p></div>
          <div className="flex-1 bg-white/50 dark:bg-white/5 border border-gray-200 dark:border-pd-glassBorder rounded-2xl p-4 md:p-6 relative overflow-x-auto shadow-sm">
            <div className="absolute inset-0 opacity-[0.05]" style={{ backgroundImage: 'linear-gradient(currentColor 1px, transparent 1px), linear-gradient(90deg, currentColor 1px, transparent 1px)', backgroundSize: '60px 40px' }}></div>
            <div className="min-w-[600px] relative z-10 space-y-8 mt-4">
              <div className="flex text-[10px] text-gray-400 font-mono mb-4 pl-32 uppercase tracking-widest border-b border-gray-200 dark:border-pd-glassBorder pb-2">
                <div className="w-[120px]">Mon</div><div className="w-[120px]">Tue</div><div className="w-[120px]">Wed</div><div className="w-[120px]">Thu</div><div className="w-[120px]">Fri</div>
              </div>

              {Object.keys(groupedEvents).map(role => {
                const style = agentColors[role] || agentColors['CTO'];
                return (
                  <div key={role} className="flex items-center">
                    <div className="w-32 sticky left-0 bg-white/95 dark:bg-[#0b0f19]/95 z-20 py-2 text-xs text-gray-600 dark:text-gray-400 font-mono font-bold flex items-center gap-2 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.05)]">
                      <iconify-icon icon={style.icon} className={style.text}></iconify-icon> {role}
                    </div>
                    <div className="flex-1 h-10 relative pl-4">
                      {groupedEvents[role].map(ev => (
                        <div key={ev.id} className={`absolute top-1/2 h-6 -translate-y-1/2 rounded ${style.bg} border ${style.border} flex items-center px-2 text-[10px] ${style.text} whitespace-nowrap shadow-sm cursor-pointer hover:opacity-80`} style={{ left: dayOffsets[ev.day_of_week] || '10px', width: '100px', overflow: 'hidden', textOverflow: 'ellipsis' }} title={ev.task_name}>
                          {ev.task_name}
                        </div>
                      ))}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    };

    const App = () => {
      const [session, setSession] = useState(null);
      const [currentScreen, setCurrentScreen] = useState('genesis');
      const [typingSpeed, setTypingSpeed] = useState(0);

      useEffect(() => {
        if (supabaseClient) {
          supabaseClient.auth.getSession().then(({ data: { session } }) => {
            setSession(session);
            if (session) setCurrentScreen('dashboard');
          });
          supabaseClient.auth.onAuthStateChange((_event, session) => {
            setSession(session);
            if (session) setCurrentScreen('dashboard');
          });
        }
      }, []);

      return (
        <>
          <Background typingSpeed={typingSpeed} />
          {!session ? (
            <AuthScreen onLogin={(sess) => setSession(sess)} />
          ) : (
            <>
              {currentScreen === 'genesis' && <Genesis onComplete={() => setCurrentScreen('dashboard')} typingSpeed={typingSpeed} setTypingSpeed={setTypingSpeed} />}
              {currentScreen === 'dashboard' && <CommandCenter session={session} />}
            </>
          )}
        </>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>


</body>

</html>
