        0 8px 20px rgba(0,0,0,0.4),
        0 0 0 1px rgba(70,212,198,0.12);
    }

    .glass-panel {
      background: linear-gradient(

      0%, 100% {
        transform: translateY(0) scale(1.02);
        box-shadow: 0 0 20px rgba(255, 145, 70, 0.4), 0 0 30px rgba(70, 212, 198, 0.2);

        box-shadow: 0 10px 30px rgba(255, 145, 70, 0.6), 0 15px 40px rgba(70, 212, 198, 0.4);
      }
    }
    .dramatic-hover {
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1) !important;
      will-change: transform, box-shadow;
    }
    .dramatic-hover:not(:disabled):hover {
      animation: floatHover 2s ease-in-out infinite !important;
    }
    .dramatic-hover:not(:disabled):active {
      transform: scale(0.95) !important;
    }

    /* â”€â”€ BUTTONS â”€â”€ */

      background: linear-gradient(135deg, rgba(255,255,255,0.85) 0%, rgba(240,245,255,0.55) 100%);
      backdrop-filter: blur(12px) saturate(130%);
      -webkit-backdrop-filter: blur(12px) saturate(130%);
      border: 1px solid rgba(255,255,255,0.9);
      border-radius: 9999px;
      transition: all 0.3s cubic-bezier(0.4,0,0.2,1);

      align-items: center;
      justify-content: center;
      gap: 0.5rem;

      box-shadow:

        0 -1px 0 rgba(0,0,0,0.06) inset,
        0 4px 14px rgba(0,0,0,0.07);

      color: #dde3f0;
      box-shadow:
        0 1px 0 rgba(255,255,255,0.1) inset,
        0 -1px 0 rgba(0,0,0,0.4) inset,
        0 4px 14px rgba(0,0,0,0.35);
    }

    .amp-button::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,95,0,0.18), transparent);
      transform: translateX(-100%);
      transition: transform 0.5s ease;
    }

    .amp-button:hover::before { transform: translateX(100%); }

    .amp-button:hover {
      border-color: rgba(255,95,0,0.55);
      box-shadow:
        0 2px 0 rgba(255,255,255,1) inset,
        0 -1px 0 rgba(0,0,0,0.06) inset,
        0 8px 25px rgba(255,95,0,0.18),

        0 -1px 0 rgba(0,0,0,0.45) inset,

        0 -1px 0 rgba(180,50,0,0.15) inset,

        0 -1px 0 rgba(180,50,0,0.2) inset,

      color: #FF5F00;

    /* â”€â”€ ANIMATIONS â”€â”€ */
    .glass-reveal {
      animation: glassReveal 0.8s cubic-bezier(0.16,1,0.3,1) forwards;
      opacity: 0;
      transform: translateY(20px) scale(0.95);

    @keyframes glassReveal {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .stagger-1 { animation-delay: 0.1s; }
    .stagger-2 { animation-delay: 0.2s; }
    .stagger-3 { animation-delay: 0.3s; }
    .stagger-4 { animation-delay: 0.4s; }

    /* â”€â”€ AGENT DELEGATION ANIMATIONS â”€â”€ */
    @keyframes taskSlideIn {
      from { opacity: 0; transform: translateX(30px) scale(0.95); }
      to { opacity: 1; transform: translateX(0) scale(1); }
    }
    .task-slide-in {
      animation: taskSlideIn 0.5s cubic-bezier(0.16,1,0.3,1) forwards;
      opacity: 0;
    }

    @keyframes shimmerScan {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(200%); }
    }
    .task-shimmer::after {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 50%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(70,212,198,0.06), transparent);
      animation: shimmerScan 2.5s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes agentGlow {
      0%, 100% { box-shadow: 0 0 4px currentColor; opacity: 1; }
      50% { box-shadow: 0 0 12px currentColor; opacity: 0.7; }
    }
    .agent-active-glow {
      animation: agentGlow 2s ease-in-out infinite;
    }

    @keyframes delegateFlow {
      0% { opacity: 0.3; transform: translateX(-2px); }
      50% { opacity: 1; transform: translateX(2px); }
      100% { opacity: 0.3; transform: translateX(-2px); }
    }
    .delegate-arrow {
      animation: delegateFlow 1.5s ease-in-out infinite;
    }

    @keyframes capacityPulse {
      0%, 100% { box-shadow: 0 0 6px rgba(70,212,198,0.3); }
      50% { box-shadow: 0 0 14px rgba(70,212,198,0.6); }
    }
    .capacity-active {
      animation: capacityPulse 2s ease-in-out infinite;
    }

    /* ── ONBOARDING SPOTLIGHT TUTORIAL ── */
    @keyframes onb-fadein {
      from { opacity: 0; }
      to { opacity: 1; }

      from { opacity: 0; transform: translateY(16px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes onb-content {

      to { opacity: 1; transform: translateX(0); }

    }
    .tour-spotlight-target {
      position: relative;
      z-index: 210 !important;
      border-radius: 1rem;
      animation: spotlight-ring 2s ease-in-out infinite;
    }
    .tour-backdrop {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0,0,0,0);
      backdrop-filter: blur(0px);
      transition: background 0.6s ease, backdrop-filter 0.6s ease;
      pointer-events: all;
    }
    .tour-backdrop.active {
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(4px);
    }
    .tour-popover {
      position: fixed;
      z-index: 220;
      max-width: 380px;
      width: calc(100vw - 2rem);
      animation: onb-slideup 0.45s cubic-bezier(0.16, 1, 0.3, 1);

    ::-webkit-scrollbar { width: 5px; height: 5px; }

    .toggle-checkbox:checked+.toggle-label { background-color: #FF5F00; border-color: #FF5F00; }
    .toggle-checkbox:checked+.toggle-label .toggle-thumb { transform: translateX(100%); border-color: #FF5F00; }
    .toggle-label { background-color: rgba(0,0,0,0.1); border: 1px solid rgba(0,0,0,0.2); }
    .dark .toggle-label { background-color: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); }

    .tree-line-v { width: 1px; background: linear-gradient(to bottom, rgba(0,0,0,0.2), transparent); }
    .dark .tree-line-v { background: linear-gradient(to bottom, rgba(255,255,255,0.2), transparent); }
    .tree-line-h { height: 1px; background: rgba(0,0,0,0.2); }
    .dark .tree-line-h { background: rgba(255,255,255,0.2); }

    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

<body>
  <div id="google_translate_element"></div>
  <div class="fixed inset-0 w-full h-full overflow-hidden pointer-events-none z-0 bg-gray-50 dark:bg-[#0b0f19]"
    id="bg-container"></div>
  <div id="root" class="relative z-10 w-full min-h-[100dvh] flex text-gray-800 dark:text-gray-200"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Initialize Supabase — using new publishable key format (sb_publishable_*)
    const SUPABASE_URL = 'https://alkknerlktomzolqlntt.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_3Pip4_Ta8kBDSkUkM5-AGw_SCa4pJc-';
    let supabaseClient = null;
    try {
      if (SUPABASE_URL && SUPABASE_ANON_KEY && window.supabase) {
        supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      }
    } catch(e) {
      console.warn('Supabase init failed:', e.message);
    }

    // --- CLOUD SYNC: Data follows the user across devices ---
    // All localStorage keys that contain user workspace data
    const SYNC_KEYS = [
      'amp_business_profile', 'amp_custom_agents', 'amp_account_users',
      'amp_chat_history', 'amp_chat_threads', 'amp_team_messages',
      'amp_documents', 'amp_usage_pct', 'amp_language'
    ];
    // Stage-dependent keys get resolved dynamically
    const SYNC_STAGE_KEYS = ['amp_leads_', 'amp_clients_', 'amp_tasks_', 'amp_finances_', 'amp_inventory_', 'amp_calendar_'];

    const getAllSyncKeys = (stage) => {
      const stageVal = stage || 'Default';
      return [...SYNC_KEYS, ...SYNC_STAGE_KEYS.map(k => k + stageVal)];
    };

    // Load all workspace data from Supabase into localStorage (runs on login)
    const loadFromCloud = async (userId, stage) => {
      if (!supabaseClient || !userId) return;
      try {
        const { data, error } = await supabaseClient
          .from('user_workspace')
          .select('data_key, data_value')
          .eq('user_id', userId);
        if (error) { console.warn('Cloud load failed:', error.message); return; }
        if (data && data.length > 0) {
          data.forEach(row => {
            // Only populate localStorage if it doesn't already have newer data
            const existing = localStorage.getItem(row.data_key);
            if (!existing || existing === '[]' || existing === '{}' || existing === 'null') {
              localStorage.setItem(row.data_key, row.data_value);
            }
          });
          console.log(`â˜ï¸ Loaded ${data.length} data keys from cloud`);
        }
      } catch (e) {
        console.warn('Cloud sync load error:', e.message);
      }
    };

    // Save all workspace data from localStorage to Supabase (runs after data changes)
    const syncToCloud = async (userId, stage) => {
      if (!supabaseClient || !userId) return;
      try {
        const keys = getAllSyncKeys(stage);
        const rows = [];
        keys.forEach(key => {
          const val = localStorage.getItem(key);
          if (val && val !== '[]' && val !== '{}' && val !== 'null') {
            rows.push({ user_id: userId, data_key: key, data_value: val, updated_at: new Date().toISOString() });
          }
        });
        if (rows.length > 0) {
          // Upsert: update if exists, insert if not
          await supabaseClient.from('user_workspace').upsert(rows, { onConflict: 'user_id,data_key' });
        }
      } catch (e) {
        console.warn('Cloud sync save error:', e.message);
      }
    };

    // Debounced sync â€” saves at most once every 5 seconds after data changes
    let syncTimeout = null;
    const debouncedSync = (userId, stage) => {
      if (syncTimeout) clearTimeout(syncTimeout);
      syncTimeout = setTimeout(() => syncToCloud(userId, stage), 5000);
    };

    // --- REALTIME MULTI-DEVICE SYNC ---
    // Subscribes to user_workspace table changes. When ANY device upserts a row
    // (leads added, tasks created, etc), all other open sessions receive it
    // instantly via WebSocket and update their localStorage + React state.
    //
    // SETUP REQUIRED: In Supabase Dashboard â†’ Database â†’ Replication,
    // toggle ON the `user_workspace` table to enable Realtime on it.
    let realtimeChannel = null;
    const subscribeToRealtimeWorkspace = (userId, onDataChanged) => {
      if (!supabaseClient || !userId || userId === 'local') return null;
      // Clean up any existing channel first
      if (realtimeChannel) {
        supabaseClient.removeChannel(realtimeChannel);
        realtimeChannel = null;
      }
      const channel = supabaseClient
        .channel(`workspace:${userId}`)
        .on(
          'postgres_changes',
          {
            event: '*', // INSERT or UPDATE
            schema: 'public',
            table: 'user_workspace',
            filter: `user_id=eq.${userId}`
          },
          (payload) => {
            const row = payload.new;
            if (!row || !row.data_key || !row.data_value) return;
            // Apply the incoming value to localStorage
            const current = localStorage.getItem(row.data_key);
            if (current !== row.data_value) {
              localStorage.setItem(row.data_key, row.data_value);
              // Dispatch storage event so React hooks in other components pick it up
              window.dispatchEvent(new StorageEvent('storage', {
                key: row.data_key,
                newValue: row.data_value,
                oldValue: current,
                storageArea: localStorage
              }));
              // Also fire specific AMP events for components listening to them
              const key = row.data_key;
              if (key.startsWith('amp_leads_'))    window.dispatchEvent(new Event('amp-leads-updated'));
              if (key.startsWith('amp_clients_'))  window.dispatchEvent(new Event('amp-clients-updated'));
              if (key.startsWith('amp_tasks_'))    window.dispatchEvent(new Event('amp-tasks-updated'));
              if (key.startsWith('amp_finances_')) window.dispatchEvent(new Event('amp-finances-updated'));
              if (key.startsWith('amp_inventory_'))window.dispatchEvent(new Event('amp-inventory-updated'));
              if (key.startsWith('amp_calendar_')) window.dispatchEvent(new Event('amp-calendar-updated'));
              if (key === 'amp_team_messages')     window.dispatchEvent(new Event('amp-team-messages'));
              if (key === 'amp_custom_agents')     window.dispatchEvent(new Event('amp-subagents-updated'));
              if (key === 'amp_business_profile')  window.dispatchEvent(new Event('amp-profile-updated'));
              // Notify parent to re-render if needed
              if (onDataChanged) onDataChanged(key, row.data_value);
            }
          }
        )
        .subscribe((status) => {
          if (status === 'SUBSCRIBED') {
            console.log(`ðŸ”´ Realtime active â€” live sync enabled for account ${userId.slice(0, 8)}...`);
          }
        });
      realtimeChannel = channel;
      return channel;
    };
    const unsubscribeRealtimeWorkspace = () => {
      if (realtimeChannel && supabaseClient) {
        supabaseClient.removeChannel(realtimeChannel);
        realtimeChannel = null;
      }
    };

    const AuthScreen = ({ onLogin }) => {

      const handleAuth = async (e) => {

          setError("Supabase not connected. Please use Local Mode.");
          return;
        }
        setLoading(true);
        setError('');
        setSuccessMsg('');

        try {
          if (isSignUp) {
            const { data, error } = await supabaseClient.auth.signUp({ email, password });
            if (error) throw error;
            if (data.session) onLogin(data.session);
            else {
              setIsSignUp(false);
              setPassword('');
              setSuccessMsg("Account created! Please check your email for a confirmation link, then log in here.");
            }
          } else {
            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) throw error;
            if (data.session) onLogin(data.session);
          }
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      };

      const handleGoogleSignIn = async () => {
        if (!supabaseClient) { setError("Supabase not connected."); return; }
        setGoogleLoading(true);
        setError('');
        try {
          const { error } = await supabaseClient.auth.signInWithOAuth({
            provider: 'google',
            options: {
              // After Google auth, redirect back to this exact page.
              // Supabase automatically exchanges the code for a session.
              redirectTo: window.location.origin + window.location.pathname,
              scopes: 'https://www.googleapis.com/auth/gmail.readonly https://www.googleapis.com/auth/gmail.send https://www.googleapis.com/auth/gmail.modify email profile',
              queryParams: {
                access_type: 'offline',
                prompt: 'consent', // Always show account picker
              }
            }
          });
          if (error) throw error;
          // Page will redirect to Google â€” no further action needed here.
          // When the user returns, onAuthStateChange in App will fire and set the session.
        } catch (err) {
          setError(err.message);
          setGoogleLoading(false);
        }
      };

      return (
        <div className="w-full min-h-[100dvh] flex items-center justify-center relative z-10 px-4">

              <div className="w-20 h-20 rounded-2xl shadow-[0_0_20px_rgba(70,212,198,0.3)] overflow-hidden">
                <img src="https://hoirqrkdgbmvpwutwuwj.supabase.co/storage/v1/object/public/assets/assets/8c547aee-5092-488d-9b24-cc3cadf37fdc_800w.png" className="w-full h-full object-cover" alt="Project D Logo" />
              </div>
            </div>
            <h2 className="text-2xl font-bold text-center mb-1 text-gray-900 dark:text-white">
              {isSignUp ? 'Initialize Account' : 'Access AMP Center'}
            </h2>
            <p className="text-center text-gray-500 dark:text-gray-400 mb-6 text-sm">
              {isSignUp ? 'Create your account to get started' : 'Sign in to your workspace'}
            </p>

            {error && (
              <div className="mb-4 p-3 bg-red-500/20 border border-red-500/50 rounded-lg text-red-600 dark:text-red-400 text-sm text-center">
                {error}
              </div>
            )}

            {successMsg && (
              <div className="mb-4 p-3 bg-pd-teal/20 border border-pd-teal/50 rounded-lg text-pd-teal text-sm text-center font-medium">
                {successMsg}
              </div>
            )}

            {/* Google Sign-In Button */}
            {supabaseClient && (
              <button
                onClick={handleGoogleSignIn}
                disabled={googleLoading}
                type="button"
                className="w-full flex items-center justify-center gap-3 bg-white dark:bg-white/10 hover:bg-gray-50 dark:hover:bg-white/15 border border-gray-300 dark:border-white/20 rounded-xl py-3 px-4 text-gray-800 dark:text-white font-semibold text-sm transition-all shadow-sm disabled:opacity-60 mb-4"
              >
                {googleLoading ? (
                  <span className="w-5 h-5 border-2 border-gray-400 border-t-transparent rounded-full animate-spin"></span>
                ) : (
                  <svg width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                  </svg>
                )}
                {googleLoading ? 'Redirecting to Google...' : 'Continue with Google'}
              </button>
            )}

            {/* Divider */}
            {supabaseClient && (
              <div className="flex items-center gap-3 mb-4">
                <div className="flex-1 h-px bg-gray-200 dark:bg-white/10"></div>
                <span className="text-xs text-gray-400 font-medium">or sign in with email</span>
                <div className="flex-1 h-px bg-gray-200 dark:bg-white/10"></div>
              </div>
            )}

            <form onSubmit={handleAuth} className="space-y-4">
              <div>
                <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Email</label>
                <input type="email" value={email} onChange={e => setEmail(e.target.value)} required
                  className="w-full bg-white/50 dark:bg-pd-dark/50 border border-gray-300 dark:border-gray-700 rounded-xl px-4 py-3 text-gray-900 dark:text-white focus:ring-2 focus:ring-pd-teal focus:border-transparent outline-none transition-all"
                />
              </div>
              <div>
                <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Password</label>
                <input type="password" value={password} onChange={e => setPassword(e.target.value)} required minLength="6"
                  className="w-full bg-white/50 dark:bg-pd-dark/50 border border-gray-300 dark:border-gray-700 rounded-xl px-4 py-3 text-gray-900 dark:text-white focus:ring-2 focus:ring-pd-teal focus:border-transparent outline-none transition-all"
                />
              </div>
              <button type="submit" disabled={loading} className="w-full py-3 px-4 bg-gradient-to-r from-pd-orange to-pd-teal text-white font-semibold rounded-xl hover:opacity-90 transition-opacity disabled:opacity-50">
                {loading ? 'Processing...' : (isSignUp ? 'Create Account' : 'Login')}
              </button>
            </form>
            <div className="mt-6 text-center space-y-4">
              <button onClick={() => { setIsSignUp(!isSignUp); setError(''); setSuccessMsg(''); }} className="text-sm font-medium text-gray-600 dark:text-gray-400 hover:text-pd-orange transition-colors outline-none">
                {isSignUp ? 'Already have an account? Login' : "Don't have an account? Sign Up"}
              </button>
              
              {!supabaseClient && (
                <button onClick={() => {
                  localStorage.setItem('amp_local_session', 'true');
                  onLogin({ user: { id: 'local' } });
                }} type="button" className="w-full bg-black/5 dark:bg-white/10 hover:bg-black/10 dark:hover:bg-white/20 text-gray-900 dark:text-white rounded-xl py-3 text-sm font-semibold transition-all mt-4 border border-gray-200 dark:border-white/10 shadow-sm">
                  <iconify-icon icon="solar:cpu-linear" className="mr-2"></iconify-icon>
                  Enter Local Mode (No Database)
                </button>
              )}
            </div>
          </div>
        </div>
      );
    };

    const LanguageToggle = () => {
      const [lang, setLang] = useState(() => {
        const saved = localStorage.getItem('amp_language');
        if (saved) return saved;
        const combo = document.querySelector('.goog-te-combo');
        if (combo && combo.value) return combo.value === 'es' ? 'es' : 'en';
        return 'en';
      });
      const [isSwitching, setIsSwitching] = useState(false);
      
      const toggle = () => {
        if (isSwitching) return;
        setIsSwitching(true);
        const targetLang = lang === 'en' ? 'es' : 'en';
        
        const selectField = document.querySelector(".goog-te-combo");
        if (selectField) {
          selectField.value = targetLang === 'en' ? 'en' : 'es'; 
          selectField.dispatchEvent(new Event('change'));
          setTimeout(() => {
            if (selectField.value !== (targetLang === 'en' ? 'en' : 'es')) {
               selectField.value = targetLang === 'en' ? 'en' : 'es';
               selectField.dispatchEvent(new Event('change'));
            }
          }, 150);
        }

        setLang(targetLang);
        localStorage.setItem('amp_language', targetLang);
        setTimeout(() => setIsSwitching(false), 800);
      };

      return (
        <button 
          onClick={toggle} 
          disabled={isSwitching}

        </div>

    };

      useEffect(() => {
        if (session?.user?.id && session.user.id !== 'local') {
          fetch(`/.netlify/functions/gmail-connect?action=status&userId=${session.user.id}`)
            .then(r => r.json())
            .then(data => setGmailStatus({ ...data, loading: false }))
            .catch(() => setGmailStatus({ connected: false, email: '', loading: false }));
        } else {
          setGmailStatus({ connected: false, email: '', loading: false });
        }
        // Check for gmail_connected query param (returned from OAuth)
        const params = new URLSearchParams(window.location.search);
        if (params.get('gmail_connected') === 'true') {
          setGmailStatus({ connected: true, email: 'Refreshing...', loading: true });
          // Re-fetch to get the actual email
          if (session?.user?.id) {
            fetch(`/.netlify/functions/gmail-connect?action=status&userId=${session.user.id}`)
              .then(r => r.json())
              .then(data => setGmailStatus({ ...data, loading: false }))
              .catch(() => setGmailStatus({ connected: false, email: '', loading: false }));
          }
          // Clean URL
          window.history.replaceState({}, '', window.location.pathname);
        }
      }, [session?.user?.id]);

      const handleGmailConnect = () => {
        if (!session?.user?.id || session.user.id === 'local') {
          alert('You must be signed in with a cloud account to connect Gmail.');
          return;
        }
        window.location.href = `/.netlify/functions/gmail-connect?action=connect&userId=${session.user.id}`;

        if (!window.confirm('Disconnect Gmail? You will no longer be able to send emails from the AMP Center.')) return;
        try {
          await fetch('/.netlify/functions/gmail-connect?action=disconnect', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId: session?.user?.id })

          setGmailStatus({ connected: false, email: '', loading: false });

          alert('Failed to disconnect: ' + e.message);
        }

      const handleReset = async () => {
        if (confirmText.toLowerCase() !== 'confirm') return;
        setLoading(true);
        try {
          // Thoroughly wipe all amp-related localStorage keys including stage-specific ones
          Object.keys(localStorage).forEach(key => {
            if (key.startsWith('amp_')) {
              localStorage.removeItem(key);
            }
          });
          
          if (supabaseClient && session?.user?.id) {
            const tables = ['business_profile', 'tasks', 'leads', 'clients', 'inventory', 'campaigns', 'calendar_events', 'finances', 'account_users', 'plans', 'agents', 'documents'];
            for (const table of tables) {
              try {
                await supabaseClient.from(table).delete().eq('user_id', session.user.id);
              } catch(e) {
                console.warn(`Failed to wipe table ${table}:`, e);

          }
        } catch (e) {
          console.error("Reset failed", e);
        }
        window.location.reload();

            bio: userProfile.bio,
            stage: userProfile.stage,
            store_link: userProfile.store_link,
            integrations: userProfile.integrations

          console.error("Failed to save to localStorage", e);

              user_id: session.user.id,
              company_name: userProfile.company_name,
              bio: userProfile.bio,
              stage: userProfile.stage,
              store_link: userProfile.store_link,
              updated_at: new Date().toISOString()

    const FleetComms = ({ session, userProfile }) => {

      useEffect(() => {
        if (endRef.current) {
          endRef.current.scrollIntoView({ behavior: 'smooth' });
        }
      }, [messages, activeDriver]);

      const fetchDrivers = async () => {
        let currentLocal = [];
        try {
          currentLocal = JSON.parse(localStorage.getItem(`amp_clients_${userProfile?.stage}`) || '[]');
        } catch(e) {}

        if (window.supabaseClient && session?.user?.id) {
          try {
            const { data, error } = await window.supabaseClient.from('clients').select('*').eq('business_stage', userProfile?.stage).order('created_at', { ascending: false });
            if (!error && data) {
              const remoteIds = new Set(data.map(d => d.id || d.name));
              const localOnly = currentLocal.filter(l => !remoteIds.has(l.id || l.name));
              const merged = [...data, ...localOnly];
              setDrivers(merged);
              localStorage.setItem(`amp_clients_${userProfile?.stage}`, JSON.stringify(merged));
              return;
            }
          } catch(e) {}
        }
        setDrivers(currentLocal);
      };

      useEffect(() => {
        fetchDrivers();
        const handleSync = () => fetchDrivers();
        window.addEventListener('amp-simulated-sale', handleSync);
        return () => window.removeEventListener('amp-simulated-sale', handleSync);
      }, []);

      useEffect(() => {
        const handleOpenComms = (e) => {
          const driver = e.detail;

      }, []);

      const today = new Date().toLocaleDateString('en-US', { weekday: 'long' });

          return bActive - aActive;

        return 0;

          id: Date.now().toString(),

          sender: 'me',

          platform: activeDriver.chat_platform || 'whatsapp'

          [activeDriver.id]: [...(prev[activeDriver.id] || []), newMsg]

            <div ref={endRef} />

          <div className="p-4 bg-white/50 dark:bg-white/5 border-t border-gray-200 dark:border-pd-glassBorder flex flex-col gap-2">

            <div className="relative flex items-center gap-2">

              <button onClick={() => fileInputRef.current?.click()} className="group relative w-10 h-10 rounded-full overflow-hidden isolate flex items-center justify-center flex-shrink-0 dramatic-hover shadow-[0_4px_20px_rgba(70,212,198,0.15)]">
                <div className="absolute inset-[-200%] bg-[conic-gradient(from_90deg_at_50%_50%,transparent_0%,#ff9146_30%,#ffffff_50%,#46d4c6_70%,transparent_100%)] opacity-0 group-hover:opacity-100 transition-opacity duration-500 animate-[spin_1.5s_linear_infinite] pointer-events-none z-0"></div>
                <div className="absolute inset-[2px] rounded-full bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-600 group-hover:bg-pd-teal group-hover:border-pd-teal transition-colors duration-300 pointer-events-none z-0"></div>
                <span className="relative z-10 flex items-center justify-center pointer-events-none text-gray-600 dark:text-gray-300 group-hover:text-white transition-colors duration-300">

                <button onClick={handleSend} className="group absolute right-2 top-2 w-10 h-10 rounded-full overflow-hidden isolate flex items-center justify-center dramatic-hover shadow-[0_4px_20px_rgba(255,95,0,0.15)]">
                  <div className="absolute inset-[-200%] bg-[conic-gradient(from_90deg_at_50%_50%,transparent_0%,#ff9146_30%,#ffffff_50%,#ff5f00_70%,transparent_100%)] opacity-0 group-hover:opacity-100 transition-opacity duration-500 animate-[spin_1.5s_linear_infinite] pointer-events-none z-0"></div>
                  <div className="absolute inset-[2px] rounded-full bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-600 group-hover:bg-pd-orange group-hover:border-pd-orange transition-colors duration-300 pointer-events-none z-0"></div>
                  <span className="relative z-10 flex items-center justify-center pointer-events-none text-gray-600 dark:text-gray-300 group-hover:text-white transition-colors duration-300">
                    <iconify-icon icon="solar:plain-bold" width="18"></iconify-icon>
                  </span>
                </button>
              </div>
            </div>
          </div>

          {activeDocument && (
            <div className="absolute inset-0 z-[100] bg-white/95 dark:bg-[#0b0f19]/95 backdrop-blur-xl flex flex-col animate-fade-in">
              <div className="flex items-center justify-between p-4 md:p-6 border-b border-gray-200 dark:border-white/10 bg-white/50 dark:bg-black/20">
                <div className="flex items-center gap-4">
                  <div className="w-12 h-12 rounded-xl bg-indigo-500/10 text-indigo-500 flex items-center justify-center shrink-0 border border-indigo-500/20">

                  </div>
                  <div>
                    <h3 className="font-bold text-lg text-gray-900 dark:text-white">{activeDocument.title}</h3>
                    <p className="text-xs font-semibold text-indigo-500 tracking-wider uppercase mt-1">{activeDocument.document_type} â€¢ {new Date(activeDocument.created_at).toLocaleDateString()}</p>
                  </div>
                </div>
                <div className="flex gap-2">
                  <button onClick={() => {
                    const el = document.createElement('a');
                    el.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(activeDocument.content));
                    el.setAttribute('download', activeDocument.title + '.txt');
                    el.click();
                  }} className="p-2 md:px-4 md:py-2 text-sm font-semibold bg-gray-100 hover:bg-gray-200 dark:bg-white/5 dark:hover:bg-white/10 text-gray-700 dark:text-white rounded-lg flex items-center gap-2 transition-all">
                    <iconify-icon icon="solar:download-minimalistic-bold"></iconify-icon> <span className="hidden md:inline">Download</span>
                  </button>
                  <button onClick={() => setActiveDocument(null)} className="p-2 md:px-4 md:py-2 text-sm font-semibold bg-red-50 hover:bg-red-100 dark:bg-red-500/10 dark:hover:bg-red-500/20 text-red-500 rounded-lg flex items-center gap-2 transition-all">
                    <iconify-icon icon="solar:close-circle-bold" width="20"></iconify-icon> <span className="hidden md:inline">Close</span>
                  </button>
                </div>
              </div>
              <div className="flex-1 overflow-y-auto p-4 md:p-12">
                <div className="max-w-4xl mx-auto bg-white dark:bg-[#131b2c] p-8 md:p-16 rounded-2xl shadow-2xl border border-gray-200 dark:border-white/5 min-h-[800px]">
                  <div className="prose prose-sm md:prose-base dark:prose-invert max-w-none prose-p:leading-relaxed prose-headings:font-bold whitespace-pre-wrap font-serif text-gray-800 dark:text-gray-200">
                    <FormatText text={activeDocument.content} />
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    const LeadPipeline = ({ session, activeTasks, userProfile, onAddLead, onImportCsv, title, subtitle, inputLabels, entityLabel }) => {
      const getStages = (stage) => {
        switch(stage) {
          case 'Ecomm': return ['Favorites', 'Inquiries', 'Abandoned Cart'];
          case 'Software': return ['Signups', 'Active Trials', 'Needs Nurturing'];
          case 'Organizer': return ['Prospect', 'Communicating', 'Committed'];
          case 'Dispatcher': return ['Resumes Considered', 'Interview Scheduled', 'Recently Hired'];
          case 'Local Service': return ['New Inquiries', 'Quoting', 'Pending Approval'];
          default: return ['Inbound', 'Qualifying', 'Negotiation'];
        }
      };
      const stages = getStages(userProfile?.stage);
      const isOrganizer = userProfile?.stage === 'Organizer';
      
      const [leads, setLeads] = useState([]);
      const [showModal, setShowModal] = useState(false);
      const [showRemovalModal, setShowRemovalModal] = useState(false);
      const [itemToDelete, setItemToDelete] = useState(null);
      const [formData, setFormData] = useState({ id: null, name: '', contact: '', phone: '', email: '', website: '', address: '', value: isOrganizer ? '1' : '$0', stage: stages[0], notes: '' });
      const [activeMobileStage, setActiveMobileStage] = useState(stages[0]);
      const [emailComposer, setEmailComposer] = useState(null); // { lead } or null
      const [emailForm, setEmailForm] = useState({ subject: '', message: '' });
      const [emailSending, setEmailSending] = useState(false);
      const [emailResult, setEmailResult] = useState(null); // { status: 'sent'|'error', text: '' }

      const openEmailComposer = (lead) => {
        setEmailComposer(lead);
        setEmailForm({ subject: `Quick note from ${userProfile?.company_name || 'us'}`, message: '' });
        setEmailResult(null);
      };

      const sendQuickEmail = async () => {
        if (!emailComposer?.email || !emailForm.subject.trim() || !emailForm.message.trim()) return;
        setEmailSending(true);
        setEmailResult(null);
        try {
          const res = await fetch('/.netlify/functions/outreach', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              recipients: [{ name: emailComposer.name, email: emailComposer.email }],
              subject: emailForm.subject,
              message: emailForm.message,
              sender_name: userProfile?.company_name || '',
              userId: session?.user?.id || 'local'
            })
          });
          const data = await res.json();
          if (res.ok && data.summary?.sent > 0) {
            setEmailResult({ status: 'sent', text: `âœ… Email delivered to ${emailComposer.email}` });
            setTimeout(() => { setEmailComposer(null); setEmailResult(null); }, 2500);
          } else {
            const reason = data.results?.[0]?.reason || data.error || 'Unknown error';
            setEmailResult({ status: 'error', text: `âŒ Failed: ${reason}` });
          }
        } catch (err) {
          setEmailResult({ status: 'error', text: `âŒ Network error: ${err.message}` });
        } finally {
          setEmailSending(false);
        }
      };

      useEffect(() => {
        setActiveMobileStage(stages[0]);
      }, [userProfile?.stage]);

      const currentStage = userProfile?.stage || 'Default';
      const storageKey = `amp_leads_${currentStage}`;

      const fetchLeads = async () => {
        let currentLocal = [];
        try {
          currentLocal = JSON.parse(localStorage.getItem(storageKey) || '[]');
        } catch(e) {}

        if (supabaseClient && session?.user?.id) {
          try {
            const { data, error } = await supabaseClient.from('leads').select('*').eq('business_stage', currentStage).order('created_at', { ascending: false });
            if (!error && data) {
              const remoteIds = new Set(data.map(d => d.id || d.name));
              const localOnly = currentLocal.filter(l => !remoteIds.has(l.id || l.name));
              const merged = [...data, ...localOnly];
              setLeads(merged);
              localStorage.setItem(storageKey, JSON.stringify(merged));
              return;
            }
          } catch(e) {}
        }
        setLeads(currentLocal);
      };

      const updateLeadStage = async (id, newStage) => {
        const localLeads = JSON.parse(localStorage.getItem(storageKey) || '[]');
        const updated = localLeads.map(l => l.id === id ? { ...l, stage: newStage } : l);
        localStorage.setItem(storageKey, JSON.stringify(updated));
        setLeads(updated);

        if (!supabaseClient) return;
        try { await supabaseClient.from('leads').update({ stage: newStage }).eq('id', id); } catch(e){}
      };

      const deleteLead = async (reason) => {
        if (!itemToDelete) return;
        const id = itemToDelete.id;
        const localLeads = JSON.parse(localStorage.getItem(storageKey) || '[]');
        const updated = localLeads.filter(l => l.id !== id);
        localStorage.setItem(storageKey, JSON.stringify(updated));
        setLeads(updated);

        if (!supabaseClient) return;
        try { 
          await supabaseClient.from('leads').delete().eq('id', id); 
          // Log deletion with reason if needed - for now just delete
        } catch(e){}
      };

      const handleSave = async () => {
        try {
          const payload = { ...formData, user_id: session?.user?.id || 'local', business_stage: currentStage };
          let localLeads = [];
          try {
            const parsed = JSON.parse(localStorage.getItem(storageKey) || '[]');
            if (Array.isArray(parsed)) localLeads = parsed;
          } catch(e) {}
          
          if (formData.id) {
            localLeads = localLeads.map(l => l.id === formData.id ? payload : l);
          } else {
            payload.id = Date.now().toString();
            payload.created_at = new Date().toISOString();
            localLeads.unshift(payload);
          }
          
          localStorage.setItem(storageKey, JSON.stringify(localLeads));
          setLeads([...localLeads]);
          setShowModal(false);

          if (!supabaseClient || !session?.user?.id) return;
          try {
            if (formData.id) {
              await supabaseClient.from('leads').update(payload).eq('id', formData.id);
            } else {
              const remotePayload = { ...payload };
              delete remotePayload.id;
              await supabaseClient.from('leads').insert([remotePayload]);
            }
          } catch(e) {}
        } catch(error) {
          alert('Failed to save lead: ' + error.message);
        }
      };

      useEffect(() => {
        fetchLeads();
        const handleSync = () => fetchLeads();
        window.addEventListener('amp-simulated-lead', handleSync);
        
        if (supabaseClient) {
          const channel = supabaseClient.channel('realtime:leads')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'leads' }, fetchLeads)
            .subscribe();
          return () => { 
            supabaseClient.removeChannel(channel); 
            window.removeEventListener('amp-simulated-lead', handleSync);
          };
        }
        return () => window.removeEventListener('amp-simulated-lead', handleSync);
      }, [session, userProfile?.stage]);

      return (
        <div className="p-4 md:p-8 h-full flex flex-col relative">
          <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 md:mb-8 gap-4">
            <div><h2 className="text-xl md:text-2xl font-semibold tracking-tight text-gray-900 dark:text-white mb-1">{title || (isEcomm ? 'Sales Pipeline' : 'Lead Pipeline')}</h2><p className="text-xs text-gray-500">{subtitle || (isEcomm ? 'Track customer interest and abandoned carts.' : 'Manage prospects and activate AI sequences.')}</p></div>
            <div className="flex gap-2 w-full md:w-auto">
              <label className="group inline-flex gap-1 transition-all duration-500 dark:text-white overflow-hidden isolate dark:bg-gray-800/60 text-xs font-medium text-gray-900 bg-white/60 rounded-full py-2 px-4 relative backdrop-blur-md items-center justify-center w-full md:w-auto cursor-pointer shadow-[0_4px_24px_rgba(70,212,198,0.18),0_2px_8px_rgba(255,145,70,0.12)] hover:shadow-[0_6px_32px_rgba(70,212,198,0.28),0_4px_16px_rgba(255,145,70,0.2)] hover:-translate-y-[1px] active:scale-[0.98]"><div className="absolute inset-[-200%] bg-[conic-gradient(from_90deg_at_50%_50%,transparent_0%,#ff9146_30%,#ffffff_50%,#46d4c6_70%,transparent_100%)] opacity-0 group-hover:opacity-100 transition-opacity duration-500 animate-[spin_1.5s_linear_infinite] pointer-events-none z-0"></div><div className="absolute inset-[2px] rounded-full bg-white/90 dark:bg-gray-800/90 transition-colors duration-500 pointer-events-none z-0"></div><span className="relative z-10 flex items-center gap-2"><iconify-icon icon="solar:import-linear" className="mr-2"></iconify-icon> Import CSV</span><input type="file" accept=".csv" className="hidden" onChange={onImportCsv} />
              </label>
              <button onClick={() => { setFormData({ id: null, name: '', contact: '', phone: '', email: '', website: '', address: '', value: '$0', stage: stages[0] }); setShowModal(true); }} className="group inline-flex gap-1 transition-all duration-500 dark:text-white overflow-hidden isolate dark:bg-gray-800/60 text-xs font-medium text-gray-900 bg-white/60 rounded-full py-2 px-4 relative backdrop-blur-md items-center justify-center w-full md:w-auto shadow-[0_4px_24px_rgba(70,212,198,0.18),0_2px_8px_rgba(255,145,70,0.12)] hover:shadow-[0_6px_32px_rgba(70,212,198,0.28),0_4px_16px_rgba(255,145,70,0.2)] hover:-translate-y-[1px] active:scale-[0.98]"><div className="absolute inset-[-200%] bg-[conic-gradient(from_90deg_at_50%_50%,transparent_0%,#ff9146_30%,#ffffff_50%,#46d4c6_70%,transparent_100%)] opacity-0 group-hover:opacity-100 transition-opacity duration-500 animate-[spin_1.5s_linear_infinite] pointer-events-none z-0"></div><div className="absolute inset-[2px] rounded-full bg-white/90 dark:bg-gray-800/90 transition-colors duration-500 pointer-events-none z-0"></div><span className="relative z-10 flex items-center gap-2"><iconify-icon icon="solar:pen-linear" className="mr-2"></iconify-icon> Manual Entry
              </span></button>
              <button onClick={onAddLead} className="group inline-flex gap-1 transition-all duration-500 text-white overflow-hidden isolate dramatic-hover text-xs font-medium bg-pd-teal rounded-full py-2 px-4 relative backdrop-blur-md items-center justify-center w-full md:w-auto shadow-[0_4px_24px_rgba(70,212,198,0.18),0_2px_8px_rgba(255,145,70,0.12)] hover:shadow-[0_6px_32px_rgba(70,212,198,0.28),0_4px_16px_rgba(255,145,70,0.2)] hover:-translate-y-[1px] active:scale-[0.98]"><div className="absolute inset-[-200%] bg-[conic-gradient(from_90deg_at_50%_50%,transparent_0%,#ff9146_30%,#ffffff_50%,#46d4c6_70%,transparent_100%)] opacity-0 group-hover:opacity-100 transition-opacity duration-500 animate-[spin_1.5s_linear_infinite] pointer-events-none z-0"></div><div className="absolute inset-[2px] rounded-full bg-pd-teal transition-colors duration-500 pointer-events-none z-0"></div><span className="relative z-10 flex items-center gap-2"><iconify-icon icon="solar:add-circle-linear" className="mr-2"></iconify-icon> Ask CEO to Add
              </span></button>
            </div>
          </div>
          <div className="md:hidden w-full mb-4 flex-shrink-0">
            <select 
              value={activeMobileStage} 
              onChange={e => setActiveMobileStage(e.target.value)}
              className="w-full bg-white/60 dark:bg-black/40 border border-gray-200 dark:border-white/10 rounded-xl px-4 py-3 text-sm text-gray-900 dark:text-white focus:outline-none focus:border-pd-teal appearance-none font-bold"
            >
              {stages.map(s => <option key={s} value={s}>{s}</option>)}
            </select>
          </div>
          <div className="flex gap-4 md:gap-6 overflow-hidden md:overflow-x-auto pb-4 flex-1">
            {stages.map(col => (
              <div key={col} className={`w-full md:w-80 flex-shrink-0 flex-col gap-4 h-full ${activeMobileStage === col ? 'flex' : 'hidden'} md:flex overflow-y-auto pr-2 pb-10 hide-scrollbar`}>
                <h3 className="text-xs font-mono uppercase tracking-widest text-pd-teal border-b border-gray-200 dark:border-pd-glassBorder pb-2 hidden md:block">{col}</h3>
                {leads.filter(l => l.stage === col).map(lead => (
                  <div key={lead.id} className="amp-card p-5 relative overflow-hidden group flex-shrink-0">
                    <div className="flex justify-between items-start mb-3">
                      <div className="flex flex-col gap-1 w-[60%]">
                        <span className="font-semibold text-gray-900 dark:text-white truncate flex items-center gap-2">
                          {lead.name}
                          {isOrganizer && lead.is_leader && <iconify-icon icon="solar:crown-minimalistic-bold" className="text-pd-orange"></iconify-icon>}
                        </span>
                        {/* Address / location */}
                        {(lead.address || lead.contact) && (
                          <span className="text-[10px] text-gray-400 flex items-center gap-1 truncate">
                            <iconify-icon icon="solar:map-point-linear" className="flex-shrink-0"></iconify-icon>
                            {lead.address || lead.contact}
                          </span>
                        )}
                        {lead.notes && <span className="text-[10px] text-gray-400 italic truncate">{lead.notes}</span>}
                      </div>
                      <div className="flex flex-col items-end gap-1">
                        <div className="flex items-center gap-2 mb-1">
                          <button onClick={() => { setFormData(lead); setShowModal(true); }} className="opacity-0 group-hover:opacity-100 text-gray-400 hover:text-pd-teal transition-all" title="Edit">
                              <iconify-icon icon="solar:pen-linear"></iconify-icon>
                          </button>
                          <button onClick={() => { setItemToDelete(lead); setShowRemovalModal(true); }} className="opacity-0 group-hover:opacity-100 text-gray-400 hover:text-red-500 transition-all" title="Delete">
                            <iconify-icon icon="solar:trash-bin-trash-linear"></iconify-icon>
                          </button>
                        </div>
                        <select 
                          value={lead.stage} 
                          onChange={(e) => updateLeadStage(lead.id, e.target.value)}
                          className="text-[10px] bg-black/5 dark:bg-white/10 border-none rounded py-1 px-2 cursor-pointer focus:outline-none focus:ring-1 focus:ring-pd-teal"
                        >
                          {stages.map(s => <option key={s} value={s}>{s}</option>)}
                        </select>
                      </div>
                    </div>

                    {/* Contact details row */}
                    <div className="flex flex-wrap gap-2 mb-3">
                      {(lead.phone || (lead.contact && lead.contact.match(/\d{3}/))) && (
                        <a href={`tel:${lead.phone || lead.contact}`} className="flex items-center gap-1 text-[10px] text-pd-teal hover:text-pd-teal/70 bg-pd-teal/10 rounded px-2 py-1 transition-colors" title="Call">
                          <iconify-icon icon="solar:phone-linear"></iconify-icon>
                          {lead.phone || lead.contact}
                        </a>
                      )}
                      {lead.website && (
                        <a href={lead.website.startsWith('http') ? lead.website : `https://${lead.website}`} target="_blank" rel="noopener noreferrer" className="flex items-center gap-1 text-[10px] text-blue-500 hover:text-blue-400 bg-blue-500/10 rounded px-2 py-1 transition-colors" title="Website">
                          <iconify-icon icon="solar:global-linear"></iconify-icon>
                          Website
                        </a>
                      )}
                      {lead.email && (
                        <a href={`mailto:${lead.email}`} className="flex items-center gap-1 text-[10px] text-purple-400 hover:text-purple-300 bg-purple-500/10 rounded px-2 py-1 transition-colors" title="Email">
                          <iconify-icon icon="solar:letter-linear"></iconify-icon>
                          {lead.email}
                        </a>
                      )}
                    </div>

                    <div className="bg-black/5 dark:bg-white/5 rounded-lg p-3 text-xs mb-3 space-y-1">
                      <div className="flex justify-between"><span className="text-gray-500">{isOrganizer ? 'Commitment' : 'Value'}</span><span className="font-medium text-gray-900 dark:text-gray-200">{lead.value || (isOrganizer ? '1' : '$0')}</span></div>
                      <div className="flex flex-col gap-1 mt-1">
                        <div className="flex justify-between"><span className="text-gray-500">Win Prob</span><span className="font-medium text-gray-900 dark:text-gray-200">{lead.prob || '0%'}</span></div>
                        <div className="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-1 mt-1 overflow-hidden">
                          <div className="bg-pd-teal h-full" style={{ width: lead.prob || '0%' }}></div>
                        </div>
                      </div>
                    </div>

                    <div className="flex items-center justify-between mt-2 pt-2 border-t border-gray-200 dark:border-white/10 gap-2">
                      <div className="text-[10px] text-gray-500 dark:text-gray-400 flex items-center gap-1 truncate max-w-[45%]"><iconify-icon icon="solar:arrow-right-linear" className="text-pd-orange"></iconify-icon> Next: {lead.next_step || 'N/A'}</div>
                      <div className="flex items-center gap-1.5">
                        {/* Quick manual email composer */}
                        {(lead.email || lead.contact?.includes('@')) && (
                          <button
                            onClick={() => openEmailComposer({ ...lead, email: lead.email || lead.contact })}
                            className="text-[10px] bg-purple-500/10 hover:bg-purple-500/20 text-purple-400 px-2 py-1.5 rounded transition-colors flex items-center gap-1 font-semibold"
                            title="Compose email"
                          >
                            <iconify-icon icon="solar:letter-bold"></iconify-icon> Email
                          </button>
                        )}
                      </div>
                    </div>
                  </div>

                ))}
              </div>
            ))}
          </div>

          {/* Manual Entry Modal */}
          {showModal && (
            <div className="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div className="bg-white dark:bg-[#0b0f19] border border-gray-200 dark:border-pd-glassBorder rounded-2xl w-full max-w-md p-6 shadow-2xl">
                <div className="flex justify-between items-center mb-4">
                  <h3 className="font-semibold">{formData.id ? `Edit ${entityLabel || 'Lead'}` : `Manual ${entityLabel || 'Lead'} Entry`}</h3>
                  <button onClick={() => setShowModal(false)} className="text-gray-500 hover:text-gray-900 dark:hover:text-white"><iconify-icon icon="solar:close-circle-linear" width="20"></iconify-icon></button>
                </div>
                <div className="space-y-3">
                  <div>
                    <label className="block text-xs text-gray-500 mb-1">{inputLabels?.[0] || 'Name / Company'}</label>
                    <input type="text" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} className="w-full bg-black/5 dark:bg-white/10 border-none rounded-xl px-4 py-2 text-sm focus:ring-1 focus:ring-pd-teal outline-none" />
                  </div>
                  <div className="grid grid-cols-2 gap-3">
                    <div>
                      <label className="block text-xs text-gray-500 mb-1">Phone</label>
                      <input type="tel" value={formData.phone || ''} onChange={e => setFormData({...formData, phone: e.target.value})} placeholder="(555) 123-4567" className="w-full bg-black/5 dark:bg-white/10 border-none rounded-xl px-4 py-2 text-sm focus:ring-1 focus:ring-pd-teal outline-none" />
                    </div>
                    <div>
                      <label className="block text-xs text-gray-500 mb-1">Email</label>
                      <input type="email" value={formData.email || ''} onChange={e => setFormData({...formData, email: e.target.value})} placeholder="name@company.com" className="w-full bg-black/5 dark:bg-white/10 border-none rounded-xl px-4 py-2 text-sm focus:ring-1 focus:ring-pd-teal outline-none" />
                    </div>
                  </div>
                  <div>
                    <label className="block text-xs text-gray-500 mb-1">Website</label>
                    <input type="text" value={formData.website || ''} onChange={e => setFormData({...formData, website: e.target.value})} placeholder="https://company.com" className="w-full bg-black/5 dark:bg-white/10 border-none rounded-xl px-4 py-2 text-sm focus:ring-1 focus:ring-pd-teal outline-none" />
                  </div>
                  <div>
                    <label className="block text-xs text-gray-500 mb-1">Address / Location</label>
                    <input type="text" value={formData.address || ''} onChange={e => setFormData({...formData, address: e.target.value})} placeholder="City, State" className="w-full bg-black/5 dark:bg-white/10 border-none rounded-xl px-4 py-2 text-sm focus:ring-1 focus:ring-pd-teal outline-none" />
                  </div>
                  <div className="flex gap-3">
                    <div className="flex-1">
                      <label className="block text-xs text-gray-500 mb-1">{inputLabels?.[2] || 'Est. Value'}</label>
                      {isOrganizer ? (
                        <select value={formData.value} onChange={e => setFormData({...formData, value: e.target.value})} className="w-full bg-black/5 dark:bg-white/10 border-none rounded-xl px-4 py-2 text-sm focus:ring-1 focus:ring-pd-teal outline-none">
                          <option value="1">1 - Leader</option>
                          <option value="2">2 - Activist</option>
                          <option value="3">3 - Supporter</option>
                          <option value="4">4 - Passive</option>
                          <option value="5">5 - Anti-union</option>
                        </select>
                      ) : (
                        <input type="text" value={formData.value} onChange={e => setFormData({...formData, value: e.target.value})} className="w-full bg-black/5 dark:bg-white/10 border-none rounded-xl px-4 py-2 text-sm focus:ring-1 focus:ring-pd-teal outline-none" />
                      )}
                    </div>
                    <div className="flex-1">
                      <label className="block text-xs text-gray-500 mb-1">Stage</label>
                      <select value={formData.stage} onChange={e => setFormData({...formData, stage: e.target.value})} className="w-full bg-black/5 dark:bg-white/10 border-none rounded-xl px-4 py-2 text-sm focus:ring-1 focus:ring-pd-teal outline-none">
                        {stages.map(s => <option key={s} value={s}>{s}</option>)}
                      </select>
                    </div>
                  </div>
                  <div>
                    <label className="block text-xs text-gray-500 mb-1">Notes</label>
                    <textarea value={formData.notes} onChange={e => setFormData({...formData, notes: e.target.value})} className="w-full bg-black/5 dark:bg-white/10 border-none rounded-xl px-4 py-2 text-sm focus:ring-1 focus:ring-pd-teal outline-none resize-none" rows="2" placeholder="Add notes..."></textarea>
                  </div>
                  <button onClick={handleSave} className="w-full amp-button primary py-2 mt-1">Save {entityLabel || 'Lead'}</button>
                </div>
              </div>
            </div>
          )}
          {showRemovalModal && (
            <RemovalModal 
              isOpen={showRemovalModal} 
              onClose={() => setShowRemovalModal(false)} 
              onConfirm={deleteLead} 
              entityName={itemToDelete?.name || 'this lead'} 
            />
          )}

          {/* Quick Email Composer Modal */}
          {emailComposer && (
            <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4" onClick={(e) => { if (e.target === e.currentTarget) setEmailComposer(null); }}>
              <div className="bg-white dark:bg-[#0b0f19] border border-gray-200 dark:border-white/10 rounded-2xl w-full max-w-md shadow-2xl overflow-hidden">
                {/* Header */}
                <div className="flex items-center justify-between px-5 py-4 border-b border-gray-100 dark:border-white/10 bg-purple-500/5">
                  <div className="flex items-center gap-3">
                    <div className="w-9 h-9 rounded-xl bg-purple-500/10 text-purple-400 flex items-center justify-center">
                      <iconify-icon icon="solar:letter-bold" width="18"></iconify-icon>
                    </div>
                    <div>
                      <div className="font-semibold text-sm text-gray-900 dark:text-white">{emailComposer.name}</div>
                      <div className="text-[10px] text-purple-400 font-medium">{emailComposer.email}</div>
                    </div>
                  </div>
                  <button onClick={() => setEmailComposer(null)} className="text-gray-400 hover:text-gray-600 dark:hover:text-white transition-colors">
                    <iconify-icon icon="solar:close-circle-bold" width="20"></iconify-icon>
                  </button>
                </div>
                {/* Body */}
                <div className="p-5 space-y-3">
                  <div>
                    <label className="block text-[10px] font-semibold text-gray-400 uppercase tracking-wider mb-1.5">Subject</label>
                    <input
                      type="text"
                      value={emailForm.subject}
                      onChange={e => setEmailForm({ ...emailForm, subject: e.target.value })}
                      className="w-full bg-black/5 dark:bg-white/5 border border-gray-200 dark:border-white/10 rounded-xl px-4 py-2.5 text-sm text-gray-900 dark:text-white focus:outline-none focus:border-purple-400/50 transition-colors"
                      placeholder="Subject line..."
                    />
                  </div>
                  <div>
                    <label className="block text-[10px] font-semibold text-gray-400 uppercase tracking-wider mb-1.5">Message</label>
                    <textarea
                      value={emailForm.message}
                      onChange={e => setEmailForm({ ...emailForm, message: e.target.value })}
                      rows={6}
                      className="w-full bg-black/5 dark:bg-white/5 border border-gray-200 dark:border-white/10 rounded-xl px-4 py-2.5 text-sm text-gray-900 dark:text-white focus:outline-none focus:border-purple-400/50 transition-colors resize-none"
                      placeholder={`Hi ${emailComposer.name},\n\n`}
                    />
                  </div>
                  {emailResult && (
                    <div className={`text-xs font-medium px-3 py-2 rounded-lg ${emailResult.status === 'sent' ? 'bg-green-500/10 text-green-400' : 'bg-red-500/10 text-red-400'}`}>
                      {emailResult.text}
                    </div>
                  )}
                </div>
                {/* Footer */}
                <div className="px-5 pb-5 flex gap-2">
                  <button onClick={() => setEmailComposer(null)} className="flex-1 py-2.5 text-sm font-semibold bg-black/5 dark:bg-white/5 hover:bg-black/10 dark:hover:bg-white/10 text-gray-600 dark:text-gray-300 rounded-xl transition-colors">
                    Cancel
                  </button>
                  <button
                    onClick={sendQuickEmail}
                    disabled={emailSending || !emailForm.subject.trim() || !emailForm.message.trim()}
                    className="flex-2 flex-1 py-2.5 text-sm font-semibold bg-purple-500 hover:bg-purple-600 disabled:opacity-50 disabled:cursor-not-allowed text-white rounded-xl transition-colors flex items-center justify-center gap-2"
                  >
                    {emailSending ? (
                      <><iconify-icon icon="solar:spinner-bold" className="animate-spin"></iconify-icon> Sending...</>
                    ) : (
                      <><iconify-icon icon="solar:plain-bold"></iconify-icon> Send Email</>
                    )}
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    const ClientLedger = ({ session, activeTasks, userProfile, onAddClient, onImportCsv, title, subtitle, tableCols, inputLabels, entityLabel }) => {
      const isEcomm = userProfile?.stage === 'Ecomm';
      const isOrganizer = userProfile?.stage === 'Organizer';
      const isDispatcher = userProfile?.stage === 'Dispatcher';
      const [clients, setClients] = useState([]);
      const [showModal, setShowModal] = useState(false);
      const [showRemovalModal, setShowRemovalModal] = useState(false);
      const [itemToDelete, setItemToDelete] = useState(null);
      const [sortBy, setSortBy] = useState('date');
      const today = new Date().toLocaleDateString('en-US', { weekday: 'long' });
      const [formData, setFormData] = useState({ id: null, name: '', retainer: '', ltv: '', notes: '', is_leader: false, rank: '1', chat_link: '', chat_platform: 'whatsapp' });

      const currentStage = userProfile?.stage || 'Default';
      const storageKey = `amp_clients_${currentStage}`;

      const deleteClient = async (reason) => {
        if (!itemToDelete) return;
        const id = itemToDelete.id;
        const local = JSON.parse(localStorage.getItem(storageKey) || '[]');
        const updated = local.filter(l => l.id !== id);
        localStorage.setItem(storageKey, JSON.stringify(updated));
        setClients(updated);

        if (!supabaseClient) return;
        try { 
          await supabaseClient.from('clients').delete().eq('id', id); 
        } catch(e){}
      };

      const fetchClients = async () => {
        let currentLocal = [];
        try {
          currentLocal = JSON.parse(localStorage.getItem(storageKey) || '[]');
        } catch(e) {}

        if (supabaseClient && session?.user?.id) {
          try {
            const { data, error } = await supabaseClient.from('clients').select('*').eq('business_stage', currentStage).order('created_at', { ascending: false });
            if (!error && data) {
              const remoteIds = new Set(data.map(d => d.id || d.name));
              const localOnly = currentLocal.filter(l => !remoteIds.has(l.id || l.name));
              const merged = [...data, ...localOnly];
              setClients(merged);
              localStorage.setItem(storageKey, JSON.stringify(merged));
              return;
            }
          } catch(e) {}
        }
        setClients(currentLocal);
      };

      const handleSave = async () => {
        try {
          const payload = { ...formData, business_stage: currentStage };
          
          let local = [];
          try {
            const parsed = JSON.parse(localStorage.getItem(storageKey) || '[]');
            if (Array.isArray(parsed)) local = parsed;
          } catch(e) {}
          if (formData.id) {
            local = local.map(c => c.id === formData.id ? { ...c, ...payload } : c);
          } else {
            payload.id = Date.now().toString();
            payload.created_at = new Date().toISOString();
            local.unshift(payload);
          }
          localStorage.setItem(storageKey, JSON.stringify(local));
          setClients([...local]);
          setShowModal(false);

          if (supabaseClient && session?.user?.id) {
            payload.user_id = session.user.id;
            try {
              if (formData.id) {
                await supabaseClient.from('clients').update(payload).eq('id', formData.id);
              } else {
                const remotePayload = { ...payload };
                delete remotePayload.id;
                await supabaseClient.from('clients').insert([remotePayload]);
              }
            } catch(e) {}
          }
        } catch (error) {
          alert('Failed to save client: ' + error.message);
        }
      };

      useEffect(() => {
        fetchClients();
        
        const handleSync = () => fetchClients();
        window.addEventListener('amp-simulated-sale', handleSync);
        
        if (supabaseClient) {
          const channel = supabaseClient.channel('realtime:clients')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'clients' }, fetchClients)
            .subscribe();
          return () => { 
            supabaseClient.removeChannel(channel); 
            window.removeEventListener('amp-simulated-sale', handleSync);
          };
        }
        
        return () => window.removeEventListener('amp-simulated-sale', handleSync);
      }, [session, userProfile?.stage]);

      const getAssignedAgent = (clientName, dbAgent) => {
        if (!activeTasks || !clientName) return dbAgent || 'Support';
        const task = activeTasks.find(t => 
          t.title?.toLowerCase().includes(clientName.toLowerCase()) || 
          t.description?.toLowerCase().includes(clientName.toLowerCase())
        );
        if (task) {
          const colorClass = task.agent === 'CMO' ? 'bg-pd-teal/20 text-pd-teal border-pd-teal/50' : 
                             task.agent === 'Creative' ? 'bg-pd-orange/20 text-pd-orange border-pd-orange/50' : 
                             task.agent === 'CTO' ? 'bg-gray-500/20 text-gray-400 border-gray-500/50' : 
                             'bg-pd-purple/20 text-pd-purple border-pd-purple/50';
          return <span className={`px-2 py-1 border rounded text-[10px] flex items-center gap-1 font-medium ${colorClass}`}><span className="w-1.5 h-1.5 rounded-full bg-current animate-pulse"></span>{task.agent} Active</span>;
        }
        return <span className="px-2 py-1 bg-black/5 dark:bg-white/10 rounded text-[10px] text-gray-700 dark:text-gray-300">{dbAgent || 'Support'}</span>;
      };

      const isWorkingToday = (workDaysString) => {
        if (!workDaysString) return false;
        return String(workDaysString).toLowerCase().includes(today.toLowerCase());
      };

      const sortedClients = React.useMemo(() => {
        let sorted = [...clients];
        if (sortBy === 'alpha') {
          sorted.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
        } else if (sortBy === 'active' && isDispatcher) {
          sorted.sort((a, b) => {
            const aActive = isWorkingToday(a.ltv) ? 1 : 0;
            const bActive = isWorkingToday(b.ltv) ? 1 : 0;
            return bActive - aActive;
          });
        }
        return sorted;
      }, [clients, sortBy, isDispatcher, today]);

      return (
        <div className="p-4 md:p-8 h-full flex flex-col relative">
          <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 md:mb-8 gap-4">
            <div><h2 className="text-xl md:text-2xl font-semibold tracking-tight text-gray-900 dark:text-white mb-1">{title || (isEcomm ? 'Customer Ledger' : 'Client Ledger')}</h2><p className="text-xs text-gray-500">{subtitle || (isEcomm ? 'Active customers and purchase history.' : 'Active accounts and automated deliverable tracking.')}</p></div>
            <div className="flex flex-wrap gap-2 w-full md:w-auto">
              <select value={sortBy} onChange={e => setSortBy(e.target.value)} className="bg-black/5 dark:bg-white/10 border-none rounded-xl px-3 py-2 text-xs focus:ring-1 focus:ring-pd-teal outline-none cursor-pointer">
                <option value="date">Sort: Date Added</option>
                <option value="alpha">Sort: A-Z</option>
                {isDispatcher && <option value="active">Sort: Active Today</option>}
              </select>
              <label className="group inline-flex gap-1 transition-all duration-500 dark:text-white overflow-hidden isolate dark:bg-gray-800/60 text-xs font-medium text-gray-900 bg-white/60 rounded-full py-2 px-4 relative backdrop-blur-md items-center justify-center w-full md:w-auto cursor-pointer shadow-[0_4px_24px_rgba(70,212,198,0.18),0_2px_8px_rgba(255,145,70,0.12)] hover:shadow-[0_6px_32px_rgba(70,212,198,0.28),0_4px_16px_rgba(255,145,70,0.2)] hover:-translate-y-[1px] active:scale-[0.98]"><div className="absolute inset-[-200%] bg-[conic-gradient(from_90deg_at_50%_50%,transparent_0%,#ff9146_30%,#ffffff_50%,#46d4c6_70%,transparent_100%)] opacity-0 group-hover:opacity-100 transition-opacity duration-500 animate-[spin_1.5s_linear_infinite] pointer-events-none z-0"></div><div className="absolute inset-[2px] rounded-full bg-white/90 dark:bg-gray-800/90 transition-colors duration-500 pointer-events-none z-0"></div><span className="relative z-10 flex items-center gap-2"><iconify-icon icon="solar:import-linear" className="mr-2"></iconify-icon> Import CSV</span><input type="file" accept=".csv" className="hidden" onChange={onImportCsv} />
              </label>
              <button onClick={() => { setFormData({ id: null, name: '', retainer: '', ltv: '', notes: '', is_leader: false, rank: '1', chat_link: '', chat_platform: 'whatsapp' }); setShowModal(true); }} className="group inline-flex gap-1 transition-all duration-500 dark:text-white overflow-hidden isolate dark:bg-gray-800/60 text-xs font-medium text-gray-900 bg-white/60 rounded-full py-2 px-4 relative backdrop-blur-md items-center justify-center w-full md:w-auto shadow-[0_4px_24px_rgba(70,212,198,0.18),0_2px_8px_rgba(255,145,70,0.12)] hover:shadow-[0_6px_32px_rgba(70,212,198,0.28),0_4px_16px_rgba(255,145,70,0.2)] hover:-translate-y-[1px] active:scale-[0.98]"><div className="absolute inset-[-200%] bg-[conic-gradient(from_90deg_at_50%_50%,transparent_0%,#ff9146_30%,#ffffff_50%,#46d4c6_70%,transparent_100%)] opacity-0 group-hover:opacity-100 transition-opacity duration-500 animate-[spin_1.5s_linear_infinite] pointer-events-none z-0"></div><div className="absolute inset-[2px] rounded-full bg-white/90 dark:bg-gray-800/90 transition-colors duration-500 pointer-events-none z-0"></div><span className="relative z-10 flex items-center gap-2"><iconify-icon icon="solar:pen-linear" className="mr-2"></iconify-icon> Manual Entry
              </span></button>
              <button onClick={onAddClient} className="group inline-flex gap-1 transition-all duration-500 text-white overflow-hidden isolate dramatic-hover text-xs font-medium bg-pd-teal rounded-full py-2 px-4 relative backdrop-blur-md items-center justify-center w-full md:w-auto shadow-[0_4px_24px_rgba(70,212,198,0.18),0_2px_8px_rgba(255,145,70,0.12)] hover:shadow-[0_6px_32px_rgba(70,212,198,0.28),0_4px_16px_rgba(255,145,70,0.2)] hover:-translate-y-[1px] active:scale-[0.98]"><div className="absolute inset-[-200%] bg-[conic-gradient(from_90deg_at_50%_50%,transparent_0%,#ff9146_30%,#ffffff_50%,#46d4c6_70%,transparent_100%)] opacity-0 group-hover:opacity-100 transition-opacity duration-500 animate-[spin_1.5s_linear_infinite] pointer-events-none z-0"></div><div className="absolute inset-[2px] rounded-full bg-pd-teal transition-colors duration-500 pointer-events-none z-0"></div><span className="relative z-10 flex items-center gap-2"><iconify-icon icon="solar:add-circle-linear" className="mr-2"></iconify-icon> Ask CEO to Add
              </span></button>
            </div>
          </div>
          <div className="bg-white/50 dark:bg-white/5 border border-gray-200 dark:border-pd-glassBorder rounded-2xl overflow-x-auto flex-1 shadow-sm">
            <table className="w-full text-left text-sm min-w-[600px]">
              <thead className="bg-black/5 dark:bg-black/20 text-xs font-mono text-gray-500 uppercase tracking-wider">
                <tr>
                  {tableCols ? tableCols.map((col, i) => <th key={i} className={`p-4 ${i === tableCols.length - 1 ? 'text-right' : ''}`}>{col}</th>) : (
                    <><th className="p-4">{isEcomm ? 'Customer' : 'Client'}</th><th className="p-4">{isEcomm ? 'Products Bought' : 'Retainer'}</th><th className="p-4">{isEcomm ? 'Total Spent' : 'LTV'}</th><th className="p-4">Assigned Agents</th><th className="p-4 text-right">Actions</th></>
                  )}
                </tr>
              </thead>
              <tbody className="divide-y divide-gray-200 dark:divide-pd-glassBorder">
                {sortedClients.map(c => (
                  <tr key={c.id} className="hover:bg-white/40 dark:hover:bg-white/5 transition-colors group">
                    <td className="p-4 font-semibold text-gray-900 dark:text-white flex items-center gap-2 sticky left-0 bg-white/95 dark:bg-[#0b0f19]/95 group-hover:bg-gray-50 dark:group-hover:bg-white/5 backdrop-blur z-10 transition-colors shadow-[2px_0_5px_-2px_rgba(0,0,0,0.1)] dark:shadow-[2px_0_5px_-2px_rgba(255,255,255,0.05)]">
                      {c.name}
                      {isOrganizer && c.is_leader && <span className="bg-pd-orange text-white text-[10px] px-2 py-0.5 rounded-full font-bold uppercase tracking-wider ml-2">Leader</span>}
                    </td>
                    {isOrganizer && (
                      <td className="p-4 text-gray-600 dark:text-gray-300">
                        <span className="bg-black/5 dark:bg-white/10 px-2 py-1 rounded text-xs font-mono">{c.rank || '1'}</span>
                      </td>
                    )}
                    <td className="p-4 text-gray-600 dark:text-gray-300">
                      <div>{c.retainer || '-'}</div>
                      {c.notes && <div className="text-[10px] text-gray-400 mt-1 italic truncate max-w-[150px]">{c.notes}</div>}
                    </td>
                    <td className="p-4 text-gray-600 dark:text-gray-300">
                      {isDispatcher ? (
                        <div className="flex items-center gap-2">
                          {isWorkingToday(c.ltv) ? (
                            <div className="w-2 h-2 rounded-full bg-pd-teal shadow-[0_0_5px_#46d4c6]" title="Working Today"></div>
                          ) : (
                            <div className="w-2 h-2 rounded-full bg-gray-300 dark:bg-gray-600" title="Off Today"></div>
                          )}
                          {c.ltv || '-'}
                        </div>
                      ) : (
                        c.ltv || '-'
                      )}
                    </td>
                    <td className="p-4">{getAssignedAgent(c.name, c.assigned_agents)}</td>

    const InventoryTracker = ({ session, activeTasks, userProfile, onSync, onImportCsv }) => {
      const [inventory, setInventory] = useState([]);
