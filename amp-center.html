    const BudgetBar = ({ agent, percentage }) => {
      const displayPct = Math.max(0, Math.round(percentage));
      return (
        <div className="flex flex-col gap-1">
          <div className="flex justify-between text-[10px]">
            <span className="text-gray-700 dark:text-gray-300 font-medium">{agent}</span>
            <span className="text-gray-500">{displayPct}% Remaining</span>
          </div>
          <div className="h-1.5 w-full bg-black/5 dark:bg-white/10 rounded-full overflow-hidden shadow-inner">
            <div className={`h-full ${displayPct < 20 ? 'bg-red-500 shadow-[0_0_10px_rgba(239,68,68,0.8)]' : 'bg-pd-teal shadow-[0_0_10px_rgba(0,242,234,0.5)]'} rounded-full transition-all duration-1000`} style={{ width: `${displayPct}%` }}></div>
          </div>
        </div>
      );
    };

    const TeamChat = ({ session, accountUsers, activeUserId, activeUserName, unreadCounts, setUnreadCounts }) => {
        const [messages, setMessages] = useState([]);
        const [activeChannel, setActiveChannel] = useState('all'); // 'all' or user.id
        const [input, setInput] = useState('');
        const endRef = useRef(null);

        const fetchMessages = async () => {
          if (supabaseClient && session?.user?.id) {
             const { data } = await supabaseClient.from('team_messages').select('*').eq('account_id', session.user.id).order('created_at', { ascending: true });
             if (data) setMessages(data);
          } else {
             try {
               const local = JSON.parse(localStorage.getItem('amp_team_messages') || '[]');
               setMessages(local);
             } catch(e) {}
          }
        };

        useEffect(() => {
          fetchMessages();
          if (supabaseClient) {
            const channel = supabaseClient.channel('realtime:team_messages')
              .on('postgres_changes', { event: '*', schema: 'public', table: 'team_messages' }, fetchMessages)
              .subscribe();
            return () => { supabaseClient.removeChannel(channel); };
          } else {
            const handleStorage = (e) => {
              if (e.key === 'amp_team_messages' && e.newValue) setMessages(JSON.parse(e.newValue));
            };
            window.addEventListener('storage', handleStorage);
            return () => window.removeEventListener('storage', handleStorage);
          }
        }, []);

        useEffect(() => {
          if (unreadCounts[activeChannel] > 0) {
            setUnreadCounts(prev => ({ ...prev, [activeChannel]: 0 }));
          }
        }, [messages, activeChannel, unreadCounts, setUnreadCounts]);

        useEffect(() => { endRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages, activeChannel]);

        const handleSend = async (e) => {
          if (e) e.preventDefault();
          if (!input.trim()) return;
          const payload = {
            id: Date.now().toString() + Math.random().toString(36).substr(2, 5),
            account_id: session?.user?.id || 'local',
            sender_id: activeUserId,
            sender_name: activeUserName,
            channel: activeChannel,
            text: input.trim(),
            created_at: new Date().toISOString()
          };
          setInput('');

          if (supabaseClient && session?.user?.id) {
             await supabaseClient.from('team_messages').insert([payload]);
          } else {
             const local = JSON.parse(localStorage.getItem('amp_team_messages') || '[]');
             local.push(payload);
             localStorage.setItem('amp_team_messages', JSON.stringify(local));
             setMessages(local);
             window.dispatchEvent(new Event('amp-team-messages'));
          }
        };

        const filteredMessages = messages.filter(m => 
          m.channel === 'all' ? activeChannel === 'all' : 
          (m.channel === activeUserId && m.sender_id === activeChannel) || 
          (m.channel === activeChannel && m.sender_id === activeUserId) ||
          (m.channel === activeChannel && activeChannel === 'all')
        );

        return (
          <div className="flex h-full overflow-hidden">
             {/* Channel Sidebar */}
             <div className="w-1/3 md:w-1/4 border-r border-gray-200 dark:border-pd-glassBorder bg-black/5 dark:bg-white/5 flex flex-col p-4 overflow-y-auto">
                <h3 className="text-sm font-bold text-gray-900 dark:text-white mb-4">Channels</h3>
                <button onClick={() => setActiveChannel('all')} className={`text-left px-3 py-2 rounded-xl text-sm mb-2 transition-colors flex justify-between items-center ${activeChannel === 'all' ? 'bg-pd-teal text-pd-dark font-bold' : 'text-gray-600 dark:text-gray-400 hover:bg-black/5 dark:hover:bg-white/10'}`}>
                  <span>Whole Team</span>
                  {unreadCounts['all'] > 0 && <span className="bg-red-500 text-white text-[10px] px-2 py-0.5 rounded-full">{unreadCounts['all']}</span>}
                </button>
                <div className="text-xs text-gray-400 font-semibold mb-2 mt-4 uppercase">Direct Messages</div>
                {accountUsers.filter(u => u.id !== activeUserId).map(u => (
                  <button key={u.id} onClick={() => setActiveChannel(u.id)} className={`text-left px-3 py-2 rounded-xl text-sm mb-1 transition-colors flex justify-between items-center ${activeChannel === u.id ? 'bg-pd-teal text-pd-dark font-bold' : 'text-gray-600 dark:text-gray-400 hover:bg-black/5 dark:hover:bg-white/10'}`}>
                    <span>{u.name}</span>
                    {unreadCounts[u.id] > 0 && <span className="bg-red-500 text-white text-[10px] px-2 py-0.5 rounded-full">{unreadCounts[u.id]}</span>}
                  </button>
                ))}
             </div>
             {/* Chat Area */}
             <div className="flex-1 flex flex-col relative overflow-hidden bg-white/40 dark:bg-black/20">
                <div className="flex-1 overflow-y-auto p-4 md:p-6 space-y-4">
                  {filteredMessages.length === 0 ? (
                    <div className="flex items-center justify-center h-full text-sm text-gray-500">No messages yet. Say hello!</div>
                  ) : (
                    filteredMessages.map(m => (
                      <div key={m.id} className={`flex flex-col max-w-[80%] ${m.sender_id === activeUserId ? 'ml-auto items-end' : 'mr-auto items-start'}`}>
                        <div className="text-[10px] text-gray-500 mb-1">{m.sender_name} • {new Date(m.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</div>
                        <div className={`px-4 py-2 text-sm shadow-sm ${m.sender_id === activeUserId ? 'bg-pd-teal text-pd-dark rounded-2xl rounded-br-sm' : 'bg-white dark:bg-[#1a2133] text-gray-900 dark:text-white border border-gray-200 dark:border-white/10 rounded-2xl rounded-bl-sm'}`}>
                          {m.text}
                        </div>
                      </div>
                    ))
                  )}
                  <div ref={endRef} />
                </div>
                <div className="p-4 border-t border-gray-200 dark:border-pd-glassBorder bg-white/50 dark:bg-pd-glass backdrop-blur-md">
                   <form onSubmit={handleSend} className="relative">
                      <input type="text" value={input} onChange={e => setInput(e.target.value)} placeholder={`Message ${activeChannel === 'all' ? 'everyone' : accountUsers.find(u => u.id === activeChannel)?.name}...`} className="w-full bg-white/90 dark:bg-black/40 border border-gray-200 dark:border-white/10 rounded-full pl-4 pr-12 py-3 text-sm text-gray-900 dark:text-white focus:outline-none focus:border-pd-teal" />
                      <button type="submit" disabled={!input.trim()} className="absolute right-2 top-1/2 -translate-y-1/2 w-8 h-8 rounded-full bg-pd-teal flex items-center justify-center text-pd-dark disabled:opacity-50 hover:scale-105 transition-transform">
                        <iconify-icon icon="solar:rounded-right-bold" width="16"></iconify-icon>
                      </button>
                   </form>
                </div>
             </div>
          </div>
        );
      };

      const NeuralChat = ({ session, needsProfileSetup, depleteBudget, userProfile, triggerPrompt, setTriggerPrompt, setTempTasks, activeUserName }) => {
      const [messages, setMessages] = useState(() => {
        try {
          const saved = localStorage.getItem('amp_chat_history');
          if (saved) return JSON.parse(saved);
        } catch (e) {
          console.error("Failed to load chat history", e);
        }
        return [
          { sender: 'ceo', text: "Systems online. The team is awaiting your command. How should we proceed?", time: "09:00 AM" }
        ];
      });
      const [input, setInput] = useState('');
      const [isTyping, setIsTyping] = useState(false);
      const [attachment, setAttachment] = useState(null);
      const [threads, setThreads] = useState(() => {
        try {
          const saved = localStorage.getItem('amp_chat_threads');
          if (saved) return JSON.parse(saved);
        } catch (e) {}
        return [];
      });
      const [showHistory, setShowHistory] = useState(false);
      const endRef = useRef(null);
      const fileInputRef = useRef(null);

      const handleNewChat = () => {
        if (messages.length > 1) {
          const newThread = { 
            id: Date.now().toString(), 
            date: new Date().toLocaleDateString(), 
            title: messages[1]?.text?.substring(0, 30) || 'New Conversation', 
            messages 
          };
          const updated = [newThread, ...threads];
          setThreads(updated);
          localStorage.setItem('amp_chat_threads', JSON.stringify(updated));
        }
        setMessages([{ sender: 'ceo', text: "Systems online. The team is awaiting your command. How should we proceed?", time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) }]);
        setShowHistory(false);
      };

      const loadThread = (t) => {
        setMessages(t.messages);
        setShowHistory(false);
      };

      const fetchMessages = async () => {
        if (supabaseClient && session?.user?.id) {
          const { data } = await supabaseClient.from('chat_history').select('*').eq('user_id', session.user.id).order('created_at', { ascending: true });
          if (data && data.length > 0) {
            setMessages(data.map(d => ({ sender: d.sender, text: d.text, time: new Date(d.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }), userName: d.user_name, attachment: d.attachment })));
          }
        }
      };

      useEffect(() => {
        try {
          localStorage.setItem('amp_chat_history', JSON.stringify(messages));
        } catch (e) {
          console.error("Failed to save chat history", e);
        }
      }, [messages]);

      useEffect(() => {
        fetchMessages();
        if (supabaseClient) {
          const channel = supabaseClient.channel('realtime:chat_history')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'chat_history' }, fetchMessages)
            .subscribe();
          return () => { supabaseClient.removeChannel(channel); };
        } else {
          const handleStorage = (e) => {
            if (e.key === 'amp_chat_history' && e.newValue) setMessages(JSON.parse(e.newValue));
          };
          window.addEventListener('storage', handleStorage);
          return () => window.removeEventListener('storage', handleStorage);
        }
      }, []);

      useEffect(() => {
        if (needsProfileSetup && messages.length === 1) {
          const genesisInput = typeof localStorage !== 'undefined' ? localStorage.getItem('amp_genesis_input') : null;
          const greetingText = genesisInput 
            ? `Systems online. I have analyzed your digital kingdom parameters for: "${genesisInput}".\n\nI am your custom CEO Agent. I orchestrate a team of specialized AI agents (CMO, CTO, Creative) to handle your daily operations autonomously.\n\n**Here is how to get the most out of our platform:**\n- **Chat with me** directly here in Neural Chat to assign tasks, ask questions, or request content.\n- Try prompting me: **"Analyze my target audience"**, **"Create a marketing strategy"**, or **"Log a new client lead"**.\n- I will automatically route your requests to the correct agent and update your pipelines on the left.\n\nTo begin assembling your workforce, please click the **Settings** button on the bottom left and complete your Business Profile. Once configured, your team will be ready to execute.`
            : `Systems online. I am your custom CEO Agent. I orchestrate a team of specialized AI agents (CMO, CTO, Creative) to handle your daily operations autonomously.\n\n**Here is how to get the most out of our platform:**\n- **Chat with me** directly here in Neural Chat to assign tasks, ask questions, or request content.\n- Try prompting me: **"Analyze my target audience"**, **"Create a marketing strategy"**, or **"Log a new client lead"**.\n- I will automatically route your requests to the correct agent and update your pipelines on the left.\n\nTo begin assembling your workforce, please click the **Settings** button on the bottom left and complete your Business Profile. Once configured, your team will be ready to execute.`;
          setMessages([
            { sender: 'ceo', text: greetingText, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) }
          ]);
        }
      }, [needsProfileSetup]);

      const appendMessage = (newMsg) => {
        setMessages(prev => [...prev, newMsg]);
        if (supabaseClient && session?.user?.id) {
          supabaseClient.from('chat_history').insert([{ user_id: session.user.id, sender: newMsg.sender, user_name: newMsg.userName || null, text: newMsg.text, attachment: newMsg.attachment || null }]).then();
        }
      };

      const sendMessage = (msgText, msgAttachment) => {
        if (!msgText && !msgAttachment) return;
        
        if (needsProfileSetup) {
          setMessages(prev => [...prev, 
            { sender: 'user', text: msgText, attachment: msgAttachment ? msgAttachment.preview : null, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) },
            { sender: 'ceo', text: "I cannot execute tasks until your Business Profile is configured. Please complete your settings first.", time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) }
          ]);
          return;
        }
        
        const newUserMsg = { 
          sender: 'user', 
          userName: activeUserName,
          text: msgText, 
          attachment: msgAttachment ? msgAttachment.preview : null,
          time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) 
        };
        appendMessage(newUserMsg);
        
        setIsTyping(true);
        if (setTempTasks) {
          const tks = [];
          const txt = msgText.toLowerCase();
          if (txt.includes('lead') || txt.includes('prospect') || txt.includes('campaign') || txt.includes('market')) tks.push({ id: 'temp-cmo', agent: 'CMO', title: 'Executing Marketing Objective...', status: 'running' });
          if (txt.includes('image') || txt.includes('content') || txt.includes('design') || txt.includes('logo')) tks.push({ id: 'temp-creative', agent: 'Creative', title: 'Generating Content...', status: 'running' });
          if (txt.includes('inventory') || txt.includes('sync') || txt.includes('product') || txt.includes('data')) tks.push({ id: 'temp-cto', agent: 'CTO', title: 'Processing Data Operations...', status: 'running' });
          if (txt.includes('plan') || txt.includes('strategy') || tks.length === 0) tks.push({ id: 'temp-ceo', agent: 'CEO', title: 'Formulating Neural Architecture...', status: 'running' });
          setTempTasks(tks);
        }

        fetch('/.netlify/functions/agent', {
          method: 'POST',
          body: JSON.stringify({ 
            message: msgText, 
            userId: session?.user?.id,
            userProfile: userProfile,
            attachment: msgAttachment ? { data: msgAttachment.data, mimeType: msgAttachment.mimeType } : null,
            history: messages.map(m => ({ sender: m.sender, text: m.text }))
          })
        })
          .then(res => res.json().then(data => ({ status: res.status, data })))
          .then(({ status, data }) => {
            if (depleteBudget) depleteBudget('CEO', 0.5);
            
            if (setTempTasks) {
              setTempTasks(prev => prev.map(t => ({ ...t, status: 'done' })));
              setTimeout(() => {
                setTempTasks([]);
              }, 2000);
            }

            // Execute frontend actions to populate localStorage when Supabase is missing/failing
            if (data.actions && Array.isArray(data.actions)) {
              data.actions.forEach(action => {
                let agentForLog = 'CEO';
                let taskNameLog = 'System Task';
                let detailsLog = JSON.stringify(action.payload);
                
                if (action.type === 'add_multiple_leads') {
                  agentForLog = 'CMO'; taskNameLog = 'Generated Leads';
                  detailsLog = `Sourced ${action.payload.leads?.length || 0} leads including ${action.payload.leads?.[0]?.name || 'new contacts'}.`;
                } else if (action.type === 'add_lead') {
                  agentForLog = 'CMO'; taskNameLog = 'Added Lead';
                  detailsLog = `Added lead: ${action.payload.name}`;
                } else if (action.type === 'store_plan') {
                  agentForLog = 'CEO'; taskNameLog = 'Created Plan';
                  detailsLog = `Stored plan: ${action.payload.title}\n\n${action.payload.content}`;
                } else if (action.type === 'create_task') {
                  agentForLog = action.payload.assigned_agent || 'CEO'; taskNameLog = 'Delegated Task';
                  detailsLog = `Created task: ${action.payload.title}`;
                } else if (action.type === 'add_inventory_item') {
                  agentForLog = 'CTO'; taskNameLog = 'Synced Inventory';
                  detailsLog = `Added product: ${action.payload.product_name}`;
                } else if (action.type === 'update_lead') {
                  agentForLog = 'CEO'; taskNameLog = 'Updated Lead';
                  detailsLog = `Updated ${action.payload.name} to stage ${action.payload.stage}`;
                } else if (action.type === 'update_business_profile') {
                  agentForLog = 'CEO'; taskNameLog = 'Updated Profile';
                  detailsLog = `Updated business profile: ${action.payload.company_name || 'Details updated'}`;
                }

                // Create calendar event for historical record
                const localCal = JSON.parse(localStorage.getItem('amp_calendar_events') || '[]');
                const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
                const dayOfWeek = days[new Date().getDay()];
                const histPayload = { 
                  id: Date.now().toString() + Math.random(), 
                  day_of_week: dayOfWeek, 
                  agent_role: agentForLog, 
                  task_name: taskNameLog,
                  details: detailsLog,
                  is_historical: true,
                  created_at: new Date().toISOString() 
                };
                localCal.push(histPayload);
                localStorage.setItem('amp_calendar_events', JSON.stringify(localCal));
                window.dispatchEvent(new Event('amp-calendar-updated'));
                if (supabaseClient && session?.user?.id) {
                   supabaseClient.from('calendar_events').insert([{ ...histPayload, user_id: session.user.id }]).then();
                }

                try {
                  const logAction = (name, agent) => {
                    const localCal2 = JSON.parse(localStorage.getItem('amp_calendar_events') || '[]');
                    const payload = { id: Date.now().toString() + Math.random().toString(36).substr(2,5), date_time: new Date().toISOString(), event_type: 'agent_deployment', agent_role: agent || 'CEO', task_name: name, created_at: new Date().toISOString(), created_by: activeUserName || 'System' };
                    localCal2.push(payload);
                    localStorage.setItem('amp_calendar_events', JSON.stringify(localCal2));
                    window.dispatchEvent(new Event('amp-calendar-updated'));
                    if (supabaseClient && session?.user?.id) {
                       supabaseClient.from('calendar_events').insert([{ ...payload, user_id: session.user.id }]).then();
                    }
                  };

                  if (action.type === 'add_inventory_item') {
                    const local = JSON.parse(localStorage.getItem('amp_inventory') || '[]');
                    local.push({ id: Date.now() + Math.random(), ...action.payload, created_at: new Date().toISOString() });
                    localStorage.setItem('amp_inventory', JSON.stringify(local));
                  } else if (action.type === 'store_plan') {
                    const local = JSON.parse(localStorage.getItem('amp_plans') || '[]');
                    local.push({ id: Date.now().toString(), ...action.payload, created_at: new Date().toISOString() });
                    localStorage.setItem('amp_plans', JSON.stringify(local));
                    logAction(`Created Plan: ${action.payload.title}`, action.payload.agent);
                  } else if (action.type === 'create_task') {
                    const local = JSON.parse(localStorage.getItem('amp_tasks') || '[]');
                    local.unshift({ id: Date.now().toString(), title: action.payload.title, status: action.payload.column_id || 'todo', agent: action.payload.assigned_agent || 'CEO', scheduled_time: action.payload.scheduled_time || null, priority: action.payload.priority || 'Medium', created_at: new Date().toISOString() });
                    localStorage.setItem('amp_tasks', JSON.stringify(local));
                    window.dispatchEvent(new Event('amp-tasks-updated'));
                    logAction(`Delegated Task: ${action.payload.title}`, action.payload.assigned_agent);
                  } else if (action.type === 'update_task') {
                    let local = JSON.parse(localStorage.getItem('amp_tasks') || '[]');
                    const targetIdx = local.findIndex(t => t.id === action.payload.task_title_or_id || t.title.toLowerCase() === action.payload.task_title_or_id.toLowerCase());
                    if (targetIdx !== -1) {
                      if (action.payload.priority) local[targetIdx].priority = action.payload.priority;
                      if (action.payload.status) local[targetIdx].status = action.payload.status;
                      localStorage.setItem('amp_tasks', JSON.stringify(local));
                      window.dispatchEvent(new Event('amp-tasks-updated'));
                      logAction(`Updated Task: ${action.payload.task_title_or_id}`, 'CEO');
                    }
                  } else if (action.type === 'add_calendar_event') {
                    const local = JSON.parse(localStorage.getItem('amp_calendar_events') || '[]');
                    local.push({ id: Date.now().toString(), ...action.payload, created_at: new Date().toISOString() });
                    localStorage.setItem('amp_calendar_events', JSON.stringify(local));
                    window.dispatchEvent(new Event('amp-calendar-updated'));
                  } else if (action.type === 'update_business_profile') {
                    const localData = localStorage.getItem('amp_business_profile');
                    let parsed = { company_name: '', bio: '', stage: 'Solo' };
                    if (localData) {
                      try { parsed = JSON.parse(localData); } catch (e) {}
                    }
                    localStorage.setItem('amp_business_profile', JSON.stringify({ ...parsed, ...action.payload }));
                    window.dispatchEvent(new Event('amp-profile-updated'));
                  } else if (action.type === 'create_agent') {
                    const local = JSON.parse(localStorage.getItem('amp_custom_agents') || '[]');
                    local.push({ id: Date.now().toString(), name: action.payload.role_name, description: action.payload.persona_description, parent: action.payload.parent || 'CMO', created_at: new Date().toISOString() });
                    localStorage.setItem('amp_custom_agents', JSON.stringify(local));
                    window.dispatchEvent(new Event('amp-subagents-updated'));
                    logAction(`Hired Subagent: ${action.payload.role_name}`, 'CEO');
                  } else if (action.type === 'add_lead') {
                    const local = JSON.parse(localStorage.getItem('amp_leads') || '[]');
                    local.unshift({ id: Date.now().toString(), ...action.payload, created_at: new Date().toISOString() });
                    localStorage.setItem('amp_leads', JSON.stringify(local));
                    window.dispatchEvent(new Event('amp-simulated-lead'));
                    logAction(`Added Lead: ${action.payload.name}`, 'CEO');
                  } else if (action.type === 'add_multiple_leads') {
                    const local = JSON.parse(localStorage.getItem('amp_leads') || '[]');
                    const newLeads = action.payload.leads.map((l, i) => ({ id: Date.now().toString() + i, ...l, created_at: new Date().toISOString() }));
                    localStorage.setItem('amp_leads', JSON.stringify([...newLeads, ...local]));
                    window.dispatchEvent(new Event('amp-simulated-lead'));
                    logAction(`Generated ${action.payload.leads.length} Leads`, 'CEO');
                  } else if (action.type === 'update_lead') {
                    const local = JSON.parse(localStorage.getItem('amp_leads') || '[]');
                    const index = local.findIndex(l => l.name.toLowerCase() === action.payload.name.toLowerCase());
                    if (index >= 0) {
                      local[index] = { ...local[index], ...action.payload, updated_at: new Date().toISOString() };
                      localStorage.setItem('amp_leads', JSON.stringify(local));
                      window.dispatchEvent(new Event('amp-simulated-lead'));
                      logAction(`Updated Lead: ${action.payload.name}`, 'CEO');
                    }
                  } else if (action.type === 'create_campaign') {
                    const local = JSON.parse(localStorage.getItem('amp_campaigns') || '[]');
                    local.unshift({ id: Date.now().toString(), ...action.payload, created_at: new Date().toISOString() });
                    localStorage.setItem('amp_campaigns', JSON.stringify(local));
                    window.dispatchEvent(new Event('amp-campaigns-updated'));
                    logAction(`Launched Campaign: ${action.payload.name}`, 'CMO');
                  } else if (action.type === 'update_plan') {
                    const local = JSON.parse(localStorage.getItem('amp_plans') || '[]');
                    const targetIdx = local.findIndex(p => p.id === action.payload.plan_id_or_title || p.title.toLowerCase() === action.payload.plan_id_or_title.toLowerCase());
                    if (targetIdx !== -1) {
                      if (action.payload.title) local[targetIdx].title = action.payload.title;
                      if (action.payload.content) local[targetIdx].content = action.payload.content;
                      localStorage.setItem('amp_plans', JSON.stringify(local));
                      logAction(`Adapted Plan: ${action.payload.plan_id_or_title}`, 'CEO');
                    }
                  }
                } catch (e) { console.error("Parse error", e); }
              });
            }

            if (status >= 400 || data.error) {
              appendMessage({ sender: 'ceo', text: `[SYSTEM ERROR] ${data.error || 'Unknown error'}`, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) });
            } else {
              appendMessage({ sender: 'ceo', text: data.content || "I have completed the task.", time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) });
            }
            setIsTyping(false);
          })
          .catch(err => {
            console.error(err);
            const userTextLower = msgText.toLowerCase();
            let responseText = "[ERROR] Backend disconnected or API Key missing. Simulation mode active.";
            
            if (userTextLower.includes('lead') && (userTextLower.includes('add') || userTextLower.includes('find') || userTextLower.includes('generate') || userTextLower.includes('insert'))) {
              responseText = "[ERROR] I cannot generate leads because my backend connection to Gemini is currently offline. Please ensure you are running this platform on a live server with API keys configured.";
            }

            appendMessage({ sender: 'ceo', text: responseText, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) });
            setIsTyping(false);
          });
      };

      const handleSend = (e) => {
        if (e && e.preventDefault) e.preventDefault();
        if (!input.trim() && !attachment) return;
        const textToSend = input.trim();
        const attachmentToSend = attachment;
        setInput('');
        setAttachment(null);
        sendMessage(textToSend, attachmentToSend);
      };

      useEffect(() => {
        if (triggerPrompt) {
          if (triggerPrompt.sender === 'ceo') {
            appendMessage({ sender: 'ceo', text: triggerPrompt.text, time: triggerPrompt.time || new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) });
          } else {
            sendMessage(triggerPrompt.text, null);
          }
          setTriggerPrompt(null);
        }
      }, [triggerPrompt]);

      useEffect(() => { endRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages, isTyping]);

      const handleFileChange = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (ev) => {
            setAttachment({ 
              data: ev.target.result.split(',')[1], 
              mimeType: file.type, 
              preview: ev.target.result 
            });
          };
          reader.readAsDataURL(file);
        }
      };

      return (
        <div className="flex flex-col h-full w-full relative">
          <div className="p-4 md:p-6 border-b border-gray-200 dark:border-pd-glassBorder flex items-center justify-between gap-4 bg-white/50 dark:bg-white/5 relative z-20">
            <div className="flex items-center gap-4">
              <div className="w-10 h-10 rounded-xl bg-white/40 dark:bg-pd-glass border border-gray-200 dark:border-pd-glassBorder flex items-center justify-center text-pd-orange shadow-sm">
                <iconify-icon icon="solar:crown-minimalistic-bold" width="20"></iconify-icon>
              </div>
              <div>
                <h2 className="font-semibold text-gray-900 dark:text-white tracking-tight">CEO Agent</h2>
                <p className="text-xs text-gray-500 hidden sm:block">Orchestrating 3 sub-agents.</p>
              </div>
            </div>
            
            <div className="flex items-center gap-2">
              <button onClick={() => setShowHistory(!showHistory)} className={`p-2 transition-all ${showHistory ? 'text-pd-teal' : 'text-gray-500 hover:text-pd-teal'}`}>
                <iconify-icon icon="solar:history-linear" width="20"></iconify-icon>
              </button>
              <button onClick={handleNewChat} className="px-3 py-1.5 text-xs font-semibold bg-pd-teal/10 hover:bg-pd-teal/20 text-pd-teal border border-pd-teal/30 rounded-lg flex items-center gap-1 transition-all">
                <iconify-icon icon="solar:pen-new-square-linear"></iconify-icon> <span className="hidden sm:inline">New Chat</span>
              </button>
            </div>
            
            {showHistory && (
              <div className="absolute top-full right-4 mt-2 w-64 bg-white dark:bg-[#0b0f19] border border-gray-200 dark:border-white/10 rounded-xl shadow-2xl p-2 z-50 max-h-64 overflow-y-auto">
                <h3 className="text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-2 px-2 pt-1">Previous Chats</h3>
                {threads.length === 0 ? (
                  <p className="text-xs text-gray-500 px-2 pb-2">No history yet.</p>
                ) : (
                  threads.map(t => (
                    <button key={t.id} onClick={() => loadThread(t)} className="w-full text-left px-3 py-2 text-xs text-gray-700 dark:text-gray-300 hover:bg-black/5 dark:hover:bg-white/5 rounded-lg truncate transition-colors">
                      <span className="block font-semibold mb-0.5 truncate">{t.title}...</span>
                      <span className="text-[9px] text-gray-500">{t.date}</span>
                    </button>
                  ))
                )}
              </div>
            )}
          </div>
          <div className="flex-1 p-4 md:p-6 overflow-y-auto flex flex-col gap-4 md:gap-6 relative z-0">
            {messages.map((m, i) => (
              m.sender === 'user' ? (
                <div key={i} className="self-end max-w-lg bg-pd-teal/20 border border-pd-teal/40 rounded-2xl rounded-tr-sm p-4 text-sm text-gray-900 dark:text-gray-100 shadow-sm break-words whitespace-pre-wrap">
                  <div className="text-[10px] text-pd-teal font-bold mb-1">{m.userName || 'You'}</div>
                  {m.attachment && (
                    <img src={m.attachment} alt="Attachment preview" className="max-w-full rounded-lg mb-2 border border-pd-teal/30" />
                  )}
                  {m.text && <div><FormatText text={m.text} /></div>}
                  <div className="text-[9px] text-gray-500 dark:text-gray-400 text-right mt-2">{m.time}</div>
                </div>
              ) : (
                <div key={i} className="self-start max-w-lg bg-white/60 dark:bg-pd-glass border border-gray-200 dark:border-pd-glassBorder backdrop-blur-xl rounded-2xl rounded-tl-sm p-5 text-sm text-gray-800 dark:text-gray-200 shadow-sm relative break-words whitespace-pre-wrap">
                  <div className="absolute -left-3 -top-3 w-6 h-6 rounded-full bg-white dark:bg-[#0b0f19] border border-gray-200 dark:border-pd-glassBorder flex items-center justify-center text-pd-orange">
                    <iconify-icon icon="solar:crown-minimalistic-bold" width="12"></iconify-icon>
                  </div>
                  <div><FormatText text={m.text} /></div>
                  <div className="text-[9px] text-gray-500 dark:text-gray-400 mt-2">{m.time}</div>
                </div>
              )
            ))}
            {isTyping && (
              <div className="self-start max-w-lg bg-white/60 dark:bg-pd-glass border border-gray-200 dark:border-pd-glassBorder rounded-2xl rounded-tl-sm p-4 flex gap-2 items-center">
                <span className="w-2 h-2 rounded-full bg-pd-orange animate-bounce"></span>
                <span className="w-2 h-2 rounded-full bg-pd-orange animate-bounce" style={{ animationDelay: '0.1s' }}></span>
                <span className="w-2 h-2 rounded-full bg-pd-orange animate-bounce" style={{ animationDelay: '0.2s' }}></span>
              </div>
            )}
            <div ref={endRef} />
          </div>
          <div className="p-4 bg-white/50 dark:bg-white/5 border-t border-gray-200 dark:border-pd-glassBorder flex flex-col gap-2">
            {attachment && (
              <div className="flex items-center gap-2 bg-white dark:bg-black/40 w-max px-3 py-1.5 rounded-lg border border-gray-200 dark:border-white/10">
                <img src={attachment.preview} className="w-8 h-8 object-cover rounded" alt="Preview" />
                <span className="text-xs text-gray-500">Image attached</span>
                <button onClick={() => setAttachment(null)} className="ml-2 text-gray-400 hover:text-red-500"><iconify-icon icon="solar:close-circle-bold" width="16"></iconify-icon></button>
              </div>
            )}
            <div className="relative flex items-center gap-2">
              <input type="file" ref={fileInputRef} onChange={handleFileChange} accept="image/*" className="hidden" />
              <button onClick={() => fileInputRef.current?.click()} className="w-10 h-10 rounded-full bg-white dark:bg-black/40 border border-gray-200 dark:border-pd-glassBorder hover:bg-gray-50 dark:hover:bg-white/10 text-gray-500 flex items-center justify-center transition-all flex-shrink-0">
                <iconify-icon icon="solar:paperclip-linear" width="20"></iconify-icon>
              </button>
              <div className="relative flex-1">
                <input type="text" value={input} onChange={e => setInput(e.target.value)} onKeyDown={(e) => { if (e.key === 'Enter') handleSend(e) }} onFocus={(e) => setTimeout(() => e.target.scrollIntoView({ behavior: 'smooth', block: 'center' }), 300)} placeholder="Instruct the CEO or attach a reference..." className="w-full bg-white dark:bg-pd-glass border border-gray-200 dark:border-pd-glassBorder rounded-full pl-6 pr-14 py-4 text-sm text-gray-900 dark:text-white focus:outline-none focus:border-pd-orange/50 shadow-inner" />
                <button onClick={handleSend} className="absolute right-2 top-2 w-10 h-10 rounded-full bg-pd-orange/20 border border-pd-orange/50 hover:bg-pd-orange hover:text-white text-pd-orange flex items-center justify-center transition-all"><iconify-icon icon="solar:plain-bold" width="18"></iconify-icon></button>
              </div>
            </div>
          </div>
        </div>
      );
    };

    const LeadPipeline = ({ session, activeTasks, userProfile, onAddLead, onImportCsv }) => {
      const isEcomm = userProfile?.stage === 'Ecomm';
      const stages = isEcomm ? ['Favorites', 'Inquiries', 'Abandoned Cart'] : ['Inbound', 'Qualifying', 'Negotiation'];
      
      const [leads, setLeads] = useState([]);
      const [showModal, setShowModal] = useState(false);
      const [formData, setFormData] = useState({ id: null, name: '', contact: '', value: '$0', stage: stages[0] });
      const [activeMobileStage, setActiveMobileStage] = useState(stages[0]);

      useEffect(() => {
        setActiveMobileStage(stages[0]);
      }, [isEcomm]);

      const fetchLeads = async () => {
        let localLeads = [];
        try {
          localLeads = JSON.parse(localStorage.getItem('amp_leads') || '[]');
        } catch(e) {}

        if (supabaseClient) {
          const { data } = await supabaseClient.from('leads').select('*').order('created_at', { ascending: false });
          if (data && data.length > 0) {
            setLeads(data);
            return;
          }
        }
        setLeads(localLeads);
      };

      const updateLeadStage = async (id, newStage) => {
        const localLeads = JSON.parse(localStorage.getItem('amp_leads') || '[]');
        const updated = localLeads.map(l => l.id === id ? { ...l, stage: newStage } : l);
        localStorage.setItem('amp_leads', JSON.stringify(updated));
        setLeads(updated);

        if (!supabaseClient) return;
        await supabaseClient.from('leads').update({ stage: newStage }).eq('id', id);
      };

      const deleteLead = async (id) => {
        if (!confirm('Are you sure you want to delete this lead?')) return;
        const localLeads = JSON.parse(localStorage.getItem('amp_leads') || '[]');
        const updated = localLeads.filter(l => l.id !== id);
        localStorage.setItem('amp_leads', JSON.stringify(updated));
        setLeads(updated);

        if (!supabaseClient) return;
        await supabaseClient.from('leads').delete().eq('id', id);
      };

      const handleSave = async () => {
        const payload = { ...formData, user_id: session?.user?.id || 'local' };
        let localLeads = JSON.parse(localStorage.getItem('amp_leads') || '[]');
        
        if (formData.id) {
          localLeads = localLeads.map(l => l.id === formData.id ? payload : l);
        } else {
          payload.id = Date.now().toString();
          payload.created_at = new Date().toISOString();
          localLeads.unshift(payload);
        }
        
        localStorage.setItem('amp_leads', JSON.stringify(localLeads));
        setLeads(localLeads);
        setShowModal(false);

        if (!supabaseClient || !session?.user?.id) return;
        if (formData.id) {
          await supabaseClient.from('leads').update(payload).eq('id', formData.id);
        } else {
          delete payload.id;
          await supabaseClient.from('leads').insert([payload]);
        }
      };

      useEffect(() => {
        fetchLeads();
        const handleSync = () => fetchLeads();
        window.addEventListener('amp-simulated-lead', handleSync);
        
        if (supabaseClient) {
          const channel = supabaseClient.channel('realtime:leads')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'leads' }, fetchLeads)
            .subscribe();
          return () => { 
            supabaseClient.removeChannel(channel); 
            window.removeEventListener('amp-simulated-lead', handleSync);
          };
        }
        return () => window.removeEventListener('amp-simulated-lead', handleSync);
      }, []);

      return (
        <div className="p-4 md:p-8 h-full flex flex-col relative">
          <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 md:mb-8 gap-4">
            <div><h2 className="text-xl md:text-2xl font-semibold tracking-tight text-gray-900 dark:text-white mb-1">{isEcomm ? 'Sales Pipeline' : 'Lead Pipeline'}</h2><p className="text-xs text-gray-500">{isEcomm ? 'Track customer interest and abandoned carts.' : 'Manage prospects and activate AI sequences.'}</p></div>
            <div className="flex gap-2 w-full md:w-auto">
              <label className="amp-button secondary px-4 py-2 text-xs font-medium w-full md:w-auto cursor-pointer flex items-center justify-center">
                <iconify-icon icon="solar:import-linear" className="mr-2"></iconify-icon> Import CSV
                <input type="file" accept=".csv" className="hidden" onChange={onImportCsv} />
              </label>
              <button onClick={() => { setFormData({ id: null, name: '', contact: '', value: '$0', stage: stages[0] }); setShowModal(true); }} className="amp-button secondary px-4 py-2 text-xs font-medium w-full md:w-auto flex items-center justify-center">
                <iconify-icon icon="solar:pen-linear" className="mr-2"></iconify-icon> Manual Entry
              </button>
              <button onClick={onAddLead} className="amp-button primary px-4 py-2 text-xs font-medium w-full md:w-auto flex items-center justify-center">
                <iconify-icon icon="solar:add-circle-linear" className="mr-2"></iconify-icon> Ask CEO to Add
              </button>
            </div>
          </div>
          <div className="md:hidden w-full mb-4 flex-shrink-0">
            <select 
              value={activeMobileStage} 
              onChange={e => setActiveMobileStage(e.target.value)}
              className="w-full bg-white/60 dark:bg-black/40 border border-gray-200 dark:border-white/10 rounded-xl px-4 py-3 text-sm text-gray-900 dark:text-white focus:outline-none focus:border-pd-teal appearance-none font-bold"
            >
              {stages.map(s => <option key={s} value={s}>{s}</option>)}
            </select>
          </div>
          <div className="flex gap-4 md:gap-6 overflow-hidden md:overflow-x-auto pb-4 flex-1">
            {stages.map(col => (
              <div key={col} className={`w-full md:w-80 flex-shrink-0 flex-col gap-4 h-full ${activeMobileStage === col ? 'flex' : 'hidden'} md:flex overflow-y-auto pr-2 pb-10 hide-scrollbar`}>
                <h3 className="text-xs font-mono uppercase tracking-widest text-pd-teal border-b border-gray-200 dark:border-pd-glassBorder pb-2 hidden md:block">{col}</h3>
                {leads.filter(l => l.stage === col).map(lead => (
                  <div key={lead.id} className="amp-card p-5 relative overflow-hidden group flex-shrink-0">
                    <div className="flex justify-between items-start mb-3">
                      <div>
                        <h4 className="font-semibold text-gray-900 dark:text-gray-200 flex items-center gap-2">
                          {lead.name}

    const FinanceTracker = ({ session, userProfile, onLogExpense }) => {
      const [clients, setClients] = useState([]);
      const [transactions, setTransactions] = useState([]);
      const [autoIncome, setAutoIncome] = useState(0);
      const [showManualAdd, setShowManualAdd] = useState(false);
      const [newTx, setNewTx] = useState({ type: 'Expense', amount: '', description: '' });
      const [monthlyReport, setMonthlyReport] = useState(null);

      const isEcomm = userProfile?.stage === 'Ecomm';

      const fetchClients = async () => {
        if (!supabaseClient) return;
        const { data } = await supabaseClient.from('clients').select('*');
        if (data) {
          setClients(data);
          let total = 0;
          data.forEach(c => {
            const valStr = String(isEcomm ? (c.ltv || '0') : (c.retainer || '0'));
            const val = parseFloat(valStr.replace(/[^0-9.]/g, '')) || 0;
            total += val;
          });
          setAutoIncome(total);
        }
      };

      const fetchFinances = async () => {
        if (supabaseClient && session?.user?.id) {
          try {
            const { data, error } = await supabaseClient.from('finances').select('*').order('created_at', { ascending: false });
            if (!error && data) {
              setTransactions(data);
              return;
            }
          } catch (e) {
             console.warn("Finances table likely missing.");
          }
        }
        try {
          const local = localStorage.getItem('amp_finances');
          if (local) {
            const parsed = JSON.parse(local);
            if (Array.isArray(parsed)) setTransactions(parsed);
          }
        } catch (e) {}
      };

      useEffect(() => {
        fetchClients();
        fetchFinances();
        
        const handleSync = () => {
          fetchClients();
          fetchFinances();
        };
        window.addEventListener('amp-simulated-sale', handleSync);
        
        return () => window.removeEventListener('amp-simulated-sale', handleSync);
      }, [userProfile]);

      const manualIncome = transactions.filter(t => t.type === 'Income').reduce((acc, t) => acc + t.amount, 0);
      const manualExpenses = transactions.filter(t => t.type === 'Expense').reduce((acc, t) => acc + t.amount, 0);
      
      const totalIncome = autoIncome + manualIncome;
      const netProfit = totalIncome - manualExpenses;

      useEffect(() => {
        const today = new Date();
        const lastDayOfMonth = new Date(today.getFullYear(), today.getMonth() + 1, 0).getDate();
        
        if (today.getDate() === lastDayOfMonth) {
          const reportKey = `amp_report_${today.getFullYear()}_${today.getMonth()}`;
          const saved = localStorage.getItem(reportKey);
          if (saved) {
            setMonthlyReport(JSON.parse(saved));
          } else if (totalIncome > 0 || manualExpenses > 0) {
            const report = {
              date: today.toLocaleDateString(),
              revenue: totalIncome,
              expenses: manualExpenses,
              profit: netProfit,
              month: today.toLocaleString('default', { month: 'long' })
            };
            localStorage.setItem(reportKey, JSON.stringify(report));
            setMonthlyReport(report);
          }
        }
      }, [totalIncome, manualExpenses, netProfit]);

      const handleAddTx = async () => {
        if (!newTx.amount || !newTx.description) return;
        const amountNum = parseFloat(newTx.amount.replace(/[^0-9.]/g, ''));
        const payload = {
          user_id: session?.user?.id || 'local',
          type: newTx.type,
          amount: amountNum,
          description: newTx.description,
          created_at: new Date().toISOString()
        };

        if (supabaseClient && session?.user?.id) {
          try {
            await supabaseClient.from('finances').insert([payload]);
          } catch(e) {}
        }
        
        const newTxs = [payload, ...transactions];
        setTransactions(newTxs);
        localStorage.setItem('amp_finances', JSON.stringify(newTxs));
        
        setNewTx({ type: 'Expense', amount: '', description: '' });
        setShowManualAdd(false);
      };

      return (
        <div className="flex flex-col h-full overflow-hidden">
          <div className="p-4 md:p-8 flex-shrink-0 flex flex-col md:flex-row justify-between items-start border-b border-gray-200 dark:border-pd-glassBorder bg-white/50 dark:bg-white/5 gap-4">
            <div>
              <h2 className="text-xl md:text-2xl font-semibold tracking-tight text-gray-900 dark:text-white mb-1">Financial Tracker</h2>
              <p className="text-xs text-gray-500">Autonomous revenue tracking & expense logging.</p>
            </div>
            <div className="flex gap-2 w-full md:w-auto items-center">
              {monthlyReport && (
                <div className="px-3 py-1.5 rounded-lg bg-pd-teal/10 border border-pd-teal/30 text-pd-teal text-xs flex items-center gap-2 cursor-help hidden md:flex" title={`Monthly Report for ${monthlyReport.month}: Revenue: $${monthlyReport.revenue}, Expenses: $${monthlyReport.expenses}, Profit: $${monthlyReport.profit}`}>
                  <iconify-icon icon="solar:document-text-bold"></iconify-icon> {monthlyReport.month} Report Drafted
                </div>
              )}
              <button onClick={() => setShowManualAdd(!showManualAdd)} className="amp-button secondary px-4 py-2 text-xs font-medium w-full md:w-auto flex items-center justify-center">
                <iconify-icon icon={showManualAdd ? "solar:close-circle-linear" : "solar:pen-linear"} className="mr-2"></iconify-icon> {showManualAdd ? 'Cancel' : 'Manual Entry'}
              </button>
              <button onClick={onLogExpense} className="amp-button primary px-4 py-2 text-xs font-medium w-full md:w-auto flex items-center justify-center">
                <iconify-icon icon="solar:add-circle-linear" className="mr-2"></iconify-icon> Ask CEO to Log
              </button>
            </div>
          </div>

          <div className="flex-1 overflow-y-auto p-4 md:p-8 space-y-6">
            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
              <div className="bg-white/40 dark:bg-pd-glass border border-gray-200 dark:border-pd-glassBorder rounded-2xl p-5 shadow-sm">
                <div className="text-gray-500 text-xs mb-1 flex justify-between">Total Revenue <iconify-icon icon="solar:wallet-money-bold" className="text-green-500"></iconify-icon></div>
                <div className="text-2xl font-bold text-gray-900 dark:text-white">${totalIncome.toLocaleString()}</div>
                <div className="text-[10px] text-gray-400 mt-2">Autonomous: ${autoIncome.toLocaleString()} {isEcomm ? '(LTV)' : '(Retainers)'}</div>
              </div>
              <div className="bg-white/40 dark:bg-pd-glass border border-gray-200 dark:border-pd-glassBorder rounded-2xl p-5 shadow-sm">
                <div className="text-gray-500 text-xs mb-1 flex justify-between">Total Expenses <iconify-icon icon="solar:card-send-bold" className="text-red-500"></iconify-icon></div>
                <div className="text-2xl font-bold text-gray-900 dark:text-white">${manualExpenses.toLocaleString()}</div>
                <div className="text-[10px] text-gray-400 mt-2">Logged manually or by CEO</div>
              </div>
              <div className={`border rounded-2xl p-5 shadow-sm ${netProfit >= 0 ? 'bg-pd-teal/10 border-pd-teal/30' : 'bg-red-500/10 border-red-500/30'}`}>
                <div className="text-gray-500 dark:text-gray-400 text-xs mb-1 flex justify-between">Net Profit <iconify-icon icon="solar:chart-square-bold" className={netProfit >= 0 ? "text-pd-teal" : "text-red-500"}></iconify-icon></div>
                <div className={`text-2xl font-bold ${netProfit >= 0 ? 'text-pd-teal' : 'text-red-500'}`}>${netProfit.toLocaleString()}</div>
                <div className="text-[10px] text-gray-500 dark:text-gray-400 mt-2">All-time tracked</div>
              </div>
            </div>

            <div className="bg-white/60 dark:bg-pd-glass border border-gray-200 dark:border-pd-glassBorder rounded-2xl p-6 shadow-sm">
              <div className="flex justify-between items-center mb-6">
                <h3 className="text-sm font-semibold text-gray-900 dark:text-white">Transaction Ledger</h3>
              </div>

              {showManualAdd && (
                <div className="flex flex-col md:flex-row gap-3 mb-6 p-4 bg-black/5 dark:bg-white/5 rounded-xl border border-gray-200 dark:border-pd-glassBorder">
                  <select value={newTx.type} onChange={e => setNewTx({...newTx, type: e.target.value})} className="bg-white dark:bg-black/40 border border-gray-200 dark:border-white/10 rounded-lg px-3 py-2 text-sm text-gray-900 dark:text-white focus:border-pd-teal outline-none appearance-none">
                    <option value="Expense">Expense</option>
                    <option value="Income">Income</option>
                  </select>
                  <input type="text" placeholder="Amount (e.g. 50.00)" value={newTx.amount} onChange={e => setNewTx({...newTx, amount: e.target.value})} className="flex-1 bg-white dark:bg-black/40 border border-gray-200 dark:border-white/10 rounded-lg px-3 py-2 text-sm text-gray-900 dark:text-white focus:border-pd-teal outline-none" />
                  <input type="text" placeholder="Description (e.g. Software Sub)" value={newTx.description} onChange={e => setNewTx({...newTx, description: e.target.value})} className="flex-[2] bg-white dark:bg-black/40 border border-gray-200 dark:border-white/10 rounded-lg px-3 py-2 text-sm text-gray-900 dark:text-white focus:border-pd-teal outline-none" />
                  <button onClick={handleAddTx} className="bg-pd-teal hover:bg-pd-teal/80 text-black font-semibold rounded-lg px-4 py-2 text-sm transition-colors shadow-[0_0_15px_rgba(0,242,234,0.3)]">Save</button>
                </div>
              )}

              <div className="overflow-x-auto">
                <table className="w-full text-left border-collapse min-w-[500px]">
                  <thead>
                    <tr className="border-b border-gray-200 dark:border-pd-glassBorder text-xs text-gray-500 uppercase tracking-wider">
                      <th className="pb-3 font-medium">Date</th>
                      <th className="pb-3 font-medium">Description</th>
                      <th className="pb-3 font-medium">Type</th>
                      <th className="pb-3 font-medium text-right">Amount</th>
                    </tr>
                  </thead>
                  <tbody>
                    {transactions.length === 0 ? (
                      <tr><td colSpan="4" className="py-8 text-center text-xs text-gray-500 italic">No manual transactions logged yet.</td></tr>
                    ) : transactions.map((t, i) => (
                      <tr key={i} className="border-b border-gray-100 dark:border-white/5 last:border-0 hover:bg-black/5 dark:hover:bg-white/5 transition-colors">
                        <td className="py-3 text-sm text-gray-500">{new Date(t.created_at).toLocaleDateString()}</td>
                        <td className="py-3 text-sm text-gray-900 dark:text-white">{t.description}</td>
                        <td className="py-3 text-sm"><span className={`px-2 py-0.5 rounded text-[10px] ${t.type === 'Income' ? 'bg-green-500/10 text-green-500' : 'bg-red-500/10 text-red-500'}`}>{t.type}</span></td>
                        <td className={`py-3 text-sm text-right font-medium ${t.type === 'Income' ? 'text-green-500' : 'text-gray-900 dark:text-white'}`}>
                          {t.type === 'Income' ? '+' : '-'}${t.amount.toLocaleString()}
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      );
    };

    const MarketingPipeline = ({ onAddCampaign, setActiveModule, setTriggerPrompt }) => {
      const [campaigns, setCampaigns] = useState([]);
      const [showModal, setShowModal] = useState(false);
      const [formData, setFormData] = useState({ id: null, name: '', description: '', stage: 'Planning', agents_assigned: '' });

      const fetchCampaigns = async () => {
        let local = [];
        try {
          local = JSON.parse(localStorage.getItem('amp_campaigns') || '[]');
        } catch(e) {}
        
        if (supabaseClient) {
          const { data } = await supabaseClient.from('campaigns').select('*').order('created_at', { ascending: false });
          if (data && data.length > 0) {
            setCampaigns(data);
            return;
          }
        }
        setCampaigns(local);
      };

      useEffect(() => {
        fetchCampaigns();
        const handleSync = () => fetchCampaigns();
        window.addEventListener('amp-campaigns-updated', handleSync);
        
        if (supabaseClient) {
          const channel = supabaseClient.channel('realtime:campaigns')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'campaigns' }, fetchCampaigns)
            .subscribe();
          return () => { 
            supabaseClient.removeChannel(channel); 
            window.removeEventListener('amp-campaigns-updated', handleSync);
          };
        }
        return () => window.removeEventListener('amp-campaigns-updated', handleSync);
      }, []);

      const handleSave = async () => {
        const payload = { ...formData };
        let local = JSON.parse(localStorage.getItem('amp_campaigns') || '[]');
        
        if (formData.id) {
          local = local.map(c => c.id === formData.id ? payload : c);
        } else {
          payload.id = Date.now().toString();
          payload.created_at = new Date().toISOString();
          local.unshift(payload);
        }
        
        localStorage.setItem('amp_campaigns', JSON.stringify(local));
        setCampaigns(local);
        setShowModal(false);

        if (!supabaseClient) return;
        if (formData.id) {
          await supabaseClient.from('campaigns').update(payload).eq('id', formData.id);
        } else {
          delete payload.id;
          await supabaseClient.from('campaigns').insert([payload]);
        }
      };

      const handleActivate = async (campaign) => {
        const updated = { ...campaign, stage: 'Active' };
        let local = JSON.parse(localStorage.getItem('amp_campaigns') || '[]');
        local = local.map(c => c.id === campaign.id ? updated : c);
        localStorage.setItem('amp_campaigns', JSON.stringify(local));
        setCampaigns(local);
        
        if (supabaseClient) {
          await supabaseClient.from('campaigns').update({ stage: 'Active' }).eq('id', campaign.id);
        }

        setActiveModule('neural-chat');
        setTimeout(() => {
          setTriggerPrompt({ 
            sender: 'user', 
            text: `I have activated the marketing campaign: "${campaign.name}". Strategy: ${campaign.description}. Please deploy the necessary sub-agents (CMO, Creative, CTO) to execute this by creating active tasks for them.`, 
            time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) 
          });
        }, 300);
      };

      return (
        <div className="p-4 md:p-8 h-full flex flex-col relative">
          <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 md:mb-8 gap-4">
            <div><h2 className="text-xl md:text-2xl font-semibold tracking-tight text-gray-900 dark:text-white mb-1">Marketing Pipeline</h2><p className="text-xs text-gray-500">Campaign execution and team resource sharing.</p></div>
            <div className="flex gap-2 w-full md:w-auto">
              <button onClick={() => { setFormData({ id: null, name: '', description: '', stage: 'Planning', agents_assigned: '' }); setShowModal(true); }} className="amp-button secondary px-4 py-2 text-xs font-medium w-full md:w-auto flex items-center justify-center">
                <iconify-icon icon="solar:pen-linear" className="mr-2"></iconify-icon> Manual Entry
              </button>
              <button onClick={onAddCampaign} className="amp-button primary px-4 py-2 text-xs font-medium w-full md:w-auto flex items-center justify-center">
                <iconify-icon icon="solar:add-circle-linear" className="mr-2"></iconify-icon> Ask CEO to Add
              </button>
            </div>
          </div>
          <div className="flex gap-4 md:gap-6 overflow-x-auto pb-4 flex-1 snap-x snap-mandatory">
            {['Planning', 'Active', 'Completed'].map(col => (
              <div key={col} className="w-[85vw] sm:w-80 flex-shrink-0 flex flex-col gap-4 snap-center h-full overflow-y-auto pr-2 pb-4 hide-scrollbar">
                <h3 className="text-xs font-mono uppercase tracking-widest text-pd-orange border-b border-gray-200 dark:border-pd-glassBorder pb-2">{col}</h3>
                
                {campaigns.filter(c => c.stage === col).map(campaign => (
                  <div key={campaign.id} className="amp-card p-5 relative overflow-hidden group flex-shrink-0">
                    <div className="flex justify-between items-start mb-2">
                      <h4 className="font-semibold text-gray-900 dark:text-white flex items-center gap-2">
                        {campaign.name}
                        <button onClick={() => { setFormData(campaign); setShowModal(true); }} className="opacity-0 group-hover:opacity-100 text-gray-400 hover:text-pd-teal transition-all" title="Edit">
                          <iconify-icon icon="solar:pen-linear"></iconify-icon>
                        </button>
                      </h4>
                    </div>
                    <p className="text-xs text-gray-500 mb-4 line-clamp-3" title={campaign.description}>{campaign.description || 'No description'}</p>
                    <div className="flex justify-between items-center mt-auto border-t border-gray-200 dark:border-white/10 pt-3">
                      <div className="flex flex-wrap gap-1">
                        {campaign.agents_assigned && campaign.agents_assigned.split(',').map((agent, i) => (
                          <span key={i} className="px-1.5 py-0.5 bg-pd-teal/20 text-pd-teal rounded text-[9px] font-bold uppercase">{agent.trim()}</span>
                        ))}
                      </div>
                      {col === 'Planning' && (
                        <button onClick={() => handleActivate(campaign)} className="flex items-center gap-1 text-[10px] bg-pd-orange/10 hover:bg-pd-orange/20 text-pd-orange px-2 py-1 rounded transition-colors font-semibold shadow-sm">
                          <iconify-icon icon="solar:play-circle-bold"></iconify-icon> Activate
                        </button>
                      )}
                    </div>
                  </div>
                ))}
                
                {col === 'Planning' && campaigns.filter(c => c.stage === col).length === 0 && (
                  <div className="amp-card p-4 opacity-70 border-dashed cursor-pointer hover:bg-black/5 dark:hover:bg-white/5 transition-colors flex-shrink-0" onClick={onAddCampaign}>
                    <div className="flex items-center justify-center h-16 text-xs text-gray-500"><iconify-icon icon="solar:add-circle-linear" className="mr-1"></iconify-icon> Add Campaign</div>
                  </div>
                )}
              </div>
            ))}
          </div>

          {showModal && (
            <div className="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div className="bg-white dark:bg-[#0b0f19] border border-gray-200 dark:border-pd-glassBorder rounded-2xl w-full max-w-md p-6 shadow-2xl">
                <div className="flex justify-between items-center mb-4">
                  <h3 className="font-semibold">{formData.id ? 'Edit Campaign' : 'Manual Campaign Entry'}</h3>
                  <button onClick={() => setShowModal(false)} className="text-gray-500 hover:text-gray-900 dark:hover:text-white"><iconify-icon icon="solar:close-circle-linear" width="20"></iconify-icon></button>
                </div>
                <div className="space-y-4">
                  <div>
                    <label className="block text-xs text-gray-500 mb-1">Campaign Name</label>
                    <input type="text" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} className="w-full bg-black/5 dark:bg-white/10 border-none rounded-xl px-4 py-2 text-sm focus:ring-1 focus:ring-pd-teal outline-none" placeholder="e.g. Q4 Holiday Push" />
                  </div>
                  <div>
                    <label className="block text-xs text-gray-500 mb-1">Description & Strategy</label>
                    <textarea value={formData.description} onChange={e => setFormData({...formData, description: e.target.value})} className="w-full bg-black/5 dark:bg-white/10 border-none rounded-xl px-4 py-3 text-sm focus:ring-1 focus:ring-pd-teal outline-none resize-none" rows="3" placeholder="Outline the campaign goals..."></textarea>
                  </div>
                  <div className="flex gap-4">
                    <div className="flex-1">
                      <label className="block text-xs text-gray-500 mb-1">Stage</label>
                      <select value={formData.stage} onChange={e => setFormData({...formData, stage: e.target.value})} className="w-full bg-black/5 dark:bg-white/10 border-none rounded-xl px-4 py-2 text-sm focus:ring-1 focus:ring-pd-teal outline-none appearance-none">
                        <option>Planning</option>
                        <option>Active</option>
                        <option>Completed</option>
                      </select>
                    </div>
                    <div className="flex-1">
                      <label className="block text-xs text-gray-500 mb-1">Agents (comma sep)</label>
                      <input type="text" value={formData.agents_assigned} onChange={e => setFormData({...formData, agents_assigned: e.target.value})} className="w-full bg-black/5 dark:bg-white/10 border-none rounded-xl px-4 py-2 text-sm focus:ring-1 focus:ring-pd-teal outline-none" placeholder="CMO, Creative" />
                    </div>
                  </div>
                  <button onClick={handleSave} className="w-full amp-button primary py-2 mt-2">Save Campaign</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    const ContentFactory = ({ session, activeTasks, depleteBudget }) => {
      const [prompt, setPrompt] = useState('');
      const [aspectRatio, setAspectRatio] = useState('1:1');
      const [references, setReferences] = useState([]);
      const [isGenerating, setIsGenerating] = useState(false);
      const [result, setResult] = useState(null);
      const fileRef = useRef(null);

      // Filter tasks to get creative agent generated assets
      const archiveItems = activeTasks ? activeTasks.filter(t => t.agent === 'Creative' && t.status === 'done' && t.notes) : [];

      const handleFile = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (ev) => {
            setReferences(prev => [...prev, { data: ev.target.result.split(',')[1], mimeType: file.type, preview: ev.target.result }]);
          };
          reader.readAsDataURL(file);
        }
      };

      const handleGenerate = async () => {
        if (!prompt.trim()) return;
        setIsGenerating(true);
        setResult(null);

        try {
          if (depleteBudget) depleteBudget('Creative', 5); // Deplete 5% per generation
          const res = await fetch('/.netlify/functions/content', {
            method: 'POST',
            body: JSON.stringify({
              prompt,
              aspectRatio,
              referenceImages: references.map(r => ({ data: r.data, mimeType: r.mimeType })),
              userId: session?.user?.id
            })
          });
          
          if (!res.ok) {
            throw new Error(`Server returned ${res.status}: Payload too large or backend error.`);
          }
          
          const data = await res.json();
          if (data.error) throw new Error(data.error);
          
          const imageUrl = data.content;
          setResult(imageUrl);

          // Save to asset archive
          const taskPayload = {
            title: prompt.substring(0, 30) + '...',
            agent: 'Creative',
            status: 'done',
            notes: imageUrl,
            user_id: session?.user?.id || 'local'
          };
          
          const local = JSON.parse(localStorage.getItem('amp_tasks') || '[]');
          local.unshift({
            id: Date.now().toString(),
            ...taskPayload,
            created_at: new Date().toISOString()
          });
          localStorage.setItem('amp_tasks', JSON.stringify(local));
          window.dispatchEvent(new Event('amp-tasks-updated'));

          if (typeof supabaseClient !== 'undefined' && supabaseClient && session?.user?.id) {
            supabaseClient.from('tasks').insert([taskPayload]).then();
          }

        } catch (e) {
          console.error(e);
          setResult("[ERROR] Nano Banana Preview Failed: " + e.message);
        } finally {
          setIsGenerating(false);
          setPrompt('');
        }
      };

      return (
        <div className="p-4 md:p-6 h-full flex flex-col relative overflow-y-auto overflow-x-hidden">
          <div className="absolute inset-0 opacity-[0.03] dark:opacity-[0.05]" style={{ backgroundImage: 'radial-gradient(currentColor 1px, transparent 1px)', backgroundSize: '32px 32px' }}></div>
          <div className="relative z-10 flex flex-col md:flex-row justify-between items-start md:items-center mb-4 md:mb-6 gap-2">
            <div>
              <h2 className="text-xl md:text-2xl font-semibold tracking-tight text-gray-900 dark:text-white mb-1 flex items-center gap-2">Content Factory <span className="text-[10px] font-mono bg-pd-teal/20 text-pd-teal px-2 py-0.5 rounded">NANO BANANA</span></h2>
              <p className="text-xs text-gray-500">Upload brand references and prompt the AI to generate tailored visual assets.</p>
            </div>
            {references.length > 0 && (
              <div className="flex items-center gap-2">
                <span className="text-xs text-gray-500">{references.length} references attached</span>
                <button onClick={() => setReferences([])} className="text-xs text-red-500 hover:underline">Clear</button>
              </div>
            )}
          </div>
          
          <div className="flex-1 flex flex-col-reverse md:flex-row gap-4 md:gap-6 relative z-10 h-full pb-4">

          try {

      useEffect(() => {
        fetchPlans();

          const channel = supabaseClient.channel('realtime:plans')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'plans' }, fetchPlans)
            .subscribe();
          return () => { supabaseClient.removeChannel(channel); };
        } else {
          const interval = setInterval(fetchPlans, 2000);
          return () => clearInterval(interval);

      const handleSaveManual = async () => {
        if (!newPlan.title || !newPlan.content) return;
        const payload = { id: Date.now().toString(), agent: 'CEO', ...newPlan, created_at: new Date().toISOString() };
        if (supabaseClient && session?.user?.id) {
          await supabaseClient.from('plans').insert([{ ...payload, user_id: session.user.id }]);
        } else {
          const local = JSON.parse(localStorage.getItem('amp_plans') || '[]');

          setEnlargedPlan({ ...enlargedPlan, ...editBuffer });

            local[idx] = { ...local[idx], ...editBuffer };

                <button onClick={handleSaveManual} className="px-6 py-2 bg-pd-teal text-pd-dark rounded-xl text-xs font-bold shadow-md hover:shadow-lg transition-all">Save Plan</button>

            {plans.length === 0 ? (

                   <div className="flex justify-between items-start mb-4">

                       <span className="inline-block mt-1 px-2 py-0.5 bg-pd-teal/10 text-pd-teal text-[10px] uppercase font-bold tracking-widest border border-pd-teal/30 rounded-full">{plan.agent || 'CEO'}</span>
                     </div>
                     <div className="flex gap-2 flex-shrink-0">
                       <button onClick={(e) => { e.stopPropagation(); executePlan(plan); }} className="w-8 h-8 bg-pd-teal text-pd-dark rounded-full shadow-[0_0_15px_rgba(0,242,234,0.3)] hover:scale-110 transition-all flex items-center justify-center" title="Execute Plan">

          {enlargedPlan && (

                <div className="flex items-center justify-between p-4 sm:p-6 border-b border-gray-100 dark:border-white/5">

                    {isEditing ? (

                        <span className="inline-block mt-1 px-2 py-0.5 bg-pd-teal/10 text-pd-teal text-[10px] uppercase font-bold tracking-widest border border-pd-teal/30 rounded-full">{enlargedPlan.agent || 'CEO'}</span>

                  <div className="flex gap-2 items-center">
                    {!isEditing && (

                      <iconify-icon icon="solar:play-circle-bold" className="mr-2"></iconify-icon> <span className="hidden sm:inline">Execute Plan</span>
