<!DOCTYPE html>
<html lang="en" class="">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <title>AMP Center | Project D</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            pd: {
              teal: '#00F2EA',
              orange: '#FF5F00',
              dark: '#0b0f19',
              glass: 'rgba(255, 255, 255, 0.03)',
              glassBorder: 'rgba(255, 255, 255, 0.08)'
            }
          },
          animation: {
            'blob': 'blob 7s infinite',
            'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'flow-beam': 'flowBeam 2s linear infinite',
            'sweep-beam': 'sweepBeam 2s ease-in-out infinite'
          },
          keyframes: {
            blob: {
              '0%': { transform: 'translate(0px, 0px) scale(1)' },
              '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
              '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
              '100%': { transform: 'translate(0px, 0px) scale(1)' },
            },
            flowBeam: {
              '0%': { transform: 'translateY(-100%)' },
              '100%': { transform: 'translateY(200%)' }
            },
            sweepBeam: {
              '0%': { transform: 'translateX(-100%) skewX(-15deg)' },
              '100%': { transform: 'translateX(200%) skewX(-15deg)' }
            }
          }
        }
      }
    };
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap"
    rel="stylesheet">
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <script crossorigin="" src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin="" src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      background-color: #f9fafb;
      color: #111827;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      transition: background-color 0.3s, color 0.3s;
    }

    .dark body {
      background-color: #0b0f19;
      color: #f3f4f6;
    }

    .amp-card {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(0, 0, 0, 0.05);
      border-radius: 20px;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .dark .amp-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .amp-card:hover {
      transform: translateY(-4px);
      border-color: #00F2EA;
      box-shadow: 0 10px 30px -10px rgba(0, 242, 234, 0.15);
    }

    .amp-button {
      background: rgba(0, 0, 0, 0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 0, 0, 0.1);
      border-radius: 9999px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      color: #111;
    }

    .dark .amp-button {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #fff;
    }

    .amp-button::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 95, 0, 0.2), transparent);
      transform: translateX(-100%);
      transition: transform 0.5s ease;
    }

    .amp-button:hover::before {
      transform: translateX(100%);
    }

    .amp-button:hover {
      border-color: #FF5F00;
      box-shadow: 0 0 20px rgba(255, 95, 0, 0.3);
      transform: scale(1.02);
      color: #FF5F00;
    }

    .dark .amp-button:hover {
      color: white;
    }

    .amp-button.primary {
      background: rgba(255, 95, 0, 0.15);
      border-color: rgba(255, 95, 0, 0.5);
      color: #FF5F00;
    }

    .dark .amp-button.primary {
      color: white;
    }

    .amp-button.primary:hover {
      background: rgba(255, 95, 0, 0.3);
    }

    .glass-reveal {
      animation: glassReveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
      transform: translateY(20px) scale(0.95);
    }

    @keyframes glassReveal {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .stagger-1 {
      animation-delay: 0.1s;
    }

    .stagger-2 {
      animation-delay: 0.2s;
    }

    .stagger-3 {
      animation-delay: 0.3s;
    }

    .stagger-4 {
      animation-delay: 0.4s;
    }

    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.1);
      border-radius: 10px;
    }

    .dark ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 0, 0, 0.2);
    }

    .dark ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .toggle-checkbox:checked+.toggle-label {
      background-color: #FF5F00;
      border-color: #FF5F00;
    }

    .toggle-checkbox:checked+.toggle-label .toggle-thumb {
      transform: translateX(100%);
      border-color: #FF5F00;
    }

    .toggle-label {
      background-color: rgba(0, 0, 0, 0.1);
      border: 1px solid rgba(0, 0, 0, 0.2);
    }

    .dark .toggle-label {
      background-color: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .tree-line-v {
      width: 1px;
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0.2), transparent);
    }

    .dark .tree-line-v {
      background: linear-gradient(to bottom, rgba(255, 255, 255, 0.2), transparent);
    }

    .tree-line-h {
      height: 1px;
      background: rgba(0, 0, 0, 0.2);
    }

    .dark .tree-line-h {
      background: rgba(255, 255, 255, 0.2);
    }

    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>

<body>
  <div class="fixed inset-0 w-full h-full overflow-hidden pointer-events-none z-0 bg-gray-50 dark:bg-[#0b0f19]"
    id="bg-container"></div>
  <div id="root" class="relative z-10 w-full min-h-[100dvh] flex text-gray-800 dark:text-gray-200"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Initialize Supabase - USER MUST REPLACE THESE WITH ACTUAL KEYS
    const SUPABASE_URL = 'https://alkknerlktomzolqlntt.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_3Pip4_Ta8kBDSkUkM5-AGw_SCa4pJc-';
    let supabaseClient = null;
    if (SUPABASE_URL && SUPABASE_ANON_KEY && window.supabase) {
      supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    }

    const AuthScreen = ({ onLogin }) => {
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [isSignUp, setIsSignUp] = useState(false);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');

      const handleAuth = async (e) => {
        e.preventDefault();
        if (!supabaseClient) {
          setError("Supabase not connected. Please use Local Mode.");
          return;
        }
        setLoading(true);
        setError('');

        try {
          if (isSignUp) {
            const { data, error } = await supabaseClient.auth.signUp({ email, password });
            if (error) throw error;
            if (data.session) onLogin(data.session);
            else setError("Check your email for a confirmation link.");
          } else {
            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) throw error;
            if (data.session) onLogin(data.session);
          }
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="w-full min-h-[100dvh] flex items-center justify-center relative z-10 px-4">
          <div className="bg-white/40 dark:bg-pd-glass backdrop-blur-xl border border-gray-200 dark:border-pd-glassBorder rounded-2xl p-8 w-full max-w-md shadow-2xl">
            <div className="flex justify-center mb-6">
              <div className="w-20 h-20 rounded-2xl shadow-[0_0_20px_rgba(0,242,234,0.3)] overflow-hidden">
                <img src="https://hoirqrkdgbmvpwutwuwj.supabase.co/storage/v1/object/public/assets/assets/8c547aee-5092-488d-9b24-cc3cadf37fdc_800w.png" className="w-full h-full object-cover" alt="Project D Logo" />
              </div>
            </div>
            <h2 className="text-2xl font-bold text-center mb-2 text-gray-900 dark:text-white">
              {isSignUp ? 'Initialize Account' : 'Access AMP Center'}
            </h2>
            <p className="text-center text-gray-500 dark:text-gray-400 mb-8">
              Enter your credentials to proceed
            </p>

            {error && (
              <div className="mb-4 p-3 bg-red-500/20 border border-red-500/50 rounded-lg text-red-600 dark:text-red-400 text-sm text-center">
                {error}
              </div>
            )}

            <form onSubmit={handleAuth} className="space-y-4">
              <div>
                <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Email</label>
                <input type="email" value={email} onChange={e => setEmail(e.target.value)} required
                  className="w-full bg-white/50 dark:bg-pd-dark/50 border border-gray-300 dark:border-gray-700 rounded-xl px-4 py-3 text-gray-900 dark:text-white focus:ring-2 focus:ring-pd-teal focus:border-transparent outline-none transition-all"
                />
              </div>
              <div>
                <label className="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Password</label>
                <input type="password" value={password} onChange={e => setPassword(e.target.value)} required minLength="6"
                  className="w-full bg-white/50 dark:bg-pd-dark/50 border border-gray-300 dark:border-gray-700 rounded-xl px-4 py-3 text-gray-900 dark:text-white focus:ring-2 focus:ring-pd-teal focus:border-transparent outline-none transition-all"
                />
              </div>
              <button type="submit" disabled={loading} className="w-full py-3 px-4 bg-gradient-to-r from-pd-orange to-pd-teal text-white font-semibold rounded-xl hover:opacity-90 transition-opacity disabled:opacity-50">
                {loading ? 'Processing...' : (isSignUp ? 'Create Account' : 'Login')}
              </button>
            </form>
            <div className="mt-6 text-center space-y-4">
              <button onClick={() => setIsSignUp(!isSignUp)} className="text-sm font-medium text-gray-600 dark:text-gray-400 hover:text-pd-orange transition-colors outline-none">
                {isSignUp ? 'Already have an account? Login' : "Don't have an account? Sign Up"}
              </button>
              
              {!supabaseClient && (
                <button onClick={() => {
                  localStorage.setItem('amp_local_session', 'true');
                  onLogin({ user: { id: 'local' } });
                }} type="button" className="w-full bg-black/5 dark:bg-white/10 hover:bg-black/10 dark:hover:bg-white/20 text-gray-900 dark:text-white rounded-xl py-3 text-sm font-semibold transition-all mt-4 border border-gray-200 dark:border-white/10 shadow-sm">
                  <iconify-icon icon="solar:cpu-linear" className="mr-2"></iconify-icon>
                  Enter Local Mode (No Database)
                </button>
              )}
            </div>
          </div>
        </div>
      );
    };

    const ThemeToggle = () => {
      const [isDark, setIsDark] = useState(() => document.documentElement.classList.contains('dark'));
      const toggle = () => {
        const next = !isDark;
        setIsDark(next);
        if (next) document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
      };
      return (
        <div className="flex items-center gap-2 z-50">
          <a href="index.html" className="w-10 h-10 rounded-xl flex items-center justify-center bg-gray-200/50 dark:bg-pd-glass border border-gray-300 dark:border-pd-glassBorder hover:scale-105 transition-all text-gray-600 dark:text-gray-400 hover:text-pd-teal shadow-sm">
            <iconify-icon icon="solar:home-2-linear" width="20"></iconify-icon>
          </a>
          <button onClick={toggle} className="w-10 h-10 rounded-xl flex items-center justify-center bg-gray-200/50 dark:bg-pd-glass border border-gray-300 dark:border-pd-glassBorder hover:scale-105 transition-all text-gray-600 dark:text-gray-400 hover:text-pd-teal shadow-sm">
            <iconify-icon icon={isDark ? "solar:sun-linear" : "solar:moon-linear"} width="20"></iconify-icon>
          </button>
        </div>
      );
    };

    const Background = ({ typingSpeed }) => {
      const duration = Math.max(1.5, 7 - typingSpeed * 0.5);
      const isDark = document.documentElement.classList.contains('dark');
      return (
        <div className="fixed inset-0 w-full h-full pointer-events-none opacity-50 z-0">
          <div className="absolute top-[10%] -left-[10%] w-[40vw] h-[40vw] bg-pd-orange rounded-full mix-blend-screen filter blur-[120px] opacity-20" style={{ animation: `blob ${duration}s infinite` }} />
          <div className="absolute top-[5%] -right-[5%] w-[35vw] h-[35vw] bg-pd-teal rounded-full mix-blend-screen filter blur-[100px] opacity-20" style={{ animation: `blob ${duration}s infinite`, animationDelay: '2s' }} />
          <div className="absolute -bottom-[20%] -left-[10%] w-[50vw] h-[50vw] bg-pd-teal rounded-full mix-blend-screen filter blur-[150px] opacity-20" style={{ animation: `blob ${duration}s infinite`, animationDelay: '4s' }} />
          <div className="absolute -bottom-[10%] right-[10%] w-[35vw] h-[35vw] bg-pd-orange rounded-full mix-blend-screen filter blur-[100px] opacity-20" style={{ animation: `blob ${duration}s infinite`, animationDelay: '2s' }} />
          <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-[60vw] h-[60vw] bg-gradient-to-r from-pd-orange/10 to-pd-teal/10 rounded-full filter blur-[120px] opacity-30 animate-pulse"></div>
          <div className="absolute inset-0 opacity-[0.03]" style={{ backgroundImage: 'radial-gradient(currentColor 1px, transparent 1px)', backgroundSize: '32px 32px' }}></div>
        </div>
      );
    };

    const Genesis = ({ onComplete, typingSpeed, setTypingSpeed }) => {
      const [input, setInput] = useState('');
      const [stage, setStage] = useState(0);
      const [ceoText, setCeoText] = useState('');
      const fullCeoText = "Initialization complete. I am your Custom CEO Agent. I have analyzed your kingdom parameters and am assembling your autonomous workforce...";

      const handleType = (e) => {
        setInput(e.target.value);
        setTypingSpeed(prev => Math.min(prev + 1, 10));
        clearTimeout(window.typingTimer);
        window.typingTimer = setTimeout(() => setTypingSpeed(0), 1000);
      };

      const handleSubmit = (e) => {
        if (e && e.preventDefault) e.preventDefault();
        if (!input.trim()) return;
        localStorage.setItem('amp_genesis_input', input.trim());
        setStage(1);
        setTypingSpeed(0);
      };

      useEffect(() => {
        if (stage === 1) {
          let i = 0;
          const interval = setInterval(() => {
            setCeoText(fullCeoText.substring(0, i));
            i++;
            if (i > fullCeoText.length) {
              clearInterval(interval);
              setTimeout(() => setStage(2), 500);
            }
          }, 30);
          return () => clearInterval(interval);
        }
      }, [stage]);

      return (
        <div className="w-full min-h-[100dvh] flex flex-col items-center justify-center p-6 relative z-10">
          <div className="absolute top-6 right-6"><ThemeToggle /></div>
          {stage === 0 && (
            <div className="w-full max-w-2xl mx-auto glass-reveal flex flex-col items-center">
              <div className="w-12 h-12 rounded-full border border-gray-200 dark:border-pd-glassBorder bg-white/40 dark:bg-pd-glass flex items-center justify-center mb-8 shadow-sm">
                <iconify-icon icon="solar:command-linear" width="24" className="text-gray-500 dark:text-gray-400"></iconify-icon>
              </div>
              <h1 className="text-3xl sm:text-4xl md:text-5xl font-medium tracking-tight mb-4 text-center drop-shadow-lg text-gray-900 dark:text-white">
                Describe your <span className="text-transparent bg-clip-text bg-gradient-to-r from-pd-orange to-pd-teal">digital kingdom...</span>
              </h1>
              <p className="text-sm text-gray-500 dark:text-gray-400 mb-8 md:mb-12 text-center">(Tell the Agent what kind of business you have)</p>
              <div className="w-full relative">
                <input
                  autoFocus type="text" value={input} onChange={handleType} onKeyDown={(e) => { if (e.key === 'Enter') handleSubmit(e); }}
                  className="w-full bg-white/40 dark:bg-pd-glass border border-gray-200 dark:border-pd-glassBorder rounded-2xl px-4 md:px-6 pr-14 md:pr-16 py-4 md:py-5 text-base md:text-lg text-gray-900 dark:text-white placeholder-gray-500 focus:outline-none focus:border-pd-teal/50 focus:ring-1 focus:ring-pd-teal/50 transition-all backdrop-blur-xl shadow-xl"
                  placeholder="e.g. A digital marketing agency focusing on Web3..."
                />
                <button type="button" onClick={handleSubmit} className="absolute right-2 md:right-3 top-1/2 -translate-y-1/2 w-10 md:w-12 h-10 md:h-12 rounded-xl bg-black/5 dark:bg-white/10 hover:bg-pd-orange/20 border border-black/10 dark:border-white/10 hover:border-pd-orange/50 flex items-center justify-center transition-all text-gray-900 dark:text-white hover:text-pd-orange">
                  <iconify-icon icon="solar:arrow-right-linear" width="20"></iconify-icon>
                </button>
              </div>
            </div>
          )}
          {stage >= 1 && (
            <div className="w-full max-w-4xl mx-auto flex flex-col items-center justify-start pt-10">
              <div className="glass-reveal mb-12 w-full max-w-2xl bg-white/40 dark:bg-pd-glass border border-gray-200 dark:border-pd-glassBorder rounded-2xl p-6 backdrop-blur-xl flex gap-4 items-start shadow-lg">
                <div className="w-10 h-10 rounded-full bg-white/40 dark:bg-pd-glass border border-gray-200 dark:border-pd-glassBorder flex items-center justify-center flex-shrink-0">
                  <iconify-icon icon="solar:user-bold" width="20" className="text-pd-teal"></iconify-icon>
                </div>
                <div>
                  <div className="text-xs font-mono text-pd-teal mb-1 uppercase tracking-widest">CEO Agent</div>
                  <div className="text-gray-800 dark:text-gray-200 leading-relaxed min-h-[3rem]"><FormatText text={ceoText} /></div>
                </div>
              </div>
              {stage === 2 && (
                <div className="flex flex-col items-center w-full relative">
                  <div className="amp-card p-4 flex items-center gap-4 w-64 justify-center glass-reveal z-10">
                    <div className="w-8 h-8 rounded-full bg-white/40 dark:bg-pd-glass border border-gray-200 dark:border-pd-glassBorder flex items-center justify-center">
                      <iconify-icon icon="solar:crown-minimalistic-linear" width="16" className="text-pd-orange"></iconify-icon>
                    </div>
                    <div>
                      <div className="text-sm font-semibold text-gray-900 dark:text-white">CEO</div>
                      <div className="text-[10px] text-gray-500 dark:text-gray-400 flex items-center gap-1">
                        <span className="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></span> Active
                      </div>
                    </div>
                  </div>
                  <div className="tree-line-v h-8 glass-reveal stagger-1 hidden md:block"></div>
                  <div className="tree-line-h w-full max-w-2xl relative glass-reveal stagger-1 hidden md:block">
                    <div className="absolute top-0 left-0 w-[1px] h-6 tree-line-v"></div>
                    <div className="absolute top-0 right-0 w-[1px] h-6 tree-line-v"></div>
                    <div className="absolute top-0 left-1/2 w-[1px] h-6 tree-line-v"></div>
                  </div>
                  <div className="h-6 hidden md:block"></div>
                  <div className="flex flex-col md:flex-row w-full max-w-3xl justify-between gap-4 relative z-10 px-4 mt-6 md:mt-0">
                    <div className="amp-card p-4 flex flex-col items-center gap-2 w-full md:w-48 text-center glass-reveal stagger-2 border-pd-teal/30">
                      <div className="w-8 h-8 rounded-full bg-white/40 dark:bg-pd-glass border border-gray-200 dark:border-pd-glassBorder flex items-center justify-center text-pd-teal">
                        <iconify-icon icon="solar:global-linear" width="16"></iconify-icon>
                      </div>
                      <div>
                        <div className="text-sm font-semibold text-gray-900 dark:text-white">CMO Agent</div>
                        <div className="text-[10px] text-gray-500 dark:text-gray-400 mt-1">Lead Gen & Marketing</div>
                      </div>
                    </div>
                    <div className="amp-card p-4 flex flex-col items-center gap-2 w-full md:w-48 text-center glass-reveal stagger-3">
                      <div className="w-8 h-8 rounded-full bg-white/40 dark:bg-pd-glass border border-gray-200 dark:border-pd-glassBorder flex items-center justify-center text-gray-500">
                        <iconify-icon icon="solar:settings-linear" width="16"></iconify-icon>
                      </div>
                      <div>
                        <div className="text-sm font-semibold text-gray-900 dark:text-white">CTO Agent</div>
                        <div className="text-[10px] text-gray-500 dark:text-gray-400 mt-1">Systems & Code</div>
                      </div>
                    </div>
                    <div className="amp-card p-4 flex flex-col items-center gap-2 w-full md:w-48 text-center glass-reveal stagger-4 border-pd-orange/30">
                      <div className="w-8 h-8 rounded-full bg-white/40 dark:bg-pd-glass border border-gray-200 dark:border-pd-glassBorder flex items-center justify-center text-pd-orange">
                        <iconify-icon icon="solar:palette-linear" width="16"></iconify-icon>
                      </div>
                      <div>
                        <div className="text-sm font-semibold text-gray-900 dark:text-white">Creative Agent</div>
                        <div className="text-[10px] text-gray-500 dark:text-gray-400 mt-1">Content & Assets</div>
                      </div>
                    </div>
                  </div>
                  <div className="mt-16 glass-reveal stagger-4 flex justify-center w-full">
                    <button onClick={onComplete} className="amp-button primary px-8 py-3 text-sm font-medium tracking-wide shadow-[0_0_30px_rgba(255,95,0,0.2)]">
                      Enter Command Center <iconify-icon icon="solar:arrow-right-linear"></iconify-icon>
                    </button>
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
      );
    };

    const SettingsMenu = ({ session, onSaveComplete, activeTasks, userProfile, setUserProfile, onConnectPlatform }) => {
      const [loading, setLoading] = useState(false);
      const [showResetModal, setShowResetModal] = useState(false);

      const handleCsvImport = async (e, table, mapper) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async (ev) => {
          const text = ev.target.result;
          const lines = text.split('\n').filter(l => l.trim().length > 0);
          if (lines.length < 2) return;
          const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
          const records = lines.slice(1).map(line => {
            const values = line.split(',');
            const obj = {};
            headers.forEach((h, i) => { obj[h] = values[i]?.trim(); });
            return obj;
          });
          
          if (supabaseClient && session?.user?.id) {
             const toInsert = records.map(r => mapper(r, session.user.id));
             try {
               await supabaseClient.from(table).insert(toInsert);
               alert(`Successfully imported ${toInsert.length} records into ${table}!`);
             } catch (err) {
               console.error("Import failed:", err);
               alert("Failed to import. Ensure your CSV matches the required columns.");
             }
          } else {
             alert(`Database not connected. Simulated import of ${records.length} records.`);
          }
        };
        reader.readAsText(file);
        e.target.value = null; // reset input
      };

          const greetingText = genesisInput 
            ? `Systems online. I have analyzed your digital kingdom parameters for: "${genesisInput}".\n\nI am your custom CEO Agent. I orchestrate a team of specialized AI agents (CMO, CTO, Creative) to handle your daily operations autonomously.\n\n**Here is how to get the most out of our platform:**\n- **Chat with me** directly here in Neural Chat to assign tasks, ask questions, or request content.\n- Try prompting me: *"Analyze my target audience"*, *"Create a marketing strategy"*, or *"Log a new client lead"*.\n- I will automatically route your requests to the correct agent and update your pipelines on the left.\n\nTo begin assembling your workforce, please click the **Settings** button on the bottom left and complete your Business Profile. Once configured, your team will be ready to execute.`
            : `Systems online. I am your custom CEO Agent. I orchestrate a team of specialized AI agents (CMO, CTO, Creative) to handle your daily operations autonomously.\n\n**Here is how to get the most out of our platform:**\n- **Chat with me** directly here in Neural Chat to assign tasks, ask questions, or request content.\n- Try prompting me: *"Analyze my target audience"*, *"Create a marketing strategy"*, or *"Log a new client lead"*.\n- I will automatically route your requests to the correct agent and update your pipelines on the left.\n\nTo begin assembling your workforce, please click the **Settings** button on the bottom left and complete your Business Profile. Once configured, your team will be ready to execute.`;
          setMessages([
            { sender: 'ceo', text: greetingText, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) }
          ]);
        }
      }, [needsProfileSetup]);

      const sendMessage = (msgText, msgAttachment) => {
        if (!msgText && !msgAttachment) return;
        
        if (needsProfileSetup) {
          setMessages(prev => [...prev, 
            { sender: 'user', text: msgText, attachment: msgAttachment ? msgAttachment.preview : null, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) },
            { sender: 'ceo', text: "I cannot execute tasks until your Business Profile is configured. Please complete your settings first.", time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) }
          ]);
          return;
        }
        
        setMessages(prev => [...prev, { 
          sender: 'user', 
          text: msgText, 
          attachment: msgAttachment ? msgAttachment.preview : null,
          time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) 
        }]);
        
        setIsTyping(true);
        if (setTempTasks) {
          const tks = [];
          const txt = msgText.toLowerCase();
          if (txt.includes('lead') || txt.includes('prospect') || txt.includes('campaign') || txt.includes('market')) tks.push({ id: 'temp-cmo', agent: 'CMO', title: 'Executing Marketing Objective...', status: 'running' });
          if (txt.includes('image') || txt.includes('content') || txt.includes('design') || txt.includes('logo')) tks.push({ id: 'temp-creative', agent: 'Creative', title: 'Generating Content...', status: 'running' });
          if (txt.includes('inventory') || txt.includes('sync') || txt.includes('product') || txt.includes('data')) tks.push({ id: 'temp-cto', agent: 'CTO', title: 'Processing Data Operations...', status: 'running' });
          if (txt.includes('plan') || txt.includes('strategy') || tks.length === 0) tks.push({ id: 'temp-ceo', agent: 'CEO', title: 'Formulating Neural Architecture...', status: 'running' });
          setTempTasks(tks);
        }

        fetch('/.netlify/functions/agent', {
          method: 'POST',
          body: JSON.stringify({ 
            message: msgText, 
            userId: session?.user?.id,
            userProfile: userProfile,
            attachment: msgAttachment ? { data: msgAttachment.data, mimeType: msgAttachment.mimeType } : null,
            history: messages.map(m => ({ sender: m.sender, text: m.text }))
          })
        })
          .then(res => res.json().then(data => ({ status: res.status, data })))
          .then(({ status, data }) => {
            if (depleteBudget) depleteBudget('CEO', 0.5);
            
            if (setTempTasks) {
              setTempTasks(prev => prev.map(t => ({ ...t, status: 'done' })));
              setTimeout(() => {
                setTempTasks([]);
              }, 2000);
            }

            // Execute frontend actions to populate localStorage when Supabase is missing/failing
            if (data.actions && Array.isArray(data.actions)) {
              data.actions.forEach(action => {
                let agentForLog = 'CEO';
                let taskNameLog = 'System Task';
                let detailsLog = JSON.stringify(action.payload);
                
                if (action.type === 'add_multiple_leads') {
                  agentForLog = 'CMO'; taskNameLog = 'Generated Leads';
                  detailsLog = `Sourced ${action.payload.leads?.length || 0} leads including ${action.payload.leads?.[0]?.name || 'new contacts'}.`;
                } else if (action.type === 'add_lead') {
                  agentForLog = 'CMO'; taskNameLog = 'Added Lead';
                  detailsLog = `Added lead: ${action.payload.name}`;
                } else if (action.type === 'store_plan') {
                  agentForLog = 'CEO'; taskNameLog = 'Created Plan';
                  detailsLog = `Stored plan: ${action.payload.title}\n\n${action.payload.content}`;
                } else if (action.type === 'create_task') {
                  agentForLog = action.payload.assigned_agent || 'CEO'; taskNameLog = 'Delegated Task';
                  detailsLog = `Created task: ${action.payload.title}`;
                } else if (action.type === 'add_inventory_item') {
                  agentForLog = 'CTO'; taskNameLog = 'Synced Inventory';
                  detailsLog = `Added product: ${action.payload.product_name}`;
                } else if (action.type === 'update_lead') {
                  agentForLog = 'CEO'; taskNameLog = 'Updated Lead';
                  detailsLog = `Updated ${action.payload.name} to stage ${action.payload.stage}`;
                } else if (action.type === 'update_business_profile') {
                  agentForLog = 'CEO'; taskNameLog = 'Updated Profile';
                  detailsLog = `Updated business profile: ${action.payload.company_name || 'Details updated'}`;
                }

                // Create calendar event for historical record
                const localCal = JSON.parse(localStorage.getItem('amp_calendar_events') || '[]');
                const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
                const dayOfWeek = days[new Date().getDay()];
                localCal.push({ 
                  id: Date.now().toString() + Math.random(), 
                  day_of_week: dayOfWeek, 
                  agent_role: agentForLog, 
                  task_name: taskNameLog,
                  details: detailsLog,
                  is_historical: true,
                  created_at: new Date().toISOString() 
                });
                localStorage.setItem('amp_calendar_events', JSON.stringify(localCal));
                window.dispatchEvent(new Event('amp-calendar-updated'));

                try {
                  if (action.type === 'add_inventory_item') {
                    const local = JSON.parse(localStorage.getItem('amp_inventory') || '[]');
                    local.push({ id: Date.now() + Math.random(), ...action.payload, created_at: new Date().toISOString() });
                    localStorage.setItem('amp_inventory', JSON.stringify(local));
                  } else if (action.type === 'store_plan') {
                    const local = JSON.parse(localStorage.getItem('amp_plans') || '[]');
                    local.push({ id: Date.now().toString(), ...action.payload, created_at: new Date().toISOString() });
                    localStorage.setItem('amp_plans', JSON.stringify(local));
                  } else if (action.type === 'create_task') {
                    const local = JSON.parse(localStorage.getItem('amp_tasks') || '[]');
                    local.unshift({ id: Date.now().toString(), title: action.payload.title, status: action.payload.column_id || 'todo', agent: action.payload.assigned_agent || 'CEO', scheduled_time: action.payload.scheduled_time || null, created_at: new Date().toISOString() });
                    localStorage.setItem('amp_tasks', JSON.stringify(local));
                    window.dispatchEvent(new Event('amp-tasks-updated'));
                  } else if (action.type === 'add_calendar_event') {
                    const local = JSON.parse(localStorage.getItem('amp_calendar_events') || '[]');
                    local.push({ id: Date.now().toString(), ...action.payload, created_at: new Date().toISOString() });
                    localStorage.setItem('amp_calendar_events', JSON.stringify(local));
                    window.dispatchEvent(new Event('amp-calendar-updated'));
                  } else if (action.type === 'update_business_profile') {
                    const localData = localStorage.getItem('amp_business_profile');
                    let parsed = { company_name: '', bio: '', stage: 'Solo' };
                    if (localData) {
                      try { parsed = JSON.parse(localData); } catch (e) {}
                    }
                    localStorage.setItem('amp_business_profile', JSON.stringify({ ...parsed, ...action.payload }));
                    window.dispatchEvent(new Event('amp-profile-updated'));
                  } else if (action.type === 'add_lead') {
                    const local = JSON.parse(localStorage.getItem('amp_leads') || '[]');
                    local.unshift({ id: Date.now().toString(), ...action.payload, created_at: new Date().toISOString() });
                    localStorage.setItem('amp_leads', JSON.stringify(local));
                    window.dispatchEvent(new Event('amp-simulated-lead'));
                  } else if (action.type === 'add_multiple_leads') {
                    const local = JSON.parse(localStorage.getItem('amp_leads') || '[]');
                    const newLeads = action.payload.leads.map((l, i) => ({ id: Date.now().toString() + i, ...l, created_at: new Date().toISOString() }));
                    localStorage.setItem('amp_leads', JSON.stringify([...newLeads, ...local]));
                    window.dispatchEvent(new Event('amp-simulated-lead'));
                  } else if (action.type === 'update_lead') {
                    const local = JSON.parse(localStorage.getItem('amp_leads') || '[]');
                    const index = local.findIndex(l => l.name.toLowerCase() === action.payload.name.toLowerCase());
                    if (index >= 0) {
                      local[index] = { ...local[index], ...action.payload, updated_at: new Date().toISOString() };
                      localStorage.setItem('amp_leads', JSON.stringify(local));
                      window.dispatchEvent(new Event('amp-simulated-lead'));
                    }
                  }
                } catch (e) { console.error("Parse error", e); }
              });
            }

            if (status >= 400 || data.error) {
              setMessages(prev => [...prev, { sender: 'ceo', text: `[SYSTEM ERROR] ${data.error || 'Unknown error'}`, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) }]);
            } else {
              setMessages(prev => [...prev, { sender: 'ceo', text: data.content || "I have completed the task.", time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) }]);
            }
            setIsTyping(false);
            if (setIsProcessing) setIsProcessing(false);
          })
          .catch(err => {
            console.error(err);
            const userTextLower = msgText.toLowerCase();
            let responseText = "[ERROR] Backend disconnected or API Key missing. Simulation mode active.";
            
            if (userTextLower.includes('lead') && (userTextLower.includes('add') || userTextLower.includes('find') || userTextLower.includes('generate') || userTextLower.includes('insert'))) {
              responseText = "[ERROR] I cannot generate leads because my backend connection to Gemini is currently offline. Please ensure you are running this platform on a live server with API keys configured.";
            }

            setMessages(prev => [...prev, { sender: 'ceo', text: responseText, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) }]);
            setIsTyping(false);
            if (setIsProcessing) setIsProcessing(false);
          });
      };

      const handleSend = (e) => {
        if (e && e.preventDefault) e.preventDefault();
        if (!input.trim() && !attachment) return;
        const textToSend = input.trim();
        const attachmentToSend = attachment;
        setInput('');
        setAttachment(null);
        sendMessage(textToSend, attachmentToSend);
      };

      useEffect(() => {
        if (triggerPrompt) {
          sendMessage(triggerPrompt.text, null);
          setTriggerPrompt(null);
        }
      }, [triggerPrompt]);

      useEffect(() => { endRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages, isTyping]);

      const handleFileChange = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (ev) => {
            setAttachment({ 
              data: ev.target.result.split(',')[1], 
              mimeType: file.type, 
              preview: ev.target.result 
            });
          };
          reader.readAsDataURL(file);
        }
      };

      return (
        <div className="flex flex-col h-full w-full relative">
          <div className="p-4 md:p-6 border-b border-gray-200 dark:border-pd-glassBorder flex items-center justify-between gap-4 bg-white/50 dark:bg-white/5 relative z-20">
            <div className="flex items-center gap-4">
              <div className="w-10 h-10 rounded-xl bg-white/40 dark:bg-pd-glass border border-gray-200 dark:border-pd-glassBorder flex items-center justify-center text-pd-orange shadow-sm">
                <iconify-icon icon="solar:crown-minimalistic-bold" width="20"></iconify-icon>
              </div>
              <div>
                <h2 className="font-semibold text-gray-900 dark:text-white tracking-tight">CEO Agent</h2>
                <p className="text-xs text-gray-500 hidden sm:block">Orchestrating 3 sub-agents.</p>
              </div>
            </div>
            
            <div className="flex items-center gap-2">
              <button onClick={() => setShowHistory(!showHistory)} className={`p-2 transition-all ${showHistory ? 'text-pd-teal' : 'text-gray-500 hover:text-pd-teal'}`}>
                <iconify-icon icon="solar:history-linear" width="20"></iconify-icon>
              </button>
              <button onClick={handleNewChat} className="px-3 py-1.5 text-xs font-semibold bg-pd-teal/10 hover:bg-pd-teal/20 text-pd-teal border border-pd-teal/30 rounded-lg flex items-center gap-1 transition-all">
                <iconify-icon icon="solar:pen-new-square-linear"></iconify-icon> <span className="hidden sm:inline">New Chat</span>
              </button>
            </div>
            
            {showHistory && (
              <div className="absolute top-full right-4 mt-2 w-64 bg-white dark:bg-[#0b0f19] border border-gray-200 dark:border-white/10 rounded-xl shadow-2xl p-2 z-50 max-h-64 overflow-y-auto">
                <h3 className="text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-2 px-2 pt-1">Previous Chats</h3>
                {threads.length === 0 ? (
                  <p className="text-xs text-gray-500 px-2 pb-2">No history yet.</p>
                ) : (
                  threads.map(t => (
                    <button key={t.id} onClick={() => loadThread(t)} className="w-full text-left px-3 py-2 text-xs text-gray-700 dark:text-gray-300 hover:bg-black/5 dark:hover:bg-white/5 rounded-lg truncate transition-colors">
                      <span className="block font-semibold mb-0.5 truncate">{t.title}...</span>
                      <span className="text-[9px] text-gray-500">{t.date}</span>
                    </button>
                  ))
                )}
              </div>
            )}
          </div>
          <div className="flex-1 p-4 md:p-6 overflow-y-auto flex flex-col gap-4 md:gap-6 relative z-0">
            {messages.map((m, i) => (
              m.sender === 'user' ? (
                <div key={i} className="self-end max-w-lg bg-pd-teal/20 border border-pd-teal/40 rounded-2xl rounded-tr-sm p-4 text-sm text-gray-900 dark:text-gray-100 shadow-sm break-all">
                  {m.attachment && (
                    <img src={m.attachment} alt="Attachment preview" className="max-w-full rounded-lg mb-2 border border-pd-teal/30" />
                  )}
                  {m.text && <div><FormatText text={m.text} /></div>}
                  <div className="text-[9px] text-gray-500 dark:text-gray-400 text-right mt-2">{m.time}</div>
                </div>
              ) : (
                <div key={i} className="self-start max-w-lg bg-white/60 dark:bg-pd-glass border border-gray-200 dark:border-pd-glassBorder backdrop-blur-xl rounded-2xl rounded-tl-sm p-5 text-sm text-gray-800 dark:text-gray-200 shadow-sm relative break-all">
                  <div className="absolute -left-3 -top-3 w-6 h-6 rounded-full bg-white dark:bg-[#0b0f19] border border-gray-200 dark:border-pd-glassBorder flex items-center justify-center text-pd-orange">
                    <iconify-icon icon="solar:crown-minimalistic-bold" width="12"></iconify-icon>
                  </div>
                  <div><FormatText text={m.text} /></div>
                  <div className="text-[9px] text-gray-500 dark:text-gray-400 mt-2">{m.time}</div>
                </div>
              )
            ))}
            {isTyping && (
              <div className="self-start max-w-lg bg-white/60 dark:bg-pd-glass border border-gray-200 dark:border-pd-glassBorder rounded-2xl rounded-tl-sm p-4 flex gap-2 items-center">
                <span className="w-2 h-2 rounded-full bg-pd-orange animate-bounce"></span>
                <span className="w-2 h-2 rounded-full bg-pd-orange animate-bounce" style={{ animationDelay: '0.1s' }}></span>
                <span className="w-2 h-2 rounded-full bg-pd-orange animate-bounce" style={{ animationDelay: '0.2s' }}></span>
              </div>
            )}
            <div ref={endRef} />
          </div>
          <div className="p-4 bg-white/50 dark:bg-white/5 border-t border-gray-200 dark:border-pd-glassBorder flex flex-col gap-2">
            {attachment && (
              <div className="flex items-center gap-2 bg-white dark:bg-black/40 w-max px-3 py-1.5 rounded-lg border border-gray-200 dark:border-white/10">
                <img src={attachment.preview} className="w-8 h-8 object-cover rounded" alt="Preview" />
                <span className="text-xs text-gray-500">Image attached</span>
                <button onClick={() => setAttachment(null)} className="ml-2 text-gray-400 hover:text-red-500"><iconify-icon icon="solar:close-circle-bold" width="16"></iconify-icon></button>
              </div>
            )}
            <div className="relative flex items-center gap-2">
              <input type="file" ref={fileInputRef} onChange={handleFileChange} accept="image/*" className="hidden" />
              <button onClick={() => fileInputRef.current?.click()} className="w-10 h-10 rounded-full bg-white dark:bg-black/40 border border-gray-200 dark:border-pd-glassBorder hover:bg-gray-50 dark:hover:bg-white/10 text-gray-500 flex items-center justify-center transition-all flex-shrink-0">
                <iconify-icon icon="solar:paperclip-linear" width="20"></iconify-icon>
              </button>
              <div className="relative flex-1">
                <input type="text" value={input} onChange={e => setInput(e.target.value)} onKeyDown={(e) => { if (e.key === 'Enter') handleSend(e) }} onFocus={(e) => setTimeout(() => e.target.scrollIntoView({ behavior: 'smooth', block: 'center' }), 300)} placeholder="Instruct the CEO or attach a reference..." className="w-full bg-white dark:bg-pd-glass border border-gray-200 dark:border-pd-glassBorder rounded-full pl-6 pr-14 py-4 text-sm text-gray-900 dark:text-white focus:outline-none focus:border-pd-orange/50 shadow-inner" />
                <button onClick={handleSend} className="absolute right-2 top-2 w-10 h-10 rounded-full bg-pd-orange/20 border border-pd-orange/50 hover:bg-pd-orange hover:text-white text-pd-orange flex items-center justify-center transition-all"><iconify-icon icon="solar:plain-bold" width="18"></iconify-icon></button>
              </div>
            </div>
          </div>
        </div>
      );
    };

    const LeadPipeline = ({ session, activeTasks, userProfile, onAddLead, onImportCsv }) => {
      const isEcomm = userProfile?.stage === 'Ecomm';
      const stages = isEcomm ? ['Favorites', 'Inquiries', 'Abandoned Cart'] : ['Inbound', 'Qualifying', 'Negotiation'];
      
      const [leads, setLeads] = useState([]);
      const [showModal, setShowModal] = useState(false);
      const [formData, setFormData] = useState({ id: null, name: '', contact: '', value: '$0', stage: stages[0] });

      const fetchLeads = async () => {
        let localLeads = [];
        try {
          localLeads = JSON.parse(localStorage.getItem('amp_leads') || '[]');
        } catch(e) {}

        if (supabaseClient) {
          const { data } = await supabaseClient.from('leads').select('*').order('created_at', { ascending: false });
          if (data && data.length > 0) {
            setLeads(data);
            return;
          }
        }
        setLeads(localLeads);
      };

      const updateLeadStage = async (id, newStage) => {
        const localLeads = JSON.parse(localStorage.getItem('amp_leads') || '[]');
        const updated = localLeads.map(l => l.id === id ? { ...l, stage: newStage } : l);
        localStorage.setItem('amp_leads', JSON.stringify(updated));
        setLeads(updated);

        if (!supabaseClient) return;
        await supabaseClient.from('leads').update({ stage: newStage }).eq('id', id);
      };

      const deleteLead = async (id) => {
        if (!confirm('Are you sure you want to delete this lead?')) return;
        const localLeads = JSON.parse(localStorage.getItem('amp_leads') || '[]');
        const updated = localLeads.filter(l => l.id !== id);
        localStorage.setItem('amp_leads', JSON.stringify(updated));
        setLeads(updated);

        if (!supabaseClient) return;
        await supabaseClient.from('leads').delete().eq('id', id);
      };

      const handleSave = async () => {
        const payload = { ...formData, user_id: session?.user?.id || 'local' };
        let localLeads = JSON.parse(localStorage.getItem('amp_leads') || '[]');
        
        if (formData.id) {
          localLeads = localLeads.map(l => l.id === formData.id ? payload : l);
        } else {
          payload.id = Date.now().toString();
          payload.created_at = new Date().toISOString();
          localLeads.unshift(payload);
        }
        
        localStorage.setItem('amp_leads', JSON.stringify(localLeads));
        setLeads(localLeads);
        setShowModal(false);

        if (!supabaseClient || !session?.user?.id) return;
        if (formData.id) {
          await supabaseClient.from('leads').update(payload).eq('id', formData.id);
        } else {
          delete payload.id;
          await supabaseClient.from('leads').insert([payload]);
        }
      };

      useEffect(() => {
        fetchLeads();
        const handleSync = () => fetchLeads();
        window.addEventListener('amp-simulated-lead', handleSync);
        
        if (supabaseClient) {
          const channel = supabaseClient.channel('realtime:leads')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'leads' }, fetchLeads)
            .subscribe();
          return () => { 
            supabaseClient.removeChannel(channel); 
            window.removeEventListener('amp-simulated-lead', handleSync);
          };
        }
        return () => window.removeEventListener('amp-simulated-lead', handleSync);
      }, []);

      return (
        <div className="p-4 md:p-8 h-full flex flex-col relative">
          <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 md:mb-8 gap-4">
            <div><h2 className="text-xl md:text-2xl font-semibold tracking-tight text-gray-900 dark:text-white mb-1">{isEcomm ? 'Sales Pipeline' : 'Lead Pipeline'}</h2><p className="text-xs text-gray-500">{isEcomm ? 'Track customer interest and abandoned carts.' : 'Manage prospects and activate AI sequences.'}</p></div>
            <div className="flex gap-2 w-full md:w-auto">
              <label className="amp-button secondary px-4 py-2 text-xs font-medium w-full md:w-auto cursor-pointer flex items-center justify-center">
                <iconify-icon icon="solar:import-linear" className="mr-2"></iconify-icon> Import CSV
                <input type="file" accept=".csv" className="hidden" onChange={onImportCsv} />
              </label>
              <button onClick={() => { setFormData({ id: null, name: '', contact: '', value: '$0', stage: stages[0] }); setShowModal(true); }} className="amp-button secondary px-4 py-2 text-xs font-medium w-full md:w-auto flex items-center justify-center">
                <iconify-icon icon="solar:pen-linear" className="mr-2"></iconify-icon> Manual Entry
              </button>
              <button onClick={onAddLead} className="amp-button primary px-4 py-2 text-xs font-medium w-full md:w-auto flex items-center justify-center">
                <iconify-icon icon="solar:add-circle-linear" className="mr-2"></iconify-icon> Ask CEO to Add
              </button>
            </div>
          </div>
          <div className="flex gap-4 md:gap-6 overflow-x-auto pb-4 flex-1 snap-x snap-mandatory">
            {stages.map(col => (
              <div key={col} className="w-[85vw] sm:w-80 flex-shrink-0 flex flex-col gap-4 snap-center">
                <h3 className="text-xs font-mono uppercase tracking-widest text-pd-teal border-b border-gray-200 dark:border-pd-glassBorder pb-2">{col}</h3>
                {leads.filter(l => l.stage === col).map(lead => (
                  <div key={lead.id} className="amp-card p-5 relative overflow-hidden group">
                    <div className="flex justify-between items-start mb-3">
                      <div>
                        <h4 className="font-semibold text-gray-900 dark:text-gray-200 flex items-center gap-2">
                          {lead.name}
                          <button onClick={() => { setFormData(lead); setShowModal(true); }} className="opacity-0 group-hover:opacity-100 text-gray-400 hover:text-pd-teal transition-all" title="Edit">
                            <iconify-icon icon="solar:pen-linear"></iconify-icon>
                          </button>
                          <button onClick={() => deleteLead(lead.id)} className="opacity-0 group-hover:opacity-100 text-gray-400 hover:text-red-500 transition-all" title="Delete">
                            <iconify-icon icon="solar:trash-bin-trash-linear"></iconify-icon>
                          </button>
                        </h4>
                        <span className="text-[10px] text-gray-500">{lead.contact}</span>
                      </div>
                      <div className="flex flex-col items-end gap-1">
                        <select

            const val = parseFloat(valStr.replace(/[^0-9.]/g, '')) || 0;
            total += val;
          });
          setAutoIncome(total);
        }
      };

      const fetchFinances = async () => {
        if (supabaseClient && session?.user?.id) {
          try {
            const { data, error } = await supabaseClient.from('finances').select('*').order('created_at', { ascending: false });
            if (!error && data) {
              setTransactions(data);
              return;
            }
          } catch (e) {
             console.warn("Finances table likely missing.");
          }
        }
        try {
          const local = localStorage.getItem('amp_finances');
          if (local) {
            const parsed = JSON.parse(local);
            if (Array.isArray(parsed)) setTransactions(parsed);
          }

      };

      useEffect(() => {
        fetchClients();
        fetchFinances();
        
        const handleSync = () => {
          fetchClients();
          fetchFinances();
        };
        window.addEventListener('amp-simulated-sale', handleSync);
        
        return () => window.removeEventListener('amp-simulated-sale', handleSync);
      }, [userProfile]);

      const manualIncome = transactions.filter(t => t.type === 'Income').reduce((acc, t) => acc + t.amount, 0);
      const manualExpenses = transactions.filter(t => t.type === 'Expense').reduce((acc, t) => acc + t.amount, 0);
      
      const totalIncome = autoIncome + manualIncome;
      const netProfit = totalIncome - manualExpenses;

        const today = new Date();
        const lastDayOfMonth = new Date(today.getFullYear(), today.getMonth() + 1, 0).getDate();
        
        if (today.getDate() === lastDayOfMonth) {
          const reportKey = `amp_report_${today.getFullYear()}_${today.getMonth()}`;
          const saved = localStorage.getItem(reportKey);
          if (saved) {
            setMonthlyReport(JSON.parse(saved));
          } else if (totalIncome > 0 || manualExpenses > 0) {
            const report = {
              date: today.toLocaleDateString(),
              revenue: totalIncome,
              expenses: manualExpenses,
              profit: netProfit,
              month: today.toLocaleString('default', { month: 'long' })
            };
            localStorage.setItem(reportKey, JSON.stringify(report));
            setMonthlyReport(report);
          }
        }
      }, [totalIncome, manualExpenses, netProfit]);

        };

        setActiveModule('neural-chat');
        setTimeout(() => {
          setTriggerPrompt({ sender: 'user', text: `Please execute the stored plan: "${plan.title}". Initiate a sequence of task creations and assignments for the agents according to the plan.`, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) });
        }, 300);
      };

      const handleAskCEO = () => {
        setActiveModule('neural-chat');
        setTimeout(() => {
          setTriggerPrompt({ sender: 'ceo', text: "What kind of strategic plan would you like me to construct for you?" });
        }, 150);
      };

      const handleSaveManual = () => {
        if (!newPlan.title || !newPlan.content) return;
        const local = JSON.parse(localStorage.getItem('amp_plans') || '[]');
        local.push({ id: Date.now().toString(), agent: 'CEO', ...newPlan, created_at: new Date().toISOString() });
        localStorage.setItem('amp_plans', JSON.stringify(local));
        setIsAdding(false);
        setNewPlan({ title: '', content: '' });
        fetchPlans();
      };

      return (
        <div className="p-4 md:p-8 h-full flex flex-col overflow-hidden">
          <div className="mb-6 md:mb-8 flex-shrink-0 flex justify-between items-start">
            <div>
              <h2 className="text-xl md:text-2xl font-semibold tracking-tight text-gray-900 dark:text-white mb-1">Strategic Planning</h2>
              <p className="text-xs text-gray-500">Stored architectural and marketing plans generated by the CEO.</p>
            </div>
            <div className="flex gap-2 w-full md:w-auto">
              <button onClick={() => setIsAdding(!isAdding)} className="amp-button secondary px-4 py-2 text-xs font-medium w-full md:w-auto flex items-center justify-center">
                <iconify-icon icon={isAdding ? "solar:close-circle-linear" : "solar:pen-linear"} className="mr-2"></iconify-icon> {isAdding ? 'Cancel' : 'Manual Entry'}
              </button>
              <button onClick={handleAskCEO} className="amp-button primary px-4 py-2 text-xs font-medium w-full md:w-auto flex items-center justify-center">
                <iconify-icon icon="solar:magic-stick-3-linear" className="mr-2"></iconify-icon> Ask CEO to Create
              </button>
            </div>
          </div>
          
          <div className="flex-1 overflow-y-auto pr-2 pb-20">
            {isAdding && (
              <div className="mb-6 bg-white/40 dark:bg-pd-glass backdrop-blur-xl border border-pd-teal/30 rounded-2xl p-6 shadow-xl">
                <h3 className="text-sm font-semibold mb-4 text-gray-900 dark:text-white">Add Manual Plan</h3>
                <input type="text" placeholder="Plan Title" value={newPlan.title} onChange={e => setNewPlan({...newPlan, title: e.target.value})} className="w-full bg-white/60 dark:bg-black/40 border border-gray-200 dark:border-white/10 rounded-xl px-4 py-2 mb-3 text-sm text-gray-900 dark:text-white focus:outline-none focus:border-pd-teal" />
                <textarea placeholder="Plan Details..." value={newPlan.content} onChange={e => setNewPlan({...newPlan, content: e.target.value})} rows="4" className="w-full bg-white/60 dark:bg-black/40 border border-gray-200 dark:border-white/10 rounded-xl px-4 py-3 mb-4 text-sm text-gray-900 dark:text-white focus:outline-none focus:border-pd-teal resize-none"></textarea>
                <button onClick={handleSaveManual} className="px-6 py-2 bg-pd-teal text-pd-dark rounded-xl text-xs font-bold shadow-md hover:shadow-lg transition-all">Save Plan</button>
              </div>
            )}
            
            {plans.length === 0 ? (
               <div className="w-full h-32 bg-black/5 dark:bg-white/5 rounded-2xl flex flex-col items-center justify-center border border-dashed border-gray-300 dark:border-white/10">
                 <iconify-icon icon="solar:document-text-linear" width="32" className="text-gray-400 mb-2"></iconify-icon>
                 <p className="text-xs text-gray-500">No stored plans. Ask the CEO Agent to create a plan for you.</p>
               </div>
            ) : (
              <div className="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-6 items-start">
                {plans.map((plan) => (
                 <div key={plan.id} className="bg-white/40 dark:bg-pd-glass backdrop-blur-xl border border-gray-200 dark:border-pd-glassBorder rounded-2xl p-6 shadow-sm flex flex-col h-[300px]">
                   <div className="flex justify-between items-start mb-4">
                     <div className="pr-4 overflow-hidden">
                       <h3 className="text-base font-bold text-gray-900 dark:text-white truncate">{plan.title}</h3>
                       <span className="inline-block mt-1 px-2 py-0.5 bg-pd-teal/10 text-pd-teal text-[10px] uppercase font-bold tracking-widest border border-pd-teal/30 rounded-full">{plan.agent || 'CEO'}</span>
                     </div>
                     <button onClick={() => executePlan(plan)} className="w-8 h-8 bg-pd-teal text-pd-dark rounded-full shadow-[0_0_15px_rgba(0,242,234,0.3)] hover:scale-110 transition-all flex items-center justify-center flex-shrink-0" title="Execute Plan">
                       <iconify-icon icon="solar:play-circle-bold" width="18"></iconify-icon>
                     </button>
                   </div>
                   <div className="text-xs text-gray-700 dark:text-gray-300 whitespace-pre-wrap leading-relaxed flex-1 overflow-y-auto scrollbar-hide">
                     <FormatText text={plan.content} />
                   </div>
                 </div>
                ))}
              </div>
            )}
          </div>
        </div>
      );
    };

    const TacticalCalendar = ({ activeTasks }) => {
      const [events, setEvents] = useState([]);
      const [selectedEvent, setSelectedEvent] = useState(null);

      const fetchEvents = async () => {
        if (supabaseClient) {
          const { data } = await supabaseClient.from('calendar_events').select('*').order('created_at', { ascending: true });
          if (data) setEvents(data);
        } else {
          try {
            const local = JSON.parse(localStorage.getItem('amp_calendar_events') || '[]');
            setEvents(local);
          } catch(e) {}
        }
      };

      useEffect(() => {
        const handleCalUpdate = () => fetchEvents();
        window.addEventListener('amp-calendar-updated', handleCalUpdate);
        return () => window.removeEventListener('amp-calendar-updated', handleCalUpdate);
      }, []);

      useEffect(() => {
        fetchEvents();
        if (supabaseClient) {
          const channel = supabaseClient.channel('realtime:calendar_events')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'calendar_events' }, fetchEvents)
            .subscribe();
          return () => { supabaseClient.removeChannel(channel); };
        }
      }, []);

      const dayOffsets = { 'Mon': '10px', 'Tue': '130px', 'Wed': '250px', 'Thu': '370px', 'Fri': '490px' };
      const agentColors = {
        'CMO': { icon: 'solar:global-linear', text: 'text-pd-teal', bg: 'bg-pd-teal/20', border: 'border-pd-teal/50' },
        'Creative': { icon: 'solar:palette-linear', text: 'text-pd-orange', bg: 'bg-pd-orange/20', border: 'border-pd-orange/50' },
        'CTO': { icon: 'solar:settings-linear', text: 'text-gray-700 dark:text-gray-300', bg: 'bg-gray-200 dark:bg-white/10', border: 'border-gray-300 dark:border-white/20' }
      };

      const scheduledTasksAsEvents = (activeTasks || []).filter(t => t.scheduled_time && t.status !== 'done').map(t => ({
        day_of_week: new Date(t.scheduled_time).toLocaleDateString('en-US', { weekday: 'short' }),
        agent_role: t.agent || 'CEO',
        task_name: t.title + ' (Scheduled ⏳)'
      }));
      const allEvents = [...events, ...scheduledTasksAsEvents];

      const groupedEvents = allEvents.reduce((acc, event) => {
        const role = event.agent_role || 'General';
        if (!acc[role]) acc[role] = [];
        acc[role].push(event);
        return acc;
      }, {});

      // Add default agents if empty
      if (Object.keys(groupedEvents).length === 0) {
        groupedEvents['CMO'] = [];
        groupedEvents['Creative'] = [];
        groupedEvents['CTO'] = [];
      }

      return (
        <div className="p-4 md:p-8 h-full flex flex-col relative">
          <div className="mb-6 md:mb-8"><h2 className="text-xl md:text-2xl font-semibold tracking-tight text-gray-900 dark:text-white mb-1">Tactical Calendar</h2><p className="text-xs text-gray-500">Gantt-style timeline of agent deployments and heartbeats.</p></div>
          <div className="flex-1 bg-white/50 dark:bg-white/5 border border-gray-200 dark:border-pd-glassBorder rounded-2xl p-4 md:p-6 relative overflow-x-auto shadow-sm">
            <div className="absolute inset-0 opacity-[0.05]" style={{ backgroundImage: 'linear-gradient(currentColor 1px, transparent 1px), linear-gradient(90deg, currentColor 1px, transparent 1px)', backgroundSize: '60px 40px' }}></div>
            <div className="min-w-[600px] relative z-10 space-y-8 mt-4">
              <div className="flex text-[10px] text-gray-400 font-mono mb-4 pl-32 uppercase tracking-widest border-b border-gray-200 dark:border-pd-glassBorder pb-2">
                <div className="w-[120px]">Mon</div><div className="w-[120px]">Tue</div><div className="w-[120px]">Wed</div><div className="w-[120px]">Thu</div><div className="w-[120px]">Fri</div>
              </div>

              {Object.keys(groupedEvents).map(role => {
                const style = agentColors[role] || agentColors['CTO'];
                return (
                  <div key={role} className="flex items-center">
                    <div className="w-32 sticky left-0 bg-white/95 dark:bg-[#0b0f19]/95 z-20 py-2 text-xs text-gray-600 dark:text-gray-400 font-mono font-bold flex items-center gap-2 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.05)]">
                      <iconify-icon icon={style.icon} className={style.text}></iconify-icon> {role}
                    </div>
                    <div className="flex-1 h-10 relative pl-4">
                      {groupedEvents[role].map(ev => (
                        <div key={ev.id} onClick={() => ev.is_historical && setSelectedEvent(ev)} className={`absolute top-1/2 h-6 -translate-y-1/2 rounded ${style.bg} border ${style.border} flex items-center px-2 text-[10px] ${style.text} whitespace-nowrap shadow-sm cursor-pointer hover:opacity-80 transition-opacity`} style={{ left: dayOffsets[ev.day_of_week] || '10px', width: '100px', overflow: 'hidden', textOverflow: 'ellipsis' }} title={ev.task_name}>
                          {ev.task_name}
                        </div>
                      ))}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          {selectedEvent && (
            <div className="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div className="bg-white dark:bg-[#0b0f19] border border-gray-200 dark:border-pd-glassBorder rounded-2xl w-full max-w-md p-6 shadow-2xl">
                <div className="flex justify-between items-start mb-4 border-b border-gray-200 dark:border-pd-glassBorder pb-3">
                  <div>
                    <h3 className="font-semibold text-lg flex items-center gap-2">
                      <iconify-icon icon={agentColors[selectedEvent.agent_role]?.icon || 'solar:command-linear'} className={agentColors[selectedEvent.agent_role]?.text || 'text-pd-teal'}></iconify-icon>
                      {selectedEvent.task_name}
                    </h3>
                    <p className="text-xs text-gray-500 mt-1">Completed by {selectedEvent.agent_role}</p>
                  </div>
                  <button onClick={() => setSelectedEvent(null)} className="text-gray-500 hover:text-gray-900 dark:hover:text-white"><iconify-icon icon="solar:close-circle-linear" width="20"></iconify-icon></button>
                </div>
                <div className="text-sm text-gray-700 dark:text-gray-300 bg-black/5 dark:bg-white/5 p-4 rounded-xl border border-gray-200 dark:border-white/10 max-h-60 overflow-y-auto whitespace-pre-wrap font-mono text-[11px] leading-relaxed">
                  {selectedEvent.details || 'No additional details available.'}
                </div>
                <button onClick={() => setSelectedEvent(null)} className="w-full amp-button primary py-2 mt-4">Close Details</button>
              </div>
            </div>
          )}
        </div>
      );
    };

    const FormatText = ({ text }) => {
      if (!text) return null;
      return text.split('\n').map((line, idx) => (
        <React.Fragment key={idx}>
          {line.split(/\*\*(.*?)\*\*/g).map((part, i) => (
            i % 2 === 1 ? <strong key={i} className="font-bold">{part}</strong> : <span key={i}>{part}</span>
          ))}
          {idx < text.split('\n').length - 1 && <br />}
        </React.Fragment>
      ));
    };

    const App = () => {
      const [session, setSession] = useState(() => {
        try { return localStorage.getItem('amp_local_session') === 'true' ? { user: { id: 'local' } } : null; }
        catch(e) { return null; }
      });
      const [currentScreen, setCurrentScreen] = useState(() => {
        try { return localStorage.getItem('amp_genesis_complete') === 'true' ? 'dashboard' : 'genesis'; }
        catch(e) { return 'genesis'; }
      });
      const [typingSpeed, setTypingSpeed] = useState(0);

      useEffect(() => {
        if (supabaseClient) {
          supabaseClient.auth.getSession().then(({ data: { session } }) => {
            setSession(session);
            if (session && localStorage.getItem('amp_genesis_complete') === 'true') {
              setCurrentScreen('dashboard');
            }
          });
          supabaseClient.auth.onAuthStateChange((_event, session) => {
            setSession(session);
            if (session && localStorage.getItem('amp_genesis_complete') === 'true') {
              setCurrentScreen('dashboard');
            }
          });
        }
      }, []);

      return (
        <>
          <Background typingSpeed={typingSpeed} />
          {!session ? (
            <AuthScreen onLogin={(sess) => setSession(sess)} />
          ) : (
            <>
              {currentScreen === 'genesis' && <Genesis onComplete={() => { localStorage.setItem('amp_genesis_complete', 'true'); setCurrentScreen('dashboard'); }} typingSpeed={typingSpeed} setTypingSpeed={setTypingSpeed} />}
              {currentScreen === 'dashboard' && <CommandCenter session={session} />}
            </>
          )}
        </>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>


</body>

</html>
