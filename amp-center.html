      );
    };

    const LeadPipeline = ({ session, activeTasks, userProfile, onAddLead, onImportCsv, title, subtitle, inputLabels, entityLabel }) => {
      const getStages = (stage) => {
        switch(stage) {
          case 'Ecomm': return ['Favorites', 'Inquiries', 'Abandoned Cart'];
          case 'Software': return ['Signups', 'Active Trials', 'Needs Nurturing'];
          case 'Organizer': return ['Prospect', 'Communicating', 'Committed'];
          case 'Dispatcher': return ['Resumes Considered', 'Interview Scheduled', 'Recently Hired'];
          case 'Local Service': return ['New Inquiries', 'Quoting', 'Pending Approval'];
          default: return ['Inbound', 'Qualifying', 'Negotiation'];
        }
      };
      const stages = getStages(userProfile?.stage);
      const isOrganizer = userProfile?.stage === 'Organizer';
      
      const [leads, setLeads] = useState([]);
      const [showModal, setShowModal] = useState(false);
      const [showRemovalModal, setShowRemovalModal] = useState(false);
      const [itemToDelete, setItemToDelete] = useState(null);
      const [formData, setFormData] = useState({ id: null, name: '', contact: '', value: isOrganizer ? '1' : '$0', stage: stages[0], notes: '' });
      const [activeMobileStage, setActiveMobileStage] = useState(stages[0]);

      useEffect(() => {
        setActiveMobileStage(stages[0]);
      }, [userProfile?.stage]);

      const currentStage = userProfile?.stage || 'Default';
      const storageKey = `amp_leads_${currentStage}`;

      const fetchLeads = async () => {
        let currentLocal = [];
        try {
          currentLocal = JSON.parse(localStorage.getItem(storageKey) || '[]');
        } catch(e) {}

        if (supabaseClient && session?.user?.id) {
          try {
            const { data, error } = await supabaseClient.from('leads').select('*').eq('business_stage', currentStage).order('created_at', { ascending: false });
            if (!error && data) {
              const remoteIds = new Set(data.map(d => d.id || d.name));
              const localOnly = currentLocal.filter(l => !remoteIds.has(l.id || l.name));
              const merged = [...data, ...localOnly];
              setLeads(merged);
              localStorage.setItem(storageKey, JSON.stringify(merged));
              return;
            }
          } catch(e) {}
        }
        setLeads(currentLocal);
      };

      const updateLeadStage = async (id, newStage) => {
        const localLeads = JSON.parse(localStorage.getItem(storageKey) || '[]');
        const updated = localLeads.map(l => l.id === id ? { ...l, stage: newStage } : l);
        localStorage.setItem(storageKey, JSON.stringify(updated));
        setLeads(updated);

        if (!supabaseClient) return;
        try { await supabaseClient.from('leads').update({ stage: newStage }).eq('id', id); } catch(e){}
      };

      const deleteLead = async (reason) => {
        if (!itemToDelete) return;
        const id = itemToDelete.id;
        const localLeads = JSON.parse(localStorage.getItem(storageKey) || '[]');
        const updated = localLeads.filter(l => l.id !== id);
        localStorage.setItem(storageKey, JSON.stringify(updated));
        setLeads(updated);

        if (!supabaseClient) return;
        try { 
          await supabaseClient.from('leads').delete().eq('id', id); 
          // Log deletion with reason if needed - for now just delete
        } catch(e){}
      };

      const handleSave = async () => {
        try {
          const payload = { ...formData, user_id: session?.user?.id || 'local', business_stage: currentStage };
          let localLeads = [];
          try {
            const parsed = JSON.parse(localStorage.getItem(storageKey) || '[]');
            if (Array.isArray(parsed)) localLeads = parsed;
          } catch(e) {}
          
          if (formData.id) {
            localLeads = localLeads.map(l => l.id === formData.id ? payload : l);
          } else {
            payload.id = Date.now().toString();
            payload.created_at = new Date().toISOString();
            localLeads.unshift(payload);
          }
          
          localStorage.setItem(storageKey, JSON.stringify(localLeads));
          setLeads([...localLeads]);
          setShowModal(false);

          if (!supabaseClient || !session?.user?.id) return;
          try {
            if (formData.id) {
              await supabaseClient.from('leads').update(payload).eq('id', formData.id);
            } else {
              const remotePayload = { ...payload };
              delete remotePayload.id;
              await supabaseClient.from('leads').insert([remotePayload]);
            }
          } catch(e) {}
        } catch(error) {
          alert('Failed to save lead: ' + error.message);
        }
      };

      useEffect(() => {
        fetchLeads();
        const handleSync = () => fetchLeads();
        window.addEventListener('amp-simulated-lead', handleSync);
        
        if (supabaseClient) {
          const channel = supabaseClient.channel('realtime:leads')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'leads' }, fetchLeads)
            .subscribe();
          return () => { 
            supabaseClient.removeChannel(channel); 
            window.removeEventListener('amp-simulated-lead', handleSync);
          };
        }
        return () => window.removeEventListener('amp-simulated-lead', handleSync);
      }, [session, userProfile?.stage]);

      return (
        <div className="p-4 md:p-8 h-full flex flex-col relative">
          <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 md:mb-8 gap-4">
            <div><h2 className="text-xl md:text-2xl font-semibold tracking-tight text-gray-900 dark:text-white mb-1">{title || (isEcomm ? 'Sales Pipeline' : 'Lead Pipeline')}</h2><p className="text-xs text-gray-500">{subtitle || (isEcomm ? 'Track customer interest and abandoned carts.' : 'Manage prospects and activate AI sequences.')}</p></div>
            <div className="flex gap-2 w-full md:w-auto">
              <label className="amp-button secondary px-4 py-2 text-xs font-medium w-full md:w-auto cursor-pointer flex items-center justify-center">
                <iconify-icon icon="solar:import-linear" className="mr-2"></iconify-icon> Import CSV
                <input type="file" accept=".csv" className="hidden" onChange={onImportCsv} />
              </label>
              <button onClick={() => { setFormData({ id: null, name: '', contact: '', value: '$0', stage: stages[0] }); setShowModal(true); }} className="amp-button secondary px-4 py-2 text-xs font-medium w-full md:w-auto flex items-center justify-center">
                <iconify-icon icon="solar:pen-linear" className="mr-2"></iconify-icon> Manual Entry
              </button>
              <button onClick={onAddLead} className="amp-button primary px-4 py-2 text-xs font-medium w-full md:w-auto flex items-center justify-center">
                <iconify-icon icon="solar:add-circle-linear" className="mr-2"></iconify-icon> Ask CEO to Add
              </button>
            </div>
          </div>
          <div className="md:hidden w-full mb-4 flex-shrink-0">
            <select 
              value={activeMobileStage} 
              onChange={e => setActiveMobileStage(e.target.value)}
              className="w-full bg-white/60 dark:bg-black/40 border border-gray-200 dark:border-white/10 rounded-xl px-4 py-3 text-sm text-gray-900 dark:text-white focus:outline-none focus:border-pd-teal appearance-none font-bold"
            >
              {stages.map(s => <option key={s} value={s}>{s}</option>)}
            </select>
          </div>
          <div className="flex gap-4 md:gap-6 overflow-hidden md:overflow-x-auto pb-4 flex-1">
            {stages.map(col => (
              <div key={col} className={`w-full md:w-80 flex-shrink-0 flex-col gap-4 h-full ${activeMobileStage === col ? 'flex' : 'hidden'} md:flex overflow-y-auto pr-2 pb-10 hide-scrollbar`}>
                <h3 className="text-xs font-mono uppercase tracking-widest text-pd-teal border-b border-gray-200 dark:border-pd-glassBorder pb-2 hidden md:block">{col}</h3>
                {leads.filter(l => l.stage === col).map(lead => (
                  <div key={lead.id} className="amp-card p-5 relative overflow-hidden group flex-shrink-0">
                    <div className="flex justify-between items-start mb-3">
                      <div className="flex flex-col gap-1 w-[60%]">
                        <span className="font-semibold text-gray-900 dark:text-white truncate flex items-center gap-2">
                          {lead.name}
                          {isOrganizer && lead.is_leader && <iconify-icon icon="solar:crown-minimalistic-bold" className="text-pd-orange"></iconify-icon>}
                        </span>
                        <span className="text-[10px] text-gray-500">{lead.contact}</span>
                        {lead.notes && <span className="text-[10px] text-gray-400 italic truncate">{lead.notes}</span>}
                      </div>
                      <div className="flex flex-col items-end gap-1">
                        <div className="flex items-center gap-2 mb-1">
                          <button onClick={() => { setFormData(lead); setShowModal(true); }} className="opacity-0 group-hover:opacity-100 text-gray-400 hover:text-pd-teal transition-all" title="Edit">
                              <iconify-icon icon="solar:pen-linear"></iconify-icon>
                          </button>
                          <button onClick={() => { setItemToDelete(lead); setShowRemovalModal(true); }} className="opacity-0 group-hover:opacity-100 text-gray-400 hover:text-red-500 transition-all" title="Delete">
                            <iconify-icon icon="solar:trash-bin-trash-linear"></iconify-icon>
                          </button>
                        </div>
                        <select 
                          value={lead.stage} 
                          onChange={(e) => updateLeadStage(lead.id, e.target.value)}
                          className="text-[10px] bg-black/5 dark:bg-white/10 border-none rounded py-1 px-2 cursor-pointer focus:outline-none focus:ring-1 focus:ring-pd-teal"
                        >
                          {stages.map(s => <option key={s} value={s}>{s}</option>)}
                        </select>
                      </div>
                    </div>
                    <div className="bg-black/5 dark:bg-white/5 rounded-lg p-3 text-xs mb-3 space-y-1">
                      <div className="flex justify-between"><span className="text-gray-500">{isOrganizer ? 'Commitment' : 'Value'}</span><span className="font-medium text-gray-900 dark:text-gray-200">{lead.value || (isOrganizer ? '1' : '$0')}</span></div>
                      <div className="flex flex-col gap-1 mt-1">
                        <div className="flex justify-between"><span className="text-gray-500">Win Prob</span><span className="font-medium text-gray-900 dark:text-gray-200">{lead.prob || '0%'}</span></div>
                        <div className="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-1 mt-1 overflow-hidden">
                          <div className="bg-pd-teal h-full" style={{ width: lead.prob || '0%' }}></div>
                        </div>
                      </div>
                    </div>
                    <div className="flex items-center justify-between mt-2 pt-2 border-t border-gray-200 dark:border-white/10">
                      <div className="text-[10px] text-gray-500 dark:text-gray-400 flex items-center gap-1 truncate max-w-[60%]"><iconify-icon icon="solar:arrow-right-linear" className="text-pd-orange"></iconify-icon> Next: {lead.next_step || 'N/A'}</div>
                      <button onClick={() => onUpdateLead && onUpdateLead(lead.name)} className="text-[10px] bg-pd-teal/10 hover:bg-pd-teal/20 text-pd-teal px-2 py-1.5 rounded transition-colors flex items-center gap-1 font-semibold">
                        <iconify-icon icon="solar:chat-round-dots-linear"></iconify-icon> Update via CEO
                      </button>
                    </div>
                  </div>
                ))}
              </div>
            ))}
          </div>

          {/* Manual Entry Modal */}
          {showModal && (
            <div className="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div className="bg-white dark:bg-[#0b0f19] border border-gray-200 dark:border-pd-glassBorder rounded-2xl w-full max-w-md p-6 shadow-2xl">
                <div className="flex justify-between items-center mb-4">
                  <h3 className="font-semibold">{formData.id ? `Edit ${entityLabel || 'Lead'}` : `Manual ${entityLabel || 'Lead'} Entry`}</h3>
                  <button onClick={() => setShowModal(false)} className="text-gray-500 hover:text-gray-900 dark:hover:text-white"><iconify-icon icon="solar:close-circle-linear" width="20"></iconify-icon></button>
                </div>
                <div className="space-y-4">
                  <div>
                    <label className="block text-xs text-gray-500 mb-1">{inputLabels?.[0] || 'Name / Company'}</label>
                    <input type="text" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} className="w-full bg-black/5 dark:bg-white/10 border-none rounded-xl px-4 py-2 text-sm focus:ring-1 focus:ring-pd-teal outline-none" />
                  </div>
                  <div>
                    <label className="block text-xs text-gray-500 mb-1">{inputLabels?.[1] || 'Contact Info'}</label>
                    <input type="text" value={formData.contact} onChange={e => setFormData({...formData, contact: e.target.value})} className="w-full bg-black/5 dark:bg-white/10 border-none rounded-xl px-4 py-2 text-sm focus:ring-1 focus:ring-pd-teal outline-none" />
                  </div>
                  <div className="flex gap-4">
                    <div className="flex-1">
                      <label className="block text-xs text-gray-500 mb-1">{inputLabels?.[2] || 'Est. Value'}</label>
                      {isOrganizer ? (
                        <select value={formData.value} onChange={e => setFormData({...formData, value: e.target.value})} className="w-full bg-black/5 dark:bg-white/10 border-none rounded-xl px-4 py-2 text-sm focus:ring-1 focus:ring-pd-teal outline-none">
                          <option value="1">1 - Leader</option>
                          <option value="2">2 - Activist</option>
                          <option value="3">3 - Supporter</option>
                          <option value="4">4 - Passive</option>
                          <option value="5">5 - Anti-union</option>
                        </select>
                      ) : (
                        <input type="text" value={formData.value} onChange={e => setFormData({...formData, value: e.target.value})} className="w-full bg-black/5 dark:bg-white/10 border-none rounded-xl px-4 py-2 text-sm focus:ring-1 focus:ring-pd-teal outline-none" />
                      )}
                    </div>
                    <div className="flex-1">
                      <label className="block text-xs text-gray-500 mb-1">Stage</label>
                      <select value={formData.stage} onChange={e => setFormData({...formData, stage: e.target.value})} className="w-full bg-black/5 dark:bg-white/10 border-none rounded-xl px-4 py-2 text-sm focus:ring-1 focus:ring-pd-teal outline-none">
                        {stages.map(s => <option key={s} value={s}>{s}</option>)}
                      </select>
                    </div>
                  </div>
                  <div>
                    <label className="block text-xs text-gray-500 mb-1">Notes</label>
                    <textarea value={formData.notes} onChange={e => setFormData({...formData, notes: e.target.value})} className="w-full bg-black/5 dark:bg-white/10 border-none rounded-xl px-4 py-2 text-sm focus:ring-1 focus:ring-pd-teal outline-none resize-none" rows="2" placeholder="Add notes..."></textarea>
                  </div>
                  <button onClick={handleSave} className="w-full amp-button primary py-2 mt-2">Save {entityLabel || 'Lead'}</button>
                </div>
              </div>
            </div>
          )}
          {showRemovalModal && (
            <RemovalModal 
              isOpen={showRemovalModal} 
              onClose={() => setShowRemovalModal(false)} 
              onConfirm={deleteLead} 
              entityName={itemToDelete?.name || 'this lead'} 
            />
          )}
        </div>
      );
    };

    const ClientLedger = ({ session, activeTasks, userProfile, onAddClient, onImportCsv, title, subtitle, tableCols, inputLabels, entityLabel }) => {
      const isEcomm = userProfile?.stage === 'Ecomm';
      const isOrganizer = userProfile?.stage === 'Organizer';
      const isDispatcher = userProfile?.stage === 'Dispatcher';
      const [clients, setClients] = useState([]);
      const [showModal, setShowModal] = useState(false);
      const [showRemovalModal, setShowRemovalModal] = useState(false);
      const [itemToDelete, setItemToDelete] = useState(null);
      const [sortBy, setSortBy] = useState('date');
      const today = new Date().toLocaleDateString('en-US', { weekday: 'long' });
      const [formData, setFormData] = useState({ id: null, name: '', retainer: '', ltv: '', notes: '', is_leader: false, rank: '1', chat_link: '', chat_platform: 'whatsapp' });

      const currentStage = userProfile?.stage || 'Default';
      const storageKey = `amp_clients_${currentStage}`;

      const deleteClient = async (reason) => {
        if (!itemToDelete) return;
        const id = itemToDelete.id;
        const local = JSON.parse(localStorage.getItem(storageKey) || '[]');
        const updated = local.filter(l => l.id !== id);
        localStorage.setItem(storageKey, JSON.stringify(updated));
        setClients(updated);

        if (!supabaseClient) return;
        try { 
          await supabaseClient.from('clients').delete().eq('id', id); 
        } catch(e){}
      };

      const fetchClients = async () => {
        let currentLocal = [];
        try {
          currentLocal = JSON.parse(localStorage.getItem(storageKey) || '[]');
        } catch(e) {}

        if (supabaseClient && session?.user?.id) {
          try {
            const { data, error } = await supabaseClient.from('clients').select('*').eq('business_stage', currentStage).order('created_at', { ascending: false });
            if (!error && data) {
              const remoteIds = new Set(data.map(d => d.id || d.name));
              const localOnly = currentLocal.filter(l => !remoteIds.has(l.id || l.name));
              const merged = [...data, ...localOnly];
              setClients(merged);
              localStorage.setItem(storageKey, JSON.stringify(merged));
              return;
            }
          } catch(e) {}
        }
        setClients(currentLocal);
      };

      const handleSave = async () => {
        try {
          const payload = { ...formData, business_stage: currentStage };
          
          let local = [];
          try {
            const parsed = JSON.parse(localStorage.getItem(storageKey) || '[]');
            if (Array.isArray(parsed)) local = parsed;
          } catch(e) {}
          if (formData.id) {
            local = local.map(c => c.id === formData.id ? { ...c, ...payload } : c);
          } else {
            payload.id = Date.now().toString();
            payload.created_at = new Date().toISOString();
            local.unshift(payload);
          }
          localStorage.setItem(storageKey, JSON.stringify(local));
          setClients([...local]);
          setShowModal(false);

          if (supabaseClient && session?.user?.id) {
            payload.user_id = session.user.id;
            try {
              if (formData.id) {
                await supabaseClient.from('clients').update(payload).eq('id', formData.id);
              } else {
                const remotePayload = { ...payload };
                delete remotePayload.id;
                await supabaseClient.from('clients').insert([remotePayload]);
              }
            } catch(e) {}
          }
        } catch (error) {
          alert('Failed to save client: ' + error.message);
        }
      };

      useEffect(() => {
        fetchClients();
        
        const handleSync = () => fetchClients();
        window.addEventListener('amp-simulated-sale', handleSync);
        
        if (supabaseClient) {
          const channel = supabaseClient.channel('realtime:clients')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'clients' }, fetchClients)
            .subscribe();
          return () => { 
            supabaseClient.removeChannel(channel); 
            window.removeEventListener('amp-simulated-sale', handleSync);
          };
        }
        
        return () => window.removeEventListener('amp-simulated-sale', handleSync);
      }, [session, userProfile?.stage]);

      const getAssignedAgent = (clientName, dbAgent) => {
        if (!activeTasks || !clientName) return dbAgent || 'Support';
        const task = activeTasks.find(t => 
          t.title?.toLowerCase().includes(clientName.toLowerCase()) || 
          t.description?.toLowerCase().includes(clientName.toLowerCase())
        );
        if (task) {
          const colorClass = task.agent === 'CMO' ? 'bg-pd-teal/20 text-pd-teal border-pd-teal/50' : 
                             task.agent === 'Creative' ? 'bg-pd-orange/20 text-pd-orange border-pd-orange/50' : 
                             task.agent === 'CTO' ? 'bg-gray-500/20 text-gray-400 border-gray-500/50' : 
                             'bg-pd-purple/20 text-pd-purple border-pd-purple/50';
          return <span className={`px-2 py-1 border rounded text-[10px] flex items-center gap-1 font-medium ${colorClass}`}><span className="w-1.5 h-1.5 rounded-full bg-current animate-pulse"></span>{task.agent} Active</span>;
        }
        return <span className="px-2 py-1 bg-black/5 dark:bg-white/10 rounded text-[10px] text-gray-700 dark:text-gray-300">{dbAgent || 'Support'}</span>;
      };

      const isWorkingToday = (workDaysString) => {
        if (!workDaysString) return false;
        return String(workDaysString).toLowerCase().includes(today.toLowerCase());
      };

      const sortedClients = React.useMemo(() => {
        let sorted = [...clients];
        if (sortBy === 'alpha') {
          sorted.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
        } else if (sortBy === 'active' && isDispatcher) {
          sorted.sort((a, b) => {
            const aActive = isWorkingToday(a.ltv) ? 1 : 0;
            const bActive = isWorkingToday(b.ltv) ? 1 : 0;
            return bActive - aActive;
          });
        }
        return sorted;
      }, [clients, sortBy, isDispatcher, today]);

      return (
        <div className="p-4 md:p-8 h-full flex flex-col relative">
          <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 md:mb-8 gap-4">
            <div><h2 className="text-xl md:text-2xl font-semibold tracking-tight text-gray-900 dark:text-white mb-1">{title || (isEcomm ? 'Customer Ledger' : 'Client Ledger')}</h2><p className="text-xs text-gray-500">{subtitle || (isEcomm ? 'Active customers and purchase history.' : 'Active accounts and automated deliverable tracking.')}</p></div>
            <div className="flex flex-wrap gap-2 w-full md:w-auto">
              <select value={sortBy} onChange={e => setSortBy(e.target.value)} className="bg-black/5 dark:bg-white/10 border-none rounded-xl px-3 py-2 text-xs focus:ring-1 focus:ring-pd-teal outline-none cursor-pointer">
                <option value="date">Sort: Date Added</option>
                <option value="alpha">Sort: A-Z</option>
                {isDispatcher && <option value="active">Sort: Active Today</option>}
              </select>
              <label className="amp-button secondary px-4 py-2 text-xs font-medium w-full md:w-auto cursor-pointer flex items-center justify-center">
                <iconify-icon icon="solar:import-linear" className="mr-2"></iconify-icon> Import CSV
                <input type="file" accept=".csv" className="hidden" onChange={onImportCsv} />
              </label>
              <button onClick={() => { setFormData({ id: null, name: '', retainer: '', ltv: '', notes: '', is_leader: false, rank: '1', chat_link: '', chat_platform: 'whatsapp' }); setShowModal(true); }} className="amp-button secondary px-4 py-2 text-xs font-medium w-full md:w-auto flex items-center justify-center">
                <iconify-icon icon="solar:pen-linear" className="mr-2"></iconify-icon> Manual Entry
              </button>
              <button onClick={onAddClient} className="amp-button primary px-4 py-2 text-xs font-medium w-full md:w-auto flex items-center justify-center">
                <iconify-icon icon="solar:add-circle-linear" className="mr-2"></iconify-icon> Ask CEO to Add
              </button>
            </div>
          </div>
          <div className="bg-white/50 dark:bg-white/5 border border-gray-200 dark:border-pd-glassBorder rounded-2xl overflow-x-auto flex-1 shadow-sm">
            <table className="w-full text-left text-sm min-w-[600px]">
              <thead className="bg-black/5 dark:bg-black/20 text-xs font-mono text-gray-500 uppercase tracking-wider">
                <tr>
                  {tableCols ? tableCols.map((col, i) => <th key={i} className={`p-4 ${i === tableCols.length - 1 ? 'text-right' : ''}`}>{col}</th>) : (
                    <><th className="p-4">{isEcomm ? 'Customer' : 'Client'}</th><th className="p-4">{isEcomm ? 'Products Bought' : 'Retainer'}</th><th className="p-4">{isEcomm ? 'Total Spent' : 'LTV'}</th><th className="p-4">Assigned Agents</th><th className="p-4 text-right">Actions</th></>
                  )}
                </tr>
              </thead>
              <tbody className="divide-y divide-gray-200 dark:divide-pd-glassBorder">
                {sortedClients.map(c => (
                  <tr key={c.id} className="hover:bg-white/40 dark:hover:bg-white/5 transition-colors group">
                    <td className="p-4 font-semibold text-gray-900 dark:text-white flex items-center gap-2 sticky left-0 bg-white/95 dark:bg-[#0b0f19]/95 group-hover:bg-gray-50 dark:group-hover:bg-white/5 backdrop-blur z-10 transition-colors shadow-[2px_0_5px_-2px_rgba(0,0,0,0.1)] dark:shadow-[2px_0_5px_-2px_rgba(255,255,255,0.05)]">
                      {c.name}
                      {isOrganizer && c.is_leader && <span className="bg-pd-orange text-white text-[10px] px-2 py-0.5 rounded-full font-bold uppercase tracking-wider ml-2">Leader</span>}
                    </td>
                    {isOrganizer && (
                      <td className="p-4 text-gray-600 dark:text-gray-300">
                        <span className="bg-black/5 dark:bg-white/10 px-2 py-1 rounded text-xs font-mono">{c.rank || '1'}</span>
                      </td>
                    )}
                    <td className="p-4 text-gray-600 dark:text-gray-300">
                      <div>{c.retainer || '-'}</div>
                      {c.notes && <div className="text-[10px] text-gray-400 mt-1 italic truncate max-w-[150px]">{c.notes}</div>}
                    </td>
                    <td className="p-4 text-gray-600 dark:text-gray-300">
                      {isDispatcher ? (
                        <div className="flex items-center gap-2">
                          {isWorkingToday(c.ltv) ? (
                            <div className="w-2 h-2 rounded-full bg-pd-teal shadow-[0_0_5px_#00F2EA]" title="Working Today"></div>
                          ) : (
                            <div className="w-2 h-2 rounded-full bg-gray-300 dark:bg-gray-600" title="Off Today"></div>
                          )}
                          {c.ltv || '-'}
                        </div>
                      ) : (
                        c.ltv || '-'
                      )}
                    </td>
                    <td className="p-4">{getAssignedAgent(c.name, c.assigned_agents)}</td>
                    <td className="p-4 text-right">
                      <div className="flex items-center justify-end gap-3">
                        {(isDispatcher || isOrganizer) && c.chat_link && (
                          <button onClick={() => {
                            window.dispatchEvent(new CustomEvent('open-fleet-comms', { detail: c }));
                            window.dispatchEvent(new CustomEvent('amp-navigate', { detail: 'fleet-comms' }));
                          }} className={`text-gray-400 hover:text-[${c.chat_platform === 'telegram' ? '#229ED9' : '#25D366'}] transition-colors`} title={`Message ${isDispatcher ? 'Driver' : 'Member'} on ${c.chat_platform === 'telegram' ? 'Telegram' : 'WhatsApp'}`}>
                            <iconify-icon icon={c.chat_platform === 'telegram' ? 'mdi:telegram' : 'mdi:whatsapp'} width="18"></iconify-icon>
                          </button>
                        )}
                        <button onClick={() => { setFormData({...c, chat_platform: c.chat_platform || 'whatsapp'}); setShowModal(true); }} className="text-gray-400 hover:text-pd-teal transition-colors" title={`Edit ${isDispatcher ? 'Driver' : 'Member'}`}>
                          <iconify-icon icon="solar:pen-linear" width="18"></iconify-icon>
                        </button>
                        <button onClick={() => { setItemToDelete(c); setShowRemovalModal(true); }} className="text-gray-400 hover:text-red-500 transition-colors" title={`Remove ${isDispatcher ? 'Driver' : 'Member'}`}>
                          <iconify-icon icon="solar:trash-bin-trash-linear" width="18"></iconify-icon>
                        </button>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          {/* Manual Entry Modal */}
          {showModal && (
            <div className="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div className="bg-white dark:bg-[#0b0f19] border border-gray-200 dark:border-pd-glassBorder rounded-2xl w-full max-w-md p-6 shadow-2xl">
                <div className="flex justify-between items-center mb-4">
                  <h3 className="font-semibold">{formData.id ? `Edit ${entityLabel || (isEcomm ? 'Customer' : 'Client')}` : `Manual ${entityLabel || (isEcomm ? 'Customer' : 'Client')} Entry`}</h3>
                  <button onClick={() => setShowModal(false)} className="text-gray-500 hover:text-gray-900 dark:hover:text-white"><iconify-icon icon="solar:close-circle-linear" width="20"></iconify-icon></button>
                </div>
                <div className="space-y-4">
                  <div>
                    <label className="block text-xs text-gray-500 mb-1">{inputLabels?.[0] || (isEcomm ? 'Customer Name' : 'Client Name')}</label>
                    <input type="text" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} className="w-full bg-black/5 dark:bg-white/10 border-none rounded-xl px-4 py-2 text-sm focus:ring-1 focus:ring-pd-teal outline-none" />
                  </div>
                  <div className="flex gap-4">
                    <div className="flex-1">
                      <label className="block text-xs text-gray-500 mb-1">{inputLabels?.[1] || (isEcomm ? 'Products Bought' : 'Retainer (Monthly)')}</label>
                      {isOrganizer ? (
                        <select value={formData.rank} onChange={e => setFormData({...formData, rank: e.target.value})} className="w-full bg-black/5 dark:bg-white/10 border-none rounded-xl px-4 py-2 text-sm focus:ring-1 focus:ring-pd-teal outline-none">
                          <option value="1">1 - Leader</option>
                          <option value="2">2 - Activist</option>
                          <option value="3">3 - Supporter</option>
                          <option value="4">4 - Passive</option>
                          <option value="5">5 - Anti-union</option>
                        </select>
                      ) : (
                        <input type="text" value={formData.retainer} onChange={e => setFormData({...formData, retainer: e.target.value})} className="w-full bg-black/5 dark:bg-white/10 border-none rounded-xl px-4 py-2 text-sm focus:ring-1 focus:ring-pd-teal outline-none" />
                      )}
                    </div>
                    <div className="flex-1">
                      <label className="block text-xs text-gray-500 mb-1">{inputLabels?.[2] || (isEcomm ? 'Total Spent' : 'Total LTV')}</label>
                      {isDispatcher ? (
                        <div className="flex flex-wrap gap-1.5 mt-1">
                          {['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'].map(day => {
                            const isSelected = (formData.ltv || '').includes(day);
                            return (
                              <button key={day} onClick={(e) => {
                                e.preventDefault();
                                let days = formData.ltv ? formData.ltv.split(',').map(d => d.trim()).filter(Boolean) : [];
                                if (isSelected) days = days.filter(d => d !== day);
                                else days.push(day);
                                setFormData({...formData, ltv: days.join(', ')});
                              }} className={`px-2 py-1 text-[10px] md:text-xs rounded-lg border font-medium transition-colors ${isSelected ? 'bg-pd-teal/20 border-pd-teal text-pd-teal' : 'bg-black/5 dark:bg-white/10 border-transparent text-gray-500 hover:bg-black/10 dark:hover:bg-white/20'}`}>
                                {day.slice(0, 3)}
                              </button>
                            );
                          })}
                        </div>
                      ) : (
                        <input type="text" value={isOrganizer ? formData.retainer : formData.ltv} onChange={e => setFormData({...formData, [isOrganizer ? 'retainer' : 'ltv']: e.target.value})} className="w-full bg-black/5 dark:bg-white/10 border-none rounded-xl px-4 py-2 text-sm focus:ring-1 focus:ring-pd-teal outline-none" />
                      )}
                    </div>
                  </div>
                  {isOrganizer && (
                    <div>
                      <label className="block text-xs text-gray-500 mb-1">{inputLabels?.[3] || 'Active Role'}</label>
                      <input type="text" value={formData.ltv} onChange={e => setFormData({...formData, ltv: e.target.value})} className="w-full bg-black/5 dark:bg-white/10 border-none rounded-xl px-4 py-2 text-sm focus:ring-1 focus:ring-pd-teal outline-none" />
                    </div>
                  )}
                  {(isDispatcher || isOrganizer) && (
                    <div className="flex gap-4">
                      <div className="w-1/3">
                        <label className="block text-xs text-gray-500 mb-1">Chat Platform</label>
                        <select value={formData.chat_platform || 'whatsapp'} onChange={e => setFormData({...formData, chat_platform: e.target.value})} className="w-full bg-black/5 dark:bg-white/10 border-none rounded-xl px-4 py-2 text-sm focus:ring-1 focus:ring-pd-teal outline-none">
                          <option value="whatsapp">WhatsApp</option>
                          <option value="telegram">Telegram</option>
                        </select>
                      </div>
                      <div className="flex-1">
                        <label className="block text-xs text-gray-500 mb-1">Phone / Username</label>
                        <input type="text" value={formData.chat_link || ''} onChange={e => setFormData({...formData, chat_link: e.target.value})} placeholder={formData.chat_platform === 'telegram' ? '@username' : '+1234567890'} className="w-full bg-black/5 dark:bg-white/10 border-none rounded-xl px-4 py-2 text-sm focus:ring-1 focus:ring-pd-teal outline-none" />
                      </div>
                    </div>
                  )}
                  <div>
                    <label className="block text-xs text-gray-500 mb-1">Notes</label>
                    <textarea value={formData.notes} onChange={e => setFormData({...formData, notes: e.target.value})} className="w-full bg-black/5 dark:bg-white/10 border-none rounded-xl px-4 py-2 text-sm focus:ring-1 focus:ring-pd-teal outline-none resize-none" rows="2" placeholder="Add notes..."></textarea>
                  </div>
                  {isOrganizer && (
                    <div className="flex items-center gap-2 mt-2 mb-2">
                      <input type="checkbox" id="is_leader" checked={formData.is_leader} onChange={e => setFormData({...formData, is_leader: e.target.checked})} className="w-4 h-4 text-pd-teal bg-black/5 border-gray-300 rounded focus:ring-pd-teal" />
                      <label htmlFor="is_leader" className="text-sm text-gray-700 dark:text-gray-300">Mark as Leader</label>
                    </div>
                  )}
                  <button onClick={handleSave} className="w-full amp-button primary py-2 mt-2">Save {entityLabel || (isEcomm ? 'Customer' : 'Client')}</button>
                </div>
              </div>
            </div>
          )}

          <RemovalModal 
            isOpen={showRemovalModal} 
            onClose={() => setShowRemovalModal(false)} 
            onConfirm={deleteClient} 
            entityName={itemToDelete?.name || 'this entry'} 
          />
        </div>
      );
    };

    const InventoryTracker = ({ session, activeTasks, userProfile, onSync, onImportCsv }) => {
      const [inventory, setInventory] = useState([]);
      const [showModal, setShowModal] = useState(false);
      const [showRemovalModal, setShowRemovalModal] = useState(false);
      const [itemToDelete, setItemToDelete] = useState(null);
      const [formData, setFormData] = useState({ id: null, product_name: '', sku_link: '', stock: '', price: '' });

      const currentStage = userProfile?.stage || 'Default';
      const storageKey = `amp_inventory_${currentStage}`;

      const deleteProduct = async (reason) => {
        if (!itemToDelete) return;
        const id = itemToDelete.id;
        const local = JSON.parse(localStorage.getItem(storageKey) || '[]');
        const updated = local.filter(l => l.id !== id);
        localStorage.setItem(storageKey, JSON.stringify(updated));
        setInventory(updated);

        if (!supabaseClient) return;
        try { 
          await supabaseClient.from('inventory').delete().eq('id', id); 
        } catch(e){}
      };

      const fetchInventory = async () => {
        let currentLocal = [];
        try {
          currentLocal = JSON.parse(localStorage.getItem(storageKey) || '[]');
        } catch(e) {}

        if (supabaseClient && session?.user?.id) {
          try {
            const { data, error } = await supabaseClient.from('inventory').select('*').eq('business_stage', currentStage).order('created_at', { ascending: false });
            if (!error && data) {
              const remoteIds = new Set(data.map(d => d.id || d.product_name));
              const localOnly = currentLocal.filter(l => !remoteIds.has(l.id || l.product_name));
              const merged = [...data, ...localOnly];
              setInventory(merged);
              localStorage.setItem(storageKey, JSON.stringify(merged));
              return;
            }
          } catch(e) {}
        }
        setInventory(currentLocal);
      };

      const handleSave = async () => {
        try {
          const payload = { ...formData, user_id: session?.user?.id || 'local', business_stage: currentStage };
          
          let local = [];
          try {
            const parsed = JSON.parse(localStorage.getItem(storageKey) || '[]');
            if (Array.isArray(parsed)) local = parsed;
          } catch(e) {}
          if (formData.id) {
            local = local.map(i => i.id === formData.id ? { ...i, ...payload } : i);
          } else {
            payload.id = Date.now().toString();
            payload.created_at = new Date().toISOString();
            local.unshift(payload);
          }
          localStorage.setItem(storageKey, JSON.stringify(local));
          setInventory([...local]);
          setShowModal(false);

          if (supabaseClient && session?.user?.id) {
            try {
              if (formData.id) {
                await supabaseClient.from('inventory').update(payload).eq('id', formData.id);
              } else {
                const remotePayload = { ...payload };
                delete remotePayload.id;
                await supabaseClient.from('inventory').insert([remotePayload]);
              }
            } catch (e) { console.warn("Inventory upsert failed."); }
          }
        } catch(error) {
          alert('Failed to save inventory: ' + error.message);
        }
      };

      useEffect(() => {
        fetchInventory();
        
        const handleSync = () => fetchInventory();
        window.addEventListener('amp-simulated-sale', handleSync);
        window.addEventListener('amp-inventory-updated', handleSync);
        
        if (supabaseClient) {
          const channel = supabaseClient.channel('realtime:inventory')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'inventory' }, fetchInventory)
            .subscribe();
          return () => { 
            supabaseClient.removeChannel(channel); 
            window.removeEventListener('amp-simulated-sale', handleSync);
            window.removeEventListener('amp-inventory-updated', handleSync);
          };
        }
        
        return () => {
          window.removeEventListener('amp-simulated-sale', handleSync);
          window.removeEventListener('amp-inventory-updated', handleSync);
        };
      }, []);

      const getAssignedAgent = (productName) => {
        if (!activeTasks || !productName) return null;
        const task = activeTasks.find(t => 
          t.title?.toLowerCase().includes(productName.toLowerCase()) || 
          t.description?.toLowerCase().includes(productName.toLowerCase())
        );
        if (task) {
          return <span className={`px-2 py-1 border rounded text-[10px] flex items-center gap-1 font-medium bg-pd-teal/20 text-pd-teal border-pd-teal/50`}><span className="w-1.5 h-1.5 rounded-full bg-current animate-pulse"></span>Syncing</span>;
        }
        return null;
      };

      return (
        <div className="p-4 md:p-8 h-full flex flex-col relative">
          <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 md:mb-8 gap-4">
            <div>
              <h2 className="text-xl md:text-2xl font-semibold tracking-tight text-gray-900 dark:text-white mb-1">Inventory Tracking</h2>
              <p className="text-xs text-gray-500">Manage your product catalog and sync with your store.</p>
            </div>
            <div className="flex gap-2 w-full md:w-auto">
              <label className="amp-button secondary px-4 py-2 text-xs font-medium w-full md:w-auto cursor-pointer flex items-center justify-center">
                <iconify-icon icon="solar:import-linear" className="mr-2"></iconify-icon> Import CSV
                <input type="file" accept=".csv" className="hidden" onChange={onImportCsv} />
              </label>
              <button onClick={() => { setFormData({ id: null, product_name: '', sku_link: '', stock: '', price: '' }); setShowModal(true); }} className="amp-button secondary px-4 py-2 text-xs font-medium w-full md:w-auto flex items-center justify-center">
                <iconify-icon icon="solar:pen-linear" className="mr-2"></iconify-icon> Manual Entry
              </button>
              <button onClick={onSync} className="amp-button primary px-4 py-2 text-xs font-medium w-full md:w-auto flex items-center justify-center">
                <iconify-icon icon="solar:refresh-circle-linear" className="mr-2"></iconify-icon> Ask CEO to Sync
              </button>
            </div>
          </div>
          
          {userProfile?.store_link && (
             <div className="mb-4 text-xs flex items-center gap-2 text-gray-500 bg-white/40 dark:bg-black/20 p-3 rounded-xl border border-gray-200 dark:border-white/10 w-fit">
               <iconify-icon icon="solar:link-circle-linear" className="text-pd-teal"></iconify-icon> Linked Store: <a href={userProfile.store_link} target="_blank" className="text-pd-teal hover:underline">{userProfile.store_link}</a>
             </div>
          )}

          <div className="bg-white/50 dark:bg-white/5 border border-gray-200 dark:border-pd-glassBorder rounded-2xl overflow-x-auto flex-1 shadow-sm">
            <table className="w-full text-left text-sm min-w-[600px]">
              <thead className="bg-black/5 dark:bg-black/20 text-xs font-mono text-gray-500 uppercase tracking-wider">
                <tr><th className="p-4">Product Name</th><th className="p-4">SKU / Link</th><th className="p-4">Stock</th><th className="p-4">Price</th><th className="p-4">Status</th><th className="p-4 text-right">Actions</th></tr>
              </thead>
              <tbody className="divide-y divide-gray-200 dark:divide-pd-glassBorder">
                {inventory.map(item => (
                  <tr key={item.id} className="hover:bg-white/40 dark:hover:bg-white/5 transition-colors group">

          {showModal && (

                  <div>
                    <label className="block text-xs text-gray-500 mb-1">SKU or Link</label>

                    <div className="flex-1">
                      <label className="block text-xs text-gray-500 mb-1">Stock Quantity</label>
                      <input type="text" value={formData.stock} onChange={e => setFormData({...formData, stock: e.target.value})} className="w-full bg-black/5 dark:bg-white/10 border-none rounded-xl px-4 py-2 text-sm focus:ring-1 focus:ring-pd-teal outline-none" />

    const FinanceTracker = ({ session, userProfile, onLogExpense, title, subtitle }) => {
      const [clients, setClients] = useState([]);
      const [transactions, setTransactions] = useState([]);
      const [autoIncome, setAutoIncome] = useState(0);
      const [showManualAdd, setShowManualAdd] = useState(false);
      const [newTx, setNewTx] = useState({ type: 'Expense', amount: '', description: '' });
      const [monthlyReport, setMonthlyReport] = useState(null);

      const isEcomm = userProfile?.stage === 'Ecomm';
      const currentStage = userProfile?.stage || 'Default';
      const storageKey = `amp_finances_${currentStage}`;

      const fetchClients = async () => {
        let currentLocal = [];
        try {
          currentLocal = JSON.parse(localStorage.getItem(`amp_clients_${currentStage}`) || '[]');
        } catch(e) {}
        
        let allClients = [...currentLocal];
        if (supabaseClient && session?.user?.id) {
           try {
             const { data, error } = await supabaseClient.from('clients').select('*').eq('business_stage', currentStage);
             if (!error && data) {
                const remoteIds = new Set(data.map(d => d.id));
                const localOnly = currentLocal.filter(l => !remoteIds.has(l.id));
                allClients = [...data, ...localOnly];
             }
           } catch(e) {}
        }
        setClients(allClients);
        let total = 0;
        allClients.forEach(c => {
          const valStr = String(isEcomm ? (c.ltv || '0') : (c.retainer || '0'));
          const val = parseFloat(valStr.replace(/[^0-9.]/g, '')) || 0;
          total += val;
        });
        setAutoIncome(total);
      };

      const fetchFinances = async () => {
        let currentLocal = [];
        try {
          currentLocal = JSON.parse(localStorage.getItem(storageKey) || '[]');
        } catch(e) {}

        if (supabaseClient && session?.user?.id) {
          try {
            const { data, error } = await supabaseClient.from('finances').select('*').eq('business_stage', currentStage).order('created_at', { ascending: false });
            if (!error && data) {
              const remoteIds = new Set(data.map(d => d.id));
              const localOnly = currentLocal.filter(l => !remoteIds.has(l.id));
              setTransactions([...data, ...localOnly]);
              return;
            }
          } catch (e) {
             console.warn("Finances table likely missing.");
          }
        }
        setTransactions(currentLocal);
      };

      useEffect(() => {
        fetchClients();
        fetchFinances();
        
        const handleSync = () => {
          fetchClients();
          fetchFinances();
        };
        window.addEventListener('amp-simulated-sale', handleSync);
        
        return () => window.removeEventListener('amp-simulated-sale', handleSync);
      }, [userProfile?.stage, session]);

      const manualIncome = transactions.filter(t => t.type === 'Income').reduce((acc, t) => acc + t.amount, 0);
      const manualExpenses = transactions.filter(t => t.type === 'Expense').reduce((acc, t) => acc + t.amount, 0);
      
      const totalIncome = autoIncome + manualIncome;
      const netProfit = totalIncome - manualExpenses;

      useEffect(() => {
        const today = new Date();
        const lastDayOfMonth = new Date(today.getFullYear(), today.getMonth() + 1, 0).getDate();
        
        if (today.getDate() === lastDayOfMonth) {
          const reportKey = `amp_report_${currentStage}_${today.getFullYear()}_${today.getMonth()}`;
          const saved = localStorage.getItem(reportKey);
          if (saved) {
            setMonthlyReport(JSON.parse(saved));
          } else if (totalIncome > 0 || manualExpenses > 0) {
            const report = {
              date: today.toLocaleDateString(),
              revenue: totalIncome,
              expenses: manualExpenses,
              profit: netProfit,
              month: today.toLocaleString('default', { month: 'long' })
            };
            localStorage.setItem(reportKey, JSON.stringify(report));
            setMonthlyReport(report);
          }
        }
      }, [totalIncome, manualExpenses, netProfit, currentStage]);

      const handleAddTx = async () => {
        if (!newTx.amount || !newTx.description) return;
        const amountNum = parseFloat(newTx.amount.replace(/[^0-9.]/g, ''));
        const payload = {
          user_id: session?.user?.id || 'local',
          business_stage: currentStage,
          type: newTx.type,
          amount: amountNum,
          description: newTx.description,
          created_at: new Date().toISOString()
        };

        if (supabaseClient && session?.user?.id) {
          try {
            await supabaseClient.from('finances').insert([payload]);
          } catch(e) {}
        }
        
        const newTxs = [payload, ...transactions];
        setTransactions(newTxs);
        localStorage.setItem(storageKey, JSON.stringify(newTxs));
        
        setNewTx({ type: 'Expense', amount: '', description: '' });
        setShowManualAdd(false);
      };

      return (
        <div className="flex flex-col h-full overflow-hidden">
          <div className="p-4 md:p-8 flex-shrink-0 flex flex-col md:flex-row justify-between items-start border-b border-gray-200 dark:border-pd-glassBorder bg-white/50 dark:bg-white/5 gap-4">
            <div>
              <h2 className="text-xl md:text-2xl font-semibold tracking-tight text-gray-900 dark:text-white mb-1">{title || 'Financial Tracker'}</h2>
              <p className="text-xs text-gray-500">{subtitle || 'Autonomous revenue tracking & expense logging.'}</p>
            </div>
            <div className="flex gap-2 w-full md:w-auto items-center">
              {monthlyReport && (
                <div className="px-3 py-1.5 rounded-lg bg-pd-teal/10 border border-pd-teal/30 text-pd-teal text-xs flex items-center gap-2 cursor-help hidden md:flex" title={`Monthly Report for ${monthlyReport.month}: Revenue: $${monthlyReport.revenue}, Expenses: $${monthlyReport.expenses}, Profit: $${monthlyReport.profit}`}>
                  <iconify-icon icon="solar:document-text-bold"></iconify-icon> {monthlyReport.month} Report Drafted
                </div>
              )}
              <button onClick={() => setShowManualAdd(!showManualAdd)} className="amp-button secondary px-4 py-2 text-xs font-medium w-full md:w-auto flex items-center justify-center">
                <iconify-icon icon={showManualAdd ? "solar:close-circle-linear" : "solar:pen-linear"} className="mr-2"></iconify-icon> {showManualAdd ? 'Cancel' : 'Manual Entry'}
              </button>
              <button onClick={onLogExpense} className="amp-button primary px-4 py-2 text-xs font-medium w-full md:w-auto flex items-center justify-center">
                <iconify-icon icon="solar:add-circle-linear" className="mr-2"></iconify-icon> Ask CEO to Log
              </button>
            </div>
          </div>

          <div className="flex-1 overflow-y-auto p-4 md:p-8 space-y-6">
            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
              <div className="bg-white/40 dark:bg-pd-glass border border-gray-200 dark:border-pd-glassBorder rounded-2xl p-5 shadow-sm">
                <div className="text-gray-500 text-xs mb-1 flex justify-between">Total Revenue <iconify-icon icon="solar:wallet-money-bold" className="text-green-500"></iconify-icon></div>
                <div className="text-2xl font-bold text-gray-900 dark:text-white">${totalIncome.toLocaleString()}</div>
                <div className="text-[10px] text-gray-400 mt-2">Autonomous: ${autoIncome.toLocaleString()} {isEcomm ? '(LTV)' : '(Retainers)'}</div>
              </div>
              <div className="bg-white/40 dark:bg-pd-glass border border-gray-200 dark:border-pd-glassBorder rounded-2xl p-5 shadow-sm">
                <div className="text-gray-500 text-xs mb-1 flex justify-between">Total Expenses <iconify-icon icon="solar:card-send-bold" className="text-red-500"></iconify-icon></div>
                <div className="text-2xl font-bold text-gray-900 dark:text-white">${manualExpenses.toLocaleString()}</div>
                <div className="text-[10px] text-gray-400 mt-2">Logged manually or by CEO</div>
              </div>
              <div className={`border rounded-2xl p-5 shadow-sm ${netProfit >= 0 ? 'bg-pd-teal/10 border-pd-teal/30' : 'bg-red-500/10 border-red-500/30'}`}>
                <div className="text-gray-500 dark:text-gray-400 text-xs mb-1 flex justify-between">Net Profit <iconify-icon icon="solar:chart-square-bold" className={netProfit >= 0 ? "text-pd-teal" : "text-red-500"}></iconify-icon></div>
                <div className={`text-2xl font-bold ${netProfit >= 0 ? 'text-pd-teal' : 'text-red-500'}`}>${netProfit.toLocaleString()}</div>
                <div className="text-[10px] text-gray-500 dark:text-gray-400 mt-2">All-time tracked</div>
              </div>
            </div>

            <div className="bg-white/60 dark:bg-pd-glass border border-gray-200 dark:border-pd-glassBorder rounded-2xl p-6 shadow-sm">
              <div className="flex justify-between items-center mb-6">
                <h3 className="text-sm font-semibold text-gray-900 dark:text-white">Transaction Ledger</h3>
              </div>

              {showManualAdd && (
                <div className="flex flex-col md:flex-row gap-3 mb-6 p-4 bg-black/5 dark:bg-white/5 rounded-xl border border-gray-200 dark:border-pd-glassBorder">
                  <select value={newTx.type} onChange={e => setNewTx({...newTx, type: e.target.value})} className="bg-white dark:bg-black/40 border border-gray-200 dark:border-white/10 rounded-lg px-3 py-2 text-sm text-gray-900 dark:text-white focus:border-pd-teal outline-none appearance-none">
                    <option value="Expense">Expense</option>
                    <option value="Income">Income</option>
                  </select>
                  <input type="text" placeholder="Amount (e.g. 50.00)" value={newTx.amount} onChange={e => setNewTx({...newTx, amount: e.target.value})} className="flex-1 bg-white dark:bg-black/40 border border-gray-200 dark:border-white/10 rounded-lg px-3 py-2 text-sm text-gray-900 dark:text-white focus:border-pd-teal outline-none" />
                  <input type="text" placeholder="Description (e.g. Software Sub)" value={newTx.description} onChange={e => setNewTx({...newTx, description: e.target.value})} className="flex-[2] bg-white dark:bg-black/40 border border-gray-200 dark:border-white/10 rounded-lg px-3 py-2 text-sm text-gray-900 dark:text-white focus:border-pd-teal outline-none" />
                  <button onClick={handleAddTx} className="bg-pd-teal hover:bg-pd-teal/80 text-black font-semibold rounded-lg px-4 py-2 text-sm transition-colors shadow-[0_0_15px_rgba(0,242,234,0.3)]">Save</button>
                </div>
              )}

              <div className="overflow-x-auto">
                <table className="w-full text-left border-collapse min-w-[500px]">
                  <thead>
                    <tr className="border-b border-gray-200 dark:border-pd-glassBorder text-xs text-gray-500 uppercase tracking-wider">
                      <th className="pb-3 font-medium">Date</th>
                      <th className="pb-3 font-medium">Description</th>
                      <th className="pb-3 font-medium">Type</th>
                      <th className="pb-3 font-medium text-right">Amount</th>
                    </tr>
                  </thead>
                  <tbody>
                    {transactions.length === 0 ? (
                      <tr><td colSpan="4" className="py-8 text-center text-xs text-gray-500 italic">No manual transactions logged yet.</td></tr>
                    ) : transactions.map((t, i) => (
                      <tr key={i} className="border-b border-gray-100 dark:border-white/5 last:border-0 hover:bg-black/5 dark:hover:bg-white/5 transition-colors">
                        <td className="py-3 text-sm text-gray-500">{new Date(t.created_at).toLocaleDateString()}</td>
                        <td className="py-3 text-sm text-gray-900 dark:text-white">{t.description}</td>
                        <td className="py-3 text-sm"><span className={`px-2 py-0.5 rounded text-[10px] ${t.type === 'Income' ? 'bg-green-500/10 text-green-500' : 'bg-red-500/10 text-red-500'}`}>{t.type}</span></td>
                        <td className={`py-3 text-sm text-right font-medium ${t.type === 'Income' ? 'text-green-500' : 'text-gray-900 dark:text-white'}`}>
                          {t.type === 'Income' ? '+' : '-'}${t.amount.toLocaleString()}
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      );
    };

    const MarketingPipeline = ({ session, onAddCampaign, setActiveModule, setTriggerPrompt }) => {
      const [campaigns, setCampaigns] = useState([]);
      const [showModal, setShowModal] = useState(false);
      const [formData, setFormData] = useState({ id: null, name: '', description: '', stage: 'Planning', agents_assigned: '' });

      const fetchCampaigns = async () => {
        let local = [];
        try {
          local = JSON.parse(localStorage.getItem('amp_campaigns') || '[]');
        } catch(e) {}
        
        if (supabaseClient) {
          const { data } = await supabaseClient.from('campaigns').select('*').order('created_at', { ascending: false });
          if (data && data.length > 0) {
            setCampaigns(data);
            return;
          }
        }
        setCampaigns(local);
      };

      useEffect(() => {
        fetchCampaigns();
        const handleSync = () => fetchCampaigns();
        window.addEventListener('amp-campaigns-updated', handleSync);
        
        if (supabaseClient) {
          const channel = supabaseClient.channel('realtime:campaigns')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'campaigns' }, fetchCampaigns)
            .subscribe();
          return () => { 
            supabaseClient.removeChannel(channel); 
            window.removeEventListener('amp-campaigns-updated', handleSync);
          };
        }
        return () => window.removeEventListener('amp-campaigns-updated', handleSync);
      }, []);

      const handleSave = async () => {
        const payload = { ...formData };
        let local = JSON.parse(localStorage.getItem('amp_campaigns') || '[]');
        
        if (formData.id) {
          local = local.map(c => c.id === formData.id ? payload : c);
        } else {
          payload.id = Date.now().toString();
          payload.created_at = new Date().toISOString();
          local.unshift(payload);
        }
        
        localStorage.setItem('amp_campaigns', JSON.stringify(local));
        setCampaigns(local);
        setShowModal(false);

        if (!supabaseClient) return;
        if (formData.id) {
          await supabaseClient.from('campaigns').update(payload).eq('id', formData.id);
        } else {
          delete payload.id;
          await supabaseClient.from('campaigns').insert([payload]);
        }
      };

      const handleActivate = async (campaign) => {
        const updated = { ...campaign, stage: 'Active' };
        let local = JSON.parse(localStorage.getItem('amp_campaigns') || '[]');
        local = local.map(c => c.id === campaign.id ? updated : c);
        localStorage.setItem('amp_campaigns', JSON.stringify(local));
        setCampaigns(local);
        
        if (supabaseClient) {
          await supabaseClient.from('campaigns').update({ stage: 'Active' }).eq('id', campaign.id);
        }

        setActiveModule('neural-chat');
        setTimeout(() => {
          setTriggerPrompt({ 
            sender: 'user', 
            text: `I have activated the marketing campaign: "${campaign.name}". Strategy: ${campaign.description}. Please deploy the necessary sub-agents (CMO, Creative, CTO) to execute this by creating active tasks for them.`, 
            time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) 
          });
        }, 300);
      };

      return (
        <div className="p-4 md:p-8 h-full flex flex-col relative">
          <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 md:mb-8 gap-4">
            <div><h2 className="text-xl md:text-2xl font-semibold tracking-tight text-gray-900 dark:text-white mb-1">Marketing Pipeline</h2><p className="text-xs text-gray-500">Campaign execution and team resource sharing.</p></div>
            <div className="flex gap-2 w-full md:w-auto">
              <button onClick={() => { setFormData({ id: null, name: '', description: '', stage: 'Planning', agents_assigned: '' }); setShowModal(true); }} className="amp-button secondary px-4 py-2 text-xs font-medium w-full md:w-auto flex items-center justify-center">
                <iconify-icon icon="solar:pen-linear" className="mr-2"></iconify-icon> Manual Entry
              </button>
              <button onClick={onAddCampaign} className="amp-button primary px-4 py-2 text-xs font-medium w-full md:w-auto flex items-center justify-center">
                <iconify-icon icon="solar:add-circle-linear" className="mr-2"></iconify-icon> Ask CEO to Add
              </button>
            </div>
          </div>
          <div className="flex gap-4 md:gap-6 overflow-x-auto pb-4 flex-1 snap-x snap-mandatory">
            {['Planning', 'Active', 'Completed'].map(col => (
              <div key={col} className="w-[85vw] sm:w-80 flex-shrink-0 flex flex-col gap-4 snap-center h-full overflow-y-auto pr-2 pb-4 hide-scrollbar">
                <h3 className="text-xs font-mono uppercase tracking-widest text-pd-orange border-b border-gray-200 dark:border-pd-glassBorder pb-2">{col}</h3>
                
                {campaigns.filter(c => c.stage === col).map(campaign => (
                  <div key={campaign.id} className="amp-card p-5 relative overflow-hidden group flex-shrink-0">
                    <div className="flex justify-between items-start mb-2">
                      <h4 className="font-semibold text-gray-900 dark:text-white flex items-center gap-2">
                        {campaign.name}
                        <button onClick={() => { setFormData(campaign); setShowModal(true); }} className="opacity-0 group-hover:opacity-100 text-gray-400 hover:text-pd-teal transition-all" title="Edit">
                          <iconify-icon icon="solar:pen-linear"></iconify-icon>
                        </button>
                      </h4>
                    </div>
                    <p className="text-xs text-gray-500 mb-4 line-clamp-3" title={campaign.description}>{campaign.description || 'No description'}</p>
                    <div className="flex justify-between items-center mt-auto border-t border-gray-200 dark:border-white/10 pt-3">
                      <div className="flex flex-wrap gap-1">
                        {campaign.agents_assigned && campaign.agents_assigned.split(',').map((agent, i) => (
                          <span key={i} className="px-1.5 py-0.5 bg-pd-teal/20 text-pd-teal rounded text-[9px] font-bold uppercase">{agent.trim()}</span>
                        ))}
                      </div>
                      {col === 'Planning' && (
                        <button onClick={() => handleActivate(campaign)} className="flex items-center gap-1 text-[10px] bg-pd-orange/10 hover:bg-pd-orange/20 text-pd-orange px-2 py-1 rounded transition-colors font-semibold shadow-sm">
                          <iconify-icon icon="solar:play-circle-bold"></iconify-icon> Activate
                        </button>
                      )}
                    </div>
                  </div>
                ))}
                
                {col === 'Planning' && campaigns.filter(c => c.stage === col).length === 0 && (
                  <div className="amp-card p-4 opacity-70 border-dashed cursor-pointer hover:bg-black/5 dark:hover:bg-white/5 transition-colors flex-shrink-0" onClick={onAddCampaign}>
                    <div className="flex items-center justify-center h-16 text-xs text-gray-500"><iconify-icon icon="solar:add-circle-linear" className="mr-1"></iconify-icon> Add Campaign</div>
                  </div>
                )}
              </div>
            ))}
          </div>

          {showModal && (
            <div className="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div className="bg-white dark:bg-[#0b0f19] border border-gray-200 dark:border-pd-glassBorder rounded-2xl w-full max-w-md p-6 shadow-2xl">
                <div className="flex justify-between items-center mb-4">
                  <h3 className="font-semibold">{formData.id ? 'Edit Campaign' : 'Manual Campaign Entry'}</h3>
                  <button onClick={() => setShowModal(false)} className="text-gray-500 hover:text-gray-900 dark:hover:text-white"><iconify-icon icon="solar:close-circle-linear" width="20"></iconify-icon></button>
                </div>
                <div className="space-y-4">
                  <div>
                    <label className="block text-xs text-gray-500 mb-1">Campaign Name</label>
                    <input type="text" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} className="w-full bg-black/5 dark:bg-white/10 border-none rounded-xl px-4 py-2 text-sm focus:ring-1 focus:ring-pd-teal outline-none" placeholder="e.g. Q4 Holiday Push" />
                  </div>
                  <div>
                    <label className="block text-xs text-gray-500 mb-1">Description & Strategy</label>
                    <textarea value={formData.description} onChange={e => setFormData({...formData, description: e.target.value})} className="w-full bg-black/5 dark:bg-white/10 border-none rounded-xl px-4 py-3 text-sm focus:ring-1 focus:ring-pd-teal outline-none resize-none" rows="3" placeholder="Outline the campaign goals..."></textarea>
                  </div>
                  <div className="flex gap-4">
                    <div className="flex-1">
                      <label className="block text-xs text-gray-500 mb-1">Stage</label>
                      <select value={formData.stage} onChange={e => setFormData({...formData, stage: e.target.value})} className="w-full bg-black/5 dark:bg-white/10 border-none rounded-xl px-4 py-2 text-sm focus:ring-1 focus:ring-pd-teal outline-none appearance-none">
                        <option>Planning</option>
                        <option>Active</option>
                        <option>Completed</option>
                      </select>
                    </div>
                    <div className="flex-1">
                      <label className="block text-xs text-gray-500 mb-1">Agents (comma sep)</label>
                      <input type="text" value={formData.agents_assigned} onChange={e => setFormData({...formData, agents_assigned: e.target.value})} className="w-full bg-black/5 dark:bg-white/10 border-none rounded-xl px-4 py-2 text-sm focus:ring-1 focus:ring-pd-teal outline-none" placeholder="CMO, Creative" />
                    </div>
                  </div>
                  <button onClick={handleSave} className="w-full amp-button primary py-2 mt-2">Save Campaign</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    const ContentFactory = ({ session, activeTasks, depleteBudget }) => {
      const [prompt, setPrompt] = useState('');
      const [aspectRatio, setAspectRatio] = useState('1:1');
      const [references, setReferences] = useState([]);
      const [isGenerating, setIsGenerating] = useState(false);
      const [result, setResult] = useState(null);
      const fileRef = useRef(null);

      // Filter tasks to get creative agent generated assets
      const archiveItems = activeTasks ? activeTasks.filter(t => t.agent === 'Creative' && t.status === 'done' && t.notes) : [];

      const handleFile = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (ev) => {
            setReferences(prev => [...prev, { data: ev.target.result.split(',')[1], mimeType: file.type, preview: ev.target.result }]);
          };
          reader.readAsDataURL(file);
        }
      };

      const handleGenerate = async () => {
        if (!prompt.trim()) return;
        setIsGenerating(true);
        setResult(null);

        try {
          if (depleteBudget) depleteBudget('Creative', 5); // Deplete 5% per generation
          const res = await fetch('/.netlify/functions/content', {
            method: 'POST',
            body: JSON.stringify({
              prompt,
              aspectRatio,
              referenceImages: references.map(r => ({ data: r.data, mimeType: r.mimeType })),
              userId: session?.user?.id
            })
          });
          
          if (!res.ok) {
            throw new Error(`Server returned ${res.status}: Payload too large or backend error.`);
          }
          
          const data = await res.json();
          if (data.error) throw new Error(data.error);
          
          const imageUrl = data.content;
          setResult(imageUrl);

          // Save to asset archive
          const taskPayload = {
            title: prompt.substring(0, 30) + '...',
            agent: 'Creative',
            status: 'done',
            notes: imageUrl,
            user_id: session?.user?.id || 'local'
          };
          
          const local = JSON.parse(localStorage.getItem(`amp_tasks_${userProfile?.stage || 'Default'}`) || '[]');
          local.unshift({
            id: Date.now().toString(),
            ...taskPayload,
            created_at: new Date().toISOString()
          });
          localStorage.setItem(`amp_tasks_${userProfile?.stage || 'Default'}`, JSON.stringify(local));
          window.dispatchEvent(new Event('amp-tasks-updated'));

          if (typeof supabaseClient !== 'undefined' && supabaseClient && session?.user?.id) {
            supabaseClient.from('tasks').insert([taskPayload]).then();
          }

        } catch (e) {
          console.error(e);
          setResult("[ERROR] Nano Banana Preview Failed: " + e.message);
        } finally {
          setIsGenerating(false);
          setPrompt('');
        }
      };

      return (
        <div className="p-4 md:p-6 h-full flex flex-col relative overflow-y-auto overflow-x-hidden">
          <div className="absolute inset-0 opacity-[0.03] dark:opacity-[0.05]" style={{ backgroundImage: 'radial-gradient(currentColor 1px, transparent 1px)', backgroundSize: '32px 32px' }}></div>
          <div className="relative z-10 flex flex-col md:flex-row justify-between items-start md:items-center mb-4 md:mb-6 gap-2">
            <div>
              <h2 className="text-xl md:text-2xl font-semibold tracking-tight text-gray-900 dark:text-white mb-1 flex items-center gap-2">Content Factory <span className="text-[10px] font-mono bg-pd-teal/20 text-pd-teal px-2 py-0.5 rounded">NANO BANANA</span></h2>
              <p className="text-xs text-gray-500">Upload brand references and prompt the AI to generate tailored visual assets.</p>
            </div>
            {references.length > 0 && (
              <div className="flex items-center gap-2">
                <span className="text-xs text-gray-500">{references.length} references attached</span>
                <button onClick={() => setReferences([])} className="text-xs text-red-500 hover:underline">Clear</button>
              </div>
            )}
          </div>
          
          <div className="flex-1 flex flex-col-reverse md:flex-row gap-4 md:gap-6 relative z-10 h-full pb-4">
            <div className="flex-1 border-2 border-dashed border-gray-300 dark:border-pd-glassBorder rounded-2xl md:rounded-3xl flex flex-col items-center justify-center relative bg-white/40 dark:bg-black/20 backdrop-blur-md shadow-inner overflow-hidden min-h-[300px]">
              
              <div className="absolute top-2 md:top-4 left-2 md:left-4 flex flex-wrap gap-2 z-10">
                <div className="px-2 md:px-3 py-1 bg-white/80 dark:bg-black/40 border border-pd-orange/30 rounded-full text-[10px] text-pd-orange flex items-center gap-1 backdrop-blur"><span className="w-1.5 h-1.5 rounded-full bg-pd-orange animate-pulse"></span> nano-banana-pro-preview</div>
              </div>

              {references.length > 0 && (
                <div className="absolute top-4 right-4 flex gap-2 z-10">
                  {references.map((r, i) => (
                    <img key={i} src={r.preview} className="w-10 h-10 md:w-14 md:h-14 object-cover rounded-lg border border-gray-200 dark:border-white/20 shadow-sm" alt="Ref" />
                  ))}
                </div>
              )}

              <div 
                className="border border-gray-200 dark:border-pd-glassBorder rounded-2xl bg-gradient-to-br from-gray-100 to-gray-200 dark:from-white/5 dark:to-white/10 flex items-center justify-center group relative shadow-2xl overflow-hidden mt-8 md:mt-0 p-4 transition-all duration-500 ease-in-out"
                style={
                  aspectRatio === '16:9' ? { width: '550px', height: '310px', maxWidth: '100%' } :
                  aspectRatio === '9:16' ? { width: '310px', height: '550px', maxWidth: '100%' } :
                  aspectRatio === '4:3' ? { width: '450px', height: '337px', maxWidth: '100%' } :
                  aspectRatio === '3:4' ? { width: '337px', height: '450px', maxWidth: '100%' } :
                  { width: '400px', height: '400px', maxWidth: '100%' }
                }
              >
                {isGenerating ? (
                   <div className="flex flex-col items-center gap-4">
                     <div className="w-10 h-10 border-4 border-pd-teal border-t-transparent rounded-full animate-spin"></div>
                     <span className="text-xs text-pd-teal font-mono tracking-widest animate-pulse">GENERATING ASSET...</span>
                   </div>
                ) : result ? (
                   <div className="w-full h-full overflow-y-auto text-xs text-gray-800 dark:text-gray-200 whitespace-pre-wrap flex items-center justify-center">
                     {result.startsWith('http') || result.startsWith('data:image') ? <img src={result} className="max-w-full max-h-full rounded" alt="Generated" /> : <p className="p-4">{result}</p>}
                   </div>
                ) : (
                  <>
                    <div className="absolute inset-0 bg-pd-teal/5 mix-blend-overlay animate-pulse"></div>
                    <div className="text-center z-10">
                      <iconify-icon icon="solar:magic-stick-3-linear" width="48" className="text-gray-400 dark:text-gray-500 opacity-50 mb-2"></iconify-icon>
                      <div className="text-xs text-gray-500 dark:text-gray-400 font-mono">Awaiting Prompt</div>
                    </div>
                  </>
                )}
              </div>

              <div className="w-full max-w-xl px-2 md:px-4 z-10 mt-auto pt-4 mb-4 md:mb-6">
                <div className="relative">
                  <input type="file" ref={fileRef} onChange={handleFile} accept="image/*" className="hidden" />
                  <input type="text" value={prompt} onChange={e => setPrompt(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleGenerate()} onFocus={(e) => setTimeout(() => e.target.scrollIntoView({ behavior: 'smooth', block: 'center' }), 300)} placeholder={references.length === 0 ? "Upload brand materials first, then type prompt..." : "Prompt (e.g. 'Generate a new logo')..."} className="w-full bg-white/90 dark:bg-pd-glass border border-gray-200 dark:border-pd-glassBorder rounded-full pl-4 md:pl-6 pr-24 md:pr-28 py-3 md:py-4 text-sm text-gray-900 dark:text-white focus:outline-none focus:border-pd-orange/50 shadow-2xl backdrop-blur-xl" />
                  
                  <div className="absolute right-1.5 md:right-2 top-1/2 -translate-y-1/2 flex items-center gap-1.5 md:gap-2">
                    <select value={aspectRatio} onChange={e => setAspectRatio(e.target.value)} className="bg-transparent text-xs text-gray-500 hover:text-pd-teal focus:outline-none cursor-pointer border-none appearance-none px-2 hidden sm:block">
                      <option value="1:1">1:1</option>
                      <option value="16:9">16:9</option>
                      <option value="9:16">9:16</option>
                      <option value="4:3">4:3</option>
                      <option value="3:4">3:4</option>
                    </select>
                    <button onClick={() => fileRef.current?.click()} className="w-8 md:w-10 h-8 md:h-10 rounded-full bg-pd-teal/20 text-pd-teal flex items-center justify-center hover:bg-pd-teal hover:text-white transition-all group relative">
                      <iconify-icon icon="solar:paperclip-linear" width="18"></iconify-icon>
                      <span className="absolute bottom-full mb-2 px-2 py-1 bg-black text-white text-[10px] rounded opacity-0 group-hover:opacity-100 whitespace-nowrap pointer-events-none transition-opacity hidden md:block">Attach Reference</span>
                    </button>
