<!DOCTYPE html>
<html lang="en" class=""><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMP Center | Project D</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
      darkMode: 'class',
      theme: {
      extend: {
      colors: {
      pd: {
      teal: '#00F2EA',
      orange: '#FF5F00',
      dark: '#0b0f19',
      glass: 'rgba(255, 255, 255, 0.03)',
      glassBorder: 'rgba(255, 255, 255, 0.08)'
      }
      },
      animation: {
      'blob': 'blob 7s infinite',
      'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
      },
      keyframes: {
      blob: {
      '0%': { transform: 'translate(0px, 0px) scale(1)' },
      '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
      '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
      '100%': { transform: 'translate(0px, 0px) scale(1)' },
      }
      }
      }
      }
      };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <script crossorigin="" src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin="" src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      body {
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      background-color: #f9fafb;
      color: #111827;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      transition: background-color 0.3s, color 0.3s;
      }
      .dark body { background-color: #0b0f19; color: #f3f4f6; }
      .amp-card {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(0, 0, 0, 0.05);
      border-radius: 20px;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }
      .dark .amp-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); }
      .amp-card:hover {
      transform: translateY(-4px);
      border-color: #00F2EA;
      box-shadow: 0 10px 30px -10px rgba(0, 242, 234, 0.15);
      }
      .amp-button {
      background: rgba(0, 0, 0, 0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 0, 0, 0.1);
      border-radius: 9999px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      color: #111;
      }
      .dark .amp-button { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: #fff; }
      .amp-button::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 95, 0, 0.2), transparent);
      transform: translateX(-100%);
      transition: transform 0.5s ease;
      }
      .amp-button:hover::before { transform: translateX(100%); }
      .amp-button:hover { border-color: #FF5F00; box-shadow: 0 0 20px rgba(255, 95, 0, 0.3); transform: scale(1.02); color: #FF5F00; }
      .dark .amp-button:hover { color: white; }
      .amp-button.primary { background: rgba(255, 95, 0, 0.15); border-color: rgba(255, 95, 0, 0.5); color: #FF5F00; }
      .dark .amp-button.primary { color: white; }
      .amp-button.primary:hover { background: rgba(255, 95, 0, 0.3); }
      .glass-reveal {
      animation: glassReveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
      transform: translateY(20px) scale(0.95);
      }
      @keyframes glassReveal { to { opacity: 1; transform: translateY(0) scale(1); } }
      .stagger-1 { animation-delay: 0.1s; }
      .stagger-2 { animation-delay: 0.2s; }
      .stagger-3 { animation-delay: 0.3s; }
      .stagger-4 { animation-delay: 0.4s; }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(0, 0, 0, 0.1); border-radius: 10px; }
      .dark ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); }
      ::-webkit-scrollbar-thumb:hover { background: rgba(0, 0, 0, 0.2); }
      .dark ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }
      .toggle-checkbox:checked + .toggle-label { background-color: #FF5F00; border-color: #FF5F00; }
      .toggle-checkbox:checked + .toggle-label .toggle-thumb { transform: translateX(100%); border-color: #FF5F00; }
      .toggle-label { background-color: rgba(0,0,0,0.1); border: 1px solid rgba(0,0,0,0.2); }
      .dark .toggle-label { background-color: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); }
      .tree-line-v { width: 1px; background: linear-gradient(to bottom, rgba(0,0,0,0.2), transparent); }
      .dark .tree-line-v { background: linear-gradient(to bottom, rgba(255,255,255,0.2), transparent); }
      .tree-line-h { height: 1px; background: rgba(0,0,0,0.2); }
      .dark .tree-line-h { background: rgba(255,255,255,0.2); }
      .hide-scrollbar::-webkit-scrollbar { display: none; }
      .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
  </head>
  <body>
    <div class="fixed inset-0 w-full h-full overflow-hidden pointer-events-none z-0 bg-gray-50 dark:bg-[#0b0f19]" id="bg-container"></div>
    <div id="root" class="relative z-10 w-full min-h-screen flex text-gray-800 dark:text-gray-200"></div>

    <script type="text/babel">
      const { useState, useEffect, useRef } = React;

      const ThemeToggle = () => {
        const [isDark, setIsDark] = useState(() => document.documentElement.classList.contains('dark'));
        const toggle = () => {
          const next = !isDark;
          setIsDark(next);
          if (next) document.documentElement.classList.add('dark');
          else document.documentElement.classList.remove('dark');
        };
        return (
          <div className="flex items-center gap-2 z-50">
            <a href="index.html" className="w-10 h-10 rounded-xl flex items-center justify-center bg-gray-200/50 dark:bg-pd-glass border border-gray-300 dark:border-pd-glassBorder hover:scale-105 transition-all text-gray-600 dark:text-gray-400 hover:text-pd-teal shadow-sm">
              <iconify-icon icon="solar:home-2-linear" width="20"></iconify-icon>
            </a>
            <button onClick={toggle} className="w-10 h-10 rounded-xl flex items-center justify-center bg-gray-200/50 dark:bg-pd-glass border border-gray-300 dark:border-pd-glassBorder hover:scale-105 transition-all text-gray-600 dark:text-gray-400 hover:text-pd-teal shadow-sm">
              <iconify-icon icon={isDark ? "solar:sun-linear" : "solar:moon-linear"} width="20"></iconify-icon>
            </button>
          </div>
        );
      };

      const Background = ({ typingSpeed }) => {
        const duration = Math.max(1.5, 7 - typingSpeed * 0.5);
        const isDark = document.documentElement.classList.contains('dark');
        return (
          <div className="fixed inset-0 w-full h-full pointer-events-none opacity-50 z-0">
            <div className="absolute top-[10%] -left-[10%] w-[40vw] h-[40vw] bg-pd-orange rounded-full mix-blend-screen filter blur-[120px] opacity-20" style={{ animation: `blob ${duration}s infinite` }} />
            <div className="absolute top-[5%] -right-[5%] w-[35vw] h-[35vw] bg-pd-teal rounded-full mix-blend-screen filter blur-[100px] opacity-20" style={{ animation: `blob ${duration}s infinite`, animationDelay: '2s' }} />
            <div className="absolute -bottom-[20%] -left-[10%] w-[50vw] h-[50vw] bg-pd-teal rounded-full mix-blend-screen filter blur-[150px] opacity-20" style={{ animation: `blob ${duration}s infinite`, animationDelay: '4s' }} />
            <div className="absolute -bottom-[10%] right-[10%] w-[35vw] h-[35vw] bg-pd-orange rounded-full mix-blend-screen filter blur-[100px] opacity-20" style={{ animation: `blob ${duration}s infinite`, animationDelay: '2s' }} />
            <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-[60vw] h-[60vw] bg-gradient-to-r from-pd-orange/10 to-pd-teal/10 rounded-full filter blur-[120px] opacity-30 animate-pulse"></div>
            <div className="absolute inset-0 opacity-[0.03]" style={{ backgroundImage: 'radial-gradient(currentColor 1px, transparent 1px)', backgroundSize: '32px 32px' }}></div>
          </div>
        );
      };

      const Genesis = ({ onComplete, typingSpeed, setTypingSpeed }) => {
        const [input, setInput] = useState('');
        const [stage, setStage] = useState(0);
        const [ceoText, setCeoText] = useState('');
        const fullCeoText = "Initialization complete. I am your Custom CEO Agent. I have analyzed your kingdom parameters and am assembling your autonomous workforce...";

        const handleType = (e) => {
          setInput(e.target.value);
          setTypingSpeed(prev => Math.min(prev + 1, 10));
          clearTimeout(window.typingTimer);
          window.typingTimer = setTimeout(() => setTypingSpeed(0), 1000);
        };

        const handleSubmit = (e) => {
          if (e && e.preventDefault) e.preventDefault();
          if (!input.trim()) return;
          setStage(1);
          setTypingSpeed(0);
        };

        useEffect(() => {
          if (stage === 1) {
            let i = 0;
            const interval = setInterval(() => {
              setCeoText(fullCeoText.substring(0, i));
              i++;
              if (i > fullCeoText.length) {
                clearInterval(interval);
                setTimeout(() => setStage(2), 500);
              }
            }, 30);
            return () => clearInterval(interval);
          }
        }, [stage]);

        return (
          <div className="w-full min-h-screen flex flex-col items-center justify-center p-6 relative z-10">
            <div className="absolute top-6 right-6"><ThemeToggle /></div>
            {stage === 0 && (
              <div className="w-full max-w-2xl mx-auto glass-reveal flex flex-col items-center">
                <div className="w-12 h-12 rounded-full border border-gray-200 dark:border-pd-glassBorder bg-white/40 dark:bg-pd-glass flex items-center justify-center mb-8 shadow-sm">
                   <iconify-icon icon="solar:command-linear" width="24" className="text-gray-500 dark:text-gray-400"></iconify-icon>
                </div>
                <h1 className="text-3xl sm:text-4xl md:text-5xl font-medium tracking-tight mb-4 text-center drop-shadow-lg text-gray-900 dark:text-white">
                  Describe your <span className="text-transparent bg-clip-text bg-gradient-to-r from-pd-orange to-pd-teal">digital kingdom...</span>
                </h1>
                <p className="text-sm text-gray-500 dark:text-gray-400 mb-8 md:mb-12 text-center">(Tell the Agent what kind of business you have)</p>
                <div className="w-full relative">
                  <input
                    autoFocus type="text" value={input} onChange={handleType} onKeyDown={(e) => { if (e.key === 'Enter') handleSubmit(e); }}
                    className="w-full bg-white/40 dark:bg-pd-glass border border-gray-200 dark:border-pd-glassBorder rounded-2xl px-4 md:px-6 pr-14 md:pr-16 py-4 md:py-5 text-base md:text-lg text-gray-900 dark:text-white placeholder-gray-500 focus:outline-none focus:border-pd-teal/50 focus:ring-1 focus:ring-pd-teal/50 transition-all backdrop-blur-xl shadow-xl"
                    placeholder="e.g. A digital marketing agency focusing on Web3..."
                  />
                  <button type="button" onClick={handleSubmit} className="absolute right-2 md:right-3 top-1/2 -translate-y-1/2 w-10 md:w-12 h-10 md:h-12 rounded-xl bg-black/5 dark:bg-white/10 hover:bg-pd-orange/20 border border-black/10 dark:border-white/10 hover:border-pd-orange/50 flex items-center justify-center transition-all text-gray-900 dark:text-white hover:text-pd-orange">
                    <iconify-icon icon="solar:arrow-right-linear" width="20"></iconify-icon>
                  </button>
                </div>
              </div>
            )}
            {stage >= 1 && (
              <div className="w-full max-w-4xl mx-auto flex flex-col items-center justify-start pt-10">
                <div className="glass-reveal mb-12 w-full max-w-2xl bg-white/40 dark:bg-pd-glass border border-gray-200 dark:border-pd-glassBorder rounded-2xl p-6 backdrop-blur-xl flex gap-4 items-start shadow-lg">
                  <div className="w-10 h-10 rounded-full bg-white/40 dark:bg-pd-glass border border-gray-200 dark:border-pd-glassBorder flex items-center justify-center flex-shrink-0">
                    <iconify-icon icon="solar:user-bold" width="20" className="text-pd-teal"></iconify-icon>
                  </div>
                  <div>
                    <div className="text-xs font-mono text-pd-teal mb-1 uppercase tracking-widest">CEO Agent</div>
                    <p className="text-gray-800 dark:text-gray-200 leading-relaxed min-h-[3rem]">{ceoText}</p>
                  </div>
                </div>
                {stage === 2 && (
                  <div className="flex flex-col items-center w-full relative">
                    <div className="amp-card p-4 flex items-center gap-4 w-64 justify-center glass-reveal z-10">
                       <div className="w-8 h-8 rounded-full bg-white/40 dark:bg-pd-glass border border-gray-200 dark:border-pd-glassBorder flex items-center justify-center">
                          <iconify-icon icon="solar:crown-minimalistic-linear" width="16" className="text-pd-orange"></iconify-icon>
                       </div>
                       <div>
                         <div className="text-sm font-semibold text-gray-900 dark:text-white">CEO</div>
                         <div className="text-[10px] text-gray-500 dark:text-gray-400 flex items-center gap-1">
                           <span className="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></span> Active
                         </div>
                       </div>
                    </div>
                    <div className="tree-line-v h-8 glass-reveal stagger-1 hidden md:block"></div>
                    <div className="tree-line-h w-full max-w-2xl relative glass-reveal stagger-1 hidden md:block">
                      <div className="absolute top-0 left-0 w-[1px] h-6 tree-line-v"></div>
                      <div className="absolute top-0 right-0 w-[1px] h-6 tree-line-v"></div>
                      <div className="absolute top-0 left-1/2 w-[1px] h-6 tree-line-v"></div>
                    </div>
                    <div className="h-6 hidden md:block"></div>
                    <div className="flex flex-col md:flex-row w-full max-w-3xl justify-between gap-4 relative z-10 px-4 mt-6 md:mt-0">
                      <div className="amp-card p-4 flex flex-col items-center gap-2 w-full md:w-48 text-center glass-reveal stagger-2 border-pd-teal/30">
                         <div className="w-8 h-8 rounded-full bg-white/40 dark:bg-pd-glass border border-gray-200 dark:border-pd-glassBorder flex items-center justify-center text-pd-teal">
                            <iconify-icon icon="solar:global-linear" width="16"></iconify-icon>
                         </div>
                         <div>
                           <div className="text-sm font-semibold text-gray-900 dark:text-white">CMO Agent</div>
                           <div className="text-[10px] text-gray-500 dark:text-gray-400 mt-1">Lead Gen & Marketing</div>
                         </div>
                      </div>
                      <div className="amp-card p-4 flex flex-col items-center gap-2 w-full md:w-48 text-center glass-reveal stagger-3">
                         <div className="w-8 h-8 rounded-full bg-white/40 dark:bg-pd-glass border border-gray-200 dark:border-pd-glassBorder flex items-center justify-center text-gray-500">
                            <iconify-icon icon="solar:settings-linear" width="16"></iconify-icon>
                         </div>
                         <div>
                           <div className="text-sm font-semibold text-gray-900 dark:text-white">CTO Agent</div>
                           <div className="text-[10px] text-gray-500 dark:text-gray-400 mt-1">Systems & Code</div>
                         </div>
                      </div>
                      <div className="amp-card p-4 flex flex-col items-center gap-2 w-full md:w-48 text-center glass-reveal stagger-4 border-pd-orange/30">
                         <div className="w-8 h-8 rounded-full bg-white/40 dark:bg-pd-glass border border-gray-200 dark:border-pd-glassBorder flex items-center justify-center text-pd-orange">
                            <iconify-icon icon="solar:palette-linear" width="16"></iconify-icon>
                         </div>
                         <div>
                           <div className="text-sm font-semibold text-gray-900 dark:text-white">Creative Agent</div>
                           <div className="text-[10px] text-gray-500 dark:text-gray-400 mt-1">Content & Assets</div>
                         </div>
                      </div>
                    </div>
                    <div className="mt-16 glass-reveal stagger-4 flex justify-center w-full">
                      <button onClick={onComplete} className="amp-button primary px-8 py-3 text-sm font-medium tracking-wide shadow-[0_0_30px_rgba(255,95,0,0.2)]">
                        Enter Command Center <iconify-icon icon="solar:arrow-right-linear"></iconify-icon>
                      </button>
                    </div>
                  </div>
                )}
              </div>
            )}
          </div>
        );
      };

      const CommandCenter = () => {
        const [activeModule, setActiveModule] = useState('neural-chat');
        const [isStatsOpen, setIsStatsOpen] = useState(false);
        const [isRightSidebarCollapsed, setIsRightSidebarCollapsed] = useState(false);

        const navItems = [
          { id: 'neural-chat', icon: 'solar:command-linear', label: 'Neural Chat', mobileLabel: 'Chat' },
          { id: 'lead-pipeline', icon: 'solar:filter-linear', label: 'Lead Pipeline', mobileLabel: 'Leads' },
          { id: 'client-ledger', icon: 'solar:folder-with-files-linear', label: 'Client Ledger', mobileLabel: 'Clients' },
          { id: 'marketing-pipeline', icon: 'solar:chart-square-linear', label: 'Marketing Pipeline', mobileLabel: 'Marketing' },
          { id: 'content-factory', icon: 'solar:palette-linear', label: 'Content Factory', mobileLabel: 'Content' },
          { id: 'tactical-calendar', icon: 'solar:calendar-linear', label: 'Tactical Calendar', mobileLabel: 'Calendar' },
        ];

        return (
          <div className="flex flex-col lg:flex-row w-full h-screen overflow-hidden p-2 sm:p-4 gap-2 sm:gap-4 z-10 relative glass-reveal">
            
            {/* Mobile Header */}
            <div className="lg:hidden flex justify-between items-center bg-white/40 dark:bg-pd-glass border border-gray-200 dark:border-pd-glassBorder backdrop-blur-2xl rounded-2xl p-3 shadow-sm z-40 flex-shrink-0">
               <div className="flex items-center gap-3">
                   <img src="https://hoirqrkdgbmvpwutwuwj.supabase.co/storage/v1/object/public/assets/assets/917d6f93-fb36-439a-8c48-884b67b35381_1600w.jpg" className="w-8 h-8 rounded object-cover shadow-[0_0_15px_rgba(0,242,234,0.3)]" alt="Project D Logo" />
                   <span className="font-bold tracking-tight text-gray-900 dark:text-white">AMP Center</span>
               </div>
               <div className="flex items-center gap-2">
                 <ThemeToggle />
                 <button onClick={() => setIsStatsOpen(true)} className="w-10 h-10 rounded-xl flex items-center justify-center bg-white/40 dark:bg-pd-glass border border-gray-200 dark:border-pd-glassBorder text-gray-600 dark:text-gray-400 relative hover:text-pd-teal hover:border-pd-teal/50 transition-all">
                   <iconify-icon icon="solar:chart-square-linear" width="20"></iconify-icon>
                   <span className="absolute top-2 right-2 w-2 h-2 rounded-full bg-pd-teal shadow-[0_0_5px_#00F2EA] animate-pulse"></span>
                 </button>
               </div>
            </div>

            {/* Desktop Sidebar */}
            <aside className="hidden lg:flex w-64 flex-col bg-white/40 dark:bg-pd-glass border border-gray-200 dark:border-pd-glassBorder backdrop-blur-2xl rounded-3xl overflow-hidden shadow-xl flex-shrink-0">
              <div className="p-6 border-b border-gray-200 dark:border-pd-glassBorder flex justify-between items-center bg-white/50 dark:bg-transparent">
                <div className="flex items-center gap-3">
                   <img src="https://hoirqrkdgbmvpwutwuwj.supabase.co/storage/v1/object/public/assets/assets/917d6f93-fb36-439a-8c48-884b67b35381_1600w.jpg" className="w-8 h-8 rounded object-cover shadow-[0_0_15px_rgba(0,242,234,0.3)]" alt="Project D Logo" />
                   <span className="font-bold tracking-tight text-gray-900 dark:text-white">AMP Center</span>
                </div>
                <ThemeToggle />
              </div>
              <nav className="flex-1 p-4 flex flex-col gap-2 overflow-y-auto">
                {navItems.map(item => (
                  <button key={item.id} onClick={() => setActiveModule(item.id)} className={`flex items-center gap-3 px-4 py-3 rounded-xl transition-all text-sm font-medium ${ activeModule === item.id ? 'bg-black/5 dark:bg-white/10 text-gray-900 dark:text-white shadow-sm' : 'text-gray-500 dark:text-gray-400 hover:bg-black/5 dark:hover:bg-white/5 hover:text-gray-900 dark:hover:text-gray-200' }`}>
                    <iconify-icon icon={item.icon} width="20" className={activeModule === item.id ? 'text-pd-teal' : ''}></iconify-icon>
                    {item.label}
                  </button>
                ))}
              </nav>
              <div className="p-4 border-t border-gray-200 dark:border-pd-glassBorder">
                <div className="amp-card p-3 flex items-center gap-3 text-xs text-gray-500 dark:text-gray-400">
                  <div className="w-2 h-2 rounded-full bg-green-500 shadow-[0_0_8px_#22c55e] animate-pulse"></div>
                  System Online: 4 Agents
                </div>
              </div>
            </aside>

            {/* Mobile Bottom Navigation */}
            <nav className="lg:hidden fixed bottom-4 left-4 right-4 bg-white/95 dark:bg-[#0b0f19]/95 border border-gray-200 dark:border-pd-glassBorder backdrop-blur-2xl rounded-2xl flex p-2 gap-1 overflow-x-auto z-40 shadow-2xl hide-scrollbar snap-x snap-mandatory">
               {navItems.map(item => (
                  <button key={item.id} onClick={() => setActiveModule(item.id)} className={`flex flex-col items-center justify-center min-w-[72px] sm:min-w-[80px] p-2 rounded-xl transition-all text-[10px] font-medium snap-center flex-shrink-0 ${ activeModule === item.id ? 'bg-pd-teal/10 text-pd-teal shadow-inner' : 'text-gray-500 hover:bg-black/5 dark:hover:bg-white/5' }`}>
                    <iconify-icon icon={item.icon} width="22" className="mb-1"></iconify-icon>
                    <span className="truncate w-full text-center">{item.mobileLabel}</span>
                  </button>
               ))}
            </nav>

            <main className="flex-1 bg-white/40 dark:bg-pd-glass border border-gray-200 dark:border-pd-glassBorder backdrop-blur-2xl rounded-2xl lg:rounded-3xl overflow-hidden shadow-xl relative flex flex-col min-h-0 mb-[80px] lg:mb-0">
              {activeModule === 'neural-chat' && <NeuralChat />}
              {activeModule === 'lead-pipeline' && <LeadPipeline />}
              {activeModule === 'client-ledger' && <ClientLedger />}
              {activeModule === 'marketing-pipeline' && <MarketingPipeline />}
              {activeModule === 'tactical-calendar' && <TacticalCalendar />}
              {activeModule === 'content-factory' && <ContentFactory />}
            </main>

            {/* Desktop Expand Tab */}
            {isRightSidebarCollapsed && (
               <button onClick={() => setIsRightSidebarCollapsed(false)} className="hidden lg:flex absolute top-[10%] right-0 w-10 h-16 bg-white/60 dark:bg-white/10 border border-r-0 border-gray-200 dark:border-pd-glassBorder rounded-l-2xl items-center justify-center shadow-[0_0_20px_rgba(0,0,0,0.1)] backdrop-blur-2xl text-gray-600 dark:text-gray-400 hover:text-pd-teal hover:bg-white/80 dark:hover:bg-white/20 transition-all z-40 group cursor-pointer">
                  <iconify-icon icon="solar:alt-arrow-left-linear" width="20" className="group-hover:-translate-x-1 transition-transform"></iconify-icon>
               </button>
            )}
