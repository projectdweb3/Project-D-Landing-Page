      const storageKey = `amp_inventory_${currentStage}`;

      const deleteProduct = async (reason) => {
        if (!itemToDelete) return;
        const id = itemToDelete.id;
        const local = JSON.parse(localStorage.getItem(storageKey) || '[]');
        const updated = local.filter(l => l.id !== id);
        localStorage.setItem(storageKey, JSON.stringify(updated));
        setInventory(updated);

        if (!supabaseClient) return;
        try { 
          await supabaseClient.from('inventory').delete().eq('id', id); 
        } catch(e){}
      };

      const fetchInventory = async () => {
        let currentLocal = [];
        try {
          currentLocal = JSON.parse(localStorage.getItem(storageKey) || '[]');
        } catch(e) {}

        if (supabaseClient && session?.user?.id) {
          try {
            const { data, error } = await supabaseClient.from('inventory').select('*').eq('business_stage', currentStage).order('created_at', { ascending: false });
            if (!error && data) {
              const remoteIds = new Set(data.map(d => d.id || d.product_name));
              const localOnly = currentLocal.filter(l => !remoteIds.has(l.id || l.product_name));
              const merged = [...data, ...localOnly];
              setInventory(merged);
              localStorage.setItem(storageKey, JSON.stringify(merged));
              return;
            }
          } catch(e) {}
        }
        setInventory(currentLocal);
      };

      const handleSave = async () => {
        try {
          const payload = { ...formData, user_id: session?.user?.id || 'local', business_stage: currentStage };
          
          let local = [];
          try {
            const parsed = JSON.parse(localStorage.getItem(storageKey) || '[]');
            if (Array.isArray(parsed)) local = parsed;
          } catch(e) {}
          if (formData.id) {
            local = local.map(i => i.id === formData.id ? { ...i, ...payload } : i);
          } else {
            payload.id = Date.now().toString();
            payload.created_at = new Date().toISOString();
            local.unshift(payload);
          }
          localStorage.setItem(storageKey, JSON.stringify(local));
          setInventory([...local]);
          setShowModal(false);

          if (supabaseClient && session?.user?.id) {
            try {
              if (formData.id) {
                await supabaseClient.from('inventory').update(payload).eq('id', formData.id);
              } else {
                const remotePayload = { ...payload };
                delete remotePayload.id;
                await supabaseClient.from('inventory').insert([remotePayload]);
              }
            } catch (e) { console.warn("Inventory upsert failed."); }
          }
        } catch(error) {
          alert('Failed to save inventory: ' + error.message);
        }
      };

      useEffect(() => {
        fetchInventory();
        
        const handleSync = () => fetchInventory();
        window.addEventListener('amp-simulated-sale', handleSync);
        window.addEventListener('amp-inventory-updated', handleSync);
        
        if (supabaseClient) {
          const channel = supabaseClient.channel('realtime:inventory')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'inventory' }, fetchInventory)
            .subscribe();
          return () => { 
            supabaseClient.removeChannel(channel); 
            window.removeEventListener('amp-simulated-sale', handleSync);
            window.removeEventListener('amp-inventory-updated', handleSync);
          };
        }
        
        return () => {
          window.removeEventListener('amp-simulated-sale', handleSync);
          window.removeEventListener('amp-inventory-updated', handleSync);
        };

      const getAssignedAgent = (productName) => {

        const task = activeTasks.find(t =>

        <div className="p-4 md:p-8 h-full flex flex-col relative">

            </div>

              </label>

              </span></button>
              <button onClick={onSync} className="group inline-flex gap-1 transition-all duration-500 text-white overflow-hidden isolate dramatic-hover text-xs font-medium bg-pd-teal rounded-full py-2 px-4 relative backdrop-blur-md items-center justify-center w-full md:w-auto shadow-[0_4px_24px_rgba(70,212,198,0.18),0_2px_8px_rgba(255,145,70,0.12)] hover:shadow-[0_6px_32px_rgba(70,212,198,0.28),0_4px_16px_rgba(255,145,70,0.2)] hover:-translate-y-[1px] active:scale-[0.98]"><div className="absolute inset-[-200%] bg-[conic-gradient(from_90deg_at_50%_50%,transparent_0%,#ff9146_30%,#ffffff_50%,#46d4c6_70%,transparent_100%)] opacity-0 group-hover:opacity-100 transition-opacity duration-500 animate-[spin_1.5s_linear_infinite] pointer-events-none z-0"></div><div className="absolute inset-[2px] rounded-full bg-pd-teal transition-colors duration-500 pointer-events-none z-0"></div><span className="relative z-10 flex items-center gap-2"><iconify-icon icon="solar:refresh-circle-linear" className="mr-2"></iconify-icon> Ask CEO to Sync
              </span></button>
            </div>
          </div>
          
          {userProfile?.store_link && (
             <div className="mb-4 text-xs flex items-center gap-2 text-gray-500 bg-white/40 dark:bg-black/20 p-3 rounded-xl border border-gray-200 dark:border-white/10 w-fit">
               <iconify-icon icon="solar:link-circle-linear" className="text-pd-teal"></iconify-icon> Linked Store: <a href={userProfile.store_link} target="_blank" className="text-pd-teal hover:underline">{userProfile.store_link}</a>
             </div>

          <div className="bg-white/50 dark:bg-white/5 border border-gray-200 dark:border-pd-glassBorder rounded-2xl overflow-x-auto flex-1 shadow-sm">
            <table className="w-full text-left text-sm min-w-[600px]">
              <thead className="bg-black/5 dark:bg-black/20 text-xs font-mono text-gray-500 uppercase tracking-wider">
                <tr><th className="p-4">Product Name</th><th className="p-4">SKU / Link</th><th className="p-4">Stock</th><th className="p-4">Price</th><th className="p-4">Status</th><th className="p-4 text-right">Actions</th></tr>
              </thead>
              <tbody className="divide-y divide-gray-200 dark:divide-pd-glassBorder">

                    <td className="p-4 text-gray-600 dark:text-gray-300">{item.sku_link || '-'}</td>

          {showModal && (

    const FinanceTracker = ({ session, userProfile, onLogExpense, title, subtitle }) => {
      const [clients, setClients] = useState([]);
      const [transactions, setTransactions] = useState([]);
      const [autoIncome, setAutoIncome] = useState(0);
      const [showManualAdd, setShowManualAdd] = useState(false);
      const [newTx, setNewTx] = useState({ type: 'Expense', amount: '', description: '' });
      const [monthlyReport, setMonthlyReport] = useState(null);

      const isEcomm = userProfile?.stage === 'Ecomm';
      const currentStage = userProfile?.stage || 'Default';
      const storageKey = `amp_finances_${currentStage}`;

      const fetchClients = async () => {
        let currentLocal = [];
        try {
          currentLocal = JSON.parse(localStorage.getItem(`amp_clients_${currentStage}`) || '[]');
        } catch(e) {}
        
        let allClients = [...currentLocal];
        if (supabaseClient && session?.user?.id) {
           try {
             const { data, error } = await supabaseClient.from('clients').select('*').eq('business_stage', currentStage);
             if (!error && data) {
                const remoteIds = new Set(data.map(d => d.id));
                const localOnly = currentLocal.filter(l => !remoteIds.has(l.id));
                allClients = [...data, ...localOnly];
             }
           } catch(e) {}
        }
        setClients(allClients);
        let total = 0;
        allClients.forEach(c => {
          const valStr = String(isEcomm ? (c.ltv || '0') : (c.retainer || '0'));
          const val = parseFloat(valStr.replace(/[^0-9.]/g, '')) || 0;
          total += val;
        });
        setAutoIncome(total);
      };

      const fetchFinances = async () => {
        let currentLocal = [];
        try {
          currentLocal = JSON.parse(localStorage.getItem(storageKey) || '[]');
        } catch(e) {}

        if (supabaseClient && session?.user?.id) {
          try {
            const { data, error } = await supabaseClient.from('finances').select('*').eq('business_stage', currentStage).order('created_at', { ascending: false });
            if (!error && data) {
              const remoteIds = new Set(data.map(d => d.id));
              const localOnly = currentLocal.filter(l => !remoteIds.has(l.id));
              setTransactions([...data, ...localOnly]);
              return;
            }
          } catch (e) {
             console.warn("Finances table likely missing.");
          }
        }
        setTransactions(currentLocal);
      };

      useEffect(() => {
        fetchClients();
        fetchFinances();
        
        const handleSync = () => {
          fetchClients();
          fetchFinances();
        };
        window.addEventListener('amp-simulated-sale', handleSync);
        
        return () => window.removeEventListener('amp-simulated-sale', handleSync);
      }, [userProfile?.stage, session]);

      const manualIncome = transactions.filter(t => t.type === 'Income').reduce((acc, t) => acc + t.amount, 0);
      const manualExpenses = transactions.filter(t => t.type === 'Expense').reduce((acc, t) => acc + t.amount, 0);
      
      const totalIncome = autoIncome + manualIncome;
      const netProfit = totalIncome - manualExpenses;

      useEffect(() => {
        const today = new Date();
        const lastDayOfMonth = new Date(today.getFullYear(), today.getMonth() + 1, 0).getDate();
        
        if (today.getDate() === lastDayOfMonth) {
          const reportKey = `amp_report_${currentStage}_${today.getFullYear()}_${today.getMonth()}`;
          const saved = localStorage.getItem(reportKey);
          if (saved) {
            setMonthlyReport(JSON.parse(saved));
          } else if (totalIncome > 0 || manualExpenses > 0) {
            const report = {
              date: today.toLocaleDateString(),
              revenue: totalIncome,
              expenses: manualExpenses,
              profit: netProfit,
              month: today.toLocaleString('default', { month: 'long' })
            };
            localStorage.setItem(reportKey, JSON.stringify(report));
            setMonthlyReport(report);
          }
        }
      }, [totalIncome, manualExpenses, netProfit, currentStage]);

      const handleAddTx = async () => {
        if (!newTx.amount || !newTx.description) return;
        const amountNum = parseFloat(newTx.amount.replace(/[^0-9.]/g, ''));
        const payload = {
          user_id: session?.user?.id || 'local',
          business_stage: currentStage,
          type: newTx.type,
          amount: amountNum,
          description: newTx.description,
          created_at: new Date().toISOString()
        };

        if (supabaseClient && session?.user?.id) {
          try {
            await supabaseClient.from('finances').insert([payload]);
          } catch(e) {}
        }
        
        const newTxs = [payload, ...transactions];
        setTransactions(newTxs);
        localStorage.setItem(storageKey, JSON.stringify(newTxs));
        
        setNewTx({ type: 'Expense', amount: '', description: '' });
        setShowManualAdd(false);
      };

      return (
        <div className="flex flex-col h-full overflow-hidden">
          <div className="p-4 md:p-8 flex-shrink-0 flex flex-col md:flex-row justify-between items-start border-b border-gray-200 dark:border-pd-glassBorder bg-white/50 dark:bg-white/5 gap-4">
            <div>
              <h2 className="text-xl md:text-2xl font-semibold tracking-tight text-gray-900 dark:text-white mb-1">{title || 'Financial Tracker'}</h2>
              <p className="text-xs text-gray-500">{subtitle || 'Autonomous revenue tracking & expense logging.'}</p>
            </div>
            <div className="flex gap-2 w-full md:w-auto items-center">
              {monthlyReport && (
                <div className="px-3 py-1.5 rounded-lg bg-pd-teal/10 border border-pd-teal/30 text-pd-teal text-xs flex items-center gap-2 cursor-help hidden md:flex" title={`Monthly Report for ${monthlyReport.month}: Revenue: $${monthlyReport.revenue}, Expenses: $${monthlyReport.expenses}, Profit: $${monthlyReport.profit}`}>
                  <iconify-icon icon="solar:document-text-bold"></iconify-icon> {monthlyReport.month} Report Drafted
                </div>
              )}
              <button onClick={() => setShowManualAdd(!showManualAdd)} className="group inline-flex gap-1 transition-all duration-500 dark:text-white overflow-hidden isolate dark:bg-gray-800/60 text-xs font-medium text-gray-900 bg-white/60 rounded-full py-2 px-4 relative backdrop-blur-md items-center justify-center w-full md:w-auto shadow-[0_4px_24px_rgba(70,212,198,0.18),0_2px_8px_rgba(255,145,70,0.12)] hover:shadow-[0_6px_32px_rgba(70,212,198,0.28),0_4px_16px_rgba(255,145,70,0.2)] hover:-translate-y-[1px] active:scale-[0.98]"><div className="absolute inset-[-200%] bg-[conic-gradient(from_90deg_at_50%_50%,transparent_0%,#ff9146_30%,#ffffff_50%,#46d4c6_70%,transparent_100%)] opacity-0 group-hover:opacity-100 transition-opacity duration-500 animate-[spin_1.5s_linear_infinite] pointer-events-none z-0"></div><div className="absolute inset-[2px] rounded-full bg-white/90 dark:bg-gray-800/90 transition-colors duration-500 pointer-events-none z-0"></div><span className="relative z-10 flex items-center gap-2"><iconify-icon icon={showManualAdd ? "solar:close-circle-linear" : "solar:pen-linear"} className="mr-2"></iconify-icon> {showManualAdd ? 'Cancel' : 'Manual Entry'}
              </span></button>
              <button onClick={onLogExpense} className="group inline-flex gap-1 transition-all duration-500 text-white overflow-hidden isolate dramatic-hover text-xs font-medium bg-pd-teal rounded-full py-2 px-4 relative backdrop-blur-md items-center justify-center w-full md:w-auto shadow-[0_4px_24px_rgba(70,212,198,0.18),0_2px_8px_rgba(255,145,70,0.12)] hover:shadow-[0_6px_32px_rgba(70,212,198,0.28),0_4px_16px_rgba(255,145,70,0.2)] hover:-translate-y-[1px] active:scale-[0.98]"><div className="absolute inset-[-200%] bg-[conic-gradient(from_90deg_at_50%_50%,transparent_0%,#ff9146_30%,#ffffff_50%,#46d4c6_70%,transparent_100%)] opacity-0 group-hover:opacity-100 transition-opacity duration-500 animate-[spin_1.5s_linear_infinite] pointer-events-none z-0"></div><div className="absolute inset-[2px] rounded-full bg-pd-teal transition-colors duration-500 pointer-events-none z-0"></div><span className="relative z-10 flex items-center gap-2"><iconify-icon icon="solar:add-circle-linear" className="mr-2"></iconify-icon> Ask CEO to Log
              </span></button>
            </div>
          </div>

          <div className="flex-1 overflow-y-auto p-4 md:p-8 space-y-6">
            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
              <div className="bg-white/40 dark:bg-pd-glass border border-gray-200 dark:border-pd-glassBorder rounded-2xl p-5 shadow-sm">
                <div className="text-gray-500 text-xs mb-1 flex justify-between">Total Revenue <iconify-icon icon="solar:wallet-money-bold" className="text-green-500"></iconify-icon></div>
                <div className="text-2xl font-bold text-gray-900 dark:text-white">${totalIncome.toLocaleString()}</div>
                <div className="text-[10px] text-gray-400 mt-2">Autonomous: ${autoIncome.toLocaleString()} {isEcomm ? '(LTV)' : '(Retainers)'}</div>
              </div>
              <div className="bg-white/40 dark:bg-pd-glass border border-gray-200 dark:border-pd-glassBorder rounded-2xl p-5 shadow-sm">
                <div className="text-gray-500 text-xs mb-1 flex justify-between">Total Expenses <iconify-icon icon="solar:card-send-bold" className="text-red-500"></iconify-icon></div>
                <div className="text-2xl font-bold text-gray-900 dark:text-white">${manualExpenses.toLocaleString()}</div>
                <div className="text-[10px] text-gray-400 mt-2">Logged manually or by CEO</div>
              </div>
              <div className={`border rounded-2xl p-5 shadow-sm ${netProfit >= 0 ? 'bg-pd-teal/10 border-pd-teal/30' : 'bg-red-500/10 border-red-500/30'}`}>
                <div className="text-gray-500 dark:text-gray-400 text-xs mb-1 flex justify-between">Net Profit <iconify-icon icon="solar:chart-square-bold" className={netProfit >= 0 ? "text-pd-teal" : "text-red-500"}></iconify-icon></div>
                <div className={`text-2xl font-bold ${netProfit >= 0 ? 'text-pd-teal' : 'text-red-500'}`}>${netProfit.toLocaleString()}</div>
                <div className="text-[10px] text-gray-500 dark:text-gray-400 mt-2">All-time tracked</div>
              </div>
            </div>

            <div className="bg-white/60 dark:bg-pd-glass border border-gray-200 dark:border-pd-glassBorder rounded-2xl p-6 shadow-sm">
              <div className="flex justify-between items-center mb-6">
                <h3 className="text-sm font-semibold text-gray-900 dark:text-white">Transaction Ledger</h3>
              </div>

              {showManualAdd && (
                <div className="flex flex-col md:flex-row gap-3 mb-6 p-4 bg-black/5 dark:bg-white/5 rounded-xl border border-gray-200 dark:border-pd-glassBorder">
                  <select value={newTx.type} onChange={e => setNewTx({...newTx, type: e.target.value})} className="bg-white dark:bg-black/40 border border-gray-200 dark:border-white/10 rounded-lg px-3 py-2 text-sm text-gray-900 dark:text-white focus:border-pd-teal outline-none appearance-none">
                    <option value="Expense">Expense</option>
                    <option value="Income">Income</option>
                  </select>
                  <input type="text" placeholder="Amount (e.g. 50.00)" value={newTx.amount} onChange={e => setNewTx({...newTx, amount: e.target.value})} className="flex-1 bg-white dark:bg-black/40 border border-gray-200 dark:border-white/10 rounded-lg px-3 py-2 text-sm text-gray-900 dark:text-white focus:border-pd-teal outline-none" />
                  <input type="text" placeholder="Description (e.g. Software Sub)" value={newTx.description} onChange={e => setNewTx({...newTx, description: e.target.value})} className="flex-[2] bg-white dark:bg-black/40 border border-gray-200 dark:border-white/10 rounded-lg px-3 py-2 text-sm text-gray-900 dark:text-white focus:border-pd-teal outline-none" />
                  <button onClick={handleAddTx} className="bg-pd-teal hover:bg-pd-teal/80 text-black font-semibold rounded-lg px-4 py-2 text-sm transition-colors shadow-[0_0_15px_rgba(70,212,198,0.3)]">Save</button>
                </div>
              )}

              <div className="overflow-x-auto">
                <table className="w-full text-left border-collapse min-w-[500px]">
                  <thead>
                    <tr className="border-b border-gray-200 dark:border-pd-glassBorder text-xs text-gray-500 uppercase tracking-wider">
                      <th className="pb-3 font-medium">Date</th>
                      <th className="pb-3 font-medium">Description</th>
                      <th className="pb-3 font-medium">Type</th>
                      <th className="pb-3 font-medium text-right">Amount</th>
                    </tr>
                  </thead>
                  <tbody>
                    {transactions.length === 0 ? (
                      <tr><td colSpan="4" className="py-8 text-center text-xs text-gray-500 italic">No manual transactions logged yet.</td></tr>
                    ) : transactions.map((t, i) => (
                      <tr key={i} className="border-b border-gray-100 dark:border-white/5 last:border-0 hover:bg-black/5 dark:hover:bg-white/5 transition-colors">
                        <td className="py-3 text-sm text-gray-500">{new Date(t.created_at).toLocaleDateString()}</td>
                        <td className="py-3 text-sm text-gray-900 dark:text-white">{t.description}</td>
                        <td className="py-3 text-sm"><span className={`px-2 py-0.5 rounded text-[10px] ${t.type === 'Income' ? 'bg-green-500/10 text-green-500' : 'bg-red-500/10 text-red-500'}`}>{t.type}</span></td>
                        <td className={`py-3 text-sm text-right font-medium ${t.type === 'Income' ? 'text-green-500' : 'text-gray-900 dark:text-white'}`}>
                          {t.type === 'Income' ? '+' : '-'}${t.amount.toLocaleString()}
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      );
    };

    // ─── GMAIL CENTER ───
    const GmailInbox = ({ session, setActiveModule, setTriggerPrompt, leads }) => {
      const [messages, setMessages] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [connected, setConnected] = useState(false);
      const [connectedEmail, setConnectedEmail] = useState('');
      const [selectedThread, setSelectedThread] = useState(null);
      const [threadMessages, setThreadMessages] = useState([]);
      const [threadLoading, setThreadLoading] = useState(false);
      const [searchQuery, setSearchQuery] = useState('');
      const [composing, setComposing] = useState(false);
      const [composeData, setComposeData] = useState({ to: '', subject: '', body: '' });
      const [replyBody, setReplyBody] = useState('');
      const [replying, setReplying] = useState(false);
      const [sending, setSending] = useState(false);
      const [nextPageToken, setNextPageToken] = useState(null);
      const [unreadCount, setUnreadCount] = useState(0);

      const userId = session?.user?.id;
      const isLocal = !userId || userId === 'local';

      // Check Gmail connection
      useEffect(() => {
        if (isLocal) { setLoading(false); return; }
        fetch(`/.netlify/functions/gmail-connect?action=status&userId=${userId}`)
          .then(r => r.json())
          .then(data => {
            setConnected(data.connected);
            setConnectedEmail(data.email || '');
            if (data.connected) fetchInbox();
            else setLoading(false);
          })
          .catch(() => setLoading(false));
      }, [userId]);

      const fetchInbox = async (query) => {
        setLoading(true); setError(null);
        try {
          let url = `/.netlify/functions/gmail-inbox?action=list&userId=${userId}&maxResults=30`;
          if (query) url += `&q=${encodeURIComponent(query)}`;
          const res = await fetch(url);
          if (!res.ok) throw new Error((await res.json()).error || 'Failed to load inbox');
          const data = await res.json();
          setMessages(data.messages || []);
          setNextPageToken(data.nextPageToken);
          setUnreadCount((data.messages || []).filter(m => m.isUnread).length);
        } catch (e) { setError(e.message); }
        setLoading(false);
      };

      const openThread = async (msg) => {
        setSelectedThread(msg); setThreadLoading(true); setReplying(false); setReplyBody('');
        try {
          const res = await fetch(`/.netlify/functions/gmail-inbox?action=thread&userId=${userId}&threadId=${msg.threadId}`);
          const data = await res.json();
          setThreadMessages(data.messages || []);
          // Mark as read
          if (msg.isUnread) {
            fetch(`/.netlify/functions/gmail-inbox?action=read`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ userId, messageId: msg.id }) });
            setMessages(prev => prev.map(m => m.id === msg.id ? {...m, isUnread: false} : m));
            setUnreadCount(prev => Math.max(0, prev - 1));
          }
        } catch (e) { setError(e.message); }
        setThreadLoading(false);
      };

      const handleStar = async (msgId, starred) => {
        setMessages(prev => prev.map(m => m.id === msgId ? {...m, isStarred: starred} : m));
        await fetch(`/.netlify/functions/gmail-inbox?action=star`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ userId, messageId: msgId, starred }) });
      };

      const handleTrash = async (msgId) => {
        setMessages(prev => prev.filter(m => m.id !== msgId));
        if (selectedThread?.id === msgId) { setSelectedThread(null); setThreadMessages([]); }
        await fetch(`/.netlify/functions/gmail-inbox?action=trash`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ userId, messageId: msgId }) });
      };

      const handleSendReply = async () => {
        if (!replyBody.trim() || !threadMessages.length) return;
        setSending(true);
        const lastMsg = threadMessages[threadMessages.length - 1];
        try {
          await fetch(`/.netlify/functions/gmail-inbox?action=reply`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ userId, threadId: selectedThread.threadId, to: lastMsg.fromEmail, subject: 'Re: ' + (selectedThread.subject || ''), body: replyBody, inReplyTo: lastMsg.id }) });
          setReplyBody(''); setReplying(false);
          openThread(selectedThread); // Refresh thread
        } catch (e) { setError(e.message); }
        setSending(false);
      };

      const handleComposeSend = async () => {
        if (!composeData.to.trim() || !composeData.subject.trim()) return;
        setSending(true);
        try {
          await fetch(`/.netlify/functions/gmail-inbox?action=send`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ userId, to: composeData.to, subject: composeData.subject, body: composeData.body }) });
          setComposing(false); setComposeData({ to: '', subject: '', body: '' });
          fetchInbox();
        } catch (e) { setError(e.message); }
        setSending(false);
      };

      const askCeoDraft = (context) => {
        setActiveModule('neural-chat');
        setTimeout(() => {
          setTriggerPrompt({ sender: 'user', text: `Draft a professional reply to this email thread. Here's the context:\n\nFrom: ${context.from} (${context.fromEmail})\nSubject: ${context.subject}\n\nTheir message:\n${context.body?.replace(/<[^>]*>/g, '').substring(0, 800)}\n\nDraft a concise, professional reply.`, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) });
        }, 300);
      };

      const addSenderAsLead = (msg) => {
        setActiveModule('neural-chat');
        setTimeout(() => {
          setTriggerPrompt({ sender: 'user', text: `Add "${msg.from}" as a new lead. Their email is ${msg.fromEmail}.`, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) });
        }, 300);
      };

      const formatDate = (dateStr) => {
        if (!dateStr) return '';
        const d = new Date(dateStr);
        const now = new Date();
        const isToday = d.toDateString() === now.toDateString();
        if (isToday) return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const isThisYear = d.getFullYear() === now.getFullYear();
        return isThisYear ? d.toLocaleDateString([], { month: 'short', day: 'numeric' }) : d.toLocaleDateString([], { month: 'short', day: 'numeric', year: '2-digit' });
      };

      const isLeadEmail = (email) => {
        if (!leads || !email) return false;
        return leads.some(l => l.email && l.email.toLowerCase() === email.toLowerCase());
      };

      // ─── NOT CONNECTED STATE ───
      if (!connected && !loading) {
        return (
          <div className="flex flex-col items-center justify-center h-full p-8 text-center">
            <div className="w-24 h-24 rounded-3xl bg-gradient-to-br from-pd-teal to-pd-orange flex items-center justify-center shadow-xl mb-6" style={{ animation: 'onb-icon-pulse 2s ease-in-out infinite' }}>
              <iconify-icon icon="solar:mailbox-bold-duotone" width="48" className="text-white"></iconify-icon>
            </div>
            <h2 className="text-2xl font-bold text-gray-900 dark:text-white mb-3">Connect Your Gmail</h2>
            <p className="text-sm text-gray-500 dark:text-gray-400 max-w-md mb-2">See your entire inbox right here — read, reply, compose, and let your assistant draft responses for you. No more switching tabs.</p>
            <p className="text-xs text-gray-400 dark:text-gray-500 max-w-sm mb-8">Your emails stay private and secure. We only access your inbox when you're using this channel.</p>
            <button onClick={() => {
              if (isLocal) { alert('Sign in with Google first to connect Gmail.'); return; }
              window.location.href = `/.netlify/functions/gmail-connect?action=connect&userId=${userId}`;
            }} className="group inline-flex gap-2 transition-all duration-500 dark:text-white overflow-hidden isolate dark:bg-gray-800/60 text-sm font-medium text-gray-900 bg-white/60 rounded-full py-3.5 px-8 relative backdrop-blur-md items-center justify-center shadow-[0_4px_24px_rgba(70,212,198,0.18),0_2px_8px_rgba(255,145,70,0.12)] hover:shadow-[0_6px_32px_rgba(70,212,198,0.28),0_4px_16px_rgba(255,145,70,0.2)] hover:-translate-y-[1px] active:scale-[0.98]">
              <div className="absolute inset-[-200%] bg-[conic-gradient(from_90deg_at_50%_50%,transparent_0%,#ff9146_30%,#ffffff_50%,#46d4c6_70%,transparent_100%)] opacity-0 group-hover:opacity-100 transition-opacity duration-500 animate-[spin_1.5s_linear_infinite] pointer-events-none z-0"></div>
              <div className="absolute inset-[2px] rounded-full bg-white/90 dark:bg-gray-800/90 transition-colors duration-500 pointer-events-none z-0"></div>
              <span className="relative z-10 flex items-center gap-2"><iconify-icon icon="logos:google-gmail" width="18"></iconify-icon> Connect Gmail Account</span>
            </button>
          </div>
        );
      }

      return (
        <>
        <div className="flex flex-col h-full overflow-hidden">
          {/* Header */}
          <div className="flex flex-col md:flex-row justify-between items-start md:items-center p-4 md:p-6 gap-3 flex-shrink-0 border-b border-gray-200 dark:border-pd-glassBorder">
            <div>
              <h2 className="text-xl md:text-2xl font-semibold tracking-tight text-gray-900 dark:text-white mb-1 flex items-center gap-2">
                <iconify-icon icon="solar:letter-linear" className="text-pd-teal"></iconify-icon> Gmail Center
              </h2>
              <p className="text-xs text-gray-500">{connectedEmail ? `Connected: ${connectedEmail}` : 'Your inbox, powered by your assistant'} {unreadCount > 0 && <span className="ml-2 bg-pd-teal/10 text-pd-teal px-2 py-0.5 rounded-full font-bold">{unreadCount} unread</span>}</p>
            </div>
            <div className="flex gap-2 w-full md:w-auto">
              <div className="relative flex-1 md:flex-initial">
                <input type="text" value={searchQuery} onChange={e => setSearchQuery(e.target.value)} onKeyDown={e => { if (e.key === 'Enter') fetchInbox(searchQuery); }} placeholder="Search emails..." className="w-full md:w-56 bg-white/60 dark:bg-black/40 border border-gray-200 dark:border-white/10 rounded-full px-4 py-2 pl-9 text-sm text-gray-900 dark:text-white focus:outline-none focus:border-pd-teal" />
                <iconify-icon icon="solar:magnifer-linear" width="16" className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></iconify-icon>
              </div>
              <button onClick={() => { setComposing(true); setSelectedThread(null); }} className="group inline-flex gap-1 transition-all duration-500 dark:text-white overflow-hidden isolate dark:bg-gray-800/60 text-xs font-medium text-gray-900 bg-white/60 rounded-full py-2 px-4 relative backdrop-blur-md items-center justify-center shadow-[0_4px_24px_rgba(70,212,198,0.18),0_2px_8px_rgba(255,145,70,0.12)] hover:shadow-[0_6px_32px_rgba(70,212,198,0.28),0_4px_16px_rgba(255,145,70,0.2)] hover:-translate-y-[1px] active:scale-[0.98]"><div className="absolute inset-[-200%] bg-[conic-gradient(from_90deg_at_50%_50%,transparent_0%,#ff9146_30%,#ffffff_50%,#46d4c6_70%,transparent_100%)] opacity-0 group-hover:opacity-100 transition-opacity duration-500 animate-[spin_1.5s_linear_infinite] pointer-events-none z-0"></div><div className="absolute inset-[2px] rounded-full bg-white/90 dark:bg-gray-800/90 transition-colors duration-500 pointer-events-none z-0"></div><span className="relative z-10 flex items-center gap-2"><iconify-icon icon="solar:pen-new-square-linear"></iconify-icon> Compose</span></button>
              <button onClick={() => fetchInbox(searchQuery)} className="w-10 h-10 rounded-full bg-white/60 dark:bg-black/40 border border-gray-200 dark:border-white/10 flex items-center justify-center text-gray-500 hover:text-pd-teal hover:border-pd-teal/50 transition-all"><iconify-icon icon="solar:refresh-linear" width="18"></iconify-icon></button>
            </div>
          </div>

          {/* Main Content */}
          <div className="flex flex-1 overflow-hidden">
            {/* Message List */}
            <div className={`${selectedThread || composing ? 'hidden md:flex' : 'flex'} flex-col w-full md:w-2/5 border-r border-gray-200 dark:border-pd-glassBorder overflow-y-auto`}>
              {loading ? (
                <div className="flex items-center justify-center h-40"><div className="w-6 h-6 border-2 border-pd-teal border-t-transparent rounded-full animate-spin"></div></div>

        let local = [];
        try {
          local = JSON.parse(localStorage.getItem('amp_campaigns') || '[]');
        } catch(e) {}
        
        if (supabaseClient) {
          const { data } = await supabaseClient.from('campaigns').select('*').order('created_at', { ascending: false });
          if (data && data.length > 0) {
            setCampaigns(data);
            return;
          }
        }
        setCampaigns(local);
      };

      useEffect(() => {
        fetchCampaigns();
        const handleSync = () => fetchCampaigns();
        window.addEventListener('amp-campaigns-updated', handleSync);
        
        if (supabaseClient) {
          const channel = supabaseClient.channel('realtime:campaigns')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'campaigns' }, fetchCampaigns)
            .subscribe();
          return () => { 
            supabaseClient.removeChannel(channel); 
            window.removeEventListener('amp-campaigns-updated', handleSync);
          };
        }
        return () => window.removeEventListener('amp-campaigns-updated', handleSync);
      }, []);

      const handleSave = async () => {
        const payload = { ...formData };
        let local = JSON.parse(localStorage.getItem('amp_campaigns') || '[]');
        
        if (formData.id) {
          local = local.map(c => c.id === formData.id ? payload : c);
        } else {
          payload.id = Date.now().toString();

    const ContentFactory = ({ session, activeTasks, depleteBudget, userProfile }) => {

        { id: 'youtube-thumbnail',icon: 'solar:play-circle-linear',           label: 'YT Thumb',     ratio: '16:9', color: 'from-red-500 to-orange-500' },

        { id: 'email-header',     icon: 'solar:letter-linear',                label: 'Email Header', ratio: '16:9', color: 'from-pd-teal to-teal-600' },
      ];

      const activeType = CONTENT_TYPES.find(t => t.id === contentType) || CONTENT_TYPES[0];

      // Filter tasks to get creative agent generated assets
      const archiveItems = activeTasks ? activeTasks.filter(t => t.agent === 'Creative' && t.status === 'done' && t.notes) : [];

      const processOneFile = (file) => {
        const img = new Image();
