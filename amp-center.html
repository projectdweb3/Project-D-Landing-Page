          const MAX_DIM = 768;
          let w = img.width, h = img.height;
          if (w > MAX_DIM || h > MAX_DIM) {
            const scale = MAX_DIM / Math.max(w, h);
            w = Math.round(w * scale); h = Math.round(h * scale);
          }
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          const compressed = canvas.toDataURL('image/jpeg', 0.7);
          setReferences(prev => [...prev, { data: compressed.split(',')[1], mimeType: 'image/jpeg', preview: compressed, name: file.name }]);
          URL.revokeObjectURL(objectUrl);
        };
        img.onerror = () => {
          const reader = new FileReader();
          reader.onload = (ev) => setReferences(prev => [...prev, { data: ev.target.result.split(',')[1], mimeType: file.type, preview: ev.target.result, name: file.name }]);
          reader.readAsDataURL(file);
          URL.revokeObjectURL(objectUrl);
        };
        img.src = objectUrl;
      };

      const handleFile = (e) => {
        Array.from(e.target.files).forEach(processOneFile);
        e.target.value = '';
      };

      const handleRemoveReference = (index) => setReferences(prev => prev.filter((_, i) => i !== index));

      const handleGenerate = async () => {
        if (!prompt.trim()) return;
        setIsGenerating(true);
        setResult(null);
        setError(null);
        try {
          if (depleteBudget) depleteBudget('Creative', 5);
          const res = await fetch('/.netlify/functions/content', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              prompt,
              contentType,
              aspectRatio,
              brandStyle: brandStyle.trim(),
              referenceImages: references.length > 0 ? [{ data: references[0].data, mimeType: references[0].mimeType }] : [],
              userId: session?.user?.id
            })
          });
          const data = await res.json();
          if (!res.ok || data.error) throw new Error(data.error || `Server error ${res.status}`);
          const imageUrl = data.content;
          setResult(imageUrl);
          setResultRatio(data.ratio || aspectRatio);
          // Save to asset archive
          const label = `[${activeType.label}] ${prompt.substring(0, 25)}`;
          const taskPayload = { title: label, agent: 'Creative', status: 'done', notes: imageUrl, user_id: session?.user?.id || 'local' };
          const local = JSON.parse(localStorage.getItem(`amp_tasks_${userProfile?.stage || 'Default'}`) || '[]');
          local.unshift({ id: Date.now().toString(), ...taskPayload, created_at: new Date().toISOString() });
          localStorage.setItem(`amp_tasks_${userProfile?.stage || 'Default'}`, JSON.stringify(local));
          window.dispatchEvent(new Event('amp-tasks-updated'));
          if (typeof supabaseClient !== 'undefined' && supabaseClient && session?.user?.id) {
            supabaseClient.from('tasks').insert([taskPayload]).then();
          }
        } catch (e) {
          console.error(e);
          setError(e.message);
        } finally {
          setIsGenerating(false);
          setPrompt('');
        }
      };

      const canvasStyle = {
        '16:9': { width: '520px', height: '293px' },
        '9:16': { width: '240px', height: '426px' },
        '4:3':  { width: '440px', height: '330px' },
        '3:4':  { width: '310px', height: '413px' },
        '3:2':  { width: '450px', height: '300px' },
        '2:3':  { width: '280px', height: '420px' },
        '1:1':  { width: '380px', height: '380px' },
      };
      const previewStyle = { ...(canvasStyle[aspectRatio] || canvasStyle['1:1']), maxWidth: '100%', maxHeight: '100%' };

      return (
        <div className="p-4 md:p-6 h-full flex flex-col relative overflow-y-auto overflow-x-hidden">
          <div className="absolute inset-0 opacity-[0.03] dark:opacity-[0.05]" style={{ backgroundImage: 'radial-gradient(currentColor 1px, transparent 1px)', backgroundSize: '32px 32px' }}></div>

          {/* Header */}
          <div className="relative z-10 mb-4">
            <div className="flex items-start justify-between gap-2 mb-3">
              <div>
                <h2 className="text-xl md:text-2xl font-semibold tracking-tight text-gray-900 dark:text-white mb-1 flex items-center gap-2">
                  Content Factory <span className="text-[10px] font-mono bg-pd-teal/20 text-pd-teal px-2 py-0.5 rounded">NANO BANANA</span>
                </h2>
                <p className="text-xs text-gray-500">Pick a format, describe your vision, and generate brand-ready marketing assets.</p>
              </div>
              <button onClick={() => setShowBrandStyle(s => !s)} className={`flex-shrink-0 amp-button text-xs px-3 py-1.5 ${showBrandStyle ? 'primary' : ''}`}>
                <iconify-icon icon="solar:palette-linear" width="14"></iconify-icon>
                Brand Style
              </button>
            </div>

            {/* Brand style context field */}
            {showBrandStyle && (
              <div className="mb-3 relative z-10">
                <textarea
                  value={brandStyle}
                  onChange={e => setBrandStyle(e.target.value)}
                  rows={2}
                  placeholder="Describe your brand's visual style... e.g. 'Modern minimalist, deep navy and gold, elegant serif typography, luxury fashion brand'"
                  className="w-full bg-white/80 dark:bg-black/30 border border-gray-200 dark:border-pd-glassBorder rounded-2xl px-4 py-3 text-sm text-gray-900 dark:text-white focus:outline-none focus:border-pd-orange/50 resize-none placeholder-gray-400"
                />
              </div>
            )}

            {/* Content type pills */}
            <div className="flex gap-2 overflow-x-auto hide-scrollbar pb-1">
              {CONTENT_TYPES.map(type => (
                <button
                  key={type.id}
                  onClick={() => setContentType(type.id)}
                  className={`flex-shrink-0 flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-medium border transition-all duration-200 ${
                    contentType === type.id
                      ? 'bg-pd-orange/10 border-pd-orange/50 text-pd-orange shadow-sm'
                      : 'bg-white/60 dark:bg-black/20 border-gray-200 dark:border-white/10 text-gray-600 dark:text-gray-400 hover:border-gray-400'
                  }`}
                >
                  <iconify-icon icon={type.icon} width="13"></iconify-icon>
                  {type.label}
                  <span className={`text-[10px] opacity-60`}>{type.ratio}</span>
                </button>
              ))}
            </div>
          </div>

          {/* Canvas area */}
          <div className="flex-1 flex flex-col relative z-10 min-h-0">
            <div className="flex-1 border-2 border-dashed border-gray-300 dark:border-pd-glassBorder rounded-2xl md:rounded-3xl flex flex-col items-center justify-center relative bg-white/40 dark:bg-black/20 backdrop-blur-md shadow-inner overflow-hidden min-h-[280px]">

              {/* Model badge */}
              <div className="absolute top-3 left-3 z-10 flex items-center gap-2">
                <div className="px-2 py-1 bg-white/80 dark:bg-black/50 border border-pd-orange/30 rounded-full text-[10px] text-pd-orange flex items-center gap-1 backdrop-blur">
                  <span className="w-1.5 h-1.5 rounded-full bg-pd-orange animate-pulse"></span>
                  flux-1.1-pro
                </div>
                <div className="px-2 py-1 bg-white/80 dark:bg-black/50 border border-gray-200 dark:border-white/10 rounded-full text-[10px] text-gray-500 backdrop-blur flex items-center gap-1">
                  <iconify-icon icon={activeType.icon} width="11"></iconify-icon>
                  {activeType.label} · {activeType.ratio}
                </div>
              </div>

              {/* Reference image thumbnails with remove buttons */}
              {references.length > 0 && (
                <div className="absolute top-3 right-3 flex gap-1.5 z-10 flex-wrap justify-end max-w-[180px]">
                  {references.map((r, i) => (
                    <div key={i} className="relative group/ref">
                      <img src={r.preview} className="w-10 h-10 object-cover rounded-lg border border-gray-200 dark:border-white/20 shadow-sm" alt={r.name || 'Ref'} />
                      <button
                        onClick={(e) => { e.stopPropagation(); handleRemoveReference(i); }}
                        className="absolute -top-1 -right-1 w-4 h-4 rounded-full bg-red-500 text-white flex items-center justify-center text-[9px] font-bold opacity-0 group-hover/ref:opacity-100 transition-opacity shadow hover:bg-red-600 cursor-pointer"
                      >&times;</button>
                    </div>
                  ))}
                  <div className="w-full text-right text-[10px] text-gray-400 mt-0.5 pr-0.5">style ref{references.length > 1 ? 's' : ''}</div>
                </div>
              )}

              {/* Preview canvas */}
              <div
                className="border border-gray-200 dark:border-pd-glassBorder rounded-2xl bg-gradient-to-br from-gray-100 to-gray-200 dark:from-white/5 dark:to-white/10 flex items-center justify-center group relative shadow-2xl overflow-hidden transition-all duration-500 ease-in-out mt-12 md:mt-0"
                style={previewStyle}
              >
                {isGenerating ? (
                  <div className="flex flex-col items-center gap-3 px-4 text-center">
                    <div className="w-10 h-10 border-4 border-pd-teal border-t-transparent rounded-full animate-spin"></div>
                    <span className="text-xs text-pd-teal font-mono tracking-widest animate-pulse">GENERATING {activeType.label.toUpperCase()}...</span>
                    <span className="text-[10px] text-gray-400">Flux 1.1 Pro · ~15-30s</span>
                  </div>
                ) : error ? (
                  <div className="flex flex-col items-center gap-3 px-6 text-center max-w-sm">
                    <iconify-icon icon="solar:danger-triangle-linear" width="32" class="text-red-400"></iconify-icon>
                    <p className="text-xs font-semibold text-red-500">Generation Failed</p>
                    <p className="text-[11px] text-gray-500 dark:text-gray-400 leading-relaxed">{error}</p>
                    {error.includes('authentication') || error.includes('401') ? (
                      <a href="https://replicate.com/account/api-tokens" target="_blank" rel="noopener" className="text-[11px] text-pd-teal underline">Get Replicate API Token →</a>
                    ) : null}
                  </div>
                ) : result ? (
                  <div className="w-full h-full flex items-center justify-center relative group/result">
                    {(result.startsWith('http') || result.startsWith('data:image')) ? (
                      <>
                        <img src={result} className="max-w-full max-h-full object-contain rounded" alt="Generated" />
                        <a
                          href={result}
                          download="content-factory-asset.webp"
                          target="_blank"
                          rel="noopener"
                          className="absolute bottom-2 right-2 opacity-0 group-hover/result:opacity-100 transition-opacity bg-black/60 hover:bg-black/80 text-white text-[10px] px-2 py-1 rounded-full flex items-center gap-1 backdrop-blur"
                        >
                          <iconify-icon icon="solar:download-minimalistic-linear" width="12"></iconify-icon>
                          Download
                        </a>
                      </>
                    ) : (
                      <p className="p-4 text-xs text-gray-700 dark:text-gray-300">{result}</p>
                    )}
                  </div>
                ) : (
                  <>
                    <div className="absolute inset-0 bg-pd-teal/5 mix-blend-overlay animate-pulse"></div>
                    <div className="text-center z-10 flex flex-col items-center gap-2">
                      <iconify-icon icon="solar:magic-stick-3-linear" width="40" class="text-gray-400 dark:text-gray-500 opacity-50"></iconify-icon>
                      <div className="text-xs text-gray-500 dark:text-gray-400 font-mono">Select a format and describe your asset</div>
                    </div>
                  </>
                )}
              </div>

              {/* Prompt bar */}
              <div className="w-full max-w-2xl px-3 md:px-4 z-10 mt-auto pt-4 mb-4 md:mb-5">
                <div className="relative">
                  <input type="file" ref={fileRef} onChange={handleFile} accept="image/*" multiple className="hidden" />
                  <input
                    type="text"
                    value={prompt}
                    onChange={e => setPrompt(e.target.value)}
                    onKeyDown={e => e.key === 'Enter' && handleGenerate()}
                    placeholder={`Describe your ${activeType.label}... e.g. "Bold summer sale with 50% off, energetic orange tones"`}
                    className="w-full bg-white/90 dark:bg-pd-glass border border-gray-200 dark:border-pd-glassBorder rounded-full pl-4 md:pl-5 pr-28 md:pr-32 py-3 md:py-3.5 text-sm text-gray-900 dark:text-white focus:outline-none focus:border-pd-orange/50 shadow-2xl backdrop-blur-xl"
                  />
                  <div className="absolute right-1.5 top-1/2 -translate-y-1/2 flex items-center gap-1.5">
                    <button
                      onClick={() => fileRef.current?.click()}
                      title="Attach brand reference image"
                      className="group relative w-9 h-9 rounded-full overflow-hidden isolate flex items-center justify-center dramatic-hover shadow-[0_4px_20px_rgba(70,212,198,0.15)]"
                    >
                      <div className="absolute inset-[-200%] bg-[conic-gradient(from_90deg_at_50%_50%,transparent_0%,#ff9146_30%,#ffffff_50%,#46d4c6_70%,transparent_100%)] opacity-0 group-hover:opacity-100 transition-opacity duration-500 animate-[spin_1.5s_linear_infinite] pointer-events-none z-0"></div>
                      <div className="absolute inset-[2px] rounded-full bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-600 group-hover:bg-pd-teal group-hover:border-pd-teal transition-colors duration-300 pointer-events-none z-0"></div>
                      <span className="relative z-10 flex items-center justify-center pointer-events-none text-gray-600 dark:text-gray-300 group-hover:text-white transition-colors duration-300">
                        <iconify-icon icon="solar:paperclip-linear" width="16"></iconify-icon>
                      </span>
                    </button>
                    <button
                      onClick={handleGenerate}
                      disabled={isGenerating || !prompt.trim()}
                      className="group relative w-9 h-9 rounded-full overflow-hidden isolate flex items-center justify-center dramatic-hover shadow-[0_4px_20px_rgba(255,95,0,0.15)] disabled:opacity-40 disabled:pointer-events-none"
                    >
                      <div className="absolute inset-[-200%] bg-[conic-gradient(from_90deg_at_50%_50%,transparent_0%,#ff9146_30%,#ffffff_50%,#ff5f00_70%,transparent_100%)] opacity-0 group-hover:opacity-100 transition-opacity duration-500 animate-[spin_1.5s_linear_infinite] pointer-events-none z-0"></div>
                      <div className="absolute inset-[2px] rounded-full bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-600 group-hover:bg-pd-orange group-hover:border-pd-orange transition-colors duration-300 pointer-events-none z-0"></div>
                      <span className="relative z-10 flex items-center justify-center pointer-events-none text-gray-600 dark:text-gray-300 group-hover:text-white transition-colors duration-300">
                        <iconify-icon icon="solar:plain-bold" width="16"></iconify-icon>
                      </span>
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>

          {/* Asset Archive */}
          <div className="mt-5 border-t border-gray-200 dark:border-pd-glassBorder pt-5 w-full z-10 relative">
            <h3 className="text-sm font-semibold mb-3 text-gray-900 dark:text-white flex items-center gap-2">
              <iconify-icon icon="solar:history-linear" class="text-pd-orange"></iconify-icon>
              Asset Archive
            </h3>
            {archiveItems.length > 0 ? (
              <div className="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-6 gap-3 overflow-y-auto max-h-44 hide-scrollbar">
                {archiveItems.map((item, idx) => (
                  <a key={idx} href={item.notes} target="_blank" rel="noopener" className="block bg-white/40 dark:bg-black/20 border border-gray-200 dark:border-white/10 rounded-xl p-1.5 flex flex-col items-center shadow-sm hover:shadow-md hover:border-pd-orange/50 transition-all group">
                    <div className="w-full aspect-square mb-1.5 bg-black/5 dark:bg-white/5 rounded-lg flex items-center justify-center overflow-hidden">
                      {(item.notes && (item.notes.startsWith('data:image') || item.notes.startsWith('http'))) ? (
                        <img src={item.notes} alt={item.title} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" />
                      ) : (
                        <iconify-icon icon="solar:document-text-linear" width="20" class="text-gray-400"></iconify-icon>
                      )}
                    </div>
                    <p className="text-[9px] text-gray-500 dark:text-gray-500 truncate w-full text-center" title={item.title}>{item.title}</p>
                  </a>
                ))}
              </div>
            ) : (
              <div className="w-full h-20 bg-black/5 dark:bg-white/5 rounded-2xl flex flex-col items-center justify-center border border-dashed border-gray-300 dark:border-white/10">
                <iconify-icon icon="solar:box-linear" width="22" class="text-gray-400 mb-1"></iconify-icon>
                <p className="text-xs text-gray-500">Archive is empty. Generate content to populate.</p>
              </div>
            )}
          </div>
        </div>
      );
    };

    const StrategicPlanning = ({ session, setActiveModule, setTriggerPrompt }) => {
      const [plans, setPlans] = useState([]);
      const [isAdding, setIsAdding] = useState(false);
      const [newPlan, setNewPlan] = useState({ title: '', content: '' });
      const [enlargedPlan, setEnlargedPlan] = useState(null);
      const [isEditing, setIsEditing] = useState(false);
      const [editBuffer, setEditBuffer] = useState({ title: '', content: '' });

      const fetchPlans = async () => {
        let currentLocal = [];
        try {
          currentLocal = JSON.parse(localStorage.getItem('amp_plans') || '[]');
        } catch(e) {}

        if (supabaseClient && session?.user?.id) {
          try {
            const { data, error } = await supabaseClient.from('plans').select('*').eq('user_id', session.user.id).order('created_at', { ascending: false });
            if (!error && data) {
              const remoteIds = new Set(data.map(d => d.id || d.created_at));
              const localOnly = currentLocal.filter(l => !remoteIds.has(l.id || l.created_at));
              const merged = [...data, ...localOnly];
              setPlans(merged);
              localStorage.setItem('amp_plans', JSON.stringify(merged));
              return;
            }
          } catch(e) {}
        }
        setPlans(currentLocal);
      };

      useEffect(() => {
        fetchPlans();
        const handleLocalUpdate = () => fetchPlans();
        window.addEventListener('amp-plans-updated', handleLocalUpdate);
        
        let channel;
        if (supabaseClient) {
          channel = supabaseClient.channel('realtime:plans')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'plans' }, fetchPlans)
            .subscribe();
        }
        
        return () => {
          if (channel) supabaseClient.removeChannel(channel);
          window.removeEventListener('amp-plans-updated', handleLocalUpdate);
        };
      }, []);

      const executePlan = (plan) => {
        setActiveModule('neural-chat');
        setTimeout(() => {
          setTriggerPrompt({ sender: 'user', text: `Please execute the stored plan: "${plan.title}". Initiate a sequence of task creations and assignments for the agents according to the plan.`, time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) });
        }, 300);
      };

      const handleAskCEO = () => {
        setActiveModule('neural-chat');
        setTimeout(() => {
          setTriggerPrompt({ sender: 'user', text: `Create a strategic plan for my business. Analyze what I've shared with you, identify the top priorities for growth, and store a detailed plan with clear action steps I can execute. Include which agents will handle each phase.` });
        }, 150);
      };

      const handleSaveManual = async () => {
        if (!newPlan.title || !newPlan.content) return;
        const payload = { id: Date.now().toString(), agent: 'CEO', ...newPlan, created_at: new Date().toISOString() };
        if (supabaseClient && session?.user?.id) {
          await supabaseClient.from('plans').insert([{ ...payload, user_id: session.user.id }]);
        } else {
          const local = JSON.parse(localStorage.getItem('amp_plans') || '[]');
          local.push(payload);
          localStorage.setItem('amp_plans', JSON.stringify(local));
          fetchPlans();
        }
        setIsAdding(false);
        setNewPlan({ title: '', content: '' });
      };

      const handleStartEdit = () => {
        setEditBuffer({ title: enlargedPlan.title, content: enlargedPlan.content });
        setIsEditing(true);
      };

      const handleSaveEdit = async () => {
        if (supabaseClient && session?.user?.id) {
          await supabaseClient.from('plans').update(editBuffer).eq('id', enlargedPlan.id).eq('user_id', session.user.id);
          setEnlargedPlan({ ...enlargedPlan, ...editBuffer });
        } else {
          const local = JSON.parse(localStorage.getItem('amp_plans') || '[]');
          const idx = local.findIndex(p => p.id === enlargedPlan.id);
          if (idx !== -1) {
            local[idx] = { ...local[idx], ...editBuffer };
            localStorage.setItem('amp_plans', JSON.stringify(local));
            setEnlargedPlan(local[idx]);
            fetchPlans();
          }
        }
        setIsEditing(false);
      };

      const handleExportPDF = (plan) => {
        const printWindow = window.open('', '_blank');
        const formattedContent = plan.content
          .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
          .replace(/\n/g, '<br/>');
          
        printWindow.document.write(`
          <!DOCTYPE html>
          <html>
            <head>
              <title>${plan.title}</title>
              <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
              <style>
                body { 
                  font-family: 'Inter', -apple-system, sans-serif; 
                  padding: 50px; 
                  color: #1a1a1a; 
                  line-height: 1.6; 
                  max-width: 800px;
                  margin: 0 auto;
                }
                .header {
                  border-bottom: 2px solid #46d4c6;
                  margin-bottom: 30px;
                  padding-bottom: 20px;
                }
                h1 { 
                  font-size: 28px;
                  font-weight: 700;
                  margin: 0 0 10px 0;
                  color: #0b0f19;
                }
                .meta { 
                  color: #666; 
                  font-size: 13px; 
                  font-family: monospace;
                }
                .content { 
                  font-size: 15px; 
                  color: #333;
                }
                strong { font-weight: 700; color: #000; }
                @media print {
                  body { padding: 0; }
                  @page { margin: 2cm; }
                }
              </style>
            </head>
            <body>
              <div class="header">
                <h1>${plan.title}</h1>
                <div class="meta">STRATEGIC PLAN / GENERATED BY ${plan.agent || 'CEO'} AGENT / ${new Date(plan.created_at || Date.now()).toLocaleDateString()}</div>
              </div>
              <div class="content">${formattedContent}</div>
              <\script>
                window.onload = () => {
                  setTimeout(() => {
                    window.print();
                    window.close();
                  }, 500);
                };
              <\/script>
            </body>
          </html>
        `);
        printWindow.document.close();
      };

      return (
        <div className="p-4 md:p-8 h-full flex flex-col overflow-hidden">
          <div className="mb-6 md:mb-8 flex-shrink-0 flex justify-between items-start">
            <div>
              <h2 className="text-xl md:text-2xl font-semibold tracking-tight text-gray-900 dark:text-white mb-1">Strategic Planning</h2>
              <p className="text-xs text-gray-500">Stored architectural and marketing plans generated by the CEO.</p>
            </div>
            <div className="flex gap-2 w-full md:w-auto">
              <button onClick={() => setIsAdding(!isAdding)} className="group inline-flex gap-1 transition-all duration-500 dark:text-white overflow-hidden isolate dark:bg-gray-800/60 text-xs font-medium text-gray-900 bg-white/60 rounded-full py-2 px-4 relative backdrop-blur-md items-center justify-center w-full md:w-auto shadow-[0_4px_24px_rgba(70,212,198,0.18),0_2px_8px_rgba(255,145,70,0.12)] hover:shadow-[0_6px_32px_rgba(70,212,198,0.28),0_4px_16px_rgba(255,145,70,0.2)] hover:-translate-y-[1px] active:scale-[0.98]"><div className="absolute inset-[-200%] bg-[conic-gradient(from_90deg_at_50%_50%,transparent_0%,#ff9146_30%,#ffffff_50%,#46d4c6_70%,transparent_100%)] opacity-0 group-hover:opacity-100 transition-opacity duration-500 animate-[spin_1.5s_linear_infinite] pointer-events-none z-0"></div><div className="absolute inset-[2px] rounded-full bg-white/90 dark:bg-gray-800/90 transition-colors duration-500 pointer-events-none z-0"></div><span className="relative z-10 flex items-center gap-2"><iconify-icon icon={isAdding ? "solar:close-circle-linear" : "solar:pen-linear"} className="mr-2"></iconify-icon> {isAdding ? 'Cancel' : 'Manual Entry'}
              </span></button>
              <button onClick={handleAskCEO} className="group inline-flex gap-1 transition-all duration-500 text-white overflow-hidden isolate dramatic-hover text-xs font-medium bg-pd-teal rounded-full py-2 px-4 relative backdrop-blur-md items-center justify-center w-full md:w-auto shadow-[0_4px_24px_rgba(70,212,198,0.18),0_2px_8px_rgba(255,145,70,0.12)] hover:shadow-[0_6px_32px_rgba(70,212,198,0.28),0_4px_16px_rgba(255,145,70,0.2)] hover:-translate-y-[1px] active:scale-[0.98]"><div className="absolute inset-[-200%] bg-[conic-gradient(from_90deg_at_50%_50%,transparent_0%,#ff9146_30%,#ffffff_50%,#46d4c6_70%,transparent_100%)] opacity-0 group-hover:opacity-100 transition-opacity duration-500 animate-[spin_1.5s_linear_infinite] pointer-events-none z-0"></div><div className="absolute inset-[2px] rounded-full bg-pd-teal transition-colors duration-500 pointer-events-none z-0"></div><span className="relative z-10 flex items-center gap-2"><iconify-icon icon="solar:magic-stick-3-linear" className="mr-2"></iconify-icon> Ask CEO to Create
              </span></button>
            </div>
          </div>
          
          <div className="flex-1 overflow-y-auto pr-2 pb-20">
            {isAdding && (
              <div className="mb-6 bg-white/40 dark:bg-pd-glass backdrop-blur-xl border border-pd-teal/30 rounded-2xl p-6 shadow-xl">
                <h3 className="text-sm font-semibold mb-4 text-gray-900 dark:text-white">Add Manual Plan</h3>
                <input type="text" placeholder="Plan Title" value={newPlan.title} onChange={e => setNewPlan({...newPlan, title: e.target.value})} className="w-full bg-white/60 dark:bg-black/40 border border-gray-200 dark:border-white/10 rounded-xl px-4 py-2 mb-3 text-sm text-gray-900 dark:text-white focus:outline-none focus:border-pd-teal" />
                <textarea placeholder="Plan Details..." value={newPlan.content} onChange={e => setNewPlan({...newPlan, content: e.target.value})} rows="4" className="w-full bg-white/60 dark:bg-black/40 border border-gray-200 dark:border-white/10 rounded-xl px-4 py-3 mb-4 text-sm text-gray-900 dark:text-white focus:outline-none focus:border-pd-teal resize-none"></textarea>
                <button onClick={handleSaveManual} className="px-6 py-2 bg-pd-teal text-pd-dark rounded-xl text-xs font-bold shadow-md hover:shadow-lg transition-all">Save Plan</button>
              </div>
            )}
            
            {plans.length === 0 ? (
               <div className="w-full h-32 bg-black/5 dark:bg-white/5 rounded-2xl flex flex-col items-center justify-center border border-dashed border-gray-300 dark:border-white/10">
                 <iconify-icon icon="solar:document-text-linear" width="32" className="text-gray-400 mb-2"></iconify-icon>
                 <p className="text-xs text-gray-500">No stored plans. Ask the CEO Agent to create a plan for you.</p>
               </div>
            ) : (
              <div className="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-6 items-start">
                {plans.map((plan) => (
                 <div key={plan.id} onClick={() => setEnlargedPlan(plan)} className="bg-white/40 dark:bg-pd-glass backdrop-blur-xl border border-gray-200 dark:border-pd-glassBorder rounded-2xl p-6 shadow-sm flex flex-col h-[300px] cursor-pointer hover:shadow-lg transition-all group">
                   <div className="flex justify-between items-start mb-4">
                     <div className="pr-4 overflow-hidden">
                       <h3 className="text-base font-bold text-gray-900 dark:text-white truncate group-hover:text-pd-teal transition-colors">{plan.title}</h3>
                       <span className="inline-block mt-1 px-2 py-0.5 bg-pd-teal/10 text-pd-teal text-[10px] uppercase font-bold tracking-widest border border-pd-teal/30 rounded-full">{plan.agent || 'CEO'}</span>
                     </div>
                     <div className="flex gap-2 flex-shrink-0">
                       <button onClick={(e) => { e.stopPropagation(); executePlan(plan); }} className="w-8 h-8 bg-pd-teal text-pd-dark rounded-full shadow-[0_0_15px_rgba(70,212,198,0.3)] hover:scale-110 transition-all flex items-center justify-center" title="Execute Plan">
                         <iconify-icon icon="solar:play-circle-bold" width="18"></iconify-icon>
                       </button>
                     </div>
                   </div>
                   <div className="text-xs text-gray-700 dark:text-gray-300 whitespace-pre-wrap leading-relaxed flex-1 overflow-y-auto scrollbar-hide pointer-events-none">
                     <FormatText text={plan.content} />
                   </div>
                 </div>
                ))}
              </div>
            )}
          </div>
          
          {enlargedPlan && (
            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 sm:p-6 bg-gray-900/40 dark:bg-black/60 backdrop-blur-sm" onClick={() => { setEnlargedPlan(null); setIsEditing(false); }}>
              <div className="bg-white dark:bg-[#0b0f19] w-full max-w-4xl max-h-[90vh] rounded-2xl shadow-2xl flex flex-col overflow-hidden border border-gray-200 dark:border-white/10 animate-fade-in" onClick={e => e.stopPropagation()}>
                <div className="flex items-center justify-between p-4 sm:p-6 border-b border-gray-100 dark:border-white/5">
                  <div className="flex-1 mr-4">
                    {isEditing ? (
                      <input 
                        type="text" 
                        value={editBuffer.title} 
                        onChange={e => setEditBuffer({...editBuffer, title: e.target.value})}
                        className="w-full bg-black/5 dark:bg-white/5 border border-pd-teal/30 rounded-lg px-3 py-1 text-xl font-bold text-gray-900 dark:text-white focus:outline-none"
                      />
                    ) : (
                      <>
                        <h2 className="text-xl sm:text-2xl font-bold text-gray-900 dark:text-white">{enlargedPlan.title}</h2>
                        <span className="inline-block mt-1 px-2 py-0.5 bg-pd-teal/10 text-pd-teal text-[10px] uppercase font-bold tracking-widest border border-pd-teal/30 rounded-full">{enlargedPlan.agent || 'CEO'}</span>
                      </>
                    )}
                  </div>
                  <div className="flex gap-2 items-center">
                    {!isEditing && (
                      <button onClick={handleStartEdit} className="w-10 h-10 flex items-center justify-center rounded-full hover:bg-gray-100 dark:hover:bg-white/10 text-gray-500 transition-colors" title="Edit Plan">
                        <iconify-icon icon="solar:pen-2-linear" width="20"></iconify-icon>
                      </button>
                    )}
                    {!isEditing && (
                      <button onClick={() => handleExportPDF(enlargedPlan)} className="w-10 h-10 flex items-center justify-center rounded-full hover:bg-gray-100 dark:hover:bg-white/10 text-gray-500 transition-colors" title="Export to PDF">
                        <iconify-icon icon="solar:download-minimalistic-linear" width="20"></iconify-icon>
                      </button>
                    )}
                    <button onClick={() => { executePlan(enlargedPlan); setEnlargedPlan(null); setIsEditing(false); }} className="amp-button primary px-4 py-2 text-xs font-medium flex items-center shadow-[0_0_15px_rgba(70,212,198,0.3)]">
                      <iconify-icon icon="solar:play-circle-bold" className="mr-2"></iconify-icon> <span className="hidden sm:inline">Execute Plan</span>
                    </button>
                    <button onClick={() => { setEnlargedPlan(null); setIsEditing(false); }} className="w-10 h-10 flex items-center justify-center rounded-full hover:bg-gray-100 dark:hover:bg-white/10 text-gray-500 transition-colors">
                      <iconify-icon icon="solar:close-circle-linear" width="24"></iconify-icon>
                    </button>
                  </div>
                </div>
                <div className="p-4 sm:p-6 overflow-y-auto flex-1 text-sm text-gray-700 dark:text-gray-300 leading-relaxed">
                  {isEditing ? (
                    <textarea 
                      value={editBuffer.content}
                      onChange={e => setEditBuffer({...editBuffer, content: e.target.value})}
                      className="w-full h-full min-h-[300px] bg-black/5 dark:bg-white/5 border border-pd-teal/30 rounded-xl p-4 text-gray-900 dark:text-white focus:outline-none resize-none"
                    />
                  ) : (
                    <div className="whitespace-pre-wrap">
                      <FormatText text={enlargedPlan.content} />
                    </div>
                  )}
                </div>
                {isEditing && (
                  <div className="p-4 border-t border-gray-100 dark:border-white/5 flex justify-end gap-3 bg-gray-50 dark:bg-black/20">
                    <button onClick={() => setIsEditing(false)} className="px-4 py-2 text-xs font-semibold text-gray-500 hover:text-gray-700 transition-colors">Cancel</button>
                    <button onClick={handleSaveEdit} className="px-6 py-2 bg-pd-teal text-pd-dark rounded-xl text-xs font-bold shadow-md hover:shadow-lg transition-all">Save Adaptations</button>
                  </div>
                )}
              </div>
            </div>
          )}
        </div>
      );
    };

    const TacticalCalendar = ({ session, activeTasks, setActiveModule, setTriggerPrompt, activeUserName, userProfile }) => {
      const isDispatcher = userProfile?.stage === 'Dispatcher';
      const [events, setEvents] = useState([]);
      const [selectedDate, setSelectedDate] = useState(new Date());
      const [selectedEvent, setSelectedEvent] = useState(null);
      const [showAddModal, setShowAddModal] = useState(false);
      const [newEvent, setNewEvent] = useState({ title: '', time: '09:00', type: isDispatcher ? 'shift' : 'meeting', participants: '', notes: '' });
      const [expandedTaskId, setExpandedTaskId] = useState(null);
      const [activeTab, setActiveTab] = useState('timeline'); // 'timeline' or 'tasks'

      const handleAskCEO = () => {
        setActiveModule('neural-chat');
        const today = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
        setTimeout(() => {
          setTriggerPrompt({ sender: 'user', text: `Schedule something on my calendar. Today is ${today}. Ask me what type of event, the time, and any relevant details, then add it to the timeline and create any related tasks needed.` });
        }, 150);
      };

      const updateTaskLocal = (taskId, updates) => {
        const currentStage = userProfile?.stage || 'Default';
        const tasksKey = `amp_tasks_${currentStage}`;
        const local = JSON.parse(localStorage.getItem(tasksKey) || '[]');
        const targetIdx = local.findIndex(t => t.id === taskId);
        
        if (targetIdx !== -1) {
          const task = local[targetIdx];
          local[targetIdx] = { ...task, ...updates };
          localStorage.setItem(tasksKey, JSON.stringify(local));
          window.dispatchEvent(new Event('amp-tasks-updated'));

          // If marking as done, create a timeline event
          if (updates.status === 'done') {
            const calKey = `amp_calendar_events_${currentStage}`;
            const localEvents = JSON.parse(localStorage.getItem(calKey) || '[]');
            const newEvent = {
              id: 'task-done-' + Date.now(),
              task_name: task.title,
              event_type: task.agent ? 'agent_deployment' : 'manual',
              date_time: new Date().toISOString(),
              agent_role: task.agent || 'User',
              participants: '',
              notes: 'Task completed manually.',
              created_by: activeUserName || 'User',
              business_stage: currentStage,
              created_at: new Date().toISOString()
            };
            localEvents.push(newEvent);
            localStorage.setItem(calKey, JSON.stringify(localEvents));
            window.dispatchEvent(new Event('amp-calendar-updated'));

            if (supabaseClient && session?.user?.id) {
               supabaseClient.from('calendar_events').insert([{ ...newEvent, user_id: session.user.id }]).then();
            }
          }
        }
      };

      const currentStage = userProfile?.stage || 'Default';
      const storageKey = `amp_calendar_events_${currentStage}`;

      const fetchEvents = async () => {
        let currentLocal = [];
        try {
          currentLocal = JSON.parse(localStorage.getItem(storageKey) || '[]');
        } catch(e) {}

        if (supabaseClient && session?.user?.id) {
          try {
            const { data, error } = await supabaseClient.from('calendar_events').select('*').eq('business_stage', currentStage).order('created_at', { ascending: true });
            if (!error && data) {
              const remoteIds = new Set(data.map(d => d.id));
              const localOnly = currentLocal.filter(l => !remoteIds.has(l.id));
              setEvents([...data, ...localOnly]);
              return;
            }
          } catch(e) {}
        }
        setEvents(currentLocal);
      };

      useEffect(() => {
        const handleCalUpdate = () => fetchEvents();
        window.addEventListener('amp-calendar-updated', handleCalUpdate);
        return () => window.removeEventListener('amp-calendar-updated', handleCalUpdate);
      }, [userProfile?.stage]);

      useEffect(() => {
        fetchEvents();
        if (supabaseClient) {
          const channel = supabaseClient.channel('realtime:calendar_events')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'calendar_events' }, fetchEvents)
            .subscribe();
          return () => { supabaseClient.removeChannel(channel); };
        }
      }, [userProfile?.stage, session]);

      const handleAddManualEvent = async () => {
        if (!newEvent.title) return;
        const dateStr = selectedDate.toISOString().split('T')[0];
        const eventDateTime = new Date(`${dateStr}T${newEvent.time}:00`).toISOString();
        const payload = {
          task_name: newEvent.title,
          event_type: newEvent.type,
          date_time: eventDateTime,
          agent_role: 'User',
          participants: newEvent.participants,
          notes: newEvent.notes,
          created_by: activeUserName || 'User'
        };
        const completePayload = { id: Date.now().toString(), ...payload, business_stage: currentStage, created_at: new Date().toISOString() };
        
        const local = JSON.parse(localStorage.getItem(storageKey) || '[]');
        local.push(completePayload);
        localStorage.setItem(storageKey, JSON.stringify(local));
        window.dispatchEvent(new Event('amp-calendar-updated'));
        setEvents(local);

        if (supabaseClient && session?.user?.id) {
           try { await supabaseClient.from('calendar_events').insert([{ ...completePayload, user_id: session.user.id }]); } catch(e){}
        }
        
        setShowAddModal(false);
        setNewEvent({ title: '', time: '09:00', type: 'meeting', participants: '', notes: '' });
      };

      // Generate next 7 days for the date strip
      const dates = [];
      const today = new Date();
      for (let i = -1; i <= 5; i++) {
        const d = new Date(today);
        d.setDate(d.getDate() + i);
        dates.push(d);
      }

      const selectedDateStr = selectedDate.toLocaleDateString();
      const timelineEvents = events.filter(ev => {
         if (!ev.date_time) return false;
         return new Date(ev.date_time).toLocaleDateString() === selectedDateStr;
      }).sort((a, b) => new Date(b.date_time) - new Date(a.date_time));

      const priorityWeight = { 'High': 3, 'Medium': 2, 'Low': 1 };
      const todaysTasks = (activeTasks || [])
        .filter(t => t.status !== 'done' && t.id && !t.id.toString().startsWith('temp-') && !t.scheduled_time)
        .sort((a, b) => {
           const pA = priorityWeight[a.priority] || 2;
           const pB = priorityWeight[b.priority] || 2;
           return pB - pA;
        });

      const typeColors = isDispatcher ? {
        'shift': { bg: 'bg-pd-teal/10', text: 'text-pd-teal', border: 'border-pd-teal/20', icon: 'solar:steering-linear' },
        'vto': { bg: 'bg-gray-500/10', text: 'text-gray-400 dark:text-gray-400', border: 'border-gray-500/20', icon: 'solar:home-linear' },
        'pto': { bg: 'bg-blue-500/10', text: 'text-blue-600 dark:text-blue-400', border: 'border-blue-500/20', icon: 'solar:palmtree-linear' },
        'call_out': { bg: 'bg-red-500/10', text: 'text-red-500 dark:text-red-400', border: 'border-red-500/20', icon: 'solar:danger-triangle-linear' },
        'flex': { bg: 'bg-purple-500/10', text: 'text-purple-500 dark:text-purple-400', border: 'border-purple-500/20', icon: 'solar:bolt-circle-linear' },
        'manual': { bg: 'bg-pd-orange/10', text: 'text-pd-orange', border: 'border-pd-orange/20', icon: 'solar:user-linear' },
      } : {
        'meeting': { bg: 'bg-blue-500/10', text: 'text-blue-600 dark:text-blue-400', border: 'border-blue-500/20', icon: 'solar:calendar-date-linear' },
        'agent_deployment': { bg: 'bg-pd-teal/10', text: 'text-pd-teal', border: 'border-pd-teal/20', icon: 'solar:cpu-linear' },
        'manual': { bg: 'bg-pd-orange/10', text: 'text-pd-orange', border: 'border-pd-orange/20', icon: 'solar:user-linear' },
      };

      return (
        <div className="p-4 lg:p-6 xl:p-8 h-full flex flex-col gap-6 relative overflow-y-auto custom-scrollbar">
          
          {/* Header */}
          <div className="mb-6 flex justify-between items-center">
            <div>
              <h2 className="text-xl md:text-2xl font-semibold tracking-tight text-gray-900 dark:text-white mb-1">{isDispatcher ? 'Driver Schedule' : 'Tactical Calendar'}</h2>
              <p className="text-xs text-gray-500">{isDispatcher ? "Manage daily driver shifts and routes for the week." : "Autonomous scheduling and daily activity timeline."}</p>
            </div>
            <div className="flex gap-2 w-full md:w-auto">
              <button onClick={() => setShowAddModal(true)} className="group inline-flex gap-1 transition-all duration-500 dark:text-white overflow-hidden isolate dark:bg-gray-800/60 text-xs font-medium text-gray-900 bg-white/60 rounded-full py-2 px-4 relative backdrop-blur-md items-center justify-center w-full md:w-auto shadow-[0_4px_24px_rgba(70,212,198,0.18),0_2px_8px_rgba(255,145,70,0.12)] hover:shadow-[0_6px_32px_rgba(70,212,198,0.28),0_4px_16px_rgba(255,145,70,0.2)] hover:-translate-y-[1px] active:scale-[0.98]"><div className="absolute inset-[-200%] bg-[conic-gradient(from_90deg_at_50%_50%,transparent_0%,#ff9146_30%,#ffffff_50%,#46d4c6_70%,transparent_100%)] opacity-0 group-hover:opacity-100 transition-opacity duration-500 animate-[spin_1.5s_linear_infinite] pointer-events-none z-0"></div><div className="absolute inset-[2px] rounded-full bg-white/90 dark:bg-gray-800/90 transition-colors duration-500 pointer-events-none z-0"></div><span className="relative z-10 flex items-center gap-2"><iconify-icon icon="solar:pen-linear" className="mr-2"></iconify-icon> Manual Entry
              </span></button>
              <button onClick={handleAskCEO} className="group inline-flex gap-1 transition-all duration-500 text-white overflow-hidden isolate dramatic-hover text-xs font-medium bg-pd-teal rounded-full py-2 px-4 relative backdrop-blur-md items-center justify-center w-full md:w-auto shadow-[0_4px_24px_rgba(70,212,198,0.18),0_2px_8px_rgba(255,145,70,0.12)] hover:shadow-[0_6px_32px_rgba(70,212,198,0.28),0_4px_16px_rgba(255,145,70,0.2)] hover:-translate-y-[1px] active:scale-[0.98]"><div className="absolute inset-[-200%] bg-[conic-gradient(from_90deg_at_50%_50%,transparent_0%,#ff9146_30%,#ffffff_50%,#46d4c6_70%,transparent_100%)] opacity-0 group-hover:opacity-100 transition-opacity duration-500 animate-[spin_1.5s_linear_infinite] pointer-events-none z-0"></div><div className="absolute inset-[2px] rounded-full bg-pd-teal transition-colors duration-500 pointer-events-none z-0"></div><span className="relative z-10 flex items-center gap-2"><iconify-icon icon="solar:magic-stick-3-linear" className="mr-2"></iconify-icon> Ask CEO to Schedule
              </span></button>
            </div>
          </div>

          {/* Date Strip */}
          <div className="flex gap-2 overflow-x-auto pb-4 hide-scrollbar">
            {dates.map((d, i) => {
              const isSelected = d.toLocaleDateString() === selectedDateStr;
              const isToday = d.toLocaleDateString() === today.toLocaleDateString();
              return (
                <button 
                  key={i} 
                  onClick={() => setSelectedDate(d)}
                  className={`flex flex-col items-center justify-center min-w-[70px] p-3 rounded-2xl border transition-all ${isSelected ? 'bg-gray-900 dark:bg-white text-white dark:text-gray-900 border-transparent shadow-lg' : 'bg-white/50 dark:bg-[#0b0f19]/50 text-gray-500 border-gray-200 dark:border-white/10 hover:border-pd-teal/50'}`}
                >
                  <span className="text-[10px] font-bold uppercase tracking-wider opacity-70 mb-1">{d.toLocaleDateString('en-US', { weekday: 'short' })}</span>
                  <span className={`text-xl font-semibold ${isToday && !isSelected ? 'text-pd-orange' : ''}`}>{d.getDate()}</span>
                </button>
              );
            })}
          </div>

          {/* Tab Switcher (Mobile, Tablet, Small Desktop) */}
          <div className="2xl:hidden flex items-center gap-2 mb-2 p-1 bg-gray-100 dark:bg-white/5 rounded-2xl w-fit">
            <button 
              onClick={() => setActiveTab('timeline')}
              className={`px-4 py-2 rounded-xl text-xs font-semibold transition-all ${activeTab === 'timeline' ? 'bg-white dark:bg-pd-glass shadow-sm text-pd-teal' : 'text-gray-500'}`}
            >
              Timeline
            </button>
            <button 
              onClick={() => setActiveTab('tasks')}
              className={`px-4 py-2 rounded-xl text-xs font-semibold transition-all ${activeTab === 'tasks' ? 'bg-white dark:bg-pd-glass shadow-sm text-pd-orange' : 'text-gray-500'}`}
            >
              Today's Tasks
            </button>
          </div>

          <div className="flex-1 flex flex-col 2xl:flex-row gap-6 min-h-0">
            {/* Timeline Pane */}
            <div className={`w-full 2xl:w-1/2 flex flex-col bg-white/40 dark:bg-pd-glass backdrop-blur-2xl border border-gray-200 dark:border-pd-glassBorder rounded-[2rem] p-6 shadow-sm min-h-[250px] overflow-hidden ${activeTab !== 'timeline' ? 'hidden 2xl:flex' : 'flex'}`}>
              <h3 className="text-sm font-semibold mb-6 flex items-center gap-2 text-gray-900 dark:text-white flex-shrink-0">
                <iconify-icon icon="solar:clock-circle-linear" className="text-pd-teal"></iconify-icon> 
                Timeline for {selectedDate.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' })}
              </h3>
              
              <div className="flex-1 overflow-y-auto custom-scrollbar pr-2">
                {timelineEvents.length === 0 ? (
                  <div className="flex flex-col items-center justify-center h-40 text-gray-400">
                    <iconify-icon icon="solar:calendar-search-linear" width="32" className="mb-2 opacity-50"></iconify-icon>
                    <p className="text-xs">No {isDispatcher ? 'drivers scheduled' : 'events or deployments scheduled'}.</p>
                  </div>
                ) : (
                  <div className="flex flex-col gap-2">
                    {timelineEvents.map((ev, i) => {
                      const timeStr = new Date(ev.date_time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                      const style = typeColors[ev.event_type] || typeColors['manual'];
                      return (
                        <div key={i} onClick={() => setSelectedEvent(ev)} className="bg-white/60 dark:bg-black/20 border border-gray-200 dark:border-white/5 rounded-xl p-3 shadow-sm hover:border-pd-teal/50 transition-all cursor-pointer flex items-center justify-between relative overflow-hidden group">
                          <div className={`absolute top-0 left-0 w-1 h-full ${style.bg.replace('/10', '')} opacity-50`}></div>
                          <div className="flex items-center gap-3 ml-2 overflow-hidden flex-1">
                            <div className={`w-8 h-8 rounded-lg flex-shrink-0 flex items-center justify-center ${style.bg} ${style.text}`}>
                              <iconify-icon icon={style.icon} width="16"></iconify-icon>
                            </div>
                            <div className="flex flex-col flex-1 min-w-0">
                              <div className="flex items-center gap-2 mb-0.5">
                                <span className={`text-[9px] uppercase font-bold tracking-wider px-1.5 py-0.5 rounded border ${style.bg} ${style.text} ${style.border}`}>
                                  {ev.event_type?.replace('_', ' ')}
                                </span>
                                <span className="text-[10px] font-mono text-gray-400 flex items-center gap-1">
                                  <iconify-icon icon="solar:clock-circle-linear"></iconify-icon> {timeStr}
                                </span>
                              </div>
                              <h4 className="font-semibold text-gray-900 dark:text-white text-sm truncate">{ev.task_name}</h4>
                              {(ev.participants || ev.agent_role) && (
                                <div className="flex flex-wrap gap-2 text-[10px] text-gray-500 mt-0.5">
                                  {ev.participants && <span className="flex items-center gap-1"><iconify-icon icon="solar:routing-2-bold-duotone" className="text-pd-teal"></iconify-icon> {ev.participants}</span>}
                                  {ev.agent_role && <span className="flex items-center gap-1"><iconify-icon icon="solar:shield-user-linear" className="text-pd-teal"></iconify-icon> {ev.agent_role}</span>}
                                </div>
                              )}
                            </div>
                          </div>
                          <iconify-icon icon="solar:alt-arrow-right-linear" className="text-gray-400 group-hover:text-pd-teal ml-2"></iconify-icon>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            </div>

          {/* Today's Tasks Right Bar */}
          <div className={`w-full 2xl:w-1/2 flex flex-col bg-white/40 dark:bg-pd-glass backdrop-blur-2xl border border-gray-200 dark:border-pd-glassBorder rounded-[2rem] p-6 shadow-sm min-h-[250px] overflow-hidden ${activeTab !== 'tasks' ? 'hidden 2xl:flex' : 'flex'}`}>
            <h3 className="text-sm font-semibold mb-4 flex items-center justify-between text-gray-900 dark:text-white flex-shrink-0">
              <span className="flex items-center gap-2"><iconify-icon icon="solar:checklist-minimalistic-linear" className="text-pd-orange"></iconify-icon> Today's Tasks</span>
              <span className="text-[10px] bg-pd-orange/20 text-pd-orange px-2 py-1 rounded-full">{todaysTasks.length} Active</span>
            </h3>
            
            <div className="flex-1 overflow-y-auto custom-scrollbar pr-2">
              <div className="grid grid-cols-1 md:grid-cols-2 2xl:grid-cols-1 gap-3">
                {todaysTasks.length === 0 ? (
                  <div className="text-center text-gray-500 text-xs mt-4 col-span-full">You're all caught up for today.</div>
                ) : (
                  todaysTasks.map(task => {
                    const pColor = task.priority === 'High' ? 'text-red-500 bg-red-500/10 border-red-500/20' : task.priority === 'Medium' ? 'text-pd-orange bg-pd-orange/10 border-pd-orange/20' : 'text-gray-500 bg-gray-100 dark:bg-white/5 border-gray-200 dark:border-white/10';
                    const isExpanded = expandedTaskId === task.id;
                    
                    return (
                      <div key={task.id} className="rounded-xl border border-gray-200 dark:border-white/10 bg-white/60 dark:bg-black/20 hover:border-pd-teal/30 transition-colors group flex flex-col">
                        <div 
                          className="p-4 cursor-pointer flex-1"
                          onClick={() => setExpandedTaskId(isExpanded ? null : task.id)}
                        >
                          <div className="flex justify-between items-start mb-2">
                            <span className={`text-[9px] font-bold uppercase tracking-wider px-2 py-0.5 rounded border ${pColor}`}>{task.priority || 'Medium'}</span>
                            <span className="text-[10px] text-gray-400 capitalize flex items-center gap-1">
                              {(task.status || 'todo').replace('_', ' ')}
                              <iconify-icon icon={isExpanded ? "solar:alt-arrow-up-linear" : "solar:alt-arrow-down-linear"} className="text-pd-teal ml-1"></iconify-icon>
                            </span>
                          </div>
                          <h4 className="text-sm font-medium text-gray-900 dark:text-white leading-tight group-hover:text-pd-teal transition-colors">{task.title}</h4>
                          <div className="mt-3 flex items-center justify-between">
                            <span className="text-[10px] text-gray-500 flex items-center gap-1"><iconify-icon icon="solar:user-circle-linear"></iconify-icon> {task.agent}</span>
                          </div>
                        </div>
                        
                        {isExpanded && (
                          <div className="p-4 border-t border-gray-200 dark:border-white/10 bg-black/5 dark:bg-white/5 space-y-3">
                            <div className="flex gap-2 text-xs">
                              <span className="text-gray-500">Edit Priority:</span>
                              {['High', 'Medium', 'Low'].map(p => (
                                <button 
                                  key={p} 
                                  onClick={() => updateTaskLocal(task.id, { priority: p })}
                                  className={`px-2 py-0.5 rounded ${task.priority === p ? 'bg-pd-teal text-white' : 'bg-gray-200 dark:bg-white/10 text-gray-600 dark:text-gray-300 hover:bg-pd-teal/50'}`}
                                >
                                  {p}
                                </button>
                              ))}
                            </div>
                            <div className="flex gap-2 text-xs pt-1">
                              <button 
                                onClick={() => updateTaskLocal(task.id, { status: 'in_progress' })}
                                className="flex-1 bg-blue-500/10 text-blue-600 dark:text-blue-400 border border-blue-500/20 py-1.5 rounded hover:bg-blue-500/20 transition-colors"
                              >
                                In Progress
                              </button>
                              <button 
                                onClick={() => {
                                  updateTaskLocal(task.id, { status: 'done' });
                                  setExpandedTaskId(null);
                                }}
                                className="flex-1 bg-green-500/10 text-green-600 dark:text-green-400 border border-green-500/20 py-1.5 rounded hover:bg-green-500/20 transition-colors"
                              >
                                Mark Done
                              </button>
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  })
                )}
              </div>
            </div>
          </div>
        </div>

          {/* Add Event Modal */}
          {showAddModal && (
            <div className="fixed inset-0 bg-black/40 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
              <div className="bg-white dark:bg-[#0b0f19] border border-gray-200 dark:border-pd-glassBorder rounded-2xl w-full max-w-md p-6 shadow-2xl">
                <div className="flex justify-between items-center mb-4">
                  <h3 className="font-semibold text-lg text-gray-900 dark:text-white">{isDispatcher ? 'Schedule Driver' : 'Manual Event Entry'}</h3>
                  <button onClick={() => setShowAddModal(false)} className="text-gray-500 hover:text-gray-900 dark:hover:text-white"><iconify-icon icon="solar:close-circle-linear" width="20"></iconify-icon></button>
                </div>
                <div className="space-y-4">
                  <div>
                    <label className="block text-xs text-gray-500 mb-1">{isDispatcher ? 'Driver Name' : 'Event Title'}</label>
                    <input type="text" value={newEvent.title} onChange={e => setNewEvent({...newEvent, title: e.target.value})} className="w-full bg-black/5 dark:bg-white/10 border-none rounded-xl px-4 py-2 text-sm text-gray-900 dark:text-white focus:ring-1 focus:ring-pd-teal outline-none" placeholder={isDispatcher ? "John Doe" : "Meeting with Client"} />
                  </div>
                  <div className="flex gap-4">
                    <div className="flex-1">
                      <label className="block text-xs text-gray-500 mb-1">Time</label>
                      <input type="time" value={newEvent.time} onChange={e => setNewEvent({...newEvent, time: e.target.value})} className="w-full bg-black/5 dark:bg-white/10 border-none rounded-xl px-4 py-2 text-sm text-gray-900 dark:text-white focus:ring-1 focus:ring-pd-teal outline-none" />
                    </div>
                    <div className="flex-1">
                      <label className="block text-xs text-gray-500 mb-1">{isDispatcher ? 'Status/Type' : 'Type'}</label>
                      <select value={newEvent.type} onChange={e => setNewEvent({...newEvent, type: e.target.value})} className="w-full bg-black/5 dark:bg-white/10 border-none rounded-xl px-4 py-2 text-sm text-gray-900 dark:text-white focus:ring-1 focus:ring-pd-teal outline-none">
                        {isDispatcher ? (
                          <>
                            <option value="shift">Normal Shift</option>
                            <option value="vto">VTO (Voluntary Time Off)</option>
                            <option value="pto">PTO</option>
                            <option value="call_out">Call Out</option>
                            <option value="flex">Flex</option>
                          </>
                        ) : (
                          <>
                            <option value="meeting">Meeting</option>
                            <option value="manual">Manual Task</option>
                          </>
                        )}
                      </select>
                    </div>
                  </div>
                  <div>
                    <label className="block text-xs text-gray-500 mb-1">{isDispatcher ? 'Assigned Route/Location (Optional)' : 'Participants (Optional)'}</label>
                    <input type="text" value={newEvent.participants} onChange={e => setNewEvent({...newEvent, participants: e.target.value})} className="w-full bg-black/5 dark:bg-white/10 border-none rounded-xl px-4 py-2 text-sm text-gray-900 dark:text-white focus:ring-1 focus:ring-pd-teal outline-none" placeholder={isDispatcher ? "Route B / Downtown" : "John Doe, Jane Smith"} />
                  </div>
                  <div>
                     <label className="block text-xs text-gray-500 mb-1">Notes (Optional)</label>
                     <textarea value={newEvent.notes} onChange={e => setNewEvent({...newEvent, notes: e.target.value})} className="w-full bg-black/5 dark:bg-white/10 border-none rounded-xl px-4 py-2 text-sm text-gray-900 dark:text-white focus:ring-1 focus:ring-pd-teal outline-none resize-none" rows="3" placeholder="Add some details..."></textarea>
                   </div>
                </div>
                <div className="flex gap-2 mt-6">
                  <button onClick={() => setShowAddModal(false)} className="flex-1 amp-button secondary py-2">Cancel</button>
                  <button onClick={handleAddManualEvent} className="flex-1 amp-button primary py-2">Schedule</button>
                </div>
              </div>
            </div>
          )}

          {/* Event Details Modal */}
          {selectedEvent && (
            <div className="fixed inset-0 bg-black/40 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
              <div className="bg-white dark:bg-[#0b0f19] border border-gray-200 dark:border-pd-glassBorder rounded-2xl w-full max-w-md p-6 shadow-2xl">
                <div className="flex justify-between items-start mb-4 border-b border-gray-200 dark:border-pd-glassBorder pb-3">
                  <div>
                    <h3 className="text-lg font-bold text-gray-900 dark:text-white mb-4">{selectedEvent.task_name}</h3>
                    <p className="text-xs text-gray-500 mt-1">
                      {new Date(selectedEvent.date_time).toLocaleString()} â€¢ {selectedEvent.agent_role || 'User'}
                    </p>
                  </div>
                  <button onClick={() => setSelectedEvent(null)} className="text-gray-500 hover:text-gray-900 dark:hover:text-white"><iconify-icon icon="solar:close-circle-linear" width="20"></iconify-icon></button>
                </div>
                <div className="text-sm text-gray-700 dark:text-gray-300">
                  {selectedEvent.participants && <p className="mb-2"><strong>{isDispatcher ? 'Route/Location:' : 'Participants:'}</strong> {selectedEvent.participants}</p>}
                  <p className="capitalize mb-2"><strong>{isDispatcher ? 'Status:' : 'Type:'}</strong> {selectedEvent.event_type?.replace('_', ' ')}</p>
                  {selectedEvent.notes && <div className="mt-4 p-3 bg-black/5 dark:bg-white/5 rounded-xl border border-gray-100 dark:border-white/5"><strong>Notes:</strong><p className="mt-1 text-xs text-gray-500 dark:text-gray-400">{selectedEvent.notes}</p></div>}
                </div>
                <button onClick={() => setSelectedEvent(null)} className="w-full amp-button primary py-2 mt-6">Close Details</button>
              </div>
            </div>
          )}

        </div>
      );
    };

    const FormatText = ({ text }) => {
      if (!text) return null;

      const renderInline = (str, keyPrefix) => {
        // Split on **bold** first, then *italic* within remaining text
        const boldParts = str.split(/(\*\*.*?\*\*)/g);
        return boldParts.map((part, i) => {
          if (part.startsWith('**') && part.endsWith('**')) {
            return <strong key={`${keyPrefix}-b${i}`} className="font-bold">{part.slice(2, -2)}</strong>;
          }
          // Handle *italic* within non-bold segments
          const italicParts = part.split(/(\*[^*]+?\*)/g);
          return italicParts.map((ip, j) => {
            if (ip.startsWith('*') && ip.endsWith('*') && ip.length > 2) {
              return <em key={`${keyPrefix}-i${i}-${j}`} className="italic">{ip.slice(1, -1)}</em>;
            }
            return <span key={`${keyPrefix}-s${i}-${j}`}>{ip}</span>;
          });
        });
      };

      const lines = text.split('\n');
      return lines.map((line, idx) => {
        // Render bullet lines (- item or * item at line start)
        const bulletMatch = line.match(/^(\s*)[\-\*]\s+(.*)/);
        if (bulletMatch) {
          return (
            <div key={idx} className="flex gap-2 my-0.5">
              <span className="text-pd-teal mt-0.5 shrink-0">{'\u2022'}</span>
              <span>{renderInline(bulletMatch[2], `${idx}`)}</span>
            </div>
          );
        }
        return (
          <React.Fragment key={idx}>
            {renderInline(line, `${idx}`)}
            {idx < lines.length - 1 && <br />}
          </React.Fragment>
        );
      });
    };

    const App = () => {
      const [session, setSession] = useState(() => {
        try { return localStorage.getItem('amp_local_session') === 'true' ? { user: { id: 'local' } } : null; }
        catch(e) { return null; }
      });
      const [currentScreen, setCurrentScreen] = useState(() => {
        try { return localStorage.getItem('amp_genesis_complete') === 'true' ? 'dashboard' : 'genesis'; }
        catch(e) { return 'genesis'; }
      });
      const [typingSpeed, setTypingSpeed] = useState(0);

      useEffect(() => {
        if (supabaseClient) {
          const handleUserSwitch = (sess) => {
            if (!sess) return;
            const lastUser = localStorage.getItem('amp_last_user_id');
            if (lastUser && lastUser !== sess.user.id) {
              // Different user logged in! Wipe all amp_ keys to prevent data leakage.
              Object.keys(localStorage).forEach(key => {
                if (key.startsWith('amp_')) {
                  localStorage.removeItem(key);
                }
              });
            }
            localStorage.setItem('amp_last_user_id', sess.user.id);
          };

          const checkUserGenesis = async (sess) => {
            if (!sess) return;
            
            // If user signed in with Google, auto-save their Gmail connection token
            if (sess.provider_token && sess.provider_refresh_token && sess.user) {
               try {
                 await supabaseClient.from('gmail_tokens').upsert({
                   user_id: sess.user.id,
                   email: sess.user.email,
                   refresh_token: sess.provider_refresh_token,
                   connected_at: new Date().toISOString()
                 }, { onConflict: 'user_id' });
               } catch(e) {
                 console.warn("Failed to auto-save gmail token", e);
               }
            }

            if (localStorage.getItem('amp_genesis_complete') === 'true') {
              setCurrentScreen('dashboard');
              return;
            }
            try {
              const { data } = await supabaseClient.from('business_profile').select('stage').eq('user_id', sess.user.id).limit(1);
              if (data && data.length > 0) {
                localStorage.setItem('amp_genesis_complete', 'true');
                setCurrentScreen('dashboard');
              }
            } catch(e) {}
          };

          supabaseClient.auth.getSession().then(({ data: { session } }) => {
            handleUserSwitch(session);
            setSession(session);
            checkUserGenesis(session);
          });
          supabaseClient.auth.onAuthStateChange((_event, session) => {
            handleUserSwitch(session);
            setSession(session);
            checkUserGenesis(session);
          });
        }
      }, []);

      return (
        <>
          <Background typingSpeed={typingSpeed} />
          {!session ? (
            <AuthScreen onLogin={(sess) => setSession(sess)} />
          ) : (
            <>
              {currentScreen === 'genesis' && <Genesis onComplete={() => { localStorage.setItem('amp_genesis_complete', 'true'); setCurrentScreen('dashboard'); }} typingSpeed={typingSpeed} setTypingSpeed={setTypingSpeed} />}
              {currentScreen === 'dashboard' && <CommandCenter session={session} />}
            </>
          )}
        </>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>


</body>

</html>
